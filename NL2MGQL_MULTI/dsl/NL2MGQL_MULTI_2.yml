        code: "import json\n\n\ndef main(text: str):\n    raw = str(text or '').strip()\n\
          \    if not raw:\n        raise ValueError('本地LLM返回为空')\n    body = {\n\
          \        'choices': [\n            {\n                'message': {\n   \
          \                 'content': raw,\n                }\n            }\n  \
          \      ]\n    }\n    return {\n        'status_code': 200,\n        'body':\
          \ json.dumps(body, ensure_ascii=False),\n    }\n"
