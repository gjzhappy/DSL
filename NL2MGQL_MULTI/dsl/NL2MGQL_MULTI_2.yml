              return {
                  'enabled': enabled,
                  'chart_type': chart_type,
                  'x_field': x_field,
                  'y_field': y_field,
                  'series_name': series_name,
                  'title': title,
              }
          
          
          def _to_float(value):
              if isinstance(value, bool):
                  return 1.0 if value else 0.0
              if isinstance(value, (int, float)):
                  return float(value)
              text = str(value or '').strip()
              if not text:
                  return None
              text = text.replace(',', '')
              try:
                  return float(text)
              except Exception:
                  return None
          
          
