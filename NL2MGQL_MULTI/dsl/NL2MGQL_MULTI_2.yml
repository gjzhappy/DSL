                  'provider_name': 'antv/visualization/visualization',
                  'tool_name': tool_name,
                  'params': {
                      'data': json.dumps(data, ensure_ascii=False),
                      'title': title,
                      'axisXTitle': x_field,
                      'axisYTitle': y_field,
                  }
              }
          
          
          def main(semantic_plan, planner, question: str, schema_context: str, query_urls: str):
