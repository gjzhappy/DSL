          def _build_antv_tool_payload(chart_decision, visualization, rows):
              if not chart_decision.get('enabled'):
                  return {}
              chart_type = str(chart_decision.get('chart_type') or 'bar')
              x_field = str((visualization or {}).get('x_field') or '').strip()
              y_field = str((visualization or {}).get('y_field') or '').strip()
              title = str((visualization or {}).get('title') or '').strip()
              if not x_field or not y_field:
                  return {}
              data = []
              for row in rows or []:
                  if not isinstance(row, dict):
                      continue
                  if row.get(x_field) is None or row.get(y_field) is None:
                      continue
                  point = {'value': row.get(y_field)}
                  if chart_type in {'line', 'area'}:
                      point['time'] = row.get(x_field)
                  else:
                      point['category'] = row.get(x_field)
                  group = row.get('group')
                  if group is not None:
                      point['group'] = group
                  data.append(point)
              if not data:
                  return {}
              tool_name_map = {
                  'bar': 'generate_bar_chart',
                  'line': 'generate_line_chart',
                  'pie': 'generate_pie_chart',
                  'area': 'generate_area_chart',
                  'boxplot': 'generate_boxplot_chart',
              }
              tool_name = tool_name_map.get(chart_type, 'generate_bar_chart')
              return {
