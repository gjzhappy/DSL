              title = str(visualization.get('title') or '').strip()
              series_name = str(visualization.get('series_name') or 'value').strip() or 'value'
              if not x_field or not y_field:
                  return {}
              points = []
              for row in rows:
                  if not isinstance(row, dict):
                      continue
