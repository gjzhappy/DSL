    - data:
        code: |
          
          import json
          import random
          import re
          import ssl
          import urllib.error
          import urllib.request
          import uuid
          from datetime import datetime, timedelta, timezone
          
          SGT = timezone(timedelta(hours=8))
          DEFAULT_TIMEOUT_SECONDS = 600
          
          
          def _read_json_text(value):
              if value is None:
                  return None
              if isinstance(value, (dict, list)):
                  return value
              raw = str(value).strip()
              if not raw:
                  return None
              return json.loads(raw)
          
          
          def _ensure_obj(value, name):
              obj = _read_json_text(value)
              if obj is None:
                  return {}
              if not isinstance(obj, dict):
                  raise ValueError(f'{name} must be a JSON object')
              return obj
          
          
          def _ensure_non_empty_string(value, name):
              text = str(value or '').strip()
              if not text:
                  raise ValueError(f'{name} is required')
              return text
          
          
          def _ensure_string_list(value, name):
              if value is None:
                  return []
              if not isinstance(value, list):
                  raise ValueError(f'{name} must be an array')
              result = []
              for idx, item in enumerate(value):
                  text = str(item or '').strip()
                  if not text:
                      raise ValueError(f'{name}[{idx}] must be a non-empty string')
                  result.append(text)
              return result
          
          
          def _parse_scalar(value):
              if value is None:
                  return None
              if isinstance(value, (int, float, bool, list)):
                  return value
              text = str(value).strip()
              if text.lower() == 'true':
                  return True
              if text.lower() == 'false':
                  return False
              if re.fullmatch(r'-?\d+', text):
                  return int(text)
              if re.fullmatch(r'-?\d+\.\d+', text):
                  return float(text)
              return text
          
          
          def _parse_query_urls(raw_value):
              text = str(raw_value or '').strip()
              if not text:
                  return []
              parts = []
              for chunk in text.replace('\r', '\n').split('\n'):
                  for item in chunk.split(','):
                      url = str(item or '').strip()
                      if url:
                          parts.append(url)
              return parts
          
          
          def _build_match_expr(path, operator, value):
              parsed = _parse_scalar(value)
              if operator == 'eq':
                  return {path: parsed}
              if operator == 'in':
                  values = parsed if isinstance(parsed, list) else [parsed]
                  return {path: {'$in': values}}
              mongo_op = {'gt': '$gt', 'gte': '$gte', 'lt': '$lt', 'lte': '$lte', 'regex': '$regex'}.get(operator)
              if not mongo_op:
                  raise ValueError(f'unsupported operator: {operator}')
              return {path: {mongo_op: parsed}}
          
          
          def _merge_match(parts):
              parts = [p for p in parts if p]
              if not parts:
                  return None
              if len(parts) == 1:
                  return parts[0]
              return {'$and': parts}
          
          
          def _extract_returnable_fields(schema_context, collection_name):
              text = str(schema_context or '')
              pattern = rf'## collection={re.escape(collection_name)}\n.*?(?=(\n## collection=|\Z))'
              m = re.search(pattern, text, flags=re.DOTALL)
              section = m.group(0) if m else ''
              if not section:
                  return []
              lines = section.splitlines()
              fields = []
              i = 0
              name_re = re.compile(r'^[A-Za-z_][A-Za-z0-9_]*$')
              while i < len(lines):
                  line = lines[i].strip()
                  next_line = lines[i + 1].strip() if i + 1 < len(lines) else ''
                  if name_re.fullmatch(line) and next_line.startswith('- type:'):
                      field_name = line
                      block = []
                      j = i + 1
                      while j < len(lines):
                          cur = lines[j].strip()
                          nxt = lines[j + 1].strip() if j + 1 < len(lines) else ''
                          if j > i + 1 and cur and name_re.fullmatch(cur) and nxt.startswith('- type:'):
                              break
                          if cur.startswith('## collection='):
                              break
                          block.append(cur)
                          j += 1
                      block_text = '\n'.join(block)
                      if 'returnable: true' in block_text and 'sensitive: true' not in block_text:
                          fields.append(field_name)
                      i = j
                      continue
                  i += 1
              return fields
          
          
          def _normalize_time_range(value, collection_name, default_field='created_at'):
              if not isinstance(value, dict):
                  return {
                      'collection': collection_name,
                      'field': default_field,
                      'mode': 'none',
                      'relative_days': 0,
                      'start': '',
                      'end': '',
                  }
              mode = str(value.get('mode') or 'none').strip() or 'none'
              if mode not in {'none', 'relative_days', 'absolute'}:
                  mode = 'none'
              field = str(value.get('field') or default_field).strip() or default_field
              relative_days = max(int(value.get('relative_days') or 0), 0)
              start = str(value.get('start') or '').strip()
              end = str(value.get('end') or '').strip()
              if mode != 'absolute':
                  start = ''
                  end = ''
              if mode == 'absolute' and not start and not end:
                  mode = 'none'
              return {
                  'collection': collection_name,
                  'field': field,
                  'mode': mode,
                  'relative_days': relative_days,
                  'start': start,
                  'end': end,
              }
          
          
          def _sanitize_stage_filters(filters, time_range):
              if not isinstance(filters, list):
                  return []
              normalized = []
              dedup = set()
              time_mode = str((time_range or {}).get('mode') or 'none').strip()
              time_field = str((time_range or {}).get('field') or '').strip()
              for item in filters:
                  if not isinstance(item, dict):
                      continue
                  field = str(item.get('field') or '').strip()
                  operator = str(item.get('operator') or '').strip()
                  if not field or not operator:
                      continue
                  if time_mode != 'none' and field == time_field:
                      continue
                  value = item.get('value')
                  key = (field, operator, json.dumps(value, ensure_ascii=False, sort_keys=True))
                  if key in dedup:
                      continue
                  dedup.add(key)
                  normalized.append({'field': field, 'operator': operator, 'value': value})
              return normalized
          
          
          def _normalize_stage_field_ref(text):
              raw = str(text or '').strip()
              if not raw:
                  return ''
              raw = raw.lstrip('$')
              if '.' in raw:
                  return raw.split('.')[-1].strip()
              return raw
          
          
          def _sanitize_stage_for_compile(stage):
              if not isinstance(stage, dict):
                  return {}
              cleaned = dict(stage)
              time_range = _normalize_time_range(cleaned.get('time_range'), str(cleaned.get('collection') or '').strip() or 'unknown')
              cleaned['time_range'] = time_range
              raw_filters = cleaned.get('filters') or []
              cleaned['filters'] = _sanitize_stage_filters(raw_filters, time_range)
              dropped_stage_ref_filters = 0
              if str(cleaned.get('intent_type') or '').strip() == 'enrich_related':
                  cleaned['join_source_field'] = _normalize_stage_field_ref(cleaned.get('join_source_field'))
                  kept_filters = []
                  for f in cleaned.get('filters') or []:
                      value = (f or {}).get('value')
                      if isinstance(value, str) and value.strip().startswith('$stage'):
                          dropped_stage_ref_filters += 1
                          continue
                      kept_filters.append(f)
                  cleaned['filters'] = kept_filters
              cleaned['sanitize_report'] = {
                  'original_filter_count': len(raw_filters) if isinstance(raw_filters, list) else 0,
                  'effective_filter_count': len(cleaned['filters']),
                  'time_mode': time_range.get('mode'),
                  'dropped_stage_ref_filters': dropped_stage_ref_filters,
              }
              return cleaned
          
          
          def _apply_time_range(time_range):
              mode = str((time_range or {}).get('mode') or 'none').strip()
              if mode == 'none':
                  return None
              field = str((time_range or {}).get('field') or 'created_at').strip() or 'created_at'
              if mode == 'relative_days':
                  days = int((time_range or {}).get('relative_days') or 0)
                  start_dt = datetime.now(SGT) - timedelta(days=days)
                  return {field: {'$gte': start_dt.isoformat()}}
              if mode == 'absolute':
                  cond = {}
                  start = str((time_range or {}).get('start') or '').strip()
                  end = str((time_range or {}).get('end') or '').strip()
                  if start:
                      cond['$gte'] = start
                  if end:
                      cond['$lte'] = end
                  return {field: cond} if cond else None
              raise ValueError(f'unsupported time_range.mode: {mode}')
          
          
          def _find_best_rows(obj):
              best = []
              best_score = -1
              def score_rows(rows):
                  if not isinstance(rows, list) or not rows:
                      return -1
                  if not all(isinstance(item, dict) for item in rows):
                      return -1
                  keys = set()
                  for item in rows[:5]:
                      keys.update(item.keys())
                  score = len(rows)
                  for key in ('product_name', 'order_id', 'brand', 'amount', 'total_sales', 'product_gmv', 'sku_id', 'price'):
                      if key in keys:
                          score += 4
                  return score
              def visit(node):
                  nonlocal best, best_score
                  if isinstance(node, list):
                      s = score_rows(node)
                      if s > best_score:
                          best, best_score = node, s
                      for item in node:
                          visit(item)
                  elif isinstance(node, dict):
                      for key in ('rows', 'items', 'list', 'records', 'data', 'result', 'docs'):
                          if key in node:
                              visit(node.get(key))
                      for value in node.values():
                          visit(value)
              visit(obj)
              return best
          
          
          def _unique_values(rows, field):
              values = []
              seen = set()
              for row in rows or []:
                  if not isinstance(row, dict):
                      continue
                  value = row.get(field)
                  if isinstance(value, list):
                      for item in value:
                          text = str(item or '').strip()
                          if text and text not in seen:
                              seen.add(text)
                              values.append(text)
                  else:
                      text = str(value or '').strip()
                      if text and text not in seen:
                          seen.add(text)
                          values.append(text)
              return values
          
          
          def _detect_visualization_intent(query_text):
              text = str(query_text or '').strip()
              if not text:
                  return {'enabled': False, 'chart_type': ''}
              has_generic = any(k in text for k in ['å¾è¡¨', 'å¯è§å'])
              has_bar = any(k in text for k in ['æ±ç¶å¾', 'æ¡å½¢å¾', 'å¯¹æ¯å¾'])
              has_line = any(k in text for k in ['æçº¿å¾', 'è¶å¿å¾'])
              has_pie = 'é¥¼å¾' in text
              enabled = has_generic or has_bar or has_line or has_pie
              chart_type = ''
              if has_bar:
                  chart_type = 'bar'
              elif has_line:
                  chart_type = 'line'
              elif has_pie:
                  chart_type = 'pie'
              elif has_generic:
                  chart_type = 'bar'
              return {'enabled': enabled, 'chart_type': chart_type}
          
          
          def _normalize_plan(plan, planner, question=''):
              planner_primary = _ensure_non_empty_string(planner.get('primary_collection'), 'planner.primary_collection')
              planner_related = set(_ensure_string_list(planner.get('related_collections') or [], 'planner.related_collections'))
              execution_mode = str(plan.get('execution_mode') or 'single_stage').strip() or 'single_stage'
              primary_collection = _ensure_non_empty_string(plan.get('primary_collection') or planner_primary, 'execution_plan.primary_collection')
              if primary_collection != planner_primary:
                  raise ValueError('execution_plan.primary_collection must match planner.primary_collection')
              collections = _ensure_string_list(plan.get('collections') or [primary_collection], 'execution_plan.collections')
              if primary_collection not in collections:
                  collections = [primary_collection] + [c for c in collections if c != primary_collection]
              for c in collections:
                  if c != primary_collection:
                      planner_related.add(c)
          
              raw_stages = plan.get('stages') or []
              if not isinstance(raw_stages, list) or not raw_stages:
                  raise ValueError('execution_plan.stages must be a non-empty array')
              for raw in raw_stages:
                  if not isinstance(raw, dict):
                      continue
                  stage_collection = str(raw.get('collection') or '').strip()
                  if stage_collection and stage_collection not in collections:
                      collections.append(stage_collection)
          
              normalized_stages = []
              seen_stage_names = set()
              allowed_intents = {'detail_query', 'aggregate_summary', 'group_top_entity', 'group_top_record', 'enrich_related'}
              for idx, raw in enumerate(raw_stages):
                  if not isinstance(raw, dict):
                      raise ValueError(f'stages[{idx}] must be an object')
                  stage_name = _ensure_non_empty_string(raw.get('stage_name') or f'stage{idx + 1}', f'stages[{idx}].stage_name')
                  if stage_name in seen_stage_names:
                      raise ValueError(f'duplicate stage_name: {stage_name}')
                  seen_stage_names.add(stage_name)
                  collection = _ensure_non_empty_string(raw.get('collection'), f'stages[{idx}].collection')
                  if collection not in collections:
                      collections.append(collection)
                  if collection != primary_collection and collection not in planner_related:
                      planner_related.add(collection)
                  intent_type = _ensure_non_empty_string(raw.get('intent_type'), f'stages[{idx}].intent_type')
                  if intent_type not in allowed_intents:
                      raise ValueError(f'unsupported intent_type: {intent_type}')
                  default_limit = 0 if intent_type in {'group_top_entity', 'group_top_record'} else 20
                  limit = int(raw.get('limit') if raw.get('limit') is not None else default_limit)
                  if limit < 0:
                      raise ValueError(f'stages[{idx}].limit must be >= 0')
                  rank_n = int(raw.get('rank_n') or 0)
                  if intent_type in {'group_top_entity', 'group_top_record'} and rank_n <= 0:
                      rank_n = 1
                  stage = {
                      'stage_name': stage_name,
                      'collection': collection,
                      'depends_on': str(raw.get('depends_on') or '').strip(),
                      'intent_type': intent_type,
                      'time_range': _normalize_time_range(raw.get('time_range'), collection),
                      'group_fields': _ensure_string_list(raw.get('group_fields') or [], f'stages[{idx}].group_fields'),
                      'entity_field': str(raw.get('entity_field') or '').strip(),
                      'metric_function': str(raw.get('metric_function') or '').strip(),
                      'metric_field': str(raw.get('metric_field') or '').strip(),
                      'metric_alias': str(raw.get('metric_alias') or '').strip(),
                      'rank_n': rank_n,
                      'rank_order_field': str(raw.get('rank_order_field') or '').strip(),
                      'rank_direction': str(raw.get('rank_direction') or '').strip() or 'desc',
                      'sort': raw.get('sort') or [],
                      'limit': limit,
                      'projection_mode': str(raw.get('projection_mode') or 'none').strip() or 'none',
                      'projection_fields': _ensure_string_list(raw.get('projection_fields') or [], f'stages[{idx}].projection_fields'),
                      'join_source_field': str(raw.get('join_source_field') or '').strip(),
                      'apply_global_limit': bool(raw.get('apply_global_limit', False)),
                  }
                  stage['filters'] = _sanitize_stage_filters(raw.get('filters') or [], stage['time_range'])
                  if intent_type == 'enrich_related':
                      stage['join_target_field'] = str(raw.get('join_target_field') or '').strip()
                      stage['attach_as'] = str(raw.get('attach_as') or 'related_info').strip() or 'related_info'
                  normalized_stages.append(stage)
          
              final_merge = plan.get('final_merge') or {}
              if execution_mode == 'multi_stage' and len(normalized_stages) < 2:
                  raise ValueError('multi_stage execution requires at least 2 stages')
              if execution_mode == 'single_stage' and len(normalized_stages) > 1:
                  # allow but still run; keep mode aligned with actual stages count
                  execution_mode = 'multi_stage'
              visualization = _normalize_visualization(plan.get('visualization'))
              intent = _detect_visualization_intent(question)
              if intent.get('enabled'):
                  if not visualization.get('enabled'):
                      visualization['enabled'] = True
                      print('VISUALIZATION_FALLBACK_ENABLED')
                  if not str(visualization.get('chart_type') or '').strip() and intent.get('chart_type'):
                      visualization['chart_type'] = intent['chart_type']
          
              return {
                  'execution_mode': execution_mode,
                  'primary_collection': primary_collection,
                  'collections': collections,
                  'reasoning': str(plan.get('reasoning') or '').strip(),
                  'visualization': visualization,
                  'stages': normalized_stages,
                  'final_merge': {
                      'merge_mode': str(final_merge.get('merge_mode') or 'left_join').strip() or 'left_join',
                      'left_stage': str(final_merge.get('left_stage') or (normalized_stages[0]['stage_name'] if normalized_stages else '')).strip(),
                      'right_stage': str(final_merge.get('right_stage') or (normalized_stages[1]['stage_name'] if len(normalized_stages) > 1 else '')).strip(),
                      'left_field': str(final_merge.get('left_field') or '').strip(),
                      'right_field': str(final_merge.get('right_field') or '').strip(),
                      'attach_as': str(final_merge.get('attach_as') or 'related_info').strip() or 'related_info',
                  },
              }
          
          
          def _build_stage_match(stage):
              parts = []
              time_expr = _apply_time_range(stage.get('time_range'))
              if time_expr:
                  parts.append(time_expr)
              for idx, f in enumerate(stage.get('filters') or []):
                  if not isinstance(f, dict):
                      raise ValueError(f"{stage['stage_name']}.filters[{idx}] must be an object")
                  field = _ensure_non_empty_string(f.get('field'), f"{stage['stage_name']}.filters[{idx}].field")
                  operator = _ensure_non_empty_string(f.get('operator'), f"{stage['stage_name']}.filters[{idx}].operator")
                  value = f.get('value')
                  parts.append(_build_match_expr(field, operator, value))
              return _merge_match(parts)
          
          
          def _append_projection(pipeline, fields):
              unique_fields = []
              seen = set()
              for field in fields or []:
                  text = str(field or '').strip()
                  if text and text not in seen:
                      seen.add(text)
                      unique_fields.append(text)
              if not unique_fields:
                  return
              proj = {'_id': 0}
              for field in unique_fields:
                  proj[field] = f'${field}'
              pipeline.append({'$project': proj})
          
          
          def _compile_detail_query(stage, schema_context, stage_outputs):
              pipeline = []
              match_expr = _build_stage_match(stage)
              if match_expr:
                  pipeline.append({'$match': match_expr})
              _append_projection(pipeline, stage.get('projection_fields'))
              sort_stage = {}
              for s in stage.get('sort') or []:
                  field = _ensure_non_empty_string(s.get('field'), f"{stage['stage_name']}.sort.field")
                  direction = -1 if str(s.get('direction') or 'desc').strip() == 'desc' else 1
                  sort_stage[field] = direction
              if sort_stage:
                  pipeline.append({'$sort': sort_stage})
              if int(stage.get('limit') or 0) > 0:
                  pipeline.append({'$limit': int(stage['limit'])})
              validated_ast = {
                  'primary_collection': stage['collection'],
                  'collections': [stage['collection']],
                  'expands': [],
                  'filters': [{'collection': stage['collection'], **f} for f in stage.get('filters') or []],
                  'time_range': dict(stage.get('time_range') or {}, collection=stage['collection']),
                  'aggregations': [],
                  'group_by': [],
                  'sort': (stage.get('sort') or []) if stage.get('apply_global_limit') else [],
                  'limit': int(stage.get('limit') or 0) if stage.get('apply_global_limit') else 0,
                  'projection': [{'collection': stage['collection'], 'field': f, 'alias': f} for f in stage.get('projection_fields') or []],
                  'reasoning': stage['intent_type'],
              }
              return validated_ast, pipeline
          
          
          def _compile_aggregate_summary(stage, schema_context, stage_outputs):
              pipeline = []
              match_expr = _build_stage_match(stage)
              if match_expr:
                  pipeline.append({'$match': match_expr})
              group_fields = stage.get('group_fields') or []
              metric_alias = _ensure_non_empty_string(stage.get('metric_alias'), f"{stage['stage_name']}.metric_alias")
              metric_function = _ensure_non_empty_string(stage.get('metric_function'), f"{stage['stage_name']}.metric_function")
              metric_field = _ensure_non_empty_string(stage.get('metric_field'), f"{stage['stage_name']}.metric_field")
              if metric_function == 'count':
                  agg_expr = {'$sum': 1}
              else:
                  op_map = {'sum': '$sum', 'avg': '$avg', 'max': '$max', 'min': '$min'}
                  if metric_function not in op_map:
                      raise ValueError(f'unsupported metric_function: {metric_function}')
                  agg_expr = {op_map[metric_function]: f'${metric_field}'}
              group_id = {field: f'${field}' for field in group_fields} if group_fields else None
              group_stage = {'_id': group_id, metric_alias: agg_expr}
              pipeline.append({'$group': group_stage})
              project_stage = {'_id': 0}
              for field in group_fields:
                  project_stage[field] = f'$_id.{field}'
              project_stage[metric_alias] = f'${metric_alias}'
              pipeline.append({'$project': project_stage})
              sort_stage = {}
              for s in stage.get('sort') or []:
                  field = _ensure_non_empty_string(s.get('field'), f"{stage['stage_name']}.sort.field")
                  direction = -1 if str(s.get('direction') or 'desc').strip() == 'desc' else 1
                  sort_stage[field] = direction
              if sort_stage:
                  pipeline.append({'$sort': sort_stage})
              if int(stage.get('limit') or 0) > 0:
                  pipeline.append({'$limit': int(stage['limit'])})
              projection_fields = stage.get('projection_fields') or (group_fields + [metric_alias])
              if projection_fields:
                  _append_projection(pipeline, projection_fields)
              validated_ast = {
                  'primary_collection': stage['collection'],
                  'collections': [stage['collection']],
                  'expands': [],
                  'filters': [{'collection': stage['collection'], **f} for f in stage.get('filters') or []],
                  'time_range': dict(stage.get('time_range') or {}, collection=stage['collection']),
                  'aggregations': [{'alias': metric_alias, 'collection': stage['collection'], 'field': metric_field, 'function': metric_function}],
                  'group_by': [{'collection': stage['collection'], 'field': f, 'alias': f} for f in group_fields],
                  'sort': (stage.get('sort') or []) if stage.get('apply_global_limit') else [],
                  'limit': int(stage.get('limit') or 0) if stage.get('apply_global_limit') else 0,
                  'projection': [{'collection': stage['collection'], 'field': f, 'alias': f} for f in projection_fields],
                  'reasoning': stage['intent_type'],
              }
              return validated_ast, pipeline
          
          
          def _compile_group_top_entity(stage, schema_context, stage_outputs):
              pipeline = []
              match_expr = _build_stage_match(stage)
              if match_expr:
                  pipeline.append({'$match': match_expr})
              group_fields = stage.get('group_fields') or []
              entity_field = _ensure_non_empty_string(stage.get('entity_field'), f"{stage['stage_name']}.entity_field")
              metric_alias = _ensure_non_empty_string(stage.get('metric_alias'), f"{stage['stage_name']}.metric_alias")
              metric_function = _ensure_non_empty_string(stage.get('metric_function'), f"{stage['stage_name']}.metric_function")
              metric_field = _ensure_non_empty_string(stage.get('metric_field'), f"{stage['stage_name']}.metric_field")
              rank_n = int(stage.get('rank_n') or 0)
              if rank_n <= 0:
                  raise ValueError(f"{stage['stage_name']}.rank_n must be > 0 for group_top_entity")
              if metric_function == 'count':
                  agg_expr = {'$sum': 1}
              else:
                  op_map = {'sum': '$sum', 'avg': '$avg', 'max': '$max', 'min': '$min'}
                  if metric_function not in op_map:
                      raise ValueError(f'unsupported metric_function: {metric_function}')
                  agg_expr = {op_map[metric_function]: f'${metric_field}'}
              first_group_id = {field: f'${field}' for field in group_fields}
              first_group_id['__entity'] = f'${entity_field}'
              pipeline.append({'$group': {'_id': first_group_id, metric_alias: agg_expr}})
              sort_before_rank = {f'_id.{field}': 1 for field in group_fields}
              sort_before_rank[metric_alias] = -1 if str(stage.get('rank_direction') or 'desc').strip() == 'desc' else 1
              pipeline.append({'$sort': sort_before_rank})
              push_payload = {'entity': '$_id.__entity', metric_alias: f'${metric_alias}'}
              pipeline.append({'$group': {'_id': {field: f'$_id.{field}' for field in group_fields}, 'items': {'$push': push_payload}}})
              project_group = {'_id': 0, 'items': '$items'}
              for field in group_fields:
                  project_group[field] = f'$_id.{field}'
              pipeline.append({'$project': project_group})
              pipeline.append({'$unwind': {'path': '$items', 'includeArrayIndex': '__rank_index'}})
              pipeline.append({'$match': {'__rank_index': {'$lt': rank_n}}})
              project_after_rank = {'_id': 0, entity_field: '$items.entity', metric_alias: f'$items.{metric_alias}'}
              for field in group_fields:
                  project_after_rank[field] = f'${field}'
              pipeline.append({'$project': project_after_rank})
              final_sort = {}
              for s in stage.get('sort') or []:
                  field = _ensure_non_empty_string(s.get('field'), f"{stage['stage_name']}.sort.field")
                  direction = -1 if str(s.get('direction') or 'desc').strip() == 'desc' else 1
                  final_sort[field] = direction
              if final_sort and stage.get('apply_global_limit'):
                  pipeline.append({'$sort': final_sort})
              # group_top_entity: rank_n controls per-group topN. Do not apply global sort/limit by default.
              if stage.get('apply_global_limit') and int(stage.get('limit') or 0) > 0:
                  pipeline.append({'$limit': int(stage['limit'])})
              projection_fields = stage.get('projection_fields') or (list(group_fields) + [entity_field, metric_alias])
              if projection_fields:
                  _append_projection(pipeline, projection_fields)
              validated_ast = {
                  'primary_collection': stage['collection'],
                  'collections': [stage['collection']],
                  'expands': [],
                  'filters': [{'collection': stage['collection'], **f} for f in stage.get('filters') or []],
                  'time_range': dict(stage.get('time_range') or {}, collection=stage['collection']),
                  'aggregations': [{'alias': metric_alias, 'collection': stage['collection'], 'field': metric_field, 'function': metric_function}],
                  'group_by': [{'collection': stage['collection'], 'field': f, 'alias': f} for f in list(group_fields) + [entity_field]],
                  'sort': stage.get('sort') or [],
                  'limit': int(stage.get('limit') or 0),
                  'projection': [{'collection': stage['collection'], 'field': f, 'alias': f} for f in projection_fields],
                  'reasoning': stage['intent_type'],
              }
              return validated_ast, pipeline
          
          
          def _compile_group_top_record(stage, schema_context, stage_outputs):
              pipeline = []
              match_expr = _build_stage_match(stage)
              if match_expr:
                  pipeline.append({'$match': match_expr})
              group_fields = stage.get('group_fields') or []
              rank_order_field = _ensure_non_empty_string(stage.get('rank_order_field'), f"{stage['stage_name']}.rank_order_field")
              rank_n = int(stage.get('rank_n') or 0)
              if rank_n <= 0:
                  raise ValueError(f"{stage['stage_name']}.rank_n must be > 0 for group_top_record")
              projection_fields = stage.get('projection_fields') or list(dict.fromkeys(list(group_fields) + [rank_order_field]))
              sort_before_rank = {field: 1 for field in group_fields}
              sort_before_rank[rank_order_field] = -1 if str(stage.get('rank_direction') or 'desc').strip() == 'desc' else 1
              pipeline.append({'$sort': sort_before_rank})
              item_payload = {field: f'${field}' for field in projection_fields}
              pipeline.append({'$group': {'_id': {field: f'${field}' for field in group_fields}, 'items': {'$push': item_payload}}})
              project_group = {'_id': 0, 'items': '$items'}
              for field in group_fields:
                  project_group[field] = f'$_id.{field}'
              pipeline.append({'$project': project_group})
              pipeline.append({'$unwind': {'path': '$items', 'includeArrayIndex': '__rank_index'}})
              pipeline.append({'$match': {'__rank_index': {'$lt': rank_n}}})
              project_after_rank = {'_id': 0}
              for field in projection_fields:
                  project_after_rank[field] = f'$items.{field}'
              for field in group_fields:
                  project_after_rank[field] = f'${field}' if field not in projection_fields else project_after_rank[field]
              pipeline.append({'$project': project_after_rank})
              final_sort = {}
              for s in stage.get('sort') or []:
                  field = _ensure_non_empty_string(s.get('field'), f"{stage['stage_name']}.sort.field")
                  direction = -1 if str(s.get('direction') or 'desc').strip() == 'desc' else 1
                  final_sort[field] = direction
              if final_sort and stage.get('apply_global_limit'):
                  pipeline.append({'$sort': final_sort})
              if stage.get('apply_global_limit') and int(stage.get('limit') or 0) > 0:
                  pipeline.append({'$limit': int(stage['limit'])})
              if projection_fields:
                  _append_projection(pipeline, projection_fields)
              validated_ast = {
                  'primary_collection': stage['collection'],
                  'collections': [stage['collection']],
                  'expands': [],
                  'filters': [{'collection': stage['collection'], **f} for f in stage.get('filters') or []],
                  'time_range': dict(stage.get('time_range') or {}, collection=stage['collection']),
                  'aggregations': [],
                  'group_by': [{'collection': stage['collection'], 'field': f, 'alias': f} for f in group_fields],
                  'sort': stage.get('sort') or [],
                  'limit': int(stage.get('limit') or 0),
                  'projection': [{'collection': stage['collection'], 'field': f, 'alias': f} for f in projection_fields],
                  'reasoning': stage['intent_type'],
              }
              return validated_ast, pipeline
          
          
          def _compile_enrich_related(stage, schema_context, stage_outputs):
              depends_on = _ensure_non_empty_string(stage.get('depends_on'), f"{stage['stage_name']}.depends_on")
              prev = stage_outputs.get(depends_on) or {}
              prev_rows = prev.get('rows') or []
              join_source_field = _ensure_non_empty_string(stage.get('join_source_field'), f"{stage['stage_name']}.join_source_field")
              join_target_field = _ensure_non_empty_string(stage.get('join_target_field'), f"{stage['stage_name']}.join_target_field")
              join_values = _unique_values(prev_rows, join_source_field)
              projection_mode = str(stage.get('projection_mode') or 'none').strip() or 'none'
              if projection_mode == 'all_returnable':
                  projection_fields = _extract_returnable_fields(schema_context, stage['collection'])
              else:
                  projection_fields = list(stage.get('projection_fields') or [])
              validated_ast = {
                  'primary_collection': stage['collection'],
                  'collections': [stage['collection']],
                  'expands': [],
                  'filters': [{'collection': stage['collection'], **f} for f in stage.get('filters') or []],
                  'time_range': dict(stage.get('time_range') or {}, collection=stage['collection']),
                  'aggregations': [],
                  'group_by': [],
                  'sort': stage.get('sort') or [],
                  'limit': int(stage.get('limit') or 0),
                  'projection': [{'collection': stage['collection'], 'field': f, 'alias': f} for f in projection_fields],
                  'reasoning': f"enrich {stage['collection']} by {join_target_field}",
              }
              if not join_values:
                  return validated_ast, [], True
              pipeline = []
              parts = [{join_target_field: {'$in': join_values}}]
              time_expr = _apply_time_range(stage.get('time_range'))
              if time_expr:
                  parts.append(time_expr)
              for f in stage.get('filters') or []:
                  parts.append(_build_match_expr(_ensure_non_empty_string(f.get('field'), 'field'), _ensure_non_empty_string(f.get('operator'), 'operator'), f.get('value')))
              match_expr = _merge_match(parts)
              if match_expr:
                  pipeline.append({'$match': match_expr})
              if projection_fields:
                  _append_projection(pipeline, projection_fields)
              sort_stage = {}
              for s in stage.get('sort') or []:
                  field = _ensure_non_empty_string(s.get('field'), f"{stage['stage_name']}.sort.field")
                  direction = -1 if str(s.get('direction') or 'desc').strip() == 'desc' else 1
                  sort_stage[field] = direction
              if sort_stage:
                  pipeline.append({'$sort': sort_stage})
              if int(stage.get('limit') or 0) > 0:
                  pipeline.append({'$limit': int(stage['limit'])})
              return validated_ast, pipeline, False
          
          
          def _compile_stage(stage, schema_context, stage_outputs):
              stage = _sanitize_stage_for_compile(stage)
              intent = stage.get('intent_type')
              if intent == 'detail_query':
                  validated_ast, pipeline = _compile_detail_query(stage, schema_context, stage_outputs)
                  return validated_ast, pipeline, False
              if intent == 'aggregate_summary':
                  validated_ast, pipeline = _compile_aggregate_summary(stage, schema_context, stage_outputs)
                  return validated_ast, pipeline, False
              if intent == 'group_top_entity':
                  validated_ast, pipeline = _compile_group_top_entity(stage, schema_context, stage_outputs)
                  return validated_ast, pipeline, False
              if intent == 'group_top_record':
                  validated_ast, pipeline = _compile_group_top_record(stage, schema_context, stage_outputs)
                  return validated_ast, pipeline, False
              if intent == 'enrich_related':
                  return _compile_enrich_related(stage, schema_context, stage_outputs)
              raise ValueError(f'unsupported intent_type: {intent}')
          
          
          def _post_json(url, payload_obj, timeout_seconds=DEFAULT_TIMEOUT_SECONDS):
              body = json.dumps(payload_obj, ensure_ascii=False).encode('utf-8')
              req = urllib.request.Request(url=url, data=body, headers={'Content-Type': 'application/json'}, method='POST')
              ctx = ssl.create_default_context()
              ctx.check_hostname = False
              ctx.verify_mode = ssl.CERT_NONE
              try:
                  with urllib.request.urlopen(req, timeout=timeout_seconds, context=ctx) as resp:
                      status_code = int(resp.getcode() or 0)
                      body_text = resp.read().decode('utf-8', errors='replace')
                      headers = dict(resp.info().items())
                      return status_code, body_text, headers
              except urllib.error.HTTPError as e:
                  body_text = e.read().decode('utf-8', errors='replace') if hasattr(e, 'read') else str(e)
