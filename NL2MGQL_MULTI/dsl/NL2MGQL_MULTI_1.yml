 = item.get(left_field)\n        matches = []\n        if isinstance(key, list):\n            for val in key:\n                matches.extend(right_index.get(str(val), []))\n        elif key is not None:\n            matches = right_index.get(str(key), [])\n        if len(matches) == 1:\n            item[attach_as] = matches[0]\n        elif matches:\n            item[attach_as] = matches\n        merged.append(item)\n    return merged\n\n\ndef _normalize_visualization(value):\n    if not isinstance(value, dict):\n        return {'enabled': False}\n    chart_type = str(value.get('chart_type') or '').strip().lower()\n    if chart_type not in {'bar', 'line', 'pie', 'area', 'boxplot'}:\n        chart_type = 'bar'\n    x_field = str(value.get('x_field') or '').strip()\n    y_field = str(value.get('y_field') or '').strip()\n    series_name = str(value.get('series_name') or '').strip() or 'value'\n    title = str(value.get('title') or '').strip()\n    enabled = bool(value.get('enabled', bool(x_field and y_field)))\n    if chart_type == 'pie':\n        enabled = bool(value.get('enabled', bool(x_field and y_field)))\n    return {\n        'enabled': enabled,\n        'chart_type': chart_type,\n        'x_field': x_field,\n        'y_field': y_field,\n        'series_name': series_name,\n        'title': title,\n    }\n\n\ndef _to_float(value):
    if isinstance(value, bool):
        return 1.0 if value else 0.0
    if isinstance(value, (int, float)):
        return float(value)
    text = str(value or '').strip()
    if not text:
        return None
    text = text.replace(',', '')
    try:
        return float(text)
    except Exception:
        return None


def _pick_chart_fields(visualization, normalized_execution_plan, rows):
    first_row = rows[0] if isinstance(rows, list) and rows and isinstance(rows[0], dict) else {}
    stages = (normalized_execution_plan or {}).get('stages') or []
    stage0 = stages[0] if stages and isinstance(stages[0], dict) else {}
    group_fields = stage0.get('group_fields') or []
    metric_alias = str(stage0.get('metric_alias') or '').strip()

    x_field = str((visualization or {}).get('x_field') or '').strip()
    y_field = str((visualization or {}).get('y_field') or '').strip()

    if not x_field and group_fields:
        x_field = str(group_fields[0] or '').strip()
    if not y_field and metric_alias:
        y_field = metric_alias

    if not y_field and isinstance(first_row, dict):
        for k, v in first_row.items():
            if _to_float(v) is not None:
                y_field = str(k)
                break

    if not x_field and isinstance(first_row, dict):
        for k, v in first_row.items():
            if _to_float(v) is None:
                x_field = str(k)
                break

    return x_field, y_field


def _build_local_chart(visualization, normalized_execution_plan, rows, chart_decision, question=''):
    chart_type = str((visualization or {}).get('chart_type') or '').strip().lower() or str((chart_decision or {}).get('chart_type') or '').strip().lower() or 'bar'
    if chart_type == 'column':
        chart_type = 'bar'
    x_field, y_field = _pick_chart_fields(visualization, normalized_execution_plan, rows)
    if not x_field or not y_field:
        return False, {}, '', x_field, y_field, chart_type, '已识别图表意图且查询到数据，但无法确定图表横轴或纵轴字段。'

    title = str((visualization or {}).get('title') or '').strip() or str(question or '').strip()
    series_values = []
    categories = []
    pie_data = []
    for row in rows or []:
        if not isinstance(row, dict):
            continue
        x_raw = row.get(x_field)
        x_val = str(x_raw).strip() if x_raw is not None else ''
        if not x_val:
            x_val = '未分类'
        y_num = _to_float(row.get(y_field))
        y_num = y_num if y_num is not None else 0
        categories.append(x_val)
        series_values.append(y_num)
        pie_data.append({'name': x_val, 'value': y_num})

    if not categories:
        return False, {}, '', x_field, y_field, chart_type, '已识别图表意图且查询到数据，但图表配置生成失败：no valid chart points'

    if chart_type == 'pie':
        option = {
            'title': {'text': title} if title else {},
            'tooltip': {'trigger': 'item'},
            'series': [{'type': 'pie', 'data': pie_data}],
        }
    else:
        series_type = 'line' if chart_type == 'line' else 'bar'
        option = {
            'title': {'text': title} if title else {},
            'tooltip': {'trigger': 'axis'},
            'xAxis': {'type': 'category', 'data': categories},
            'yAxis': {'type': 'value'},
            'series': [{'type': series_type, 'data': series_values}],
        }

    markdown = "```echarts\n" + json.dumps(option, ensure_ascii=False, indent=2) + "\n```"
    return True, option, markdown, x_field, y_field, chart_type, ''


def _build_echarts_option(visualization, rows):
    if not isinstance(visualization, dict) or not visualization.get('enabled'):
        return {}
    if not isinstance(rows, list) or not rows:
        return {}
    chart_type = str(visualization.get('chart_type') or 'bar').strip().lower()
    x_field = str(visualization.get('x_field') or '').strip()
    y_field = str(visualization.get('y_field') or '').strip()
    title = str(visualization.get('title') or '').strip()
    series_name = str(visualization.get('series_name') or 'value').strip() or 'value'
    if not x_field or not y_field:
        return {}
    points = []
    for row in rows:
        if not isinstance(row, dict):
            continue
        x = row.get(x_field)
        y = row.get(y_field)
        if x is None or y is None:
            continue
        points.append((x, y))
    if not points:
        return {}
    if chart_type == 'pie':
        return {
            'title': {'text': title} if title else {},
            'tooltip': {'trigger': 'item'},
            'series': [{
                'name': series_name,
                'type': 'pie',
                'data': [{'name': str(x), 'value': y} for x, y in points],
            }],
        }
    x_axis = [str(x) for x, _ in points]
    y_axis = [y for _, y in points]
    return {
        'title': {'text': title} if title else {},
        'tooltip': {'trigger': 'axis'},
        'xAxis': {'type': 'category', 'data': x_axis},
        'yAxis': {'type': 'value'},
        'series': [{
            'name': series_name,
            'type': 'line' if chart_type == 'line' else 'bar',
            'data': y_axis,
        }],
    }


def _build_antv_tool_payload(chart_decision, visualization, rows):\n    if not chart_decision.get('enabled'):\n        return {}\n    chart_type = str(chart_decision.get('chart_type') or 'bar')\n    x_field = str((visualization or {}).get('x_field') or '').strip()\n    y_field = str((visualization or {}).get('y_field') or '').strip()\n    title = str((visualization or {}).get('title') or '').strip()\n    if not x_field or not y_field:\n        return {}\n    data = []\n    for row in rows or []:\n        if not isinstance(row, dict):\n            continue\n        if row.get(x_field) is None or row.get(y_field) is None:\n            continue\n        point = {'value': row.get(y_field)}\n        if chart_type in {'line', 'area'}:\n            point['time'] = row.get(x_field)\n        else:\n            point['category'] = row.get(x_field)\n        group = row.get('group')\n        if group is not None:\n            point['group'] = group\n        data.append(point)\n    if not data:\n        return {}\n    tool_name_map = {\n        'bar': 'generate_bar_chart',\n        'line': 'generate_line_chart',\n        'pie': 'generate_pie_chart',\n        'area': 'generate_area_chart',\n        'boxplot': 'generate_boxplot_chart',\n    }\n    tool_name = tool_name_map.get(chart_type, 'generate_bar_chart')\n    return {\n        'plugin_unique_identifier': 'antv/visualization:0.2.0@798a255e7bf02e93b8a5717be235b833482be58daab1c64c79c954281da14b9c',\n        'provider_name': 'antv/visualization/visualization',\n        'tool_name': tool_name,\n        'params': {\n            'data': json.dumps(data, ensure_ascii=False),\n            'title': title,\n            'axisXTitle': x_field,\n            'axisYTitle': y_field,\n        }\n    }\n\n\ndef main(semantic_plan, planner, question: str, schema_context: str, query_urls: str):\n    plan = _ensure_obj(semantic_plan, 'semantic_plan')\n    planner = _ensure_obj(planner, 'planner')\n    urls = _parse_query_urls(query_urls)\n    if not urls:\n        raise ValueError('SN_MONGODB_QUERY_URLS is empty')\n\n    normalized_execution_plan = _normalize_plan(plan, planner, question)\n    stage_outputs = {}\n    stage_execution_trace = []\n\n    for stage in normalized_execution_plan.get('stages') or []:\n        stage = _sanitize_stage_for_compile(stage)\n        validated_ast, pipeline, skip_query = _compile_stage(stage, schema_context, stage_outputs)\n        pipeline_json = json.dumps(pipeline, ensure_ascii=False, indent=2)\n        selected_url = ''\n        request_id = uuid.uuid4().hex\n        request_body = {}\n        status_code = 0\n        response_body = ''\n        response_headers = {}\n        rows = []\n        reason = ''\n        if not skip_query:\n            selected_url = random.choice(urls)\n            request_body = {\n                'validated_ast': validated_ast or {},\n                'pipeline_json': pipeline_json,\n                'validation_message': 'ok',\n                'request_id': request_id,\n            }\n            status_code, response_body, response_headers = _post_json(selected_url, request_body)\n            if status_code < 200 or status_code >= 300:\n                raise ValueError(f\"stage `{stage['stage_name']}` query failed: status={status_code}, body={response_body[:1200]}\")\n            response_json = _read_json_text(response_body)\n            rows = _find_best_rows(response_json)\n        else:\n            response_body = json.dumps({'msg': 'skip query', 'code': 200, 'data': {'rows': []}}, ensure_ascii=False)\n            rows = []\n            reason = 'no join values from previous stage'\n\n        trace_item = {\n            'stage_name': stage['stage_name'],\n            'collection': stage['collection'],\n            'intent_type': stage['intent_type'],\n            'sanitize_report': stage.get('sanitize_report') or {},\n            'validated_ast': validated_ast,\n            'pipeline': pipeline,\n            'pipeline_json': pipeline_json,\n            'selected_url': selected_url,\n            'request_id': request_id,\n            'query_request_body': request_body,\n            'query_status_code': status_code,\n            'query_response_body': response_body,\n            'query_response_headers': response_headers,\n            'rows': rows,\n            'skipped': bool(skip_query),\n            'skip_reason': reason,\n        }\n        stage_execution_trace.append(trace_item)\n        stage_outputs[stage['stage_name']] = trace_item\n\n    execution_mode = normalized_execution_plan.get('execution_mode')\n    final_merge = normalized_execution_plan.get('final_merge') or {}\n    if execution_mode == 'multi_stage' and final_merge.get('left_stage') and final_merge.get('right_stage'):\n        left_rows = (stage_outputs.get(final_merge['left_stage']) or {}).get('rows') or []\n        right_rows = (stage_outputs.get(final_merge['right_stage']) or {}).get('rows') or []\n        merged_rows = _merge_rows(left_rows, right_rows, final_merge.get('left_field'), final_merge.get('right_field'), final_merge.get('attach_as') or 'related_info')\n    else:\n        first_stage_name = normalized_execution_plan['stages'][0]['stage_name']\n        merged_rows = (stage_outputs.get(first_stage_name) or {}).get('rows') or []\n    visualization = normalized_execution_plan.get('visualization') or {}\n    chart_decision = _choose_chart_type(visualization, merged_rows, {'bar', 'column'})\n    chart_option = _build_echarts_option(visualization, merged_rows)\n    antv_tool_payload = _build_antv_tool_payload(chart_decision, visualization, merged_rows)\n    chart_payload = {\n        'enabled': bool(chart_option),\n        'renderer': 'antv',\n        'library': 'echarts',\n        'plugin_unique_identifier': 'antv/visualization:0.2.0',\n        'plugin_tool': 'render_chart',\n        'option': chart_option,\n        'decision': chart_decision,\n        'antv_tool_payload': antv_tool_payload,\n    }\n\n    no_data_message = ''\n    if visualization.get('enabled') and not (merged_rows or []):\n        no_data_message = '查询成功，但结果为空，无法生成图表。'\n    final_payload = {\n        'question': str(question or '').strip(),\n        'normalized_execution_plan': normalized_execution_plan,\n        'stage_execution_trace': stage_execution_trace,\n        'merged_rows': merged_rows,\n        'chart': chart_payload,\n        'message': no_data_message,\n    }\n    final_response_summary = {\n        'question': str(question or '').strip(),\n        'execution_mode': str(normalized_execution_plan.get('execution_mode') or ''),\n        'stage_count': len(normalized_execution_plan.get('stages') or []),\n        'merged_row_count': len(merged_rows or []),\n        'has_chart': bool((chart_payload or {}).get('enabled')),\n        'chart_type': str(chart_decision.get('chart_type') or ''),\n        'stage_names': [str((s or {}).get('stage_name') or '') for s in (normalized_execution_plan.get('stages') or [])],\n    }\n    return {\n        'normalized_execution_plan_json': json.dumps(normalized_execution_plan, ensure_ascii=False),\n        'stage_execution_trace_json': json.dumps(stage_execution_trace, ensure_ascii=False),\n        'final_response_body': json.dumps(final_payload, ensure_ascii=False),\n        'final_response_summary': final_response_summary,\n        'chart_enabled': 'true' if antv_tool_payload else 'false',\n        'chart_type': str(chart_decision.get('chart_type') or '') if antv_tool_payload else '',\n        'chart_data': ((antv_tool_payload.get('params') or {}).get('data') or ''),\n        'chart_title': ((antv_tool_payload.get('params') or {}).get('title') or ''),\n        'chart_axis_x_title': ((antv_tool_payload.get('params') or {}).get('axisXTitle') or ''),\n        'chart_axis_y_title': ((antv_tool_payload.get('params') or {}).get('axisYTitle') or ''),\n    }\n"
