stage.get('projection_fields') or list(dict.fromkeys(list(group_fields) + [rank_order_field]))\n    sort_before_rank = {field: 1 for field in group_fields}\n    sort_before_rank[rank_order_field] = -1 if str(stage.get('rank_direction') or 'desc').strip() == 'desc' else 1\n    pipeline.append({'$sort': sort_before_rank})\n    item_payload = {field: f'${field}' for field in projection_fields}\n    pipeline.append({'$group': {'_id': {field: f'${field}' for field in group_fields}, 'items': {'$push': item_payload}}})\n    project_group = {'_id': 0, 'items': '$items'}\n    for field in group_fields:\n        project_group[field] = f'$_id.{field}'\n    pipeline.append({'$project': project_group})\n    pipeline.append({'$unwind': {'path': '$items', 'includeArrayIndex': '__rank_index'}})\n    pipeline.append({'$match': {'__rank_index': {'$lt': rank_n}}})\n    project_after_rank = {'_id': 0}\n    for field in projection_fields:\n        project_after_rank[field] = f'$items.{field}'\n    for field in group_fields:\n        project_after_rank[field] = f'${field}' if field not in projection_fields else project_after_rank[field]\n    pipeline.append({'$project': project_after_rank})\n    final_sort = {}\n    for s in stage.get('sort') or []:\n        field = _ensure_non_empty_string(s.get('field'), f\"{stage['stage_name']}.sort.field\")\n        direction = -1 if str(s.get('direction') or 'desc').strip() == 'desc' else 1\n        final_sort[field] = direction\n    if final_sort and stage.get('apply_global_limit'):\n        pipeline.append({'$sort': final_sort})\n    if stage.get('apply_global_limit') and int(stage.get('limit') or 0) > 0:\n        pipeline.append({'$limit': int(stage['limit'])})\n    if projection_fields:\n        _append_projection(pipeline, projection_fields)\n    validated_ast = {\n        'primary_collection': stage['collection'],\n        'collections': [stage['collection']],\n        'expands': [],\n        'filters': [{'collection': stage['collection'], **f