          n- stage1.group_fields = [\"brand\"]\\n- stage1.rank_order_field = \"amount\"\
          \\n- stage1.rank_direction = \"desc\"\\n- stage1.projection_fields 至少包含\
          \ [\"brand\", \"order_id\", \"product_name\", \"amount\", \"created_at\"\
          ]\\n- stage1.limit = 0 （不要把每品牌top1误裁成全局1条）\\n- stage1.join_target_field\
          \ = \"\"\\n- stage1.attach_as = \"\"\\n- stage2.collection = products\\\
          n- stage2.intent_type = enrich_related\\n- stage2.join_source_field / join_target_field\
          \ 需要根据 schema relation hints 解析；在当前 schema 下可解析为 product_name -> product_name\\\
          n- stage2.projection_mode = all_returnable\\n- final_merge.attach_as = \"\
