    - data:
        code: "import base64\nimport json\nimport uuid\n\nSEMANTIC_PLAN_SYSTEM_PROMPT\
          \ = '你是一个 MongoDB 查询执行计划生成器。\\n\\n你的任务是：\\n- 基于用户问题、查询规划 JSON、schema 检索结果，生成一个“可执行的语义计划（semantic\
          \ execution plan）”\\n- 不要直接生成 MongoDB pipeline\\n- 不要直接生成旧版单 AST\\n- 只输出结构化\
          \ JSON\\n- 不要输出解释性文字\\n- 不要输出 markdown\\n- 不要输出 schema 摘要\\n\\n目标：\\n- 让后续代码节点可以根据该计划，稳定编译为单阶段或两阶段查询\\\
          n- 保持灵活，兼容不同问法\\n- 避免把 products / product_name / 第二阶段 enrich 之类逻辑写死在 DSL\
          \ 中\\n\\n总原则：\\n1. primary_collection 必须等于 planner_json.primary_collection。\\\
          n2. 只能使用 planner_json 或 schema_context 中明确出现过的 collection 和 field。\\n3.\
          \ execution_mode 只能是：\\n   - single_stage：一个阶段就能回答\\n   - multi_stage：需要第一阶段先选出实体/键，第二阶段再\
          \ enrich\\n4. stages 最多 2 个：\\n   - stage1 必须先解决主问题\\n   - stage2 只在确实需要\
          \ related 明细且 schema 关系明确时才生成\\n5. 不要发明关联字段，不要发明 collection。\\n6. 默认不生成链式多跳关联。\\\
          n\\n什么时候优先 single_stage：\\n- 纯明细查询\\n- 纯聚合统计\\n- 只查 primary_collection 就足够\\\
          n\\n什么时候优先 multi_stage：\\n- 用户既要“按组挑出代表实体”，又要“补 related 主数据/详情”\\n- 直接在一个聚合\
          \ AST 中会出现粒度冲突\\n- 典型情况：\\n  - 每个品牌销售额最高的产品信息\\n  - 每个品牌金额最高的订单及其产品信息\\\
          n  - 先选 top1/topN 实体，再去 related collection enrich\\n\\nstage.intent_type\
          \ 定义：\\n1. detail_query\\n   - 普通明细查询\\n   - 直接在一个 collection 上过滤、排序、投影、limit\\\
          n2. aggregate_summary\\n   - 普通聚合汇总\\n   - 按 group_fields 聚合 metric，然后排序/limit\\\
          n3. group_top_entity\\n   - 先按 group_fields + entity_field 聚合 metric\\n\
          \   - 再在每个 group 内取 top1/topN entity\\n   - 适合“每个品牌销售额最高的产品”\\n4. group_top_record\\\
          n   - 先按 group_fields 分组\\n   - 再在每个 group 内按某个排序字段取 top1/topN 原始记录\\n \
          \  - 适合“每个品牌金额最高的订单”\\n5. enrich_related\\n   - 第二阶段 enrich\\n   - 使用 stage1\
          \ 输出中的 join_source_field 去匹配当前 collection 的 join_target_field\\n\\ngroup_top\
          \ 语义规则：\\n1. 对于 group_top_entity / group_top_record：rank_n 只表示“每个 group\
          \ 取前 N 条”。\\n2. 如果用户没有明确要求“全局前 N 个 group / 全局只返回 1 个品牌 / topN groups”，stage.limit\
          \ 必须设置为 0。\\n3. 不要把 rank_n = 1 误写成 stage.limit = 1。\\n4. “各品牌销售第一的产品信息”应返回多个品牌，每个品牌\
          \ 1 条，而不是全局只返回 1 条。\\n5. 只有用户明确要求“销售额前10个品牌中的第一产品”这类全局裁切时，才允许 stage.limit\
          \ > 0。\\n\\n关联键规则：\\n1. 不要把任何固定字段当作通用回退关联键，包括 product_name。\\n2. stage2.join_source_field\
          \ / stage2.join_target_field 必须基于：\\n   - 用户问题语义\\n   - schema_context 中的\
