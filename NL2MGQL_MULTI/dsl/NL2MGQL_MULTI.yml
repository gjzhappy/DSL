      width: 242
    - data:
        code: "import json\n\ndef main(question: str, planner):\n    if isinstance(planner,\
          \ str):\n        planner = json.loads(planner)\n\n    primary = str((planner\
          \ or {}).get(\"primary_collection\") or \"\").strip()\n    related = (planner\
          \ or {}).get(\"related_collections\") or []\n\n    ordered = []\n    seen\
          \ = set()\n    for item in [primary] + list(related):\n        name = str(item\
          \ or \"\").strip()\n        if not name or name == \"unknown\" or name in\
          \ seen:\n            continue\n        seen.add(name)\n        ordered.append(name)\n\
          \n    collection_tasks = []\n    for name in ordered:\n        role = \"\
          primary\" if name == primary else \"related\"\n        query_text = (\n\
          \            f\"用户问题: {question}\\n\"\n            f\"当前目标 collection: {name}\\\
          n\"\n            \"请检索该 collection 的 schema、字段含义、典型过滤字段、聚合指标、\"\n      \
          \      \"与其他 collection 的关联线索、以及任何能帮助生成 Mongo 聚合 AST 的信息。\"\n        )\n\
          \        collection_tasks.append({\n            \"collection_name\": name,\n\
          \            \"role\": role,\n            \"query_text\": query_text\n \
          \       })\n\n    return {\n        \"result\": ordered,\n        \"collection_tasks\"\
          : collection_tasks,\n        \"planner_json\": json.dumps(planner, ensure_ascii=False,\
          \ indent=2)\n    }\n"
        code_language: python3
        desc: 构建待检索的 collection 任务
        outputs:
          collection_tasks:
            children: null
            type: array[object]
          planner_json:
            children: null
            type: string
          result:
            children: null
            type: array[string]
        selected: false
        title: 代码执行_构建检索任务
        type: code
