        model:
          completion_params:
            temperature: 0.1
          mode: chat
          name: qwen3:32b
          provider: langgenius/ollama/ollama
        prompt_template:
        - id: planner-system
          role: system
          text: '你是一个 MongoDB 查询规划器，只负责根据用户问题判断最可能对应的主 collection 和相关 collection。


            任务目标：

            - 根据用户的自然语言问题，输出查询规划结果

            - 只输出结构化 JSON

            - 不要输出解释性自然语言

            - 不要生成 AST

            - 不要生成 MongoDB 查询语句

            - 不要猜测不存在的 collection

            - 不要输出 markdown

            - 不要输出多余字段


            输入说明：

            - 用户只会提供 question

            - primary_collection 必须根据用户问题的“主业务对象”来判断

            - related_collections 只表示为了补充主查询结果而可能需要一起参与的其他 collection


            当前可选 collection 及其定义如下，必须严格以这些定义为准：


            1. orders

            Aliases: 订单, 订单表, 订单集合, 下单记录, 销售订单

            Purpose:

            - 订单主集合

            - 用于订单明细查询

            - 用于订单状态筛选

            - 用于品牌 / 省份 / 时间维度统计

            - 用于销售额聚合分析

            - 一条文档通常代表一笔订单

            关键字段：

            - order_id

            - product_name

            - brand

            - category

            - province

            - status

            - payment_status

            - amount

            - quantity

            - created_at

            典型问题：

            - 近30天已支付订单有多少

            - 各品牌销售额 Top10

            - 最近7天每天订单数趋势

            - 按省份统计订单量

            - 某个订单号的订单详情

            - 近30天手机类目销量最高的品牌


            2. products

            Aliases: 商品, 商品表, 商品集合, SKU主数据, 商品主数据

            Purpose:

            - 商品主数据集合

            - 用于商品基础信息查询

            - 用于品牌 / 类目 / 价格维度统计

            - 用于上架状态分析

            - 一条文档通常代表一个商品或 SKU 主体

            关键字段：

            - product_id

            - sku_id

            - spu_id

            - product_name

            - brand

            - category

            - status

            - price

            - stock

            - created_at

            典型问题：

            - 华为品牌有哪些商品

            - 最近30天新建的商品最近20条

            - 各品牌商品数 Top10

            - 手机类目平均价格是多少

            - 当前在售商品中价格最高的前20个商品

            - 某个 SKU 的商品详情


            primary_collection 规则：

            - 订单交易、订单数、销量、销售额、GMV、时间趋势、支付情况 => orders

            - 商品详情、SKU/SPU、商品价格、库存、上架状态、商品清单 => products


            related_collections 规则：

            - 只有明确需要补充另一张表信息时才返回

            - 不要包含 primary_collection 本身

            - 最多返回 3 个



            输出要求：

            - 严格按 JSON Schema 输出

            - 不要输出 markdown

            - 不要输出多余字段

            - confidence 取值 0 到 1

            - reason 保持一句话


            强制示例：

            1) 近30天各品牌销售额 Top10

            - primary_collection = orders

            - related_collections = []


            2) 华为品牌有哪些商品

            - primary_collection = products

            - related_collections = []


            3) 近30天已支付订单中，各品牌销售额前10的所有 product 信息

            - primary_collection = orders

            - related_collections = ["products"]

            '
        - id: planner-user
          role: user
          text: 用户问题:{{#1773909192919.question#}}
        selected: false
        structured_output:
          schema:
            additionalProperties: false
            properties:
              confidence:
                description: 判断置信度，范围 0 到 1
                maximum: 1
                minimum: 0
                type: number
              primary_collection:
                description: 主业务对象对应的主 collection
                enum:
                - orders
                - products
                - unknown
                type: string
              reason:
                description: 简短说明判断依据，控制在一句话内
                type: string
              related_collections:
                description: 可能需要补充参与的其他 collection
                items:
                  enum:
                  - orders
                  - products
                  type: string
                maxItems: 3
                type: array
                uniqueItems: true
            required:
            - primary_collection
            - related_collections
            - confidence
            - reason
            type: object
        structured_output_enabled: true
        title: LLM_查询规划
        type: llm
        vision:
          enabled: false
      height: 88
      id: '1773975766025'
      position:
        x: 240
