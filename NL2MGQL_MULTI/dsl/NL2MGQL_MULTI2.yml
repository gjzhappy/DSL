    - data:
        code: "import json\nimport re\n\n\ndef _truncate_text(text, limit=2000):\n\
          \    text = '' if text is None else str(text)\n    return text if len(text)\
          \ <= limit else text[:limit] + '...'\n\n\ndef _read_json_text(text):\n \
          \   if text is None:\n        return None\n    if isinstance(text, (dict,\
          \ list)):\n        return text\n    raw = str(text).strip()\n    if not\
          \ raw:\n        return None\n    return json.loads(raw)\n\n\ndef _content_to_text(content):\n\
          \    if isinstance(content, str):\n        return content.strip()\n    if\
          \ isinstance(content, list):\n        parts = []\n        for item in content:\n\
          \            if isinstance(item, str) and item.strip():\n              \
          \  parts.append(item.strip())\n            elif isinstance(item, dict):\n\
          \                text = str(item.get('text') or item.get('content') or '').strip()\n\
          \                if text:\n                    parts.append(text)\n    \
          \    return '\\n'.join(parts).strip()\n    return ''\n\n\ndef _extract_chat_text(resp_json):\n\
          \    if not isinstance(resp_json, dict):\n        return ''\n    choices\
          \ = resp_json.get('choices')\n    if isinstance(choices, list) and choices:\n\
          \        first = choices[0] or {}\n        if isinstance(first, dict):\n\
          \            msg = first.get('message') or {}\n            if isinstance(msg,\
          \ dict):\n                text = _content_to_text(msg.get('content'))\n\
          \                if text:\n                    return text\n           \
          \ text = _content_to_text(first.get('text'))\n            if text:\n   \
          \             return text\n    output = resp_json.get('output')\n    text\
          \ = _content_to_text(output)\n    if text:\n        return text\n    if\
          \ isinstance(output, list):\n        for item in output:\n            if\
          \ isinstance(item, dict):\n                text = _content_to_text(item.get('content'))\n\
          \                if text:\n                    return text\n    for key\
          \ in ('result', 'text', 'content', 'answer'):\n        text = _content_to_text(resp_json.get(key))\n\
          \        if text:\n            return text\n    data = resp_json.get('data')\n\
          \    if isinstance(data, dict):\n        for key in ('result', 'text', 'content',\
          \ 'answer'):\n            text = _content_to_text(data.get(key))\n     \
          \       if text:\n                return text\n    return ''\n\n\ndef _strip_code_fence(text):\n\
          \    raw = str(text or '').strip()\n    full_match = re.match(r'^```(?:json)?\\\
          s*(.*?)\\s*```$', raw, flags=re.IGNORECASE | re.DOTALL)\n    if full_match:\n\
          \        return full_match.group(1).strip()\n    return raw\n\n\ndef _remove_think_blocks(text):\n\
          \    raw = str(text or '')\n    raw = re.sub(r'<think>.*?</think>', ' ',\
          \ raw, flags=re.IGNORECASE | re.DOTALL)\n    return raw.strip()\n\n\ndef\
          \ _ast_candidate_score(obj):\n    if not isinstance(obj, dict):\n      \
          \  return -1\n    score = 0\n    keys = set(obj.keys())\n    for key in\
          \ ('primary_collection', 'projection', 'filters', 'sort', 'group_by', 'aggregate',\
          \ 'expands', 'time_range', 'limit'):\n        if key in keys:\n        \
          \    score += 2\n    if keys:\n        score += 1\n    return score\n\n\n\
          def _try_decode_object(raw):\n    try:\n        decoder = json.JSONDecoder()\n\
          \        obj, end = decoder.raw_decode(raw)\n        if isinstance(obj,\
          \ dict):\n            return obj, raw[:end], raw[end:].strip()\n    except\
          \ Exception:\n        return None\n    return None\n\n\ndef _extract_json_object_text(text):\n\
          \    raw = _remove_think_blocks(_strip_code_fence(text))\n    if not raw:\n\
          \        raise ValueError('LLM返回内容为空')\n    direct = _try_decode_object(raw)\n\
          \    if direct and not direct[2]:\n        return direct[1]\n    candidates\
          \ = []\n    for block in re.findall(r'```(?:json)?\\s*(.*?)```', raw, flags=re.IGNORECASE\
          \ | re.DOTALL):\n        parsed = _try_decode_object(block.strip())\n  \
          \      if parsed:\n            obj, obj_text, tail = parsed\n          \
          \  candidates.append((_ast_candidate_score(obj), 1 if tail else 0, obj_text))\n\
          \    seen_positions = set()\n    for match in re.finditer(r'\\{', raw):\n\
          \        pos = match.start()\n        if pos in seen_positions:\n      \
          \      continue\n        seen_positions.add(pos)\n        parsed = _try_decode_object(raw[pos:])\n\
          \        if parsed:\n            obj, obj_text, tail = parsed\n        \
          \    candidates.append((_ast_candidate_score(obj), 1 if tail else 0, obj_text))\n\
          \    if candidates:\n        candidates.sort(key=lambda item: (-item[0],\
          \ item[1], -len(item[2])))\n        return candidates[0][2]\n    raise ValueError(f'LLM返回内容不是合法JSON对象:\
          \ {_truncate_text(raw, 1200)}')\n\n\ndef _pick_response(full_status_code,\
          \ full_body, local_status_code, local_body):\n    local_body_text = '' if\
          \ local_body is None else str(local_body).strip()\n    if local_body_text:\n\
          \        return int(local_status_code or 0), local_body, 'local_llm'\n \
          \   return int(full_status_code or 0), full_body, 'full_llm'\n\n\ndef main(full_status_code,\
          \ full_body, local_status_code, local_body):\n    code, body, _source =\
          \ _pick_response(full_status_code, full_body, local_status_code, local_body)\n\
          \    if code < 200 or code >= 300:\n        raise ValueError(f\"LLM调用失败,\
          \ status={code}, body={_truncate_text(body, 2000)}\")\n    if not body:\n\
          \        raise ValueError('LLM返回body为空')\n    resp_json = _read_json_text(body)\n\
          \    if not resp_json:\n        raise ValueError(f\"LLM响应不是合法JSON: {_truncate_text(body,\
          \ 1200)}\")\n    result = _extract_chat_text(resp_json)\n    if not result:\n\
          \        raise ValueError(f\"LLM返回内容为空, body={_truncate_text(body, 2000)}\"\
          )\n    semantic_plan_text = _extract_json_object_text(result)\n    semantic_plan\
          \ = json.loads(semantic_plan_text)\n    if not isinstance(semantic_plan,\
          \ dict):\n        raise ValueError('LLM返回语义计划不是JSON对象')\n    return {'semantic_plan':\
          \ semantic_plan, 'semantic_plan_raw_text': result}\n"
