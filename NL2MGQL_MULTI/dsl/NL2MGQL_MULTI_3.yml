    - data:
        code: |
          import json


          def main(text: str):
              raw = str(text or '').strip()
              if not raw:
                  raise ValueError('本地LLM返�为空')
              body = {
                  'choices': [
                      {
                          'message': {
                              'content': raw,
                          }
                      }
                  ]
              }
              return {
                  'status_code': 200,
                  'body': json.dumps(body, ensure_ascii=False),
              }
        code_language: python3
        desc: 将本地LLM语义计划输出包装成与满血LLM一致的解析输入
