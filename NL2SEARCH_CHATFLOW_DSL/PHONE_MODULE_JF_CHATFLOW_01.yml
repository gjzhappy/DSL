            "source_code": "def main(local_text='', full_llm_result_json='', llm_handler_input_json=''):\n    import json\n\n    def load_json(raw):\n        try:\n            obj = json.loads(raw or '{}')\n            return obj if isinstance(obj, dict) else {}\n        except Exception:\n            return {}\n\n    llm_input = load_json(llm_handler_input_json)\n    full_result = load_json(full_llm_result_json)\n    query_plan = llm_input.get('query_plan') if isinstance(llm_input.get('query_plan'), dict) else {}\n    query_result = llm_input.get('query_result') if isinstance(llm_input.get('query_result'), dict) else {}\n    output_kind = str(llm_input.get('output_kind') or 'text')\n    artifact_type = str(llm_input.get('artifact_type') or 'markdown_text')\n    task_type = str(llm_input.get('llm_task_type') or output_kind)\n\n    if llm_input.get('status') == 'error':\n        error = str(llm_input.get('error') or 'LLM_INPUT_ERROR')\n        text = str(llm_input.get('user_prompt') or error)\n        result = {\n            'handler_status': 'error',\n            'output_kind': output_kind,\n            'answer': text,\n            'artifact_type': artifact_type,\n            'artifact_payload_json': json.dumps({'source': 'llm_input_guard', 'llm_task_type': task_type, 'content': text}, ensure_ascii=False),\n            'query_plan_json': json.dumps(query_plan, ensure_ascii=False),\n            'query_result_json': json.dumps(query_result, ensure_ascii=False),\n            'error': text\n        }\n        encoded = json.dumps(result, ensure_ascii=False)\n        return {\n            'llm_handler_result_json': encoded,\n            'local_llm_result_json': encoded\n        }\n\n    source = 'local_llm'\n    text = str(local_text or '').strip()\n    error = ''\n    if full_result.get('llm_status') == 'ok' and str(full_result.get('llm_text') or '').strip():\n        source = 'full_llm'\n        text = str(full_result.get('llm_text') or '').strip()\n    elif text:\n        source = 'local_llm'\n    else:\n        error = full_result.get('error') or 'LLM 未返回有效文本'\n        text = 'LLM 输出生成完成，但模型未返回有效文本。'\n\n    result = {\n        'handler_status': 'ok' if not error else 'error',\n        'output_kind': output_kind,\n        'answer': text,\n        'artifact_type': artifact_type,\n        'artifact_payload_json': json.dumps({'source': source, 'llm_task_type': task_type, 'content': text}, ensure_ascii=False),\n        'query_plan_json': json.dumps(query_plan, ensure_ascii=False),\n        'query_result_json': json.dumps(query_result, ensure_ascii=False),\n        'error': error\n    }\n    encoded = json.dumps(result, ensure_ascii=False)\n    return {\n        'llm_handler_result_json': encoded,\n        'local_llm_result_json': encoded\n    }\n",
