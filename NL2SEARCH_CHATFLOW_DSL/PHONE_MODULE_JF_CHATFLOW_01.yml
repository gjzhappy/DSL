            "code": "def main(analysis_result_json=''):\n    import json\n\n    def load_json(raw):\n        try:\n            obj = json.loads(raw or '{}')\n            return obj if isinstance(obj, dict) else {}\n        except Exception:\n            return {}\n\n    def device_name(row, idx):\n        for key in ('device_model', 'phone_model', 'model', 'name'):\n            value = row.get(key) if isinstance(row, dict) else None\n            if isinstance(value, str) and value.strip():\n                return value.strip()\n        return '对象%s' % (idx + 1)\n\n    def detail_groups(row):\n        if not isinstance(row, dict):\n            return []\n        groups = row.get('detail_groups')\n        return groups if isinstance(groups, list) else []\n\n    def build_detail_sheet(rows):\n        devices = []\n        matrix = {}\n        for idx, row in enumerate(rows):\n            if not isinstance(row, dict):\n                continue\n            dev = device_name(row, idx)\n            groups = detail_groups(row)\n            if not groups:\n                continue\n            if dev not in devices:\n                devices.append(dev)\n            for group in groups:\n                if not isinstance(group, dict):\n                    continue\n                group_name = str(group.get('name') or '未分组')\n                items = group.get('items') if isinstance(group.get('items'), list) else []\n                for item in items:\n                    if not isinstance(item, dict):\n                        continue\n                    item_name = str(item.get('name') or '').strip()\n                    if not item_name:\n                        continue\n                    matrix.setdefault((group_name, item_name), {})[dev] = item.get('value')\n        if devices and matrix:\n            columns = ['指标分组', '指标项'] + devices\n            sheet_rows = []\n            for group_name, item_name in sorted(matrix.keys(), key=lambda x: (x[0], x[1])):\n                sheet_rows.append([group_name, item_name] + [matrix[(group_name, item_name)].get(dev, '') for dev in devices])\n            return {'sheet_name': 'PHONE对比', 'columns': columns, 'rows': sheet_rows}\n        return None\n\n    def build_generic_sheet(rows):\n        columns = []\n        for row in rows:\n            if isinstance(row, dict):\n                for key, value in row.items():\n                    if isinstance(value, (str, int, float, bool)) or value is None:\n                        if key not in columns:\n                            columns.append(key)\n        if not columns:\n            columns = ['结果JSON']\n            return {'sheet_name': 'PHONE查询结果', 'columns': columns, 'rows': [[json.dumps(row, ensure_ascii=False)] for row in rows]}\n        return {'sheet_name': 'PHONE查询结果', 'columns': columns, 'rows': [[row.get(col, '') if isinstance(row, dict) else '' for col in columns] for row in rows]}\n\n    context = load_json(analysis_result_json)\n    query_plan = context.get('query_plan') if isinstance(context.get('query_plan'), dict) else {}\n    query_result = context.get('query_result') if isinstance(context.get('query_result'), dict) else {}\n    rows = query_result.get('rows') if isinstance(query_result.get('rows'), list) else []\n\n    sheet = build_detail_sheet(rows) or build_generic_sheet(rows)\n    payload = {\n        'file_type': 'excel_ready',\n        'file_name': 'phone_module_compare.xlsx',\n        'sheets': [sheet]\n    }\n    preview_rows = sheet.get('rows', [])[:20]\n    preview = {\n        'sheet_name': sheet.get('sheet_name'),\n        'columns': sheet.get('columns'),\n        'preview_rows': preview_rows,\n        'total_rows': len(sheet.get('rows', []))\n    }\n    answer = (\n        '## Excel 数据结构已生成\\n\\n'\n        '当前已生成 Excel-ready JSON，可由前端或后端文件服务导出为 `phone_module_compare.xlsx`。\\n\\n'\n        '```json\\n' + json.dumps(preview, ensure_ascii=False, indent=2) + '\\n```'\n    )\n    result = {\n        'handler_status': 'ok',\n        'output_kind': 'excel',\n        'answer': answer,\n        'artifact_type': 'excel_ready_json',\n        'artifact_payload_json': json.dumps(payload, ensure_ascii=False),\n        'query_plan_json': json.dumps(query_plan, ensure_ascii=False),\n        'query_result_json': json.dumps(query_result, ensure_ascii=False),\n        'error': ''\n    }\n    return {'excel_handler_result_json': json.dumps(result, ensure_ascii=False)}\n"
