            "source_code": "def main(analysis_result_json=''):\n    import json\n\n    INLINE_JSON_DISPLAY_LIMIT = 12000\n\n    def load_json(raw):\n        try:\n            obj = json.loads(raw or '{}')\n            return obj if isinstance(obj, dict) else {}\n        except Exception:\n            return {}\n\n    context = load_json(analysis_result_json)\n    query_plan = context.get('query_plan') if isinstance(context.get('query_plan'), dict) else {}\n    query_result = context.get('query_result') if isinstance(context.get('query_result'), dict) else {}\n    rows = query_result.get('rows') if isinstance(query_result.get('rows'), list) else []\n    answer = context.get('summary') or 'PHONE 查询完成'\n    if rows:\n        text = json.dumps(rows, ensure_ascii=False, indent=2)\n        if len(text) <= INLINE_JSON_DISPLAY_LIMIT:\n            answer += '\\n\\n```json\\n' + text + '\\n```'\n        else:\n            answer += '\\n\\n查询结果较长，未在最终回答中内联展示，避免静默裁剪；完整 rows 已保留在 artifact_payload_json 和 query_result_json。'\n    result = {\n        'handler_status': 'ok',\n        'output_kind': str(context.get('output_kind') or 'default'),\n        'answer': answer,\n        'artifact_type': 'query_result_json',\n        'artifact_payload_json': json.dumps({'rows': rows}, ensure_ascii=False),\n        'query_plan_json': json.dumps(query_plan, ensure_ascii=False),\n        'query_result_json': json.dumps(query_result, ensure_ascii=False),\n        'error': ''\n    }\n    return {'default_handler_result_json': json.dumps(result, ensure_ascii=False)}\n",
