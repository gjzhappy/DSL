          },
          "width": 320,
          "height": 150,
          "data": {
            "title": "代码执行_生成对比表",
            "type": "code",
            "outputs": {
              "table_handler_result_json": {
                "type": "string"
              }
            },
            "source_code": "def main(analysis_result_json=''):\n    import json\n\n    def load_json(raw):\n        try:\n            obj = json.loads(raw or '{}')\n            return obj if isinstance(obj, dict) else {}\n        except Exception:\n            return {}\n\n    def dump_compact(obj):\n        return json.dumps(obj, ensure_ascii=False, separators=(',', ':'))\n\n    def cell(value):\n        if value is None:\n            return ''\n        if isinstance(value, (dict, list)):\n            value = dump_compact(value)\n        text = str(value).replace('\\n', '<br>').replace('|', '\\\\|')\n        return text\n\n    def as_list(value):\n        return value if isinstance(value, list) else []\n\n    def normalize_name(value):\n        return ''.join(ch for ch in str(value or '').lower() if ch not in ' _-\\t\\r\\n')\n\n    def device_name(row, idx):\n        if isinstance(row, dict):\n            for key in ('device_model', 'phone_model', 'model', 'name'):\n                value = row.get(key)\n                if isinstance(value, str) and value.strip():\n                    return value.strip()\n        return '对象%s' % (idx + 1)\n\n    def expected_targets(query_plan):\n        for key in ('targets', 'target_objects'):\n            values = query_plan.get(key)\n            if isinstance(values, list):\n                return [str(v).strip() for v in values if str(v).strip()]\n        return []\n\n    def meta_without(source, excluded):\n        if not isinstance(source, dict):\n            return {}\n        return {k: v for k, v in source.items() if k not in excluded}\n\n    def build_lossless_package(query_result, query_plan):\n        rows = as_list(query_result.get('rows'))\n        expected = expected_targets(query_plan)\n        present = []\n        present_norm = set()\n        entities = []\n        data_rows = []\n        for row_index, row in enumerate(rows):\n            if not isinstance(row, dict):\n                entities.append([row_index, '对象%s' % (row_index + 1), '', '', '', '', '', '', [], {'raw_row': row}])\n                continue\n            dev = device_name(row, row_index)\n            norm = normalize_name(dev)\n            if norm and norm not in present_norm:\n                present.append(dev)\n                present_norm.add(norm)\n            entity = [\n                row_index,\n                dev,\n                row.get('manufacturer', ''),\n                row.get('platform', ''),\n                row.get('device_type', ''),\n                row.get('device_pic_url', ''),\n                row.get('module_name', ''),\n                row.get('dimension', ''),\n                row.get('extra_items') if isinstance(row.get('extra_items'), list) else [],\n                meta_without(row, {'detail_groups', 'manufacturer', 'platform', 'device_type', 'device_model', 'phone_model', 'model', 'name', 'device_pic_url', 'module_name', 'dimension', 'extra_items'})\n            ]\n            entities.append(entity)\n            for group in as_list(row.get('detail_groups')):\n                if not isinstance(group, dict):\n                    continue\n                group_name = str(group.get('name') or '未分组')\n                group_meta = meta_without(group, {'name', 'items'})\n                for item in as_list(group.get('items')):\n                    if not isinstance(item, dict):\n                        continue\n                    item_name = str(item.get('name') or '').strip()\n                    if not item_name:\n                        continue\n                    metric = item.get('metric', group.get('metric', ''))\n                    item_meta = meta_without(item, {'name', 'value', 'type', 'metric'})\n                    data_rows.append([\n                        row_index,\n                        dev,\n                        group_name,\n                        item_name,\n                        item.get('value'),\n                        item.get('type', ''),\n                        metric,\n                        group_meta,\n                        item_meta\n                    ])\n        missing = []\n        for target in expected:\n            target_norm = normalize_name(target)\n            if target_norm and target_norm not in present_norm:\n                missing.append(target)\n        package = {\n            'contract_version': 'llm_query_result_package_v1',\n            'mode': 'full_lossless',\n            'lossless': True,\n            'truncated': False,\n            'packaging': {\n                'kind': 'detail_groups_schema_rows',\n                'compression': 'schema_rows_minified_json',\n                'description': '将 query_result.rows 中每个 detail_groups[].items[] 无损展开为 schema+rows；未做摘要、未裁剪、未 gzip。'\n            },\n            'coverage_check': {\n                'expected_targets': expected,\n                'present_targets': present,\n                'missing_targets': missing\n            },\n            'rows_original_count': query_result.get('row_count') if query_result.get('row_count') is not None else len(rows),\n            'entity_schema': ['row_index', 'device_model', 'manufacturer', 'platform', 'device_type', 'device_pic_url', 'module_name', 'dimension', 'extra_items', 'other_meta'],\n            'entities': entities,\n            'data_schema': ['row_index', 'device_model', 'group_name', 'item_name', 'item_value', 'item_type', 'metric', 'group_meta', 'item_meta'],\n            'data_rows': data_rows\n        }\n        return package\n\n    def condition_text(group_meta):\n        parts = []\n        for item in as_list(group_meta.get('case_conditions') if isinstance(group_meta, dict) else []):\n            if isinstance(item, dict):\n                name = str(item.get('name') or '').strip()\n                value = item.get('value')\n                if name or value not in (None, ''):\n                    parts.append((name + '=' if name else '') + str(value))\n            elif item not in (None, ''):\n                parts.append(str(item))\n        return ' / '.join(parts)\n\n    def has_long_table_shape(package):\n        for item in as_list(package.get('data_rows')):\n            if not isinstance(item, list) or len(item) < 9:\n                continue\n            metric = item[6]\n            group_meta = item[7] if isinstance(item[7], dict) else {}\n            if metric not in (None, '') or any(key in group_meta for key in ('case_id', 'case_conditions', 'case_summary')):\n                return True\n        return False\n\n    def build_long_table_from_package(package):\n        columns = ['机型', 'Case', '条件', '指标分组', '指标项', '指标名称', '数值', '类型']\n        payload_rows = []\n        lines = ['| ' + ' | '.join(columns) + ' |', '| ' + ' | '.join(['---'] * len(columns)) + ' |']\n        for item in as_list(package.get('data_rows')):\n            if not isinstance(item, list) or len(item) < 9:\n                continue\n            row_index, dev, group_name, item_name, value, item_type, metric, group_meta, item_meta = item[:9]\n            group_meta = group_meta if isinstance(group_meta, dict) else {}\n            case_value = group_meta.get('case_id')\n            case_label = ('Case %s' % case_value) if case_value not in (None, '') else group_name\n            row_values = [dev, case_label, condition_text(group_meta), group_name, item_name, metric, value, item_type]\n            payload_rows.append(row_values)\n            lines.append('| ' + ' | '.join(cell(v) for v in row_values) + ' |')\n        if not payload_rows:\n            return '未查询到可生成对比表的数据。', {'columns': [], 'rows': [], 'mode': 'full_lossless_long_table', 'truncated': False}\n        return '\\n'.join(lines), {'columns': columns, 'rows': payload_rows, 'mode': 'full_lossless_long_table', 'truncated': False}\n\n    def build_matrix_table_from_package(package):\n        devices = []\n        matrix = {}\n        for entity in as_list(package.get('entities')):\n            if isinstance(entity, list) and len(entity) > 1:\n                dev = entity[1]\n                if dev and dev not in devices:\n                    devices.append(dev)\n        for item in as_list(package.get('data_rows')):\n            if not isinstance(item, list) or len(item) < 9:\n                continue\n            _row_index, dev, group_name, item_name, value, _item_type, _metric, _group_meta, _item_meta = item[:9]\n            if not dev or not item_name:\n                continue\n            if dev not in devices:\n                devices.append(dev)\n            key = (group_name or '未分组', item_name)\n            matrix.setdefault(key, {})[dev] = value\n        if devices and matrix:\n            columns = ['指标分组', '指标项'] + devices\n            lines = ['| ' + ' | '.join(cell(col) for col in columns) + ' |', '| ' + ' | '.join(['---'] * len(columns)) + ' |']\n            payload_rows = []\n            for group_name, item_name in sorted(matrix.keys(), key=lambda x: (str(x[0]), str(x[1]))):\n                raw_values = [matrix[(group_name, item_name)].get(dev, '') for dev in devices]\n                line_values = [group_name, item_name] + raw_values\n                payload_rows.append(line_values)\n                lines.append('| ' + ' | '.join(cell(v) for v in line_values) + ' |')\n            return '\\n'.join(lines), {'columns': columns, 'rows': payload_rows, 'mode': 'full_lossless_matrix', 'truncated': False}\n        return '', {'columns': [], 'rows': [], 'mode': 'full_lossless_matrix', 'truncated': False}\n\n    def build_entity_table(package):\n        columns = ['row_index', 'device_model', 'manufacturer', 'platform', 'device_type', 'module_name', 'dimension']\n        rows = []\n        lines = ['| ' + ' | '.join(columns) + ' |', '| ' + ' | '.join(['---'] * len(columns)) + ' |']\n        for entity in as_list(package.get('entities')):\n            if not isinstance(entity, list) or len(entity) < 8:\n                continue\n            row = [entity[0], entity[1], entity[2], entity[3], entity[4], entity[6], entity[7]]\n            rows.append(row)\n            lines.append('| ' + ' | '.join(cell(v) for v in row) + ' |')\n        if not rows:\n            return '未查询到可生成对比表的数据。', {'columns': [], 'rows': [], 'mode': 'full_lossless_entity_table', 'truncated': False}\n        return '\\n'.join(lines), {'columns': columns, 'rows': rows, 'mode': 'full_lossless_entity_table', 'truncated': False}\n\n    context = load_json(analysis_result_json)\n    query_plan = context.get('query_plan') if isinstance(context.get('query_plan'), dict) else {}\n    query_result = context.get('query_result') if isinstance(context.get('query_result'), dict) else {}\n    package = build_lossless_package(query_result, query_plan)\n\n    if has_long_table_shape(package):\n        md, artifact_payload = build_long_table_from_package(package)\n    else:\n        md, artifact_payload = build_matrix_table_from_package(package)\n        if not artifact_payload.get('rows'):\n            md, artifact_payload = build_entity_table(package)\n\n    artifact_payload['query_result_package'] = package\n    artifact_payload['lossless'] = True\n    artifact_payload['truncated'] = False\n    artifact_payload['contract_version'] = 'table_handler_artifact_payload_v2'\n\n    result = {\n        'handler_status': 'ok',\n        'output_kind': 'table',\n        'answer': '## 对比表\\n\\n' + md,\n        'artifact_type': 'markdown_table',\n        'artifact_payload_json': json.dumps(artifact_payload, ensure_ascii=False),\n        'query_plan_json': json.dumps(query_plan, ensure_ascii=False),\n        'query_result_json': json.dumps(query_result, ensure_ascii=False),\n        'query_result_package_json': json.dumps(package, ensure_ascii=False),\n        'handler_context_json': json.dumps({\n            'source_node': 'table_handler',\n            'package_mode': 'full_lossless',\n            'lossless': True,\n            'truncated': False,\n            'table_mode': artifact_payload.get('mode', '')\n        }, ensure_ascii=False),\n        'error': ''\n    }\n    return {'table_handler_result_json': json.dumps(result, ensure_ascii=False)}\n",
