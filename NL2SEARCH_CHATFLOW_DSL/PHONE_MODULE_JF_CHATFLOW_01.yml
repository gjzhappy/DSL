            "source_code": "def main(body='', status_code=200, llm_handler_input_json=''):\n    import json\n\n    def truncate(text, limit=2000):\n        text = '' if text is None else str(text)\n        return text if len(text) <= limit else text[:limit] + '...'\n\n    def extract_answer(payload):\n        if isinstance(payload, dict):\n            choices = payload.get('choices')\n            if isinstance(choices, list) and choices:\n                first = choices[0] if isinstance(choices[0], dict) else {}\n                message = first.get('message') if isinstance(first.get('message'), dict) else {}\n                content = message.get('content')\n                if isinstance(content, str) and content.strip():\n                    return content.strip()\n                text = first.get('text')\n                if isinstance(text, str) and text.strip():\n                    return text.strip()\n            for key in ('answer', 'content', 'text', 'result'):\n                value = payload.get(key)\n                if isinstance(value, str) and value.strip():\n                    return value.strip()\n            return json.dumps(payload, ensure_ascii=False)\n        if isinstance(payload, str):\n            return payload.strip()\n        return ''\n\n    status = 'error'\n    answer = ''\n    error = ''\n    try:\n        code = int(status_code or 0)\n        if code < 200 or code >= 300:\n            raise ValueError('满血版LLM调用失败, status=%s, body=%s' % (code, truncate(body)))\n        try:\n            payload = json.loads(body or '{}')\n            answer = extract_answer(payload)\n        except Exception:\n            answer = str(body or '').strip()\n        if not answer:\n            raise ValueError('FULL_LLM_EMPTY_ANSWER')\n        status = 'ok'\n    except Exception as exc:\n        error = truncate(str(exc))\n        answer = ''\n\n    result = {\n        'llm_status': status,\n        'llm_text': answer,\n        'llm_source': 'full_llm',\n        'error': error\n    }\n    return {\n        'full_llm_result_json': json.dumps(result, ensure_ascii=False),\n        'full_llm_status': status\n    }\n",
