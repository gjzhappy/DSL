            "source_code": "def main(context_json='', route_card_json=''):\n    import json, re\n    ctx=json.loads(context_json or '{}'); q=ctx.get('question','')\n    models=[]\n    for pat,name in [(r'iPhone\\s*17','iPhone17'),(r'Xiaomi\\s*17|小米\\s*17','Xiaomi17'),(r'OPPO\\s*17','OPPO17')]:\n        if re.search(pat,q,re.I): models.append(name)\n    scope='main_camera' if ('主摄' in q or 'CIS' in q or 'cis' in q) else ''\n    output_type='report' if any(w in q for w in ['报告','对比报告']) else 'table'\n    topic='power' if any(w in q for w in ['功耗','供电']) else 'cis_spec'\n    return {'slot_parse_result_json': json.dumps({'target_objects':models,'object_scope':scope,'output_type':output_type,'topic':topic}, ensure_ascii=False)}\n",
