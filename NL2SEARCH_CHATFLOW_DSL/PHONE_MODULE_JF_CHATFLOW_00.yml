            "source_code": "def main(context_json='', retrieval_result=None):\n    import json, re\n\n    def collect_text(obj):\n        if obj is None:\n            return []\n        if isinstance(obj, str):\n            return [obj]\n        if isinstance(obj, list):\n            texts = []\n            for item in obj:\n                texts.extend(collect_text(item))\n            return texts\n        if isinstance(obj, dict):\n            texts = []\n            for key in (\"content\", \"text\", \"page_content\", \"document\", \"segment\", \"answer\", \"result\"):\n                if key in obj:\n                    texts.extend(collect_text(obj[key]))\n            return texts or [json.dumps(obj, ensure_ascii=False)]\n        return []\n\n    def json_candidates(text):\n        if not text:\n            return []\n        candidates = []\n        marked = re.search(\n            r\"ROUTE_CONFIG_JSON_START[\\s\\S]*?```(?:json)?\\s*([\\s\\S]*?)\\s*```[\\s\\S]*?ROUTE_CONFIG_JSON_END\",\n            text,\n            flags=re.I,\n        )\n        if marked:\n            candidates.append(marked.group(1).strip())\n        candidates.extend(m.group(1).strip() for m in re.finditer(r\"```(?:json)?\\s*([\\s\\S]*?)\\s*```\", text, flags=re.I))\n        candidates.append(text.strip())\n        return candidates\n\n    def load_config(retrieval):\n        for text in collect_text(retrieval):\n            for candidate in json_candidates(text):\n                try:\n                    obj = json.loads(candidate)\n                except Exception:\n                    continue\n                if isinstance(obj, dict) and (obj.get(\"route_id\") or obj.get(\"required_slots\") or obj.get(\"query_templates\")):\n                    return obj\n        return {}\n\n    def to_int(value, default):\n        try:\n            return int(value)\n        except Exception:\n            return default\n\n    def clean_values(values):\n        cleaned = []\n        for item in values or []:\n            if not isinstance(item, dict) or not item.get(\"value\"):\n                continue\n            aliases = [str(a) for a in item.get(\"aliases\", []) if str(a or \"\").strip()]\n            cleaned_item = {\n                \"value\": str(item[\"value\"]),\n                \"aliases\": aliases,\n            }\n            # 维度/输出类型等业务语义归属应来自知识库，而不是 Code 节点硬编码。\n            for key in (\"topic\", \"output_kind\", \"artifact_type\", \"desc\"):\n                value = item.get(key)\n                if isinstance(value, str) and value.strip():\n                    cleaned_item[key] = value.strip()\n            cleaned.append(cleaned_item)\n        return cleaned\n\n    def normalize_slots(config):\n        raw_required = config.get(\"required_slots\") or []\n        existing_defs = config.get(\"slot_definitions\") if isinstance(config.get(\"slot_definitions\"), dict) else {}\n        slot_defs, slot_order = {}, []\n\n        for item in raw_required:\n            if isinstance(item, str):\n                slot = item\n                detail = existing_defs.get(slot) if isinstance(existing_defs.get(slot), dict) else {}\n            elif isinstance(item, dict):\n                slot = item.get(\"slot\")\n                detail = item\n            else:\n                continue\n            if not slot:\n                continue\n            slot = str(slot)\n            slot_order.append(slot)\n            slot_defs[slot] = {\n                \"desc\": detail.get(\"desc\", \"\"),\n                \"placeholder\": detail.get(\"placeholder\", \"\"),\n                \"min_items\": to_int(detail.get(\"min_items\"), 1),\n                \"type\": detail.get(\"type\") or (\"multi_enum\" if to_int(detail.get(\"min_items\"), 1) > 1 else \"enum\"),\n                \"values\": clean_values(detail.get(\"values\", [])),\n            }\n\n        for slot, detail in existing_defs.items():\n            if slot in slot_defs or not isinstance(detail, dict):\n                continue\n            slot_order.append(slot)\n            slot_defs[slot] = {\n                \"desc\": detail.get(\"desc\", \"\"),\n                \"placeholder\": detail.get(\"placeholder\", \"\"),\n                \"min_items\": to_int(detail.get(\"min_items\"), 1),\n                \"type\": detail.get(\"type\") or \"enum\",\n                \"values\": clean_values(detail.get(\"values\", [])),\n            }\n        return slot_order, slot_defs\n\n    config = load_config(retrieval_result)\n    slot_order, slot_defs = normalize_slots(config) if config else ([], {})\n    mongo = config.get(\"mongo\") if isinstance(config.get(\"mongo\"), dict) else {}\n    query_templates = config.get(\"query_templates\") if isinstance(config.get(\"query_templates\"), dict) else {}\n\n    route_status = \"ok\"\n    route_error = \"\"\n    if not config:\n        route_status = \"error\"\n        route_error = \"未从知识库召回有效 RouteCard 配置，请检查 MD 是否包含 ROUTE_CONFIG_JSON_START/END 及合法 JSON。\"\n    elif not slot_order:\n        route_status = \"error\"\n        route_error = \"RouteCard.required_slots 缺失或为空。\"\n\n    return {\n        \"route_card_json\": json.dumps({\n            \"route_status\": route_status,\n            \"route_error\": route_error,\n            \"route_id\": config.get(\"route_id\") or \"\",\n            \"route_desc\": config.get(\"route_desc\") or config.get(\"description\") or \"\",\n            \"module\": config.get(\"module\") or \"\",\n            \"source\": \"knowledge\" if config else \"missing\",\n            \"required_slots\": slot_order,\n            \"slot_definitions\": slot_defs,\n            \"query_templates\": query_templates,\n            \"mongo\": mongo,\n        }, ensure_ascii=False)\n    }\n",
            "variables": [
