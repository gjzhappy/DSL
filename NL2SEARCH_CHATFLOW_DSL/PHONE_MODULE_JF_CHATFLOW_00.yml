result_status == 'ok' else 'Mongo 查询失败，已停止后续分析/报告生成。原因：%s' % error_message\n\n    return {\n        'normalized_query_result_json': json.dumps({\n            'status': query_result_status,\n            'rows': rows,\n            'raw': payload,\n            'error': {\n                'http_status_code': status_code,\n                'business_code': business_code,\n                'message': error_message\n            } if query_result_status != 'ok' else None\n        }, ensure_ascii=False),\n        'query_result_status': query_result_status,\n        'query_error_answer': query_error_answer\n    }\n",
