          "id": "parse",
          "type": "custom",
          "data": {
            "title": "代码执行_配置化规则抽槽",
            "type": "code",
            "outputs": {
              "slot_parse_result_json": {
                "type": "string"
              }
            },
            "source_code": "def main(context_json='', route_card_json=''):\n    import json, re\n\n    def load_json(raw, default):\n        try:\n            return json.loads(raw) if raw else default\n        except Exception:\n            return default\n\n    def _norm_text(text):\n        text = str(text or '').replace('（', '(').replace('）', ')')\n        text = text.replace('_', ' ').replace('-', ' ')\n        text = re.sub(r'\\s+', ' ', text)\n        return text.lower().strip()\n\n    def _compact(text):\n        return re.sub(r'[\\s_\\-]+', '', _norm_text(text))\n\n    def norm(text):\n        return re.sub(r'[\\s_\\-·,，。/／:：;；|｜（）()\\[\\]【】]+', '', str(text or '').lower())\n\n    def _is_weak_alias(alias):\n        compact = _compact(alias)\n        if len(compact) <= 2:\n            return True\n        if len(compact) <= 3 and re.fullmatch(r'[a-z0-9]+', compact):\n            return True\n        return False\n\n    def _find_spans(text, needle):\n        spans, start = [], 0\n        if not needle:\n            return spans\n        while True:\n            idx = text.find(needle, start)\n            if idx < 0:\n                return spans\n            spans.append((idx, idx + len(needle)))\n            start = idx + 1\n\n    def _overlap(a, b):\n        return a[0] < b[1] and b[0] < a[1]\n\n    def match_multi_values(question, values, min_items=1):\n        q_normal = _norm_text(question)\n        q_compact = _compact(question)\n        candidates = []\n        for item in values or []:\n            if not isinstance(item, dict):\n                continue\n            value = str(item.get('value') or '').strip()\n            if not value:\n                continue\n            aliases = [value] + [str(a) for a in item.get('aliases', []) if str(a or '').strip()]\n            alias_seen = set()\n            for alias in aliases:\n                normal_alias = _norm_text(alias)\n                compact_alias = _compact(alias)\n                for space, q_text, a_text in (('normal', q_normal, normal_alias), ('compact', q_compact, compact_alias)):\n                    if not a_text or (space, a_text) in alias_seen:\n                        continue\n                    alias_seen.add((space, a_text))\n                    for start, end in _find_spans(q_text, a_text):\n                        candidates.append({\n                            'value': value,\n                            'alias': alias,\n                            'start': start,\n                            'end': end,\n                            'length': end - start,\n                            'space': space,\n                            'weak': _is_weak_alias(alias),\n                        })\n        candidates.sort(key=lambda c: (-c['length'], c['start'], c['value']))\n        selected, occupied = [], {'normal': [], 'compact': []}\n        for c in candidates:\n            span = (c['start'], c['end'])\n            if any(_overlap(span, used) for used in occupied[c['space']]):\n                continue\n            selected.append(c)\n            occupied[c['space']].append(span)\n        strong_values = []\n        for c in selected:\n            if not c['weak'] and c['value'] not in strong_values:\n                strong_values.append(c['value'])\n        if len(strong_values) >= int(min_items or 1):\n            selected = [c for c in selected if not c['weak']]\n        selected.sort(key=lambda c: (c['start'], -c['length'], c['value']))\n        hits, seen = [], set()\n        for c in selected:\n            if c['value'] not in seen:\n                hits.append(c['value'])\n                seen.add(c['value'])\n        return hits\n\n    def match_enum_value(question, values):\n        q = norm(question)\n        for item in values or []:\n            if not isinstance(item, dict):\n                continue\n            value = str(item.get('value') or '').strip()\n            aliases = [value] + [str(a) for a in item.get('aliases', []) if str(a or '').strip()]\n            if value and any(norm(alias) and norm(alias) in q for alias in aliases):\n                return value\n        return ''\n\n    def find_value_meta(slot_defs, slot, value):\n        if not value:\n            return {}\n        detail = slot_defs.get(slot) if isinstance(slot_defs.get(slot), dict) else {}\n        for item in detail.get('values') or []:\n            if isinstance(item, dict) and str(item.get('value') or '') == str(value):\n                return item\n        return {}\n\n    def output_kind(value):\n        text = norm(value)\n        if any(key in text for key in ('报告', 'report')):\n            return 'report'\n        if any(key in text for key in ('excel', 'xlsx')):\n            return 'excel'\n        if any(key in text for key in ('趋势', 'trend')):\n            return 'trend'\n        return 'table'\n\n    ctx = load_json(context_json, {})\n    route = load_json(route_card_json, {})\n    question = ctx.get('question', '') or ''\n    slot_defs = route.get('slot_definitions') or {}\n    slot_order = route.get('required_slots') or list(slot_defs.keys())\n\n    slots = {}\n    for slot in slot_order:\n        detail = slot_defs.get(slot) or {}\n        multi = detail.get('type') == 'multi_enum' or int(detail.get('min_items') or 1) > 1\n        if multi:\n            slots[slot] = match_multi_values(question, detail.get('values') or [], detail.get('min_items') or 1)\n        else:\n            slots[slot] = match_enum_value(question, detail.get('values') or [])\n\n    output_meta = find_value_meta(slot_defs, 'output_type', slots.get('output_type'))\n    slots['output_kind'] = output_meta.get('output_kind') or output_kind(slots.get('output_type'))\n\n    dimension_meta = find_value_meta(slot_defs, 'analysis_dimension', slots.get('analysis_dimension'))\n    slots['topic'] = str(dimension_meta.get('topic') or '').strip()\n\n    return {'slot_parse_result_json': json.dumps(slots, ensure_ascii=False)}\n",
