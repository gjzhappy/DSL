            "source_code": "def main(analysis_result_json=''):\n    import json\n\n    MAX_LLM_USER_PROMPT_CHARS = 180000\n\n    def load_json(raw):\n        try:\n            obj = json.loads(raw or '{}')\n            return obj if isinstance(obj, dict) else {}\n        except Exception:\n            return {}\n\n    def dump_compact(obj):\n        return json.dumps(obj, ensure_ascii=False, separators=(',', ':'))\n\n    def as_list(value):\n        return value if isinstance(value, list) else []\n\n    def normalize_name(value):\n        return ''.join(ch for ch in str(value or '').lower() if ch not in ' _-\\t\\r\\n')\n\n    def device_name(row, idx):\n        if isinstance(row, dict):\n            for key in ('device_model', 'phone_model', 'model', 'name'):\n                value = row.get(key)\n                if isinstance(value, str) and value.strip():\n                    return value.strip()\n        return '对象%s' % (idx + 1)\n\n    def expected_targets(query_plan):\n        for key in ('targets', 'target_objects'):\n            values = query_plan.get(key)\n            if isinstance(values, list):\n                return [str(v).strip() for v in values if str(v).strip()]\n        return []\n\n    def meta_without(source, excluded):\n        if not isinstance(source, dict):\n            return {}\n        return {k: v for k, v in source.items() if k not in excluded}\n\n    def build_lossless_package(query_result, query_plan):\n        rows = as_list(query_result.get('rows'))\n        expected = expected_targets(query_plan)\n        present = []\n        present_norm = set()\n        entities = []\n        data_rows = []\n        for row_index, row in enumerate(rows):\n            if not isinstance(row, dict):\n                entities.append([row_index, '对象%s' % (row_index + 1), '', '', '', '', '', '', [], {'raw_row': row}])\n                continue\n            dev = device_name(row, row_index)\n            norm = normalize_name(dev)\n            if norm and norm not in present_norm:\n                present.append(dev)\n                present_norm.add(norm)\n            entity = [\n                row_index,\n                dev,\n                row.get('manufacturer', ''),\n                row.get('platform', ''),\n                row.get('device_type', ''),\n                row.get('device_pic_url', ''),\n                row.get('module_name', ''),\n                row.get('dimension', ''),\n                row.get('extra_items') if isinstance(row.get('extra_items'), list) else [],\n                meta_without(row, {'detail_groups', 'manufacturer', 'platform', 'device_type', 'device_model', 'phone_model', 'model', 'name', 'device_pic_url', 'module_name', 'dimension', 'extra_items'})\n            ]\n            entities.append(entity)\n            for group in as_list(row.get('detail_groups')):\n                if not isinstance(group, dict):\n                    continue\n                group_name = str(group.get('name') or '未分组')\n                group_meta = meta_without(group, {'name', 'items'})\n                for item in as_list(group.get('items')):\n                    if not isinstance(item, dict):\n                        continue\n                    item_name = str(item.get('name') or '').strip()\n                    if not item_name:\n                        continue\n                    metric = item.get('metric', group.get('metric', ''))\n                    item_meta = meta_without(item, {'name', 'value', 'type', 'metric'})\n                    data_rows.append([\n                        row_index,\n                        dev,\n                        group_name,\n                        item_name,\n                        item.get('value'),\n                        item.get('type', ''),\n                        metric,\n                        group_meta,\n                        item_meta\n                    ])\n        missing = []\n        for target in expected:\n            target_norm = normalize_name(target)\n            if target_norm and target_norm not in present_norm:\n                missing.append(target)\n        package = {\n            'contract_version': 'llm_query_result_package_v1',\n            'mode': 'full_lossless',\n            'lossless': True,\n            'truncated': False,\n            'packaging': {\n                'kind': 'detail_groups_schema_rows',\n                'compression': 'schema_rows_minified_json',\n                'description': '将 query_result.rows 中每个 detail_groups[].items[] 无损展开为 schema+rows；未做摘要、未裁剪、未 gzip。'\n            },\n            'coverage_check': {\n                'expected_targets': expected,\n                'present_targets': present,\n                'missing_targets': missing\n            },\n            'rows_original_count': query_result.get('row_count') if query_result.get('row_count') is not None else len(rows),\n            'entity_schema': ['row_index', 'device_model', 'manufacturer', 'platform', 'device_type', 'device_pic_url', 'module_name', 'dimension', 'extra_items', 'other_meta'],\n            'entities': entities,\n            'data_schema': ['row_index', 'device_model', 'group_name', 'item_name', 'item_value', 'item_type', 'metric', 'group_meta', 'item_meta'],\n            'data_rows': data_rows\n        }\n        return package\n\n    def error_payload(code, message, query_plan, query_result, output_type, artifact_type):\n        return {\n            'status': 'error',\n            'llm_task_type': 'report',\n            'output_kind': 'report',\n            'output_type': output_type,\n            'artifact_type': artifact_type,\n            'system_prompt': '你是 PHONE 数据分析助手。',\n            'user_prompt': message,\n            'query_plan': query_plan,\n            'query_result': query_result,\n            'handler_context': {'source_node': 'report_input'},\n            'error': code\n        }\n\n    context = load_json(analysis_result_json)\n    query_plan = context.get('query_plan') if isinstance(context.get('query_plan'), dict) else {}\n    query_result = context.get('query_result') if isinstance(context.get('query_result'), dict) else {}\n    output_type = query_plan.get('output_type') or context.get('output_type') or '对比报告'\n    object_scope = query_plan.get('object_scope') or ''\n    analysis_dimension = query_plan.get('analysis_dimension') or ''\n    topic = query_plan.get('topic') or ''\n    row_count = query_result.get('row_count') if query_result.get('row_count') is not None else len(as_list(query_result.get('rows')))\n    package = build_lossless_package(query_result, query_plan)\n    package_text = dump_compact(package)\n    plan_text = dump_compact(query_plan)\n\n    system_prompt = '你是 PHONE 摄像模组竞分对比报告助手。只依据输入数据作答，不要编造缺失字段。'\n    user_prompt = (\n        '请基于以下 PHONE 模组 Mongo 查询结果生成自然语言竞分对比报告。\\n'\n        '输入的 query_result_package 是 full_lossless 无损包：由 query_result.rows 的 detail_groups/items 全量展开而来，未摘要、未裁剪、未 gzip。\\n'\n        '必须依据 coverage_check 判断数据覆盖情况；如果 missing_targets 为空，不得声称任一目标缺失。\\n'\n        'data_rows 必须按 data_schema 解释；entities 必须按 entity_schema 解释。\\n'\n        'null 表示原始数据缺失或未提供，不得臆测数值。\\n'\n        '输出必须包含：1. 总体结论；2. 核心差异表；3. 规格/供电/功耗详细分析；4. 优劣势总结；5. 注意事项。\\n'\n        '核心差异表优先使用 Markdown 表格。\\n\\n'\n        '【输出类型】\\n' + str(output_type) + '\\n\\n'\n        '【对比范围】\\n' + str(object_scope) + '\\n\\n'\n        '【分析维度】\\n' + str(analysis_dimension) + '\\n\\n'\n        '【Topic Hint】\\n' + str(topic) + '\\n\\n'\n        '【查询计划】\\n' + plan_text + '\\n\\n'\n        '【Mongo查询结果无损包，原始 rows 共 %s 条】\\n' % row_count + package_text\n    )\n\n    if len(user_prompt) > MAX_LLM_USER_PROMPT_CHARS:\n        payload = error_payload(\n            'LLM_INPUT_TOO_LARGE',\n            'LLM_INPUT_TOO_LARGE: 全量无损 query_result_package 长度为 %s 字符，超过当前节点限制 %s 字符。已停止生成，未进行静默截断；请改用全量分片处理或提高模型/网关输入上限。' % (len(user_prompt), MAX_LLM_USER_PROMPT_CHARS),\n            query_plan,\n            {\n                'row_count': row_count,\n                'rows_omitted_from_handler_payload': True,\n                'query_result_package_omitted_from_handler_payload': True,\n                'omit_reason': 'avoid_single_output_variable_over_80000_chars'\n            },\n            output_type,\n            'markdown_report'\n        )\n        payload['handler_context']['lossless'] = True\n        payload['handler_context']['truncated'] = False\n        payload['handler_context']['deduplicated_handler_payload'] = True\n        return {'report_input_json': json.dumps(payload, ensure_ascii=False, separators=(\",\", \":\"))}\n\n    payload = {\n        'status': 'ok',\n        'llm_task_type': 'report',\n        'output_kind': 'report',\n        'output_type': output_type,\n        'artifact_type': 'markdown_report',\n        'system_prompt': system_prompt,\n        'user_prompt': user_prompt,\n        'query_plan': query_plan,\n        'query_result': {\n            'row_count': row_count,\n            'rows_omitted_from_handler_payload': True,\n            'query_result_package_embedded_in_user_prompt': True,\n            'omit_reason': 'avoid_duplicate_full_lossless_package_inside_report_input_json'\n        },\n        'handler_context': {\n            'object_scope': object_scope,\n            'analysis_dimension': analysis_dimension,\n            'topic': topic,\n            'source_node': 'report_input',\n            'lossless': True,\n            'truncated': False,\n            'deduplicated_handler_payload': True,\n            'query_result_package_location': 'user_prompt_only'\n        }\n    }\n    return {'report_input_json': json.dumps(payload, ensure_ascii=False, separators=(\",\", \":\"))}\n",
