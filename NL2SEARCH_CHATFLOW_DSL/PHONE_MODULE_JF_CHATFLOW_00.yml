\n            return value\n\n        text = value.strip()\n        if text.startswith(\"{{\") and text.endswith(\"}}\"):\n            return context.get(text[2:-2].strip(), value)\n        for key, replacement in context.items():\n            token = \"{{\" + key + \"}}\"\n            if token in value:\n                replacement_text = json.dumps(replacement, ensure_ascii=False) if isinstance(replacement, (dict, list)) else str(replacement)\n                value = value.replace(token, replacement_text)\n        return value\n\n    plan = load_json(query_plan_json)\n    route = load_json(route_card_json)\n    slot_payload = load_json(slot_validate_result_json)\n    slots = slot_payload.get(\"slots\") or {}\n\n    route_mongo = route.get(\"mongo\") if isinstance(route.get(\"mongo\"), dict) else {}\n    collection = str(plan.get(\"collection\") or route_mongo.get(\"collection\") or \"\").strip()\n    if not collection:\n        return fail(\"RouteCard.mongo.collection 缺失，无法确定 Mongo 主集合\")\n\n    dimension = plan.get(\"analysis_dimension\") or slots.get(\"analysis_dimension\") or \"\"\n    if not dimension:\n        return fail(\"analysis_dimension 为空，无法选择查询模板\")\n\n    templates = route.get(\"query_templates\")\n    if not isinstance(templates, dict):\n        return fail(\"RouteCard.query_templates 缺失或不是对象\")\n\n    template_item = templates.get(dimension)\n    if template_item is None:\n        return fail(\"未找到查询模板: %s\" % dimension)\n\n    try:\n        template = decode_template(template_item)\n    except Exception as exc:\n        return fail(\"查询模板解码失败: %s\" % exc)\n\n    context = {\n        \"target_objects\": plan.get(\"targets\") or slots.get(\"target_objects\") or [],\n        \"targets\": plan.get(\"targets\") or slots.get(\"target_objects\") or [],\n        \"object_scope\": plan.get(\"object_scope\") or slots.get(\"object_scope\") or \"\",\n        \"analysis_dimension\": dimension,\n        \"output_type\": plan.get(\"output_type\") or slots.get(\"output_type\") or \"\",\n        \"output_kind\": plan.get(\"output_kind\") or slots.get(\"output_kind\") or \"table\",\n        \"topic\": plan.get(\"topic\") or slots.get(\"topic\") or \"\"\n    }\n    rendered = render_value(copy.deepcopy(template), context)\n\n    template_collection = str(rendered.get(\"collection\") or \"\").strip()\n    if template_collection and template_collection != collection:\n        return fail(\"模板 collection 与 RouteCard.mongo.collection 不一致: %s != %s\" % (template_collection, collection))\n\n    pipeline = rendered.get(\"pipeline\")\n    if not isinstance(pipeline, list):\n        return fail(\"模板渲染后 pipeline 不是数组\")\n\n    request = {\"collection\": collection, \"pipeline\": pipeline}\n    request_text = json.dumps(request, ensure_ascii=False)\n    if re.search(r\"\\{\\{[^{}]+\\}\\}\", request_text):\n        return fail(\"Mongo 查询模板仍存在未填充占位符\")\n\n    return {\n        \"mongo_request_json\": request_text,\n        \"mongo_request_status\": \"ok\",\n        \"mongo_request_error_answer\": \"\"\n    }\n",
