            "code_language": "python3",
            "source_code": "import json, unicodedata, re\n\ndef norm(s):\n    s = unicodedata.normalize('NFKC', s or '').lower()\n    s = re.sub(r'[，、；;。,.!?？：:]+', ' ', s)\n    s = re.sub(r'\\s+', ' ', s).strip()\n    return s\n\ndef main(context_json: str, route_card_json: str) -> dict:\n    ctx=json.loads(context_json or '{}'); rc=json.loads(route_card_json or '{}')\n    if rc.get('status')!='ok':\n        out={\"contract_version\":\"phone_module_jf_slot_parse_v1\",\"status\":rc.get('status','route_not_found'),\"placeholder_values\":{},\"matched_evidence\":{},\"slot_conflicts\":[]}\n        return {\"slot_parse_result_json\":json.dumps(out,ensure_ascii=False),\"placeholder_values_json\":\"{}\"}\n    q=ctx.get('question',''); nq=norm(q); card=rc['route_card']\n    vals=dict(ctx.get('partial_placeholder_values') or {}); evidence={}; conflicts=[]\n    for slot in card.get('required_slots',[]):\n        ph=slot['placeholder']; hits=[]; seen=set()\n        for v in slot.get('values',[]):\n            for a in v.get('aliases',[]):\n                if norm(a) and norm(a) in nq and v['value'] not in seen:\n                    hits.append({'value':v['value'],'matched_alias':a}); seen.add(v['value'])\n        if hits: evidence[ph]=hits\n        if slot['slot']=='target_objects':\n            merged=[]\n            for x in vals.get(ph,[]):\n                if x not in merged: merged.append(x)\n            for h in hits:\n                if h['value'] not in merged: merged.append(h['value'])\n            if merged: vals[ph]=merged\n        elif hits:\n            uniq=[]\n            for h in hits:\n                if h['value'] not in uniq: uniq.append(h['value'])\n            if len(uniq)==1: vals[ph]=uniq[0]\n            else: conflicts.append({'slot':slot['slot'],'placeholder':ph,'values':uniq})\n    out={\"contract_version\":\"phone_module_jf_slot_parse_v1\",\"status\":\"ok\",\"route_id\":rc['route_id'],\"placeholder_values\":vals,\"matched_evidence\":evidence,\"slot_conflicts\":conflicts}\n    return {\"slot_parse_result_json\":json.dumps(out,ensure_ascii=False),\"placeholder_values_json\":json.dumps(vals,ensure_ascii=False)}",
