    - data:
        code: |
          import json, re
          ALLOWED={'new_query','modify_chart','refine_query','explain_result','reanalyze_result','fix_result','continue_previous','clarify'}
          REQUIRED=['turn_intent','need_previous_context','need_requery','need_rechart','need_analysis','can_answer_directly','reason','missing_info','chart_modification','query_refinement','analysis_focus']
          
          def _extract(text):
              raw=str(text or '').strip()
              m=re.match(r'^```(?:json)?\s*(.*?)\s*```$', raw, flags=re.I|re.S)
              raw=m.group(1).strip() if m else raw
              a,b=raw.find('{'),raw.rfind('}')
              return raw[a:b+1] if a>=0 and b>=a else raw
          
          def _content(body):
              obj=json.loads(body)
              choices=obj.get('choices') if isinstance(obj,dict) else None
              msg=((choices or [{}])[0] or {}).get('message') if isinstance(choices,list) else {}
              c=(msg or {}).get('content')
              return c if isinstance(c,str) else json.dumps(c, ensure_ascii=False)
          
          def _validate(obj):
              if not isinstance(obj,dict): return 'output_not_object'
              miss=[k for k in REQUIRED if k not in obj]
              if miss: return 'missing_required:'+','.join(miss)
              if obj.get('turn_intent') not in ALLOWED: return 'invalid_turn_intent'
              for k in ['need_previous_context','need_requery','need_rechart','need_analysis','can_answer_directly']:
                  if not isinstance(obj.get(k), bool): return 'invalid_bool:'+k
              if not isinstance(obj.get('missing_info'), list): return 'invalid_missing_info'
              if not isinstance(obj.get('chart_modification'), dict): return 'invalid_chart_modification'
              if not isinstance(obj.get('query_refinement'), dict): return 'invalid_query_refinement'
              return ''
          
          def main(status_code=0, body: str='', error_message: str='', request_debug_json: str='{}', **kwargs):
              code=int(status_code or 0)
              debug={'status_code':code,'request_debug':request_debug_json}
              try:
                  if code < 200 or code >= 300: raise ValueError('http_non_2xx:'+str(code)+' '+str(error_message or '')[:1000])
                  if not str(body or '').strip(): raise ValueError('empty_body')
                  text=_content(body)
                  if not str(text or '').strip(): raise ValueError('empty_choices_message_content')
                  obj=json.loads(_extract(text))
                  verr=_validate(obj)
                  if verr: raise ValueError(verr)
                  return {'full_intent_ok':'true','full_intent_status_code':code,'full_intent_text':text,'full_intent_structured_json':json.dumps(obj, ensure_ascii=False),'full_intent_error_message':'','full_intent_debug_json':json.dumps(debug, ensure_ascii=False)}
              except Exception as e:
                  return {'full_intent_ok':'false','full_intent_status_code':code,'full_intent_text':'','full_intent_structured_json':'{}','full_intent_error_message':str(e)[:2000],'full_intent_debug_json':json.dumps(debug, ensure_ascii=False)}
        code_language: python3
        desc: 校验满血 LLM turn_intent 原始输出 contract。
        outputs:
          full_intent_ok:
            type: string
          full_intent_status_code:
            type: number
          full_intent_text:
            type: string
          full_intent_structured_json:
            type: string
          full_intent_error_message:
            type: string
          full_intent_debug_json:
            type: string
        selected: false
        title: 代码执行_判断满血LLM意图识别状态
