        selected: false
        title: 代码执行_构造满血LLMCollection选择请求
        type: code
        code: |
          import base64, json, uuid
          SCHEMA = {'type': 'object', 'additionalProperties': False, 'required': ['contract_version', 'primary_collection', 'related_collections', 'schema_hydration_collections', 'selection_confidence', 'requires_clarification', 'clarification_question', 'reason', 'warnings'], 'properties': {'contract_version': {'type': 'string', 'const': 'collection_selector_v1'}, 'primary_collection': {'type': 'string'}, 'related_collections': {'type': 'array', 'items': {'type': 'string'}}, 'schema_hydration_collections': {'type': 'array', 'items': {'type': 'string'}}, 'selection_confidence': {'type': 'string', 'enum': ['high', 'medium', 'low']}, 'requires_clarification': {'type': 'boolean'}, 'clarification_question': {'type': 'string'}, 'reason': {'type': 'string'}, 'warnings': {'type': 'array', 'items': {'type': 'string'}}}}
          SYSTEM_PROMPT = '你是 collection selector，不是 query planner。你的任务不是生成查询计划，而是判断需要检索哪些 collection 的完整 schema。\n只能从 collection_catalog_json.collections[].collection_name 中选择，不能编造 collection 或 field。\nprimary_collection 是用户主要查询、过滤、统计、分组、排序、展示的主体集合。\nrelated_collections 是用户要求关联、补充、带出、合并、join、lookup、enrich 的辅助集合。\nschema_hydration_collections 必须包含 primary_collection 和所有 related_collections，用于后续精确检索完整 schema metadata。\n如果不确定但有多个可能集合，宁可多放入 schema_hydration_collections，不要漏掉可能需要的 schema。\n只输出 JSON，不输出 Mongo pipeline、最终 semantic plan 或解释文本。'
          def _bool(v): return v if isinstance(v,bool) else str(v or '').strip().lower() in {'1','true','yes','y','on'}
          def _num(v, default):
              try: return float(v)
              except Exception: return default
          def main(status_code=0, body='', collection_selector_prompt='', chat_url='', llm_config_json='{}', config_request_id='', full_llm_response_format_enabled='false', **kwargs):
              request_id=str(config_request_id or '') or 'collection_'+uuid.uuid4().hex
              debug={'request_id':request_id,'response_format_enabled':_bool(full_llm_response_format_enabled)}
              try:
                  code=int(status_code or 0)
                  if code < 200 or code >= 300: raise ValueError('token_http_failed')
                  if not str(chat_url or '').strip(): raise ValueError('missing_chat_url')
                  token_body=json.loads(body) if isinstance(body,str) and body.strip() else (body or {})
                  token=token_body.get('result') if isinstance(token_body,dict) else ''
                  if not isinstance(token,str) or not token.strip(): raise ValueError('TOKEN_RESULT_EMPTY')
                  cfg=json.loads(llm_config_json) if isinstance(llm_config_json,str) and llm_config_json.strip() else {}
                  model=str(cfg.get('model') or '').strip()
                  if not model: raise ValueError('missing_llm_config_json:model')
                  user_prompt=str(collection_selector_prompt or '').strip()+'\n\n输出 JSON contract:\n'+json.dumps({"contract_version":"collection_selector_v1","primary_collection":"","related_collections":[],"schema_hydration_collections":[],"selection_confidence":"high","requires_clarification":False,"clarification_question":"","reason":"","warnings":[]},ensure_ascii=False)+'\n只输出 JSON object，不要 markdown、解释文字、代码块或 schema 外字段。'
                  req={'model':model,'messages':[{'role':'system','content':SYSTEM_PROMPT},{'role':'user','content':user_prompt}],'stream':False,'temperature':_num(cfg.get('temperature'),0)}
                  if _bool(full_llm_response_format_enabled): req['response_format']={'type':'json_schema','json_schema':{'name':'collection_selector_schema','strict':True,'schema':SCHEMA}}
                  debug.update({'schema_name':'collection_selector_schema','model':model,'chat_url_present':True})
                  return {'chat_url':str(chat_url).strip(),'authorization_value':token.strip(),'llm_request_body_json':json.dumps(req,ensure_ascii=False),'request_enabled':'true','request_id':request_id,'full_collection_request_debug_json':json.dumps(debug,ensure_ascii=False),'full_collection_error_message':''}
              except Exception as e:
                  debug['error']=str(e)
                  return {'chat_url':str(chat_url or '').strip(),'authorization_value':'','llm_request_body_json':'','request_enabled':'false','request_id':request_id,'full_collection_request_debug_json':json.dumps(debug,ensure_ascii=False),'full_collection_error_message':str(e)}
        code_language: python3
        desc: 复用本地 Collection Selector prompt/contract 构造满血请求。
        outputs:
          chat_url:
            children:
            type: string
          authorization_value:
            children:
            type: string
          llm_request_body_json:
            children:
            type: string
          request_enabled:
