        selected: false
        title: 代码执行_构造满血LLMCollection选择请求
        type: code
        code: |
          import json, uuid
          SCHEMA = {'type': 'object', 'additionalProperties': False, 'required': ['contract_version', 'primary_collection', 'related_collections', 'schema_hydration_collections', 'selection_confidence', 'requires_clarification', 'clarification_question', 'reason', 'warnings'], 'properties': {'contract_version': {'type': 'string', 'const': 'collection_selector_v1'}, 'primary_collection': {'type': 'string'}, 'related_collections': {'type': 'array', 'items': {'type': 'string'}}, 'schema_hydration_collections': {'type': 'array', 'items': {'type': 'string'}}, 'selection_confidence': {'type': 'string', 'enum': ['high', 'medium', 'low']}, 'requires_clarification': {'type': 'boolean'}, 'clarification_question': {'type': 'string'}, 'reason': {'type': 'string'}, 'warnings': {'type': 'array', 'items': {'type': 'string'}}}}
          SYSTEM_PROMPT = '你是 collection selector，不是 query planner。你的任务不是生成查询计划，而是判断需要检索哪些 collection 的完整 schema。\n只能从 compact collection catalog 的 collections[].collection_name 中选择，不能编造 collection，不要判断字段、指标、join key 或数组字段。\nprimary_collection 是用户主要查询、过滤、统计、分组、排序、展示的主体集合。\nrelated_collections 是用户要求关联、补充、带出、合并、join、lookup、enrich 的辅助集合。\nschema_hydration_collections 必须包含 primary_collection 和所有 related_collections，用于后续精确检索完整 schema metadata。\n如果不确定但有多个可能集合，宁可降低置信度或要求澄清；确需检索时可多放入 schema_hydration_collections，不要在 Collection 阶段引入完整 schema。\n只输出 JSON，不输出 Mongo pipeline、最终 semantic plan 或解释文本。'
          UNSUPPORTED_JSON_SCHEMA_KEYS = {'uniqueItems'}

          def _truncate_text(text, limit=2000):
              text = '' if text is None else str(text)
              return text if len(text) <= limit else text[:limit] + '...'

          def _read_json_text(text):
              if text is None:
                  return None
              if isinstance(text, (dict, list)):
                  return text
              raw = str(text).strip()
              if not raw:
                  return None
              return json.loads(raw)

          def _first_non_empty_string(*values):
              for value in values:
                  if isinstance(value, str) and value.strip():
                      return value.strip()
              return ''

          def _sanitize_json_schema(value):
              if isinstance(value, dict):
                  return {key: _sanitize_json_schema(item) for key, item in value.items() if key not in UNSUPPORTED_JSON_SCHEMA_KEYS}
              if isinstance(value, list):
                  return [_sanitize_json_schema(item) for item in value]
              return value

          def _to_bool(value):
              if isinstance(value, bool):
                  return value
              return str(value or '').strip().lower() in {'1','true','yes','y','on'}

          def _to_number(value, default):
              try:
                  return float(value)
              except Exception:
                  return default

          def main(status_code=0, body='', collection_selector_prompt='', chat_url='', llm_config_json='{}', config_request_id='', full_llm_response_format_enabled='false', **kwargs):
              request_id=str(config_request_id or '') or 'collection_'+uuid.uuid4().hex
              try:
                  code = int(status_code or 0)
                  if code < 200 or code >= 300:
                      raise ValueError(f"动态token获取失败, status={code}, body={_truncate_text(body, 2000)}")
                  token_body = _read_json_text(body)
                  if not isinstance(token_body, dict):
                      raise ValueError(f"动态token响应不是合法JSON: {_truncate_text(body, 1200)}")
                  token_result = token_body.get('result')
                  if token_result is None:
                      raise ValueError('TOKEN_RESULT_EMPTY')
                  if not isinstance(token_result, str):
                      raise ValueError('TOKEN_RESULT_INVALID_TYPE')
                  authorization_value = token_result.strip()
                  if not authorization_value:
                      raise ValueError('TOKEN_RESULT_EMPTY')
                  if not authorization_value.startswith('Basic '):
                      print('WARN:TOKEN_RESULT_UNEXPECTED_PREFIX')
                  if not str(chat_url or '').strip():
                      raise ValueError('missing_chat_url')
                  llm_config = _read_json_text(llm_config_json)
                  if not isinstance(llm_config, dict):
                      raise ValueError('llm_config_json 不是合法JSON对象')
                  schema = _sanitize_json_schema(SCHEMA)
                  model = _first_non_empty_string(str(llm_config.get('model') or '').strip(), 'DeepSeek-V4-Flash')
                  user_prompt = str(collection_selector_prompt or '').strip() + '\n\n输出 JSON contract:\n' + json.dumps({"contract_version":"collection_selector_v1","primary_collection":"","related_collections":[],"schema_hydration_collections":[],"selection_confidence":"high","requires_clarification":False,"clarification_question":"","reason":"","warnings":[]},ensure_ascii=False) + '\n只输出 JSON object，不要 markdown、解释文字、代码块。不要输出 schema 外字段。array 字段必须输出数组，例如 []。object 字段必须输出对象，例如 {}。string 字段必须输出字符串，例如 ""。boolean 字段必须输出 true/false。不要输出 null。不要用空字符串代替 array/object。'
                  request_body = {'model':model,'messages':[{'role':'system','content':SYSTEM_PROMPT},{'role':'user','content':user_prompt}],'stream':False,'temperature':_to_number(llm_config.get('temperature'),0)}
                  rf_enabled = _to_bool(full_llm_response_format_enabled)
                  if rf_enabled:
                      request_body['response_format'] = {'type':'json_schema','json_schema':{'name':'collection_selector_schema','strict':False,'schema':schema}}
                  debug = {
                      'request_url': str(chat_url or '').strip(),
                      'model': model,
                      'prompt_length': len(user_prompt),
                      'auth_present': bool(authorization_value),
                      'auth_from': 'token_response.result',
                      'auth_scheme': 'Basic' if authorization_value.startswith('Basic ') else '',
                      'auth_len': len(authorization_value),
                      'body_keys': list(request_body.keys()),
                      'response_format_enabled': rf_enabled,
                      'response_format_type': 'json_schema' if rf_enabled else '',
                      'schema_name': 'collection_selector_schema' if rf_enabled else '',
                      'schema_required': schema.get('required') or [],
                      'prompt_preview': _truncate_text(user_prompt, 1000),
                      'request_id': request_id,
                  }
                  return {'chat_url':str(chat_url).strip(),'authorization_value':authorization_value,'llm_request_body_json':json.dumps(request_body,ensure_ascii=False),'request_enabled':'true','request_id':request_id,'full_collection_request_debug_json':json.dumps(debug,ensure_ascii=False),'full_collection_error_message':''}
              except Exception as e:
                  debug={'request_id':request_id,'error':_truncate_text(str(e),2000),'request_url':str(chat_url or '').strip()}
                  return {'chat_url':str(chat_url or '').strip(),'authorization_value':'','llm_request_body_json':'','request_enabled':'false','request_id':request_id,'full_collection_request_debug_json':json.dumps(debug,ensure_ascii=False),'full_collection_error_message':str(e)}
        code_language: python3
        desc: 复用本地 Collection Selector prompt/contract 构造满血请求。
        outputs:
