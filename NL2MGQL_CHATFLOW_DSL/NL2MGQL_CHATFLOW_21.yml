        type: code
        code: |
          import json, re
          REQ=['contract_version','primary_collection','related_collections','schema_hydration_collections','selection_confidence','requires_clarification','clarification_question','reason','warnings']
          def _chat_text(resp):
              choices=resp.get('choices') if isinstance(resp,dict) else None
              if isinstance(choices,list) and choices and isinstance(choices[0],dict):
                  msg=choices[0].get('message')
                  if isinstance(msg,dict): return str(msg.get('content') or '').strip()
              return str((resp or {}).get('text') or (resp or {}).get('content') or '').strip() if isinstance(resp,dict) else ''
          def _object(text):
              raw=re.sub(r'<think>.*?</think>',' ',str(text or ''),flags=re.I|re.S).strip()
              raw=re.sub(r'^```(?:json)?\s*|\s*```$','',raw,flags=re.I|re.S).strip()
              if not raw: raise ValueError('empty_content')
              obj,end=json.JSONDecoder().raw_decode(raw)
              if not isinstance(obj,dict): raise ValueError('content is not JSON object')
              return obj
          def _string_list(v,name):
              if v is None or v == '': return []
              if not isinstance(v,list) or any(not isinstance(x,str) for x in v): raise ValueError('invalid_'+name)
              return v
          def main(status_code=0, body='', error_message='', request_debug=None, **kwargs):
              code=int(status_code or 0); debug={'status_code':code,'error_message':str(error_message or ''),'request_debug':request_debug or {},'body_preview':str(body or '')[:1200],'content_preview':'','normalized_fields':[],'checker_error':''}
              try:
                  if code < 200 or code >= 300: raise ValueError('http_status_not_2xx')
                  if not str(body or '').strip(): raise ValueError('empty_body')
                  resp=json.loads(body) if isinstance(body,str) else body
                  content=_chat_text(resp) or str(body or '')
                  debug['content_preview']=str(content or '')[:1200]
                  obj=_object(content)
                  missing=[k for k in REQ if k not in obj]
                  if missing: raise ValueError('missing_required:'+','.join(missing))
                  if obj.get('contract_version')!='collection_selector_v1': raise ValueError('invalid_contract_version')
                  if not isinstance(obj.get('primary_collection'),str): raise ValueError('invalid_primary_collection')
                  for key in ['related_collections','schema_hydration_collections','warnings']:
                      if obj.get(key) is None or obj.get(key) == '': debug['normalized_fields'].append(key)
                  obj['related_collections']=_string_list(obj.get('related_collections'),'related_collections')
                  obj['schema_hydration_collections']=_string_list(obj.get('schema_hydration_collections'),'schema_hydration_collections')
                  obj['warnings']=_string_list(obj.get('warnings'),'warnings')
                  if obj.get('selection_confidence') not in {'high','medium','low'}: raise ValueError('invalid_selection_confidence')
                  if not isinstance(obj.get('requires_clarification'),bool): raise ValueError('invalid_requires_clarification')
                  for k in ['clarification_question','reason']:
                      if obj.get(k) is None:
                          obj[k]=''; debug['normalized_fields'].append(k)
                      if not isinstance(obj.get(k),str): raise ValueError('invalid_'+k)
                  text=json.dumps(obj,ensure_ascii=False)
                  return {'full_collection_ok':'true','full_collection_status_code':code,'full_collection_text':text,'full_collection_structured_json':text,'full_collection_error_message':'','full_collection_debug_json':json.dumps(debug,ensure_ascii=False)}
              except Exception as e:
                  debug['checker_error']=str(e)
                  return {'full_collection_ok':'false','full_collection_status_code':code,'full_collection_text':'','full_collection_structured_json':'{}','full_collection_error_message':str(e),'full_collection_debug_json':json.dumps(debug,ensure_ascii=False)}
        code_language: python3
        desc: 解析 choices[0].message.content，去除 think/fence 并校验 Collection Selector contract。
