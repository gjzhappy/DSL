          import json
          def _loads(s):
              if isinstance(s, dict): return s
              if not s: return {}
              try: return json.loads(str(s))
              except Exception: return {}
          def main(full_success=False, full_content='', local_text='', local_structured=None, fallback_text='', fallback_structured=None) -> dict:
              if full_success and str(full_content or '').strip():
                  text=str(full_content).strip(); return {'text':text,'structured_output':_loads(text),'llm_source':'full_llm'}
              if str(fallback_text or '').strip() or fallback_structured:
                  return {'text':str(fallback_text or ''),'structured_output': fallback_structured or _loads(fallback_text),'llm_source':'local_fallback'}
              return {'text':str(local_text or ''),'structured_output': local_structured or _loads(local_text),'llm_source':'local_direct'}
