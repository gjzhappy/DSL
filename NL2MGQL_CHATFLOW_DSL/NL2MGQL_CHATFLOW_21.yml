    - data:
        code: |
          import json
          
          SCHEMA = {"type":"object","additionalProperties":False,"required":["turn_intent","need_previous_context","need_requery","need_rechart","need_analysis","can_answer_directly","reason","missing_info","chart_modification","query_refinement","analysis_focus"],"properties":{"turn_intent":{"type":"string","enum":["new_query","modify_chart","refine_query","explain_result","reanalyze_result","fix_result","continue_previous","clarify"]},"need_previous_context":{"type":"boolean"},"need_requery":{"type":"boolean"},"need_rechart":{"type":"boolean"},"need_analysis":{"type":"boolean"},"can_answer_directly":{"type":"boolean"},"reason":{"type":"string"},"missing_info":{"type":"array","items":{"type":"string"}},"chart_modification":{"type":"object","additionalProperties":True},"query_refinement":{"type":"object","additionalProperties":True},"analysis_focus":{"type":"string"}}}
          
          def _loads(v):
              if isinstance(v, dict):
                  return v
              if isinstance(v, str) and v.strip():
                  return json.loads(v)
              return {}
          
          def _bool(v):
              return v is True or str(v or '').strip().lower() in {'1','true','yes','y','on'}
          
          def main(status_code=0, body: str='', intent_prompt: str='', chat_url: str='', llm_config_json: str='{}', request_id: str='', full_llm_response_format_enabled: str='true', **kwargs):
              try:
                  code = int(status_code or 0)
                  if code < 200 or code >= 300:
                      raise ValueError('动态token获取失败: status=%s body=%s' % (code, str(body or '')[:1000]))
                  token_json = _loads(body)
                  authorization_value = str(token_json.get('result') or '').strip()
                  if not authorization_value:
                      raise ValueError('TOKEN_RESULT_EMPTY')
                  try:
                      llm_config = _loads(llm_config_json)
                  except Exception:
                      llm_config = {'model': str(llm_config_json or '').strip()}
                  model = str(llm_config.get('model') or '').strip() or 'DeepSeek-V4-Flash'
                  prompt = (str(intent_prompt or '') + '\n\n只输出 JSON object；不要 markdown；不要解释文字；不要代码块；不要 schema 外字段；必须满足以下 JSON Schema：\n' + json.dumps(SCHEMA, ensure_ascii=False))
                  body_obj = {'model': model, 'messages': [{'role': 'system', 'content': '你是多轮数据查询 Chatflow 的意图识别器。只输出 JSON 对象。'}, {'role': 'user', 'content': prompt}], 'stream': False}
                  if _bool(full_llm_response_format_enabled):
                      body_obj['response_format'] = {'type': 'json_schema', 'json_schema': {'name': 'turn_intent_schema', 'strict': True, 'schema': SCHEMA}}
                  return {'request_enabled': 'true', 'chat_url': str(chat_url or '').strip(), 'authorization_value': authorization_value, 'llm_request_body_json': json.dumps(body_obj, ensure_ascii=False), 'request_id': str(request_id or ''), 'full_intent_request_debug_json': json.dumps({'schema_name':'turn_intent_schema','prompt_length':len(prompt),'response_format_enabled':'response_format' in body_obj}, ensure_ascii=False), 'full_intent_error_message': ''}
              except Exception as e:
                  return {'request_enabled': 'false', 'chat_url': str(chat_url or '').strip(), 'authorization_value': '', 'llm_request_body_json': '', 'request_id': str(request_id or ''), 'full_intent_request_debug_json': '{}', 'full_intent_error_message': str(e)[:2000]}
        code_language: python3
        desc: 解析动态 token 并构造 turn_intent 满血 LLM 请求体。
        outputs:
          authorization_value:
            type: string
          chat_url:
            type: string
