          import json, urllib.request, urllib.error
          
          def main(chat_url: str='', authorization_value: str='', llm_request_body_json: str='', **kwargs):
              try:
                  data = json.dumps(json.loads(llm_request_body_json), ensure_ascii=False).encode('utf-8')
                  req = urllib.request.Request(str(chat_url), data=data, headers={'Content-Type':'application/json','Authorization':str(authorization_value)}, method='POST')
                  try:
                      with urllib.request.urlopen(req, timeout=70) as resp:
                          body = resp.read().decode('utf-8', errors='replace')
                          return {'status_code': int(getattr(resp,'status',0) or 0), 'ok': True, 'body': body, 'body_preview': body[:4000], 'headers_json': json.dumps(dict(resp.headers.items()), ensure_ascii=False), 'error_message': ''}
                  except urllib.error.HTTPError as e:
                      body = e.read().decode('utf-8', errors='replace')
                      return {'status_code': int(getattr(e,'code',0) or 0), 'ok': False, 'body': body, 'body_preview': body[:4000], 'headers_json': json.dumps(dict(e.headers.items()) if e.headers else {}, ensure_ascii=False), 'error_message': ('HTTP_ERROR: '+body[:1000])}
              except Exception as e:
                  return {'status_code': 0, 'ok': False, 'body': '', 'body_preview': '', 'headers_json': '{}', 'error_message': str(e)[:2000]}
