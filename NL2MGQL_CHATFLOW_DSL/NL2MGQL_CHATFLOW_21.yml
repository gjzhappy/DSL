        type: code
        code: |
          import json, time, traceback, urllib.error, urllib.request
          MAX_RETRY=2
          RETRYABLE={500,502,503,504}
          def _post(url,data,auth,timeout=70):
              req=urllib.request.Request(str(url),data=data,headers={'Content-Type':'application/json','Authorization':str(auth)},method='POST')
              try:
                  with urllib.request.urlopen(req,timeout=timeout) as r: return int(getattr(r,'status',0) or 0),r.read().decode('utf-8','replace'),dict(r.headers.items()),''
              except urllib.error.HTTPError as e: return int(getattr(e,'code',0) or 0),e.read().decode('utf-8','replace'),dict(e.headers.items()) if getattr(e,'headers',None) else {{}},''
              except Exception as e: return 0,'',{},str(e)
          def main(chat_url='', authorization_value='', llm_request_body_json='', request_id='', **kwargs):
              out={'status_code':0,'ok':False,'body':'','body_preview':'','headers_json':'{}','error_message':'','request_debug':{},'retry_count':0,'request_id':str(request_id or '')}
              try:
                  body=json.loads(llm_request_body_json)
                  data=json.dumps(body,ensure_ascii=False).encode('utf-8')
                  out['request_debug']={'url':str(chat_url or ''),'auth_present':bool(authorization_value),'body_keys':list(body.keys()),'request_id':out['request_id']}
                  last=(0,'',{},''); retry=0
                  for i in range(MAX_RETRY+1):
                      last=_post(chat_url,data,authorization_value); code,text,headers,err=last
                      if 200 <= code < 300 or code not in RETRYABLE or i == MAX_RETRY: break
                      retry += 1; time.sleep([1,3][i])
                  code,text,headers,err=last
                  out.update({'status_code':code,'ok':200<=code<300,'body':text,'body_preview':text[:4000],'headers_json':json.dumps(headers,ensure_ascii=False),'retry_count':retry})
                  if not out['ok']: out['error_message']=err or 'HTTP_ERROR status=%s retry_count=%s'%(code,retry)
              except Exception as e:
                  out['error_message']='REQUEST_FAILED: '+str(e); out['body_preview']=traceback.format_exc()[:4000]
              return out
        code_language: python3
