    - data:
        code: |
          import json
          import hashlib

          CATALOG_VERSION = 'collection_catalog_contract'
          SELECTION_VERSION = 'collection_selection_contract'

          def _loads(value):
              if isinstance(value, dict):
                  return dict(value)
              if isinstance(value, str) and value.strip():
                  try:
                      return json.loads(value)
                  except Exception:
                      return {}
              return {}

          def _list(value):
              if isinstance(value, list):
                  return [str(x).strip() for x in value if str(x).strip()]
              if value in (None, ''):
                  return []
              return [str(value).strip()]

          def _uniq(items, limit=0):
              out, seen = [], set()
              for item in items:
                  item = str(item or '').strip()
                  if item and item not in seen:
                      seen.add(item); out.append(item)
                      if limit and len(out) >= limit:
                          break
              return out

          def _digest(obj):
              tmp = dict(obj or {})
              tmp.pop('catalog_digest', None)
              return hashlib.sha256(json.dumps(tmp, sort_keys=True, ensure_ascii=False, separators=(',', ':')).encode('utf-8')).hexdigest()

          def _fallback_catalog():
              catalog = {
                  'catalog_version': CATALOG_VERSION,
                  'catalog_digest': '',
                  'collections': [
                      {
                          'collection_name': 'orders', 'collection_label': '订单', 'domain': 'commerce',
                          'aliases': ['orders', '订单', '订单表', '销售订单', '下单记录'],
                          'description': '订单主集合，用于订单明细、销售统计、支付状态、订单趋势分析',
                          'default_time_field': 'created_at',
                          'primary_metrics': ['order_count', '订单数', '单量', '订单量', 'gmv_sum', '销售额', 'GMV', 'quantity_sum'],
                          'primary_dimensions': ['brand', '品牌', '厂商', 'category', '品类', 'province', '省份', 'status', '订单状态', 'payment_status', '支付状态', 'created_at'],
                          'supported_intents': ['detail', 'aggregate_summary', 'trend', 'ranking', 'enrich'],
                          'related_collections': ['products'], 'priority': 100,
                      },
                      {
                          'collection_name': 'products', 'collection_label': '商品', 'domain': 'commerce',
                          'aliases': ['products', '商品', '商品表', '产品', '产品表', '货品'],
                          'description': '商品主数据集合，用于商品明细、品牌、类目、上下架状态和商品数量统计',
                          'default_time_field': 'updated_at',
                          'primary_metrics': ['product_count', '商品数', '产品数', 'sku_count'],
                          'primary_dimensions': ['brand', '品牌', '厂商', 'category', '品类', 'status', '商品状态', 'product_name', '商品名称'],
                          'supported_intents': ['detail', 'aggregate_summary', 'ranking', 'enrich'],
                          'related_collections': [], 'priority': 80,
                      },
                  ],
                  'warnings': ['使用内置 C-MVP collection catalog fallback。'],
              }
              catalog['catalog_digest'] = _digest(catalog)
              return catalog

          def _catalog_from_schema(schema_metadata_json, manual_catalog_json):
              manual = _loads(manual_catalog_json)
              if manual.get('catalog_version') == CATALOG_VERSION:
                  manual.setdefault('warnings', [])
                  manual.setdefault('collections', [])
                  manual['catalog_digest'] = manual.get('catalog_digest') or _digest(manual)
                  return manual
              meta = _loads(schema_metadata_json)
              collections = meta.get('collections') if isinstance(meta.get('collections'), dict) else {}
              if not collections:
                  return _fallback_catalog()
              out = []
              for idx, name in enumerate(sorted(collections.keys())):
                  coll = collections.get(name) or {}
                  fields = coll.get('fields') if isinstance(coll.get('fields'), dict) else {}
                  metrics = coll.get('metrics') if isinstance(coll.get('metrics'), dict) else {}
                  aliases = _uniq([name, coll.get('collection_label')] + _list(coll.get('collection_aliases')), 24)
                  metric_terms = []
                  for mname, m in metrics.items():
                      m = m or {}
                      metric_terms.extend([mname, m.get('label')] + _list(m.get('aliases')))
                  dim_terms = []
                  for fname, f in fields.items():
                      f = f or {}
                      if f.get('groupable') or f.get('filterable') or f.get('chartable') or f.get('role') in ['dimension', 'time'] or f.get('semantic_type') in ['dimension', 'time']:
                          dim_terms.extend([fname, f.get('label')] + _list(f.get('aliases')))
                  related = []
                  for rel in coll.get('relations') or []:
                      target = str((rel or {}).get('target_collection') or '').strip()
                      if target and target not in related:
                          related.append(target)
                  out.append({
                      'collection_name': name,
                      'collection_label': str(coll.get('collection_label') or name),
                      'domain': str(coll.get('domain') or ''),
                      'aliases': aliases,
                      'description': str(coll.get('description') or ''),
                      'default_time_field': str(coll.get('default_time_field') or ''),
                      'primary_metrics': _uniq(metric_terms, 24),
                      'primary_dimensions': _uniq(dim_terms, 32),
                      'supported_intents': ['detail', 'aggregate_summary', 'trend', 'ranking', 'enrich'],
                      'related_collections': related[:8],
                      'priority': 100 if name == 'orders' else (80 if name == 'products' else max(10, 60 - idx)),
                  })
              catalog = {'catalog_version': CATALOG_VERSION, 'catalog_digest': '', 'collections': out, 'warnings': []}
              catalog['catalog_digest'] = _digest(catalog)
              return catalog

          def _default_selection():
              return {
                  'contract_version': SELECTION_VERSION,
                  'selected_primary_collection': '',
                  'selected_related_collections': [],
                  'confidence': 0,
                  'needs_schema_retrieval': True,
                  'primary_candidates': [],
                  'related_candidates': [],
                  'low_confidence': False,
                  'requires_clarification': False,
                  'clarification_question': '',
                  'warnings': [],
              }

          def main(question: str, turn_intent_json: str = '', compact_context_json: str = '', schema_metadata_json: str = '', collection_catalog_json: str = '', planner=None):
              catalog = _catalog_from_schema(schema_metadata_json, collection_catalog_json)
              selection = _default_selection()
              selection['collection_catalog_digest'] = catalog.get('catalog_digest', '')
              q = str(question or '')
              ctx = _loads(compact_context_json)
              turn = _loads(turn_intent_json)
              planner = _loads(planner)
              intent = str(turn.get('turn_intent') or '').strip()
              schema_ref = ctx.get('schema_context_ref') if isinstance(ctx.get('schema_context_ref'), dict) else {}
              last_primary = str(ctx.get('last_primary_collection') or '').strip()
              last_related = _list(ctx.get('last_related_collections'))
              schema_ref_collections = _list(schema_ref.get('collections'))
              context_prior_collections = _uniq([last_primary] + last_related + schema_ref_collections, 12)
              warnings, candidates = [], []
              for coll in catalog.get('collections') or []:
                  cname = str(coll.get('collection_name') or '').strip()
                  if not cname:
                      continue
                  score, matched, reasons = 0.0, [], []
                  for term in _uniq(_list(coll.get('aliases')) + [coll.get('collection_label'), cname], 48):
                      if term and term in q:
                          score += 0.55; matched.append(term)
                  for term in _uniq(_list(coll.get('primary_metrics')), 48):
                      if term and term in q:
                          score += 0.22; matched.append(term)
                  for term in _uniq(_list(coll.get('primary_dimensions')), 64):
                      if term and term in q:
                          score += 0.14; matched.append(term)
                  if intent in _list(coll.get('supported_intents')):
                      score += 0.05
                  if intent in ['refine_query', 'fix_result', 'continue_previous']:
                      if last_primary and cname == last_primary:
                          score += 0.35 if not matched else 0.12
                          reasons.append('使用 compact_context.last_primary_collection prior')
                      elif cname in context_prior_collections:
                          score += 0.18 if not matched else 0.08
                          reasons.append('使用 compact_context.schema_context_ref.collections prior')
                  score += min(float(coll.get('priority') or 0) / 1000.0, 0.1)
                  if matched:
                      reasons.append('命中 ' + '、'.join(_uniq(matched, 8)))
                  candidates.append({'collection': cname, 'score': round(min(score, 1.0), 4), 'reason': '；'.join(reasons), 'matched_aliases': _uniq(matched, 12)})
              candidates.sort(key=lambda x: (-x['score'], x['collection']))
              selection['primary_candidates'] = [x for x in candidates if x['score'] > 0][:3]
              top = selection['primary_candidates'][0] if selection['primary_candidates'] else None
              second = selection['primary_candidates'][1] if len(selection['primary_candidates']) > 1 else None
              if top and top['score'] >= 0.5:
                  selection['selected_primary_collection'] = top['collection']
                  selection['confidence'] = top['score']
              elif top:
                  selection['confidence'] = top['score']
                  selection['low_confidence'] = True
                  selection['requires_clarification'] = True
                  selection['clarification_question'] = '请明确要查询的业务对象或 collection。'
                  warnings.append('collection selector low confidence')
              else:
                  selection['low_confidence'] = True
                  selection['requires_clarification'] = True
                  selection['clarification_question'] = '请明确要查询的业务对象或 collection。'
                  warnings.append('没有命中 collection catalog 候选')
              if top and second and top['score'] - second['score'] < 0.12:
                  warnings.append('primary collection 候选分数接近，存在歧义')
              cmap = {c.get('collection_name'): c for c in catalog.get('collections') or []}
              selected = selection['selected_primary_collection']
              related = []
              if selected:
                  for rname in cmap.get(selected, {}).get('related_collections') or []:
                      rc = cmap.get(rname) or {}
                      terms = _uniq([rname, rc.get('collection_label')] + _list(rc.get('aliases')) + _list(rc.get('primary_metrics')) + _list(rc.get('primary_dimensions')), 80)
                      matched = [t for t in terms if t and t in q]
                      if matched:
                          related.append(rname)
                          selection['related_candidates'].append({'collection': rname, 'score': 0.72, 'reason': '命中 related collection 语义：' + '、'.join(matched[:6]), 'matched_aliases': matched[:8]})
              if not related and intent in ['refine_query', 'fix_result', 'continue_previous']:
                  related = [c for c in context_prior_collections if c and c != selected][:3]
                  if related:
                      warnings.append('related collections 使用 compact_context/schema_context_ref prior')
              selection['selected_related_collections'] = related[:3]
              if not selection['selected_primary_collection']:
                  legacy = str(planner.get('primary_collection') or '').strip()
                  if legacy and legacy != 'unknown':
                      selection['primary_candidates'].append({'collection': legacy, 'score': 0.45, 'reason': '兼容 fallback：旧 planner primary_collection', 'matched_aliases': []})
                      warnings.append('selector 未高置信命中，保留旧 planner collection 候选')
              selection['warnings'] = warnings
              return {
                  'collection_catalog_json': json.dumps(catalog, ensure_ascii=False),
                  'collection_selection_json': json.dumps(selection, ensure_ascii=False),
                  'selected_primary_collection': selection['selected_primary_collection'],
                  'selected_related_collections': selection['selected_related_collections'],
                  'selection_confidence': float(selection.get('confidence') or 0),
                  'selector_warnings_json': json.dumps(selection.get('warnings') or [], ensure_ascii=False),
              }
