        code: |
          import json, re
          def _list(v):
              if isinstance(v, list): return [str(x).strip() for x in v if str(x).strip()]
              if isinstance(v, str) and v.strip():
                  try:
                      x=json.loads(v); return _list(x)
                  except Exception: return [v.strip()]
              return []
          def _text(v):
              try: return json.dumps(v, ensure_ascii=False) if not isinstance(v,str) else v
              except Exception: return str(v or '')
          def main(needed_collections=None, retrieval_result=None, **kwargs):
              needed=_list(needed_collections); raw=_text(retrieval_result); low=raw.lower()
              retrieved=[c for c in needed if re.search(r'(?<![\w-])'+re.escape(c.lower())+r'(?![\w-])',low)]
              missing=[c for c in needed if c not in retrieved]
              summary={'needed_collections':needed,'retrieved_collections':retrieved,'missing_collections':missing,'schema_hydration_needed':bool(missing),'schema_recall_valid':not missing,'reason':('missing schema: '+', '.join(missing)) if missing else 'all needed collections recalled'}
              return {'needed_collections':needed,'retrieved_collections':retrieved,'missing_collections':missing,'schema_hydration_needed':bool(missing),'schema_recall_summary_json':json.dumps(summary,ensure_ascii=False)}
