        code: |
          import json
          import hashlib


          def _loads(value, default):
              if isinstance(value, (dict, list)):
                  return value
              if isinstance(value, str) and value.strip():
                  try:
                      return json.loads(value)
                  except Exception:
                      return default
              return default


          def _list(value):
              if isinstance(value, list):
                  return [str(x).strip() for x in value if str(x).strip()]
              if isinstance(value, str) and value.strip():
                  try:
                      parsed = json.loads(value)
                      if isinstance(parsed, list):
                          return [str(x).strip() for x in parsed if str(x).strip()]
                  except Exception:
                      pass
                  return [value.strip()]
              return []


          def _digest(obj, key):
              tmp = json.loads(json.dumps(obj or {}, ensure_ascii=False))
              if isinstance(tmp, dict):
                  tmp.pop(key, None)
              return hashlib.sha256(json.dumps(tmp, ensure_ascii=False, sort_keys=True, separators=(',', ':')).encode('utf-8')).hexdigest()


          def _filter_alias(alias, keep):
              if not isinstance(alias, dict):
                  return {}
              result = {}
              for k, v in alias.items():
                  if k in {'aliases', 'collection_aliases', 'field_aliases', 'metric_aliases', 'value_aliases'} and isinstance(v, dict):
                      kept = {}
                      for a, entries in v.items():
                          filtered = [e for e in (entries or []) if isinstance(e, dict) and str(e.get('collection') or '').strip() in keep]
                          if filtered:
                              kept[a] = filtered
                      result[k] = kept
                  elif k in {'fields', 'metrics'} and isinstance(v, dict):
                      result[k] = {c: m for c, m in v.items() if c in keep}
                  elif k == 'collections' and isinstance(v, dict):
                      result[k] = {a: c for a, c in v.items() if c in keep}
                  else:
                      result[k] = v
              return result


          def _schema_context(meta):
              sections = []
              for cname, coll in (meta.get('collections') or {}).items():
                  sections.append('## collection=' + cname + '\n```json\n' + json.dumps(coll, ensure_ascii=False, indent=2) + '\n```')
              return '\n\n'.join(sections)


          def main(selected_primary_collection: str = '', selected_related_collections=None, schema_context: str = '', schema_metadata_json: str = '{}', schema_alias_index_json: str = '{}', schema_context_ref_json: str = '{}', collection_catalog_json: str = '{}', expected_schema_hydration_collections=None, hydration_missing_collections_json: str = '[]', schema_hydration_complete: bool = True):
              warnings = []
              meta = _loads(schema_metadata_json, {}) or {}
              alias = _loads(schema_alias_index_json, {}) or {}
              ref = _loads(schema_context_ref_json, {}) or {}
              collections = meta.get('collections') if isinstance(meta.get('collections'), dict) else {}
              expected_collections = _list(expected_schema_hydration_collections)
              missing_collections = _list(hydration_missing_collections_json)
              if (not schema_hydration_complete) or missing_collections:
                  warnings.append('schema hydration missing expected collections: ' + ', '.join(missing_collections))
                  empty_meta = {'metadata_type': 'schema_metadata_contract', 'contract_version': 'schema_metadata_contract', 'schema_version': str(meta.get('schema_version') or ''), 'schema_digest': '', 'collections': {}, 'warnings': warnings, 'parse_errors': []}
                  return {'schema_context': '', 'schema_metadata_json': json.dumps(empty_meta, ensure_ascii=False), 'schema_alias_index_json': json.dumps({}, ensure_ascii=False), 'schema_context_ref_json': json.dumps({'collections': [], 'schema_digest': '', 'schema_version': empty_meta['schema_version'], 'catalog_digest': str(ref.get('catalog_digest') or '')}, ensure_ascii=False), 'selected_schema_ready': False, 'schema_hydration_needed': True, 'schema_hydration_reason': 'missing_expected_schema_hydration_collections', 'schema_hydration_collections': missing_collections or expected_collections, 'schema_hydration_complete': False, 'hydration_missing_collections_json': json.dumps(missing_collections, ensure_ascii=False), 'selected_schema_warnings_json': json.dumps(warnings, ensure_ascii=False)}
              primary = str(selected_primary_collection or '').strip()
              if not primary:
                  warnings.append('selected primary collection is empty')
              if primary and primary not in collections:
                  warnings.append('selected primary collection not found in candidate schemas')
              if warnings:
                  empty_meta = {'metadata_type': 'schema_metadata_contract', 'contract_version': 'schema_metadata_contract', 'schema_version': str(meta.get('schema_version') or ''), 'schema_digest': '', 'collections': {}, 'warnings': warnings, 'parse_errors': []}
                  hydration_needed = bool(primary and primary not in collections)
                  hydration_collections = [primary] if hydration_needed else []
                  hydration_reason = 'selected_primary_collection_missing_from_candidate_schemas' if hydration_needed else ''
                  return {'schema_context': '', 'schema_metadata_json': json.dumps(empty_meta, ensure_ascii=False), 'schema_alias_index_json': json.dumps({}, ensure_ascii=False), 'schema_context_ref_json': json.dumps({'collections': [], 'schema_digest': '', 'schema_version': empty_meta['schema_version'], 'catalog_digest': str(ref.get('catalog_digest') or '')}, ensure_ascii=False), 'selected_schema_ready': False, 'schema_hydration_needed': hydration_needed, 'schema_hydration_reason': hydration_reason, 'schema_hydration_collections': hydration_collections, 'schema_hydration_complete': False, 'hydration_missing_collections_json': json.dumps(hydration_collections, ensure_ascii=False), 'selected_schema_warnings_json': json.dumps(warnings, ensure_ascii=False)}
              keep = []
              missing_selected = []
              for name in [primary] + _list(selected_related_collections):
                  if name in collections and name not in keep:
                      keep.append(name)
                  elif name and name not in collections:
                      warnings.append('selected collection not found in candidate schemas: ' + name)
                      missing_selected.append(name)
              if missing_selected:
                  empty_meta = {'metadata_type': 'schema_metadata_contract', 'contract_version': 'schema_metadata_contract', 'schema_version': str(meta.get('schema_version') or ''), 'schema_digest': '', 'collections': {}, 'warnings': warnings, 'parse_errors': []}
                  return {'schema_context': '', 'schema_metadata_json': json.dumps(empty_meta, ensure_ascii=False), 'schema_alias_index_json': json.dumps({}, ensure_ascii=False), 'schema_context_ref_json': json.dumps({'collections': [], 'schema_digest': '', 'schema_version': empty_meta['schema_version'], 'catalog_digest': str(ref.get('catalog_digest') or '')}, ensure_ascii=False), 'selected_schema_ready': False, 'schema_hydration_needed': True, 'schema_hydration_reason': 'selected_collection_missing_from_hydrated_schemas', 'schema_hydration_collections': missing_selected, 'schema_hydration_complete': False, 'hydration_missing_collections_json': json.dumps(missing_selected, ensure_ascii=False), 'selected_schema_warnings_json': json.dumps(warnings, ensure_ascii=False)}
              selected = dict(meta)
              selected['collections'] = {name: collections[name] for name in keep}
              selected['schema_digest'] = _digest(selected, 'schema_digest') if keep else ''
              selected_alias = _filter_alias(alias, set(keep))
              selected_ref = {'collections': keep, 'schema_digest': selected.get('schema_digest', ''), 'schema_version': str(selected.get('schema_version') or ref.get('schema_version') or ''), 'catalog_digest': str(ref.get('catalog_digest') or '')}
              return {'schema_context': _schema_context(selected), 'schema_metadata_json': json.dumps(selected, ensure_ascii=False), 'schema_alias_index_json': json.dumps(selected_alias, ensure_ascii=False), 'schema_context_ref_json': json.dumps(selected_ref, ensure_ascii=False), 'selected_schema_ready': bool(keep), 'schema_hydration_needed': False, 'schema_hydration_reason': '', 'schema_hydration_collections': [], 'schema_hydration_complete': True, 'hydration_missing_collections_json': '[]', 'selected_schema_warnings_json': json.dumps(warnings, ensure_ascii=False)}
