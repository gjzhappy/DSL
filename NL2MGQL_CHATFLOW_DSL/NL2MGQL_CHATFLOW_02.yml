          def main(question: str, collection_catalog_json: str = '{}', selector_text: str = '', local_selector_structured=None, full_collection_ok: str = 'false', full_collection_text: str = '', full_collection_structured_json: str = '{}', full_collection_status_code=0, full_collection_error_message: str = '', full_collection_debug_json: str = '{}', enable_full_llm: str = 'false', registry_valid: bool = True, registry_error: str = ''):
