    - data:
        code: |
          import json

          def _loads_obj(value):
              if isinstance(value, dict):
                  return dict(value)
              if isinstance(value, str) and value.strip():
                  try:
                      return json.loads(value)
                  except Exception:
                      return {}
              return {}

          def _loads_list(value):
              if isinstance(value, list):
                  return value
              if isinstance(value, str) and value.strip():
                  try:
                      parsed = json.loads(value)
                      return parsed if isinstance(parsed, list) else []
                  except Exception:
                      return []
              return []

          def _candidate_meta(selection, name):
              for item in (selection.get('primary_candidates') or []) + (selection.get('related_candidates') or []):
                  if str(item.get('collection') or '').strip() == name:
                      return item
              return {}

          def _append_task(tasks, seen, name, role, question, meta, confidence, warnings):
              name = str(name or '').strip()
              if not name or name == 'unknown' or name in seen:
                  return
              seen.add(name)
              reason = str(meta.get('reason') or 'collection selection fallback').strip()
              matched = meta.get('matched_aliases') if isinstance(meta.get('matched_aliases'), list) else []
              query_text = (
                  f"用户问题: {question}\n"
                  f"当前目标 collection: {name}\n"
                  f"collection 选择依据: {reason}\n"
                  "请检索该 collection 的 schema、字段含义、典型过滤字段、聚合指标、"
                  "与其他 collection 的关联线索、以及任何能帮助生成 semantic_plan_contract 的 canonical 字段、指标、relation、query_rules 信息。"
              )
              tasks.append({
                  "collection_name": name,
                  "role": role,
                  "query_text": query_text,
                  "selection_reason": reason,
                  "selection_confidence": confidence,
                  "matched_aliases": matched,
                  "selection_warnings": warnings,
              })


          def _term_matches(question, terms):
              q = str(question or '')
              return [t for t in _uniq(_list(terms), 100) if t and t in q]

          def _explicit_collection_matches(question, coll):
              return _term_matches(question, [coll.get('collection_name'), coll.get('collection_label')] + _list(coll.get('aliases')))

          def _coverage_matches(question, coll):
              return _term_matches(question, _list(coll.get('primary_metrics')) + _list(coll.get('primary_dimensions')))

          def _has_cross_collection_intent(question):
              q = str(question or '').lower()
              return any(t in q for t in ['补充', '关联', '带出', '主数据', '详情', 'join', 'lookup', 'enrich'])

          def _negates_related(question, related_name):
              q = str(question or '').lower()
              name = str(related_name or '').lower()
              return bool(name and any(((neg + name) in q) or (neg in q and name in q) for neg in ['不要', '不需要', '无需', '不用', '排除', 'without', 'no ']))

          def main(question: str, planner=None, collection_selection_json: str = '', compact_context_json: str = ''):
              planner = _loads_obj(planner)
              selection = _loads_obj(collection_selection_json)
              compact = _loads_obj(compact_context_json)
              warnings = []

              selected_primary = str(selection.get('selected_primary_collection') or '').strip()
              requires_clarification = bool(selection.get('requires_clarification'))
              low_confidence = bool(selection.get('low_confidence'))
              confidence = float(selection.get('confidence') or 0)
              selection_warnings = selection.get('warnings') if isinstance(selection.get('warnings'), list) else []

              if selected_primary:
                  primary = selected_primary
                  primary_source = 'collection_selection_json.selected_primary_collection'
              else:
                  primary = str((planner or {}).get('primary_collection') or '').strip()
                  primary_source = 'planner.primary_collection'
                  if not primary or primary == 'unknown':
                      primary = str(compact.get('last_primary_collection') or '').strip()
                      primary_source = 'compact_context_json.last_primary_collection'
                  if not primary:
                      primary = 'unknown'
                      primary_source = 'unknown'

              if isinstance(selection.get('selected_related_collections'), list) and selection.get('selected_related_collections'):
                  related = selection.get('selected_related_collections') or []
                  related_source = 'collection_selection_json.selected_related_collections'
              else:
                  related = (planner or {}).get('related_collections') or []
                  related_source = 'planner.related_collections'

              ordered = []
              seen = set()
              tasks = []
              if selected_primary or not requires_clarification:
                  for item in [primary] + list(related):
                      name = str(item or '').strip()
                      if not name or name == 'unknown' or name in seen:
                          continue
                      ordered.append(name)
                      role = 'primary' if name == primary else 'related'
                      meta = _candidate_meta(selection, name)
                      _append_task(tasks, seen, name, role, question, meta, confidence, selection_warnings)
              else:
                  warnings.append('collection_selection_json requires clarification; skip forced primary collection task')

              if low_confidence and not tasks:
                  for cand in (selection.get('primary_candidates') or [])[:2]:
                      name = str(cand.get('collection') or '').strip()
                      if name:
                          ordered.append(name)
                          _append_task(tasks, seen, name, 'candidate', question, cand, float(cand.get('score') or 0), selection_warnings + ['low_confidence_candidate_schema_retrieval'])
                  if tasks:
                      warnings.append('low confidence; retrieving top candidate schemas')

              return {
                  "result": ordered,
                  "collection_tasks": tasks,
                  "planner_json": json.dumps(planner, ensure_ascii=False, indent=2),
                  "collection_selection_json": json.dumps(selection, ensure_ascii=False),
                  "collection_selection_source": primary_source,
                  "related_collection_source": related_source,
                  "collection_task_warnings_json": json.dumps(warnings + selection_warnings, ensure_ascii=False)
              }
