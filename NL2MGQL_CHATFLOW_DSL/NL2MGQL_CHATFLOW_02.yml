          def _to_bool(value):
              if isinstance(value, bool):
                  return value
              text = str(value or "").strip().lower()
              return text in {"1", "true", "yes", "y", "on"}


          def _to_int(value, default):
              try:
                  return int(value)
              except Exception:
                  return int(default)


