        code: |
          import json
          import hashlib

          CATALOG_VERSION = 'collection_catalog_contract'

          def _loads(value):
              if isinstance(value, dict):
                  return dict(value)
              if isinstance(value, str) and value.strip():
                  try:
                      parsed = json.loads(value)
                      return parsed if isinstance(parsed, dict) else {}
                  except Exception:
                      return {}
              return {}

          def _list(value):
              if isinstance(value, list):
                  return [str(x).strip() for x in value if str(x).strip()]
              if value in (None, ''):
                  return []
              return [str(value).strip()]

          def _uniq(items, limit=0):
              out, seen = [], set()
              for item in items:
                  item = str(item or '').strip()
                  if item and item not in seen:
                      seen.add(item); out.append(item)
                      if limit and len(out) >= limit:
                          break
              return out

          def _digest(obj):
              tmp = dict(obj or {})
              tmp.pop('catalog_digest', None)
              return hashlib.sha256(json.dumps(tmp, sort_keys=True, ensure_ascii=False, separators=(',', ':')).encode('utf-8')).hexdigest()

          def _content(doc):
              if isinstance(doc, dict):
                  return str(doc.get('content') or doc.get('text') or doc.get('document') or '')
              return str(doc or '')

          def _json_candidates(text):
              text = str(text or '').strip()
              candidates = [text]
              if '```' in text:
                  parts = text.split('```')
                  candidates.extend(part.strip() for part in parts if part.strip() and not part.strip().lower().startswith('json'))
              start = text.find('{')
              end = text.rfind('}')
              if start >= 0 and end > start:
                  candidates.append(text[start:end + 1])
              for candidate in candidates:
                  parsed = _loads(candidate)
                  if parsed:
                      yield parsed

          def _normalize_collection(item, idx):
              item = item if isinstance(item, dict) else {}
              name = str(item.get('collection_name') or item.get('name') or item.get('collection') or '').strip()
              if not name:
                  return None
              return {
                  'collection_name': name,
                  'collection_label': str(item.get('collection_label') or item.get('label') or name).strip(),
                  'aliases': _uniq(_list(item.get('aliases') or item.get('collection_aliases')), 32),
                  'description': str(item.get('description') or '').strip(),
                  'default_time_field': str(item.get('default_time_field') or '').strip(),
                  'primary_metrics': _uniq(_list(item.get('primary_metrics') or item.get('metrics')), 64),
                  'primary_dimensions': _uniq(_list(item.get('primary_dimensions') or item.get('dimensions') or item.get('fields')), 80),
                  'supported_intents': _uniq(_list(item.get('supported_intents') or ['detail', 'aggregate_summary', 'trend', 'ranking', 'enrich']), 16),
                  'related_collections': _uniq(_list(item.get('related_collections')), 16),
                  'priority': int(item.get('priority')) if str(item.get('priority') or '').strip().isdigit() else max(0, 100 - idx),
              }

          def _normalize_catalog(obj):
              warnings = []
              if obj.get('catalog_version') and obj.get('catalog_version') != CATALOG_VERSION:
                  warnings.append('unexpected catalog_version: ' + str(obj.get('catalog_version')))
              raw_collections = obj.get('collections') if isinstance(obj.get('collections'), list) else []
              collections = []
              seen = set()
              for idx, item in enumerate(raw_collections):
                  coll = _normalize_collection(item, idx)
                  if not coll:
                      continue
                  name = coll['collection_name']
                  if name in seen:
                      warnings.append('duplicate collection ignored: ' + name)
                      continue
                  seen.add(name); collections.append(coll)
              catalog = {
                  'catalog_version': CATALOG_VERSION,
                  'catalog_digest': '',
                  'collections': collections,
                  'warnings': _uniq(_list(obj.get('warnings')) + warnings, 32),
              }
              catalog['catalog_digest'] = str(obj.get('catalog_digest') or '').strip() or _digest(catalog)
              return catalog

          def main(docs):
              warnings = []
              docs = docs or []
              if not docs:
                  catalog = {'catalog_version': CATALOG_VERSION, 'catalog_digest': '', 'collections': [], 'warnings': ['collection catalog retrieval returned no documents']}
                  return {'collection_catalog_json': json.dumps(catalog, ensure_ascii=False), 'catalog_parse_warnings_json': json.dumps(catalog['warnings'], ensure_ascii=False)}
              for doc in docs:
                  for obj in _json_candidates(_content(doc)):
                      raw = obj
                      if isinstance(raw.get('collection_catalog'), dict):
                          raw = raw.get('collection_catalog')
                      if isinstance(raw.get('collections'), list):
                          catalog = _normalize_catalog(raw)
                          if catalog.get('collections'):
                              return {'collection_catalog_json': json.dumps(catalog, ensure_ascii=False), 'catalog_parse_warnings_json': json.dumps(catalog.get('warnings') or [], ensure_ascii=False)}
                          warnings.extend(catalog.get('warnings') or [])
              warnings.append('collection catalog parse failed or contained no collections')
              catalog = {'catalog_version': CATALOG_VERSION, 'catalog_digest': '', 'collections': [], 'warnings': _uniq(warnings, 32)}
              return {'collection_catalog_json': json.dumps(catalog, ensure_ascii=False), 'catalog_parse_warnings_json': json.dumps(catalog['warnings'], ensure_ascii=False)}
        code_language: python3
        desc: 将轻量 collection catalog 检索结果打包为 collection_catalog_contract；解析失败只输出空 collections，不回退到业务 collection。
        outputs:
