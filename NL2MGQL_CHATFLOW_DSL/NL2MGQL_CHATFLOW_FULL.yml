    - data:
        code: |
          import json, re
          SUPPORTED={'bar','line','pie','area','scatter'}
          ALIASES={
              'column':'bar','bar':'bar','柱状图':'bar','柱状':'bar','条形图':'bar','条形':'bar',
              'pie':'pie','饼图':'pie',
              'line':'line','折线图':'line','折线':'line','趋势图':'line','趋势':'line',
              'area':'area','面积图':'area','面积':'area',
              'scatter':'scatter','散点图':'scatter','散点':'scatter',
          }
          DEFAULTS={'enabled': True, 'renderer':'echarts', 'chart_type':'bar', 'x_field':'', 'y_field':'', 'title':'上一轮结果图表', 'series_name':'', 'top_n':0, 'sort':{}, 'label':{}, 'warning':''}

          def _extract(text):
              text=str(text or '').strip()
              m=re.match(r'^```(?:json)?\s*(.*?)\s*```$', text, flags=re.I|re.S)
              if m: text=m.group(1).strip()
              s,e=text.find('{'),text.rfind('}')
              return text[s:e+1] if s>=0 and e>=s else text

          def _loads(v, fb):
              if isinstance(v,(dict,list)): return v
              if isinstance(v,str) and v.strip():
                  try: return json.loads(_extract(v))
                  except Exception: return fb
              return fb

          def _norm_type(v):
              raw=str(v or '').lower().strip()
              if raw in ALIASES: return ALIASES[raw]
              for k,val in ALIASES.items():
                  if k in raw: return val
              return raw if raw in SUPPORTED else ''

          def _non_empty(v, key=''):
              if v is None: return False
              if isinstance(v, str): return bool(v.strip())
              if isinstance(v, (dict, list)): return bool(v)
              if key == 'top_n':
                  try: return int(v) > 0
                  except Exception: return False
              return True

          def _merge_non_empty(base, patch):
              result=dict(base or {})
              for k,v in (patch or {}).items():
                  if k == 'chart_type':
                      nt=_norm_type(v)
                      if nt: result[k]=nt
                      continue
                  if not _non_empty(v, k):
                      continue
                  if isinstance(v, str):
                      v=v.strip()
                  result[k]=v
              return result

          def _question_patch(question):
              q=str(question or '')
              ctype=_norm_type(q)
              return {'chart_type': ctype} if ctype else {}

          def _truthy(v):
              if isinstance(v, bool): return v
              if isinstance(v, str): return v.strip().lower() in {'true','1','yes','y'}
              return bool(v)

          def main(chart_structured, chart_text: str, question: str, last_merged_rows, last_chart_request_json: str, chart_modification_json: str):
              obj=_loads(chart_structured,{}) or _loads(chart_text,{})
              base=_loads(last_chart_request_json,{})
              if not isinstance(base,dict): base={}
              old_chart_type=_norm_type(base.get('chart_type'))
              mod=_loads(chart_modification_json,{})
              if not isinstance(mod,dict): mod={}
              req=obj.get('chart_request') if isinstance(obj,dict) and isinstance(obj.get('chart_request'),dict) else {}
              patch={}
              patch=_merge_non_empty(patch, mod)
              patch=_merge_non_empty(patch, req)
              patch=_merge_non_empty(patch, _question_patch(question))
              merged=_merge_non_empty(DEFAULTS, base)
              merged=_merge_non_empty(merged, patch)
              ctype=_norm_type(merged.get('chart_type')) or 'bar'
              old_chart_type=old_chart_type or _norm_type(merged.get('old_chart_type'))
              merged['chart_type']=ctype
              merged['enabled']=bool(merged.get('enabled', True))
              merged['renderer']=str(merged.get('renderer') or 'echarts')
              merged['x_field']=str(merged.get('x_field') or '').strip()
              merged['y_field']=str(merged.get('y_field') or '').strip()
              merged['title']=str(merged.get('title') or '上一轮结果图表').strip()[:60]
              if old_chart_type=='bar' and ctype=='pie' and not _truthy(merged.get('title_update')) and '对比' in merged['title']:
                  merged['title']=merged['title'].replace('对比','占比')
              series_name=str(merged.get('series_name') or '').strip()
              if (not series_name or series_name=='value') and merged.get('y_field'):
                  series_name=merged['y_field']
              merged['series_name']=series_name or 'value'
              try: merged['top_n']=int(merged.get('top_n') or 0)
              except Exception: merged['top_n']=0
              if not isinstance(merged.get('sort'),dict): merged['sort']={}
              if not isinstance(merged.get('label'),dict): merged['label']={}
              warning=str((obj or {}).get('warning') or merged.get('warning') or '') if isinstance(obj,dict) else str(merged.get('warning') or '')
              merged['warning']=warning
              return {'chart_request_json': json.dumps(merged, ensure_ascii=False), 'chart_plan_warning': warning, 'chart_plan_valid': bool(merged.get('chart_type'))}
