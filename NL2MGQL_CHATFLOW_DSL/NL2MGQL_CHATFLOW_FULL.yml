          import json, re

          def _loads(v, fb):
              if isinstance(v, (dict, list)): return v
              if isinstance(v, str) and v.strip():
                  try: return json.loads(v)
                  except Exception: return fb
              return fb

          def _dumps(v): return json.dumps(v, ensure_ascii=False)
          def _bool(v):
              if isinstance(v, bool): return v
              if isinstance(v, str): return v.strip().lower() in {'true','1','yes','y'}
              return bool(v)
          def _rows(v):
              x=_loads(v,v)
              if isinstance(x,dict) and isinstance(x.get('rows'),list): x=x.get('rows')
              return [r for r in x if isinstance(r,dict)] if isinstance(x,list) else []
          def _num(v):
              if v is None or isinstance(v,bool): return None
              try:
                  if isinstance(v,str) and not v.strip(): return None
                  return float(v)
              except Exception: return None
          def _numeric(rows,f):
              vals=[r.get(f) for r in rows[:200] if r.get(f) is not None]
              return bool(vals) and sum(1 for v in vals if _num(v) is not None)>=max(1,int(len(vals)*0.7))
          def _fields(rows, fields):
              out=[]
              for f in fields or []:
                  s=str(f or '').strip()
                  if s and s not in out: out.append(s)
              for r in rows[:20]:
                  for k in r.keys():
                      if k not in out: out.append(k)
              return out
          def _profile(rows, fields):
              fs=_fields(rows, fields); nums=[f for f in fs if _numeric(rows,f)]
              return {'preview_rows': rows[:5], 'numeric_fields': nums, 'dimension_fields': [f for f in fs if f not in nums]}
          def _chart_req(*sources):
              default={'enabled':False,'chart_type':'','x_field':'','y_field':'','series_name':'','title':'','field_labels':{}}
              found={}
              for source in sources:
                  obj=_loads(source,{})
                  if not isinstance(obj,dict): continue
                  if isinstance(obj.get('execution_plan'),dict): obj=obj.get('execution_plan') or {}
                  cand=obj.get('chart_request') if isinstance(obj.get('chart_request'),dict) else obj
                  if isinstance(cand,dict) and any(k in cand for k in default): found=cand; break
              out=dict(default)
              for k in default:
                  if k in found: out[k]=found[k]
              out['enabled']=_bool(out.get('enabled')); out['chart_type']=str(out.get('chart_type') or '').strip().lower()
              out['x_field']=str(out.get('x_field') or '').strip(); out['y_field']=str(out.get('y_field') or '').strip()
              out['series_name']=str(out.get('series_name') or '').strip(); out['title']=str(out.get('title') or '').strip()
              out['field_labels']=out.get('field_labels') if isinstance(out.get('field_labels'),dict) else {}
              return out
          def _query_result(query_result_json, rows_json, row_count, fields_json, merged_rows_json):
              warnings=[]; qr=_loads(query_result_json,{})
              if isinstance(qr,dict) and ('rows' in qr or str(qr.get('contract_version') or '') in {'query_result_contract','query_result_profile_contract'}):
                  rows=_rows(qr.get('rows',[])) or _rows(rows_json); fields=_loads(qr.get('fields',[]),[]) or _loads(fields_json,[])
                  profile=qr.get('profile') if isinstance(qr.get('profile'),dict) else _profile(rows,fields)
                  return {'contract_version':'query_result_contract','success':bool(qr.get('success',True)) and not bool(qr.get('error')),'rows':rows,'row_count':int(qr.get('row_count') or len(rows)),'fields':[str(f) for f in fields] if isinstance(fields,list) else [],'profile':profile,'error':str(qr.get('error') or ''),'warnings':qr.get('warnings') if isinstance(qr.get('warnings'),list) else []}
              rows=_rows(rows_json); fields=_loads(fields_json,[])
              if not rows and merged_rows_json:
                  rows=_rows(merged_rows_json); warnings.append('legacy_rows_fallback_used')
              try: rc=int(row_count if row_count not in (None,'') else len(rows))
              except Exception: rc=len(rows)
              if not isinstance(fields,list) or not fields: fields=list(rows[0].keys()) if rows else []
              return {'contract_version':'query_result_contract','success':True,'rows':rows,'row_count':rc,'fields':[str(f) for f in fields],'profile':_profile(rows,fields),'error':'','warnings':warnings}
          def _markdown(option):
              fence=chr(96)*3
              return fence+'echarts\n'+json.dumps(option,ensure_ascii=False,indent=2)+'\n'+fence
          def _title(req):
              if req.get('title'): return str(req.get('title'))
              labels=req.get('field_labels') if isinstance(req.get('field_labels'),dict) else {}
              x=labels.get(req.get('x_field')) or req.get('x_field') or '维度'; y=labels.get(req.get('y_field')) or req.get('series_name') or req.get('y_field') or '指标'
              return ('按%s统计%s' % (x,y)) if x and y else '查询结果图表'
          def _payload(req, qr, chart_only=False):
              rows=qr.get('rows') if isinstance(qr.get('rows'),list) else []; fields=set(_fields(rows, qr.get('fields') if isinstance(qr.get('fields'),list) else []))
              p={'contract_version':'chart_payload_contract','enabled':False,'renderer':'echarts','chart_type':str(req.get('chart_type') or ''),'option':{},'echarts_markdown':'','summary':'','warning':'','data_profile':{'row_count':int(qr.get('row_count') or len(rows)),'x_field':str(req.get('x_field') or ''),'y_field':str(req.get('y_field') or ''),'fields':[str(f) for f in fields],'preview_rows':rows[:5]},'chart_error':'','chart_debug':{}}
              if not req.get('enabled'):
                  p['warning']='chart_request disabled'; return p
              if not qr.get('success',True):
                  p['warning']=str(qr.get('error') or '查询执行失败，未生成图表。'); p['chart_error']=p['warning']; return p
              if not rows:
                  p['warning']='上一轮结果摘要不足以重新生成图表' if chart_only else '查询结果为空，未生成图表。'; return p
              x=str(req.get('x_field') or ''); y=str(req.get('y_field') or '')
              if not x or not y or x not in fields or y not in fields:
                  p['warning']='图表字段不在查询结果中'; return p
              if not _numeric(rows,y):
                  p['warning']='图表纵轴字段不是数字，未生成图表。'; return p

              ctype=str(req.get('chart_type') or 'bar')
              if ctype not in {'bar','line','pie','scatter'}:
                  p['warning']='暂不支持该图表类型'; return p

              title=_title(req); series=req.get('series_name') or y
              if ctype=='pie':
                  data=[{'name':str(r.get(x) if r.get(x) is not None else '未分类'),'value':_num(r.get(y)) or 0} for r in rows[:20]]
                  option={'title':{'text':title},'tooltip':{'trigger':'item'},'series':[{'name':series,'type':'pie','data':data}]}
                  if len(rows)>20: p['warning']='饼图分类较多，仅展示前20项。'
              elif ctype=='scatter':
                  if not _numeric(rows,x): p['warning']='散点图横轴字段不是数字，未生成图表。'; return p
                  data=[[_num(r.get(x)),_num(r.get(y))] for r in rows if _num(r.get(x)) is not None and _num(r.get(y)) is not None]
