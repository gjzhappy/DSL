          def main(question: str, collection_selection_json: str = '', collection_catalog_json: str = ''):
              selection = _loads(collection_selection_json)
              catalog = _loads(collection_catalog_json)
              warnings = selection.get('warnings') if isinstance(selection.get('warnings'), list) else []
              if not catalog.get('collections'):
                  text = '未检索到可用 schema，无法确定要查询的数据集合，请检查知识库 schema 文档。'
              else:
                  text = selection.get('clarification_question') or '无法从候选 schema 中确定本次查询的主集合，请补充说明要查询的数据对象。'
              payload = {
                  'contract_version': 'answer_payload_contract',
                  'answer_type': 'clarification',
                  'answer_text': text,
                  'chart_echarts_markdown': '',
