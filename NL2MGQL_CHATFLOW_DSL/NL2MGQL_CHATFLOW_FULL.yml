          import json
          import re
          from copy import deepcopy

          CHART_TYPE_TERMS = {
              'pie': ('换成饼图', '换为饼图', '改成饼图', '饼图'),
              'line': ('换成折线图', '换为折线图', '改成折线图', '折线图'),
              'bar': ('换成柱状图', '换为柱状图', '改成柱状图', '柱状图'),
          }
          CN_NUMBERS = {
              '一': 1, '二': 2, '两': 2, '三': 3, '四': 4, '五': 5, '六': 6,
              '七': 7, '八': 8, '九': 9, '十': 10, '十一': 11, '十二': 12, '半': 0.5
          }
          OLD_TITLE_TIME_PATTERNS = (
              '过去一个月', '过去1个月', '过去30天', '近一个月', '近1个月', '近30天',
