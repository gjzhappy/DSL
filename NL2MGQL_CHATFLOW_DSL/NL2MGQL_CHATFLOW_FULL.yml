    - data:
        code: |
          import json
          import re

          ALLOWED = {'new_query','modify_chart','refine_query','explain_result','reanalyze_result','fix_result','continue_previous','clarify'}
          SCHEMA_KEYS = {'turn_intent','need_previous_context','need_requery','need_rechart','need_analysis','can_answer_directly','reason','missing_info','chart_modification','query_refinement','analysis_focus'}


          def _strip_code_block(text):
              text = str(text or '').strip()
              m = re.match(r'^```(?:json)?\s*(.*?)\s*```$', text, flags=re.I | re.S)
              return m.group(1).strip() if m else text


          def _extract_json(text):
              text = _strip_code_block(text)
              start, end = text.find('{'), text.rfind('}')
              return text[start:end + 1] if start >= 0 and end >= start else text


          def _loads_obj(value):
              if isinstance(value, dict):
                  return dict(value)
              if isinstance(value, str) and value.strip():
                  try:
                      parsed = json.loads(_extract_json(value))
                      return parsed if isinstance(parsed, dict) else {}
                  except Exception:
                      return {}
              return {}


          def _bool(value, default=False):
              if isinstance(value, bool):
                  return value
              if value is None or value == '':
                  return default
              return str(value).strip().lower() in {'1','true','yes','y','on'}


          def _list(value):
              if isinstance(value, list):
                  return [str(x).strip() for x in value if str(x).strip()]
              if value in (None, ''):
                  return []
              return [str(value).strip()]

          def _first_stage(plan):
              stages = ((plan.get('execution_plan') or {}).get('stages') or plan.get('stages') or []) if isinstance(plan, dict) else []
              return stages[0] if isinstance(stages, list) and stages and isinstance(stages[0], dict) else {}

          def _add(out, value):
              text = str(value or '').strip()
              if text and text not in out:
                  out.append(text)

          def _same_semantic(a, b):
              def clean(v):
                  if isinstance(v, dict):
                      return {k: x for k, x in v.items() if x not in (None, '', [], {})}
                  if isinstance(v, list):
                      return [x for x in v if str(x or '').strip()]
                  return str(v or '').strip()
              return json.dumps(clean(a), ensure_ascii=False, sort_keys=True) == json.dumps(clean(b), ensure_ascii=False, sort_keys=True)

          def _context_binding(obj, old_plan):
              qref = obj.get('query_refinement') if isinstance(obj.get('query_refinement'), dict) else {}
              st = _first_stage(old_plan)
              tr = st.get('time_range') if isinstance(st.get('time_range'), dict) else {}
              base = str(old_plan.get('primary_collection') or st.get('collection') or st.get('primary_collection') or '').strip()
              explicit_switch = bool(qref.get('collection_switch') or qref.get('target_collection') or qref.get('collection'))
              changed, replaced, deprecated = [], {}, []
              old_groups = _list(st.get('group_fields'))
              new_group = qref.get('group_by_dimension') or qref.get('dimension') or qref.get('group_fields')
              if new_group not in (None, '', [], {}) and old_groups:
                  changed.append('group_by_dimension')
                  replaced['group_by_dimension'] = {'old': old_groups, 'new_semantic': new_group}
                  for f in old_groups: _add(deprecated, f)
              old_metric = {'metric_alias': st.get('metric_alias'), 'metric_field': st.get('metric_field'), 'metric_function': st.get('metric_function')}
              if qref.get('metric') not in (None, '', [], {}) and not _same_semantic(qref.get('metric'), old_metric):
                  changed.append('metric')
                  replaced['metric'] = {'old': {k: v for k, v in old_metric.items() if v not in (None, '')}, 'new_semantic': qref.get('metric')}
              if qref.get('time_range') not in (None, '', [], {}):
                  changed.append('time_range')
                  replaced['time_range'] = {'old': tr, 'new_semantic': qref.get('time_range')}
                  if isinstance(tr, dict): _add(deprecated, tr.get('field'))
              inherit = obj.get('turn_intent') == 'refine_query' and bool(obj.get('need_previous_context')) and bool(base) and not explicit_switch
              target_terms = []
              for v in [qref.get('group_by_dimension'), qref.get('metric'), qref.get('time_range')]:
                  if isinstance(v, dict):
                      for x in v.values():
                          _add(target_terms, x)
                  elif isinstance(v, list):
                      for x in v:
                          _add(target_terms, x)
                  else:
                      _add(target_terms, v)
              return {'inherit_previous_collection': inherit, 'collection_switch': explicit_switch, 'base_primary_collection': base, 'base_collection_source': 'old_normalized_semantic_plan.primary_collection' if base else '', 'old_primary_collection': base, 'old_stage_collection': str(st.get('collection') or ''), 'old_group_fields': old_groups, 'old_metric_field': str(st.get('metric_field') or ''), 'old_metric_alias': str(st.get('metric_alias') or ''), 'old_time_field': str(tr.get('field') or '') if isinstance(tr, dict) else '', 'target_group_dimension': qref.get('group_by_dimension'), 'target_metric': qref.get('metric'), 'target_time_range': qref.get('time_range'), 'changed_slots': changed, 'replaced_slots': replaced, 'deprecated_fields': deprecated, 'target_semantic_terms': target_terms}

          def _defaults(intent):
              base = {'need_previous_context': False, 'need_requery': True, 'need_rechart': False, 'need_analysis': True, 'can_answer_directly': False}
              if intent == 'modify_chart':
                  base.update({'need_previous_context': True, 'need_requery': False, 'need_rechart': True, 'need_analysis': True})
              elif intent in {'explain_result','reanalyze_result'}:
                  base.update({'need_previous_context': True, 'need_requery': False, 'need_rechart': False, 'need_analysis': True})
              elif intent == 'continue_previous':
                  base.update({'need_previous_context': True, 'need_requery': False, 'need_rechart': False, 'need_analysis': True})
              elif intent == 'clarify':
                  base.update({'need_previous_context': False, 'need_requery': False, 'need_rechart': False, 'need_analysis': False, 'can_answer_directly': True})
              elif intent == 'refine_query':
                  base.update({'need_previous_context': True, 'need_requery': True, 'need_rechart': True, 'need_analysis': True})
              elif intent == 'fix_result':
                  base.update({'need_previous_context': True, 'need_requery': True, 'need_rechart': True, 'need_analysis': True})
              return base


          def main(intent_structured, intent_text: str, last_context_json: str, question: str, old_normalized_semantic_plan_json: str = '{}', **kwargs):
              ctx = _loads_obj(last_context_json)
              old_plan = _loads_obj(old_normalized_semantic_plan_json)
              obj = _loads_obj(intent_structured)
              source = 'structured_output' if obj else 'text'
              if not obj:
                  obj = _loads_obj(intent_text)
              valid = bool(obj)
              err = '' if valid else 'intent json parse failed; fallback to new_query'
              obj = {k: obj.get(k) for k in SCHEMA_KEYS}
              intent = str(obj.get('turn_intent') or 'new_query').strip()
              if intent not in ALLOWED:
                  intent = 'new_query'; valid = False; err = (err + '; invalid intent').strip('; ')
              d = _defaults(intent)
              for k in ['need_previous_context','need_requery','need_rechart','need_analysis','can_answer_directly']:
                  obj[k] = _bool(obj.get(k), d[k])
              obj['turn_intent'] = intent
              obj['missing_info'] = obj.get('missing_info') if isinstance(obj.get('missing_info'), list) else []
              obj['chart_modification'] = obj.get('chart_modification') if isinstance(obj.get('chart_modification'), dict) else {}
              obj['query_refinement'] = obj.get('query_refinement') if isinstance(obj.get('query_refinement'), dict) else {}
              obj['analysis_focus'] = str(obj.get('analysis_focus') or '')
              obj['reason'] = str(obj.get('reason') or '')
              obj['source'] = source

              q = str(question or '')
              has_context = bool(ctx.get('has_last_context'))
              rows_count = int(ctx.get('result_rows_count') or 0)
              chart_words = ['换成饼图','改成饼图','折线图','柱状图','标题','标签','top','Top','排序']
              analysis_words = ['分析','解释','为什么','说明什么','差异','继续','接着','刚才']
              if obj['need_previous_context'] and not has_context:
                  intent = 'clarify'; obj.update(_defaults('clarify')); obj['turn_intent'] = intent; obj['reason'] = '缺少可复用的上一轮上下文'
              if any(w in q for w in chart_words) and rows_count <= 0 and intent in {'modify_chart','continue_previous','fix_result'}:
                  intent = 'clarify'; obj.update(_defaults('clarify')); obj['turn_intent'] = intent; obj['reason'] = '没有可复用的上一轮查询结果用于改图'
              if any(w in q for w in analysis_words) and rows_count <= 0 and intent in {'explain_result','reanalyze_result','continue_previous'}:
                  intent = 'clarify'; obj.update(_defaults('clarify')); obj['turn_intent'] = intent; obj['reason'] = '没有可复用的上一轮查询结果用于分析'
              if intent == 'fix_result':
                  ref = obj.get('query_refinement') or {}
                  mod = obj.get('chart_modification') or {}
                  qkeys = {'field','fields','time_range','filters','group_fields','metric','metric_alias','metric_field','dimension','sort','limit'}
                  obj['need_requery'] = any(k in ref and ref.get(k) not in ({}, [], '', None) for k in qkeys)
                  obj['need_rechart'] = bool(obj['need_requery'] or mod)
              cb = _context_binding(obj, old_plan)
              obj['context_binding'] = cb
              return {
