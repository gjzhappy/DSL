                  'last_related_collections_json': _dumps(context.get('last_related_collections') or []),
                  'last_plan_summary_json': _dumps(context.get('last_plan_summary') or _default_plan_summary()),
                  'last_result_profile_json': _dumps(context.get('last_result_profile') or _default_result_profile()),
                  'last_chart_request_json_state': last_chart_json,
