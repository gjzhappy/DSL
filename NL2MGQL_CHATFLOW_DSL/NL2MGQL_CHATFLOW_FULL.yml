          import json, re
          PROTECT=['primary_collection','related_collections','group_fields','metric_function','metric_field','metric_alias','filters','time_range','sort','limit','needs_chart','chart_request','answer_mode']

          def _loads(v):
              if isinstance(v,dict): return v
              if isinstance(v,str) and v.strip():
                  try:
                      x=json.loads(v); return x if isinstance(x,dict) else {}
                  except Exception: return {}
              return {}

          def _list(v):
              if isinstance(v,list): return v
              if isinstance(v,str) and v.strip():
                  try:
                      x=json.loads(v); return x if isinstance(x,list) else []
                  except Exception: return []
              return []

          def _first_stage(plan):
              stages=((plan.get('execution_plan') or {}).get('stages') or plan.get('stages') or []) if isinstance(plan,dict) else []
              return stages[0] if isinstance(stages,list) and stages and isinstance(stages[0],dict) else {}

          def _set_stage(plan, stage):
              if not isinstance(plan.get('execution_plan'),dict): plan['execution_plan']={}
              stages=plan['execution_plan'].get('stages')
              if not isinstance(stages,list) or not stages: stages=[{}]
              stages[0].update(stage); plan['execution_plan']['stages']=stages
          def _allowed_fields(question, query_refinement_json, changed_fields_json):
              text=(str(question or '')+' '+json.dumps(_loads(query_refinement_json),ensure_ascii=False)).lower()
              allowed=set(_list(changed_fields_json))
              rules={'time_range':['时间','近','最近','过去','天','月','年'],'filters':['筛选','过滤','条件','只看','排除','口径'],'group_fields':['分组','按','维度','口径','厂商','供应商','vendor'],'metric_field':['指标','金额','数量','统计','真实'],'metric_function':['求和','平均','最大','最小','计数','count','sum','avg'],'metric_alias':['别名'],'sort':['排序','升序','降序'],'limit':['top','前','limit'],'chart_request':['图','柱状图','折线图','饼图','可视化'],'needs_chart':['图','可视化'],'answer_mode':['分析','解释','明细'],'primary_collection':['换成','改查','查询对象','collection'],'related_collections':['关联','join','补充']}
              for field, keys in rules.items():
                  if any(k.lower() in text for k in keys): allowed.add(field)
              return allowed

          def main(old_normalized_semantic_plan_json: str, replanned_normalized_semantic_plan_json: str, current_question: str, query_refinement_json: str, changed_fields_json: str, refine_schema_context: str, patch_reason: str, replan_valid=True, replan_error: str=''):
              old=_loads(old_normalized_semantic_plan_json); new=_loads(replanned_normalized_semantic_plan_json)
              if str(replan_valid).lower() in {'false','0','no'} or not new:
                  return {'normalized_semantic_plan_json':json.dumps(old,ensure_ascii=False),'guard_valid':False,'guard_warning':'','guard_error':str(replan_error or '重规划结果无效'),'guard_changed_fields_json':'[]','guard_rollback_fields_json':'[]','guard_debug_json':json.dumps({'fallback':'old_plan'},ensure_ascii=False)}
              if not old:
                  return {'normalized_semantic_plan_json':'','guard_valid':False,'guard_warning':'','guard_error':'缺少上一轮归一化语义计划，无法进行差异保护','guard_changed_fields_json':'[]','guard_rollback_fields_json':'[]','guard_debug_json':'{}'}
              os=_first_stage(old); ns=_first_stage(new); allowed=_allowed_fields(current_question,query_refinement_json,changed_fields_json)
              changed=[]; rollback=[]; warnings=[]; errors=[]
              for k in PROTECT:
                  if k in ['needs_chart','chart_request','answer_mode']:
                      ov,nv=old.get(k),new.get(k)
                      if nv!=ov:
                          changed.append(k)
                          if k not in allowed and ov not in (None,'',[],{}): new[k]=ov; rollback.append(k)
                  else:
                      ov,nv=os.get(k),ns.get(k)
                      if nv!=ov:
                          changed.append(k)
                          if k not in allowed and ov not in (None,'',[],{}): ns[k]=ov; rollback.append(k)
              for k in ['execution_plan','needs_chart','chart_request','answer_mode']:
                  if k not in new and k in old: new[k]=old[k]; warnings.append('补齐缺失字段:'+k)
              _set_stage(new,ns)
              valid=bool(new.get('execution_plan') and ((new.get('execution_plan') or {}).get('stages')))
              if not valid: errors.append('guard 后 semantic plan 缺少 execution_plan.stages')
              if rollback: warnings.append('已回滚未授权漂移字段: '+','.join(sorted(set(rollback))))
              return {'normalized_semantic_plan_json':json.dumps(new,ensure_ascii=False),'guard_valid':valid,'guard_warning':'; '.join(warnings),'guard_error':'; '.join(errors),'guard_changed_fields_json':json.dumps(sorted(set(changed)),ensure_ascii=False),'guard_rollback_fields_json':json.dumps(sorted(set(rollback)),ensure_ascii=False),'guard_debug_json':json.dumps({'allowed_fields':sorted(allowed),'patch_reason':patch_reason},ensure_ascii=False)}
