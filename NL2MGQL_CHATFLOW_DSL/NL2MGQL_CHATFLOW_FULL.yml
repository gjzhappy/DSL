    - data:
        code: |
          import json

          def main(question: str, planner):
              if isinstance(planner, str):
                  planner = json.loads(planner)

              primary = str((planner or {}).get("primary_collection") or "").strip()
              related = (planner or {}).get("related_collections") or []

              ordered = []
              seen = set()
              for item in [primary] + list(related):
                  name = str(item or "").strip()
                  if not name or name == "unknown" or name in seen:
                      continue
                  seen.add(name)
                  ordered.append(name)

              collection_tasks = []
              for name in ordered:
                  role = "primary" if name == primary else "related"
                  query_text = (
                      f"用户问题: {question}\n"
                      f"当前�标 collection: {name}\n"
                      "请检索该 collection 的 schema、字段含义、典型过滤字段、聚合指标、"
                      "与其他 collection 的关联线索、以及任何能帮助生成 Mongo 聚合 AST 的信息。"
                  )
                  collection_tasks.append({
                      "collection_name": name,
                      "role": role,
                      "query_text": query_text
                  })

              return {
                  "result": ordered,
                  "collection_tasks": collection_tasks,
                  "planner_json": json.dumps(planner, ensure_ascii=False, indent=2)
              }
        code_language: python3
        desc: 构建待检索的 collection 任务
        outputs:
          collection_tasks:
            children:
            type: array[object]
          planner_json:
            children:
            type: string
          result:
            children:
            type: array[string]
        selected: false
