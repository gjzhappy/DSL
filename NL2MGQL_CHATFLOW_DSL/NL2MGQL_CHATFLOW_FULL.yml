        code: |
          import json
          from datetime import datetime, timezone

          def _loads(v, fb):
              if isinstance(v, (dict, list)): return v
              if isinstance(v, str) and v.strip():
                  try: return json.loads(v)
                  except Exception: return fb
              return fb
          def _dumps(v): return json.dumps(v, ensure_ascii=False)
          def _clean_chart_request(req):
              allowed=['enabled','chart_type','x_field','y_field','title','series_name','field_labels']
              return {k:req.get(k) for k in allowed if isinstance(req,dict) and k in req}
          def _clean_payload(payload):
              if not isinstance(payload,dict): return {'enabled':False,'summary':'','warning':''}
              allowed=['contract_version','enabled','chart_type','title','x_field','y_field','series_name','summary','warning','data_profile']
              out={k:payload.get(k) for k in allowed if k in payload}
              if isinstance(out.get('data_profile'),dict):
                  p=out['data_profile']
                  out['data_profile']={'row_count':int(p.get('row_count') or 0),'fields':(p.get('fields') or [])[:50],'preview_rows':[r for r in (p.get('preview_rows') or [])[:5] if isinstance(r,dict)]}
              return out
          def _base_context(last_context_json):
              ctx=_loads(last_context_json,{})
              return ctx if isinstance(ctx,dict) else {}
          def main(chart_payload_json: str, chart_request_json: str='', last_context_json: str='{}'):
              payload=_loads(chart_payload_json,{})
              req=_loads(chart_request_json,{})
              clean_req=_clean_chart_request(req if isinstance(req,dict) else {})
              clean_payload=_clean_payload(payload if isinstance(payload,dict) else {})
              md=str(payload.get('echarts_markdown') or '').strip() if isinstance(payload,dict) else ''
              enabled=bool(payload.get('enabled')) if isinstance(payload,dict) else False
              if enabled and md:
                  answer_text='已基于上一轮结果更新图表。'
                  answer_type='chart_only'
                  note=str(payload.get('summary') or '图表已更新。')
              else:
                  answer_text='上一轮结果摘要不足以重新生成图表。'
                  answer_type='chart_only'
                  note=str(payload.get('warning') or answer_text)
                  md=''
              final=(answer_text+'\n\n'+md+'\n\n'+note).strip() if md else (answer_text+'\n\n'+note).strip()
              ctx=_base_context(last_context_json)
              if ctx.get('context_version')!='compact_context_contract':
                  ctx={'context_version':'compact_context_contract','has_last_context':False,'last_question':'','last_turn_intent':{},'last_primary_collection':'','last_related_collections':[],'last_plan_summary':{},'last_resolved_fields':[],'last_resolved_metrics':[],'last_chart_request':{},'last_result_profile':{},'schema_context_ref':{'collections':[],'schema_digest':'','schema_version':'','catalog_digest':''},'answer_summary':'','size_guard':{},'context_warnings':[]}
              # chart_only can update chart request / chart summary, but must not overwrite last_plan_summary, primary collection, or schema_context_ref.
              prior_plan=ctx.get('last_plan_summary') if isinstance(ctx.get('last_plan_summary'),dict) else {}
              prior_primary=ctx.get('last_primary_collection') or ''
              prior_schema=ctx.get('schema_context_ref') if isinstance(ctx.get('schema_context_ref'),dict) else {'collections':[],'schema_digest':'','schema_version':'','catalog_digest':''}
              ctx['last_chart_request']=(ctx.get('last_chart_request') if isinstance(ctx.get('last_chart_request'),dict) else {})
              ctx['last_chart_request'].update({k:v for k,v in clean_req.items() if k in ('chart_type','title','x_field','y_field','series_name','enabled') and v not in (None,'')})
              data_profile=clean_payload.get('data_profile') if isinstance(clean_payload.get('data_profile'),dict) else {}
              if data_profile:
                  ctx['last_result_profile']=data_profile
              ctx['answer_summary']=note[:800]
              ctx['last_plan_summary']=prior_plan
              ctx['last_primary_collection']=prior_primary
              ctx['schema_context_ref']=prior_schema
              compact_json=_dumps(ctx)
              context_update={'contract_version':'context_update_contract','should_save_context':bool(ctx.get('has_last_context')),'compact_context':ctx,'last_context_json':compact_json,'warnings':ctx.get('context_warnings') or [],'clear_fields':[]}
              answer_payload={'contract_version':'answer_payload_contract','answer_type':answer_type,'answer_text':answer_text,'chart_echarts_markdown':md,'result_summary':note,'message':'' if md else note,'chart_payload':clean_payload,'query_result_profile':data_profile or {'row_count':0,'fields':[],'preview_rows':[]},'state_update':{'should_save_context':bool(ctx.get('has_last_context')),'context_summary':ctx}}
              return {'final_answer_markdown': final,'answer_payload_markdown': final,'answer_text': answer_text,'result_summary': note,'chart_request': req if isinstance(req,dict) else {},'chart_request_for_context': clean_req,'chart_payload_json': _dumps(clean_payload),'answer_payload_json': _dumps(answer_payload),'context_update_json': _dumps(context_update),'compact_context_json': compact_json,'chart_echarts_markdown': md,'final_answer_summary': note,'updated_at': datetime.now(timezone.utc).isoformat()}
