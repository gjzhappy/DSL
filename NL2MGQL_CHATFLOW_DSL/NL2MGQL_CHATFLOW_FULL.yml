              '过去2个月', '近两个月', '最近两个月', '近三个月', '最近3个月',
              '过去60天', '最近60天', '近90天', '过去半年', '最近半年', '过去一年', '最近一年'
          )
          STRUCTURAL_KEYS = (
              'group_by', 'group_field', 'group_fields', 'replace_group_fields',
              'metric', 'metric_hint', 'replace_metric', 'metric_function', 'metric_field',
              'filter', 'filters', 'add_filters', 'where',
              'collection', 'primary_collection', 'related_collections',
              'relation', 'join', 'enrich',
              'intent', 'intent_type', 'business_rule_change', 'negative_fields',
