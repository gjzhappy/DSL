    - data:
        code: |
          import json

          CONTEXT_INTENTS = {'modify_chart', 'explain_result', 'reanalyze_result', 'continue_previous', 'fix_result'}
          REFINE_LIKE_REQUERY_INTENTS = {'refine_query', 'fix_result', 'continue_previous'}


          def _bool(v):
              if isinstance(v, bool):
                  return v
              return str(v or '').strip().lower() in {'1', 'true', 'yes', 'y', 'on'}


          def main(turn_intent: str, need_previous_context, need_requery, need_rechart, need_analysis, can_answer_directly, has_last_context, intent_valid, intent_error: str, missing_info: str, normalized_turn_intent_json: str):
              try:

                  intent = str(turn_intent or 'clarify').strip()
                  has_ctx = _bool(has_last_context)
                  nr, nc, na, direct = _bool(need_requery), _bool(need_rechart), _bool(need_analysis), _bool(can_answer_directly)
                  refine_like_requery = bool(has_ctx and nr and intent in REFINE_LIKE_REQUERY_INTENTS)

                  reason = ''
                  if intent == 'clarify':
                      route = 'clarify'; reason = 'intent requires clarification'
                  elif _bool(need_previous_context) and not has_ctx:
                      route = 'clarify'; reason = 'previous context is required but unavailable'
                  elif intent in CONTEXT_INTENTS and not has_ctx:
                      route = 'clarify'; reason = 'context-dependent intent without reusable context'
                  elif nr:
                      route = 'query'; reason = 'need_requery=true'
                  elif intent in {'new_query', 'refine_query'}:
                      route = 'query'; reason = 'query intent'
                  elif (not nr) and nc:
                      route = 'chart'; reason = 'reuse prior result and regenerate chart'
                  elif (not nr) and (not nc) and na:
                      route = 'analysis'; reason = 'reuse prior result for analysis'
                  elif direct:
                      route = 'direct'; reason = 'can answer directly'
                  else:
                      route = 'clarify'; reason = 'unable to determine safe route'
