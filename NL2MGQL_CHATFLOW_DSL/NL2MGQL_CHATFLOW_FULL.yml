          )
          STRUCTURAL_NESTED_PATHS = (
              ('chart_request', 'x_field'),
              ('chart_request', 'y_field'),
          )
          UNCHANGED_GUARDS = ('group_fields_unchanged', 'metric_unchanged', 'filters_unchanged', 'collection_unchanged')
          STRUCTURAL_PATTERNS = (
              r'不再按', r'不要按', r'不按', r'改按', r'重新按', r'不是.+而是',
              r'按.+统计', r'按.+排序', r'按.+口径', r'按.+维度', r'横轴改成', r'纵轴改成',
              r'换成.+维度', r'改成.+口径', r'只统计', r'只看(?!前\s*\d)',
              r'筛选', r'过滤', r'排除', r'条件', r'口径', r'真实口径', r'重新统计',
              r'不看.+改成', r'改成.+销售额', r'改看', r'加上.+信息', r'关联', r'join|JOIN'
          )
          NEGATION_PATTERNS = (r'不再按\s*([^，。,.\s]+)', r'不要\s*([^，。,.\s]+)', r'不是\s*([^，。,.\s]+)', r'不看\s*([^，。,.\s]+)')


          def _loads(v):
              if isinstance(v, dict):
                  return v
              if isinstance(v, str) and v.strip():
                  try:
                      x = json.loads(v)
                      return x if isinstance(x, dict) else {}
                  except Exception:
                      return {}
              return {}


          def _bool(v):
              if isinstance(v, bool):
                  return v
              return str(v or '').strip().lower() in {'1', 'true', 'yes', 'y', 'on'}


          def _non_empty(v):
              if v is None or v is False:
                  return False
              if isinstance(v, str):
                  return bool(v.strip())
              if isinstance(v, (list, tuple, set, dict)):
                  return bool(v)
              return True


          def _stages(plan):
              ep = plan.get('execution_plan') if isinstance(plan, dict) else {}
              stages = ep.get('stages') if isinstance(ep, dict) else plan.get('stages')
              return stages if isinstance(stages, list) else []


          def _first_stage(plan):
              stages = _stages(plan)
              return stages[0] if stages and isinstance(stages[0], dict) else {}


          def _as_list(v):
              if isinstance(v, list):
                  return v
              if isinstance(v, tuple):
                  return list(v)
              if _non_empty(v):
                  return [v]
              return []


          def _path_value(obj, path):
              cur = obj
              for key in path:
                  if not isinstance(cur, dict):
                      return None
                  cur = cur.get(key)
              return cur


          def _cn_number_to_float(raw):
              s = str(raw or '').strip()
              if not s:
                  return None
              if re.fullmatch(r'\d+', s):
                  return float(int(s))
              if s in CN_NUMBERS:
                  return float(CN_NUMBERS[s])
              if s.startswith('十') and len(s) > 1 and s[1:] in CN_NUMBERS:
                  return float(10 + int(CN_NUMBERS[s[1:]]))
              if s.endswith('十') and s[:-1] in CN_NUMBERS:
                  return float(int(CN_NUMBERS[s[:-1]]) * 10)
              if '十' in s:
                  left, right = s.split('十', 1)
                  if (not left or left in CN_NUMBERS) and (not right or right in CN_NUMBERS):
                      return float((int(CN_NUMBERS.get(left, 1)) * 10) + int(CN_NUMBERS.get(right, 0)))
              return None


          def _parse_relative_time(q):
              text = str(q or '')
              prefix = r'(?:过去|最近|近)'

              m = re.search(prefix + r'\s*(半年|一年)', text)
              if m:
                  source = m.group(0).replace(' ', '')
                  days = 180 if m.group(1) == '半年' else 365
                  return {'mode': 'relative_days', 'relative_days': days, 'source': source}

              m = re.search(prefix + r'\s*([0-9]+|一|二|两|三|四|五|六|七|八|九|十|十一|十二|半)\s*(天|日|周|星期|个月|月|季度|季|年)', text)
              if not m:
                  return None
              n = _cn_number_to_float(m.group(1))
              if n is None or n <= 0:
                  return None
              unit = m.group(2)
              if unit in ('天', '日'):
                  days = int(n)
              elif unit in ('周', '星期'):
                  days = int(n * 7)
              elif unit in ('个月', '月'):
                  days = int(n * 30)
              elif unit in ('季度', '季'):
                  days = int(n * 90)
              elif unit == '年':
                  days = int(n * 365)
              else:
                  return None
              source = m.group(0).replace(' ', '')
              return {'mode': 'relative_days', 'relative_days': days, 'source': source}


          def _has_non_empty(refine, keys):
              return [k for k in keys if _non_empty(refine.get(k))]


          def _collect_known_fields(plan, compact_context):
              fields = []
              for st in _stages(plan):
                  if not isinstance(st, dict):
                      continue
                  fields.extend(_as_list(st.get('group_fields')))
                  fields.extend(_as_list(st.get('projection_fields')))
                  for key in ('metric_alias', 'metric_field'):
                      if _non_empty(st.get(key)):
                          fields.append(st.get(key))
                  sort = st.get('sort') if isinstance(st.get('sort'), list) else []
                  for item in sort:
                      if isinstance(item, dict) and _non_empty(item.get('field')):
                          fields.append(item.get('field'))
              cr = plan.get('chart_request') if isinstance(plan.get('chart_request'), dict) else {}
              fields.extend([cr.get('x_field'), cr.get('y_field')])
              summary = compact_context.get('last_plan_summary') if isinstance(compact_context, dict) and isinstance(compact_context.get('last_plan_summary'), dict) else {}
              fields.extend(_as_list(summary.get('group_fields')))
              last_cr = compact_context.get('last_chart_request') if isinstance(compact_context, dict) and isinstance(compact_context.get('last_chart_request'), dict) else {}
              fields.extend([last_cr.get('x_field'), last_cr.get('y_field')])
              result = []

              for f in fields:
                  s = str(f or '').strip()
                  if s and s not in result:
                      result.append(s)

              return result


          def _detect_negated_old_fields(q, refine, old, compact_context):
              known = _collect_known_fields(old, compact_context)
              neg = [str(x or '').strip() for x in _as_list(refine.get('negative_fields')) if str(x or '').strip()]
              text = str(q or '')
              for pat in NEGATION_PATTERNS:
                  for m in re.finditer(pat, text):
                      neg.append(m.group(1).strip())
              reasons = []
              if refine.get('negative_fields'):
                  reasons.append('query_refinement_json.negative_fields')
              if any(x in text for x in ('不再按', '不要按', '不按', '不是', '不看', '改按')):
                  if neg:
                      for n in neg:
                          for old_field in known:
                              if n and (n == old_field or n in old_field or old_field in n):
                                  reasons.append('negated_old_field:%s' % old_field)
                  else:
                      reasons.append('ambiguous_negated_old_field')
              if '不看' in text and any(x in text for x in ('订单数', '销售额', '指标', 'metric')):
                  reasons.append('negated_metric')
              return _unique_keep_order(reasons)


          def _detect_structural_change(q, refine, old=None, compact_context=None):
              reasons = []
              for key in _has_non_empty(refine, STRUCTURAL_KEYS):
                  reasons.append('query_refinement_json.%s' % key)
              for path in STRUCTURAL_NESTED_PATHS:
                  if _non_empty(_path_value(refine, path)):
                      reasons.append('query_refinement_json.%s' % '.'.join(path))
              for key in UNCHANGED_GUARDS:
                  if key in refine and not _bool(refine.get(key)):
                      reasons.append('query_refinement_json.%s=false' % key)

              text = str(q or '')
              for pattern in STRUCTURAL_PATTERNS:
                  if re.search(pattern, text):
                      reasons.append('user_pattern:%s' % pattern)
              if old:
                  reasons.extend(_detect_negated_old_fields(q, refine, old, compact_context or {}))

              return {'structural_change': bool(reasons), 'reasons': _unique_keep_order(reasons)}


          def _extract_chart_type(q):
              text = str(q or '')
              for chart_type, terms in CHART_TYPE_TERMS.items():
                  if any(term in text for term in terms):
                      return chart_type
              return ''


          def _is_chart_type_only(q, refine, need_requery, structural_change):
              if structural_change:
                  return False
              if _parse_relative_time(q) or _bool(refine.get('time_range_change')) or _non_empty(refine.get('time_range')):
                  return False
              chart_req = refine.get('chart_request') if isinstance(refine.get('chart_request'), dict) else {}
              if _non_empty(chart_req.get('x_field')) or _non_empty(chart_req.get('y_field')):
                  return False
              chart_type = refine.get('chart_type') or refine.get('visualization_type') or chart_req.get('chart_type') or _extract_chart_type(q)
              return bool(chart_type)


          def _can_apply_time_only_patch(refine, parsed_time, structural_change):
              if structural_change or not parsed_time:
                  return False
              explicit_safe = (
                  _bool(refine.get('time_range_change'))
                  and _bool(refine.get('group_fields_unchanged'))
                  and _bool(refine.get('metric_unchanged'))
                  and _bool(refine.get('filters_unchanged'))
                  and _bool(refine.get('collection_unchanged'))
              )
              has_any_guard = any(k in refine for k in ('time_range_change',) + UNCHANGED_GUARDS)
              return explicit_safe or not has_any_guard or (_bool(refine.get('time_range_change')) and not _has_non_empty(refine, STRUCTURAL_KEYS))


          def _set_all_stage_time(plan, days=None, mode=None):
              changed = False
              for st in _stages(plan):
                  if not isinstance(st, dict):
                      continue
                  tr = st.get('time_range') if isinstance(st.get('time_range'), dict) else {}
                  if days:
                      tr.update({'mode': 'relative_days', 'relative_days': int(days), 'start': '', 'end': ''})
                  elif mode:
                      tr.update({'mode': mode, 'start': '', 'end': ''})
                  st['time_range'] = tr
                  changed = True
              return changed


          def _patch_title_time(plan, new_source, debug):
              cr = plan.get('chart_request') if isinstance(plan.get('chart_request'), dict) else None
              if not cr or not isinstance(cr.get('title'), str) or not cr.get('title'):
                  debug['title_patch'] = 'no_chart_title'
                  return False
              title = cr['title']
              for old_text in OLD_TITLE_TIME_PATTERNS:
                  if old_text in title:
                      cr['title'] = title.replace(old_text, new_source, 1)
                      debug['title_patch'] = {'from': old_text, 'to': new_source}
                      return cr['title'] != title
              debug['title_patch'] = 'no_safe_old_time_text_found'
              return False


          def _patch_limit(plan, n):
              changed = False
              try:
                  limit = int(n)
              except Exception:
                  return False
              if limit <= 0:
                  return False
              for st in _stages(plan):
                  if isinstance(st, dict):
                      st['limit'] = min(limit, 500)
                      changed = True
              return changed


          def _parse_sort_request(q):
              text = str(q or '')
              direction = ''
              if any(x in text for x in ('升序', '从小到大', '从低到高')):
                  direction = 'asc'
              elif any(x in text for x in ('降序', '倒序', '从大到小', '从高到低')):
                  direction = 'desc'
              if not direction:
                  return None
              m = re.search(r'按\s*([^，。,.\s]+)\s*(?:升序|降序|排序|排列)', text)
              return {'direction': direction, 'target': m.group(1).strip() if m else ''}


          def _target_matches_known_field(target, known_fields):
              t = str(target or '').strip()
              if not t:
                  return True
              for f in known_fields:
                  fs = str(f or '').strip()
                  if fs and (t == fs or t in fs or fs in t):
                      return True
              return False


          def _patch_sort(plan, direction, target='', known_fields=None):
              known_fields = known_fields or []
              if not _target_matches_known_field(target, known_fields):
                  return False
              changed = False
              for st in _stages(plan):
                  if not isinstance(st, dict):
                      continue
                  sort = st.get('sort') if isinstance(st.get('sort'), list) else []
                  if not sort:
                      fallback = st.get('metric_alias') or st.get('metric_field') or (known_fields[0] if known_fields else '')
                      sort = [{'field': fallback, 'direction': direction}]
                  for item in sort:
                      if isinstance(item, dict):
                          item['direction'] = direction
                  st['sort'] = sort
                  changed = True
              return changed


          def _patch_display(plan, q):
              changed = []
              text = str(q or '')
              m = re.search(r'标题(?:改成|改为|换成)\s*([^，。,.]+)', text)
              if m:
                  if not isinstance(plan.get('chart_request'), dict):
                      plan['chart_request'] = {}
                  plan['chart_request']['title'] = m.group(1).strip()
                  changed.append('chart_request.title')
              if any(x in text for x in ('回答详细一点', '详细一点', '加分析', '简单分析')):
                  plan['answer_mode'] = 'data_with_analysis'
                  changed.append('answer_mode')
              if '只描述结果' in text:
                  plan['answer_mode'] = 'data_only'
                  changed.append('answer_mode')
              return changed


          def _patch_chart_type(plan, chart_type):
              if not chart_type:
                  return False
              if not isinstance(plan.get('chart_request'), dict):
                  plan['chart_request'] = {}
              plan['chart_request']['chart_type'] = chart_type
              plan['chart_request']['type'] = chart_type
              if isinstance(plan.get('visualization'), dict):
                  plan['visualization']['chart_type'] = chart_type
              return True


          def _unique_keep_order(values):
              seen = set()
              result = []
              for value in values:
                  if value not in seen:
                      seen.add(value)
                      result.append(value)
              return result


          def _validate_patch(refine, changed_fields, structural_change, plan=None):
              unapplied = _has_non_empty(refine, STRUCTURAL_KEYS)
              for path in STRUCTURAL_NESTED_PATHS:
                  if _non_empty(_path_value(refine, path)):
                      unapplied.append('.'.join(path))
              for key in UNCHANGED_GUARDS:
                  if key in refine and not _bool(refine.get(key)):
                      unapplied.append(key)
              has_stage = bool(_stages(plan)) if isinstance(plan, dict) else False
              passed = (not structural_change) and (not unapplied) and (plan is None or has_stage)
              return {'patch_validation_passed': passed, 'unapplied_refinements': _unique_keep_order(unapplied)}


          def _failed_validation(validation=None):
              validation = validation or {}
              return {
                  'patch_validation_passed': False,
                  'unapplied_refinements': validation.get('unapplied_refinements') or [],
              }


          def _unapplied_from_structural_reasons(reasons):
              unapplied = []
              for reason in reasons or []:
                  r = str(reason or '')
                  if 'group' in r or '按.+统计' in r or '不再按' in r or '改按' in r or '不要按' in r or '不按' in r or '横轴改成' in r:
                      unapplied.append('group_by')
                  if 'metric' in r or '不看' in r or '销售额' in r:
                      unapplied.append('metric')
                  if 'filter' in r or 'where' in r or '只看' in r or '筛选' in r or '过滤' in r or '排除' in r:
                      unapplied.append('filter')
                  if 'collection' in r or '改看' in r:
                      unapplied.append('collection')
                  if 'relation' in r or 'join' in r or 'enrich' in r or '关联' in r:
                      unapplied.append('relation')
                  if 'negative_fields' in r or 'negated' in r or '不再按' in r or '不是' in r:
                      unapplied.append('negative_fields')
                  if 'chart_request.x_field' in r:
                      unapplied.append('chart_request.x_field')
                  if 'chart_request.y_field' in r:
                      unapplied.append('chart_request.y_field')
                  if '按.+排序' in r:
                      unapplied.append('sort')
                  if '口径' in r or 'intent' in r or '重新统计' in r:
                      unapplied.append('business_rule_change')
              return _unique_keep_order(unapplied)


          def _result(patch_applied=False, requires_full_replan=True, plan=None, changed=None, reason='', error='', debug=None, validation=None, route=None):
              changed = changed or []
              debug = debug or {}
              validation = validation or {'patch_validation_passed': False, 'unapplied_refinements': []}
              if route is None:
                  if bool(patch_applied) and not bool(requires_full_replan) and bool(validation.get('patch_validation_passed')) and not error:
                      route = 'use_patch'
                  elif not bool(requires_full_replan) and 'chart_request.chart_type' in changed:
                      route = 'chart_only'
                  elif not changed:
                      route = 'no_patch'
                  else:
                      route = 'full_replan'
              if bool(patch_applied) and not bool(validation.get('patch_validation_passed')):
                  patch_applied = False
                  requires_full_replan = True
                  route = 'full_replan'
                  error = error or 'patch_validation_failed'
              plan_json = json.dumps(plan, ensure_ascii=False) if plan else ''
              return {
                  'contract_version': 'patch_result_contract',
                  'patch_route': str(route or 'full_replan'),
                  'patch_applied': bool(patch_applied),
                  'requires_full_replan': bool(requires_full_replan),
                  'patch_validation_passed': bool(validation.get('patch_validation_passed')),
                  'patched_normalized_semantic_plan_json': plan_json,
                  'patched_semantic_plan_json': plan_json,
                  'changed_fields': json.dumps(changed, ensure_ascii=False),
                  'unapplied_refinements': json.dumps(validation.get('unapplied_refinements') or [], ensure_ascii=False),
                  'patch_reason': reason or '',
                  'patch_error': error or '',
                  'patch_debug_json': json.dumps(debug or {}, ensure_ascii=False),
              }


          def main(question: str, old_normalized_semantic_plan_json: str, query_refinement_json: str, turn_intent: str, need_requery, last_chart_request_json: str, compact_context_json: str = ''):
              q = str(question or '')
              old = _loads(old_normalized_semantic_plan_json)
              refine = _loads(query_refinement_json)
              parsed_time = _parse_relative_time(q)
              compact_context = _loads(compact_context_json)
              structural = _detect_structural_change(q, refine, old, compact_context)
              structural_change = structural['structural_change']
              schema_ref = compact_context.get('schema_context_ref') if isinstance(compact_context.get('schema_context_ref'), dict) else {}
              debug = {
                  'turn_intent': str(turn_intent or ''),
                  'need_requery': _bool(need_requery),
                  'has_old_plan': bool(old),
                  'query_refinement_json': refine,
                  'parsed_time_range': parsed_time,
                  'structural_change': structural_change,
                  'structural_reasons': structural['reasons'],
                  'schema_retrieval_policy': {
                      'must_retrieve_when': ['new_query', 'patch_route=full_replan', 'new_field', 'new_metric', 'new_filter', 'relation_or_join', 'collection_switch', 'negated_old_field', 'selected_collection_changed', 'related_collections_changed', 'schema_digest_missing_or_changed', 'catalog_digest_missing_or_changed', 'validator_needs_schema_retrieval_reserved'],
                      'may_reuse_without_retrieval_when': ['time_only', 'limit_only', 'safe_sort_only', 'display_only_without_new_fields', 'chart_only_style_or_type', 'explain_result', 'reanalyze_result_from_profile', 'answer_formatting'],
                      'current_schema_context_ref': schema_ref,
                  },
              }
              validation = _validate_patch(refine, [], structural_change, old)

              if not old:
                  return _result(reason='缺少上一轮 normalized semantic plan，无法执行确定性 patch', error='missing_old_plan', debug=debug, validation=_failed_validation(validation), route='full_replan')

              if structural_change:
                  reason = '检测到结构性查询变化：%s，不执行确定性 patch，转入 LLM_Refine查询规划' % '；'.join(structural['reasons'])
                  validation = {
                      'patch_validation_passed': False,
                      'unapplied_refinements': _unique_keep_order((validation.get('unapplied_refinements') or []) + _unapplied_from_structural_reasons(structural['reasons'])),
                  }
                  return _result(reason=reason, debug=debug, validation=validation, route='full_replan')

              plan = deepcopy(old)
              changed = []

              if _is_chart_type_only(q, refine, need_requery, structural_change):
                  chart_type = refine.get('chart_type') or refine.get('visualization_type') or _extract_chart_type(q)
                  if _patch_chart_type(plan, chart_type):
                      changed.append('chart_request.chart_type')
                      validation = _validate_patch(refine, changed, False, plan)
                      return _result(False, False, plan, changed, '检测到仅图表类型变更：%s，不改变 Mongo 查询语义' % chart_type, '', debug, validation, route='chart_only')

              if _can_apply_time_only_patch(refine, parsed_time, structural_change):
                  if _set_all_stage_time(plan, days=parsed_time['relative_days']):
                      changed.append('execution_plan.stages[0].time_range.relative_days')
                      if _patch_title_time(plan, parsed_time['source'], debug):
                          changed.append('chart_request.title')
              elif parsed_time:
                  debug['time_patch_skipped'] = '检测到非纯时间修改或缺少安全白名单条件，禁止执行 time-only patch'
              elif '今年' in q and not structural_change:
                  if _set_all_stage_time(plan, mode='this_year'):
                      changed.append('time_range')
              elif '上个月' in q and not structural_change:
                  if _set_all_stage_time(plan, mode='last_month'):
                      changed.append('time_range')

              m = re.search(r'(?:top|前|只看前|限制)\s*(\d+)\s*(?:条|名|个)?', q, flags=re.I)
              if m and not structural_change and _patch_limit(plan, m.group(1)):
                  changed.append('limit')
              sort_req = _parse_sort_request(q)
              if sort_req and not structural_change:
                  known_fields = _collect_known_fields(old, compact_context)
                  if _patch_sort(plan, sort_req['direction'], sort_req.get('target') or '', known_fields):
                      changed.append('sort')
                  else:
                      debug['unsafe_sort_target'] = sort_req.get('target') or ''
                      validation = {'patch_validation_passed': False, 'unapplied_refinements': ['sort.unknown_field']}
                      return _result(reason='排序字段不在上一轮 metric_alias/group_fields/projection_fields/chart 字段白名单内，转入 full_replan', debug=debug, validation=validation, route='full_replan')
              if not structural_change:
                  changed.extend(_patch_display(plan, q))

              changed = _unique_keep_order(changed)
              validation = _validate_patch(refine, changed, structural_change, plan)
              debug['changed_fields'] = changed
              debug['patch_validation'] = validation

              if not changed:
                  return _result(reason='未发现可安全确定性修正的字段，进入 refine full replan', debug=debug, validation=_failed_validation(validation), route='full_replan')
              if not validation['patch_validation_passed']:
                  return _result(reason='检测到未应用的结构性修改意图，放弃确定性 patch，转入 LLM_Refine查询规划', debug=debug, validation=validation, route='full_replan')

              if 'execution_plan.stages[0].time_range.relative_days' in changed and len([x for x in changed if x != 'chart_request.title']) == 1:
                  patch_reason = '检测到仅时间范围变更：%s -> relative_days=%s，保留分组、指标、排序和图表配置' % (parsed_time['source'], parsed_time['relative_days'])
              else:
                  patch_reason = '高确定性规则修正：' + ','.join(changed)
              return _result(True, False, plan, changed, patch_reason, '', debug, validation, route='use_patch')


          # 自检说明：
          # 1. “改成过去两个月”且 refine 仅声明 time_range_change，并确认 group/metric/filter/collection 均 unchanged：允许 patch，relative_days=60。
          # 2. “不再按品牌，改按订单状态统计”：命中结构性分组变化，patch_applied=false，requires_full_replan=true。
          # 3. “按订单状态统计过去两个月”：命中结构性分组变化，即使可解析时间也不能只 patch 时间，必须 full replan。
          # 4. “换成饼图”且 need_requery=false、无结构性变化、无时间变化：允许 chart-type-only patch，不改变 Mongo 查询语义。
          # 5. “按订单状态统计过去两个月，生成新的柱状图”：chart 词不能覆盖结构性变化，必须 full replan。
          # 6. “只看前10个”且无结构性变化：允许 limit-only patch。
          # 7. “改成升序”且无结构性变化：允许 sort-only patch。
