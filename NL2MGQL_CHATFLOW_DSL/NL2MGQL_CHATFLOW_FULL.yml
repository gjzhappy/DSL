          def _build_chart_payload(visualization=None, rows=None, allowed_types=None, normalized_plan=None, question=''):
              visualization = visualization or {}
              rows = rows if isinstance(rows, list) else []
              normalized_plan = normalized_plan or {}
              decision = _choose_chart_type(visualization, rows, allowed_types or {'bar', 'line', 'pie'})
              chart_type = str(decision.get('chart_type') or 'bar')

              if not rows:
                  return False, {}, '', '', '', chart_type, 'empty rows'

              row_fields = set(rows[0].keys()) if rows and isinstance(rows[0], dict) else set()
              stages = normalized_plan.get('stages') or []
              stage0 = stages[0] if stages and isinstance(stages[0], dict) else {}
              group_fields = stage0.get('group_fields') or []
              primary_group = str(group_fields[0] or '').strip() if group_fields else ''
              metric_alias = str(stage0.get('metric_alias') or '').strip()
              warning = ''

              x_field = str(decision.get('x_field') or _choose_x_field(normalized_plan, rows) or '').strip()
              y_field = str(decision.get('y_field') or _choose_y_field(normalized_plan, rows) or '').strip()
              if x_field not in row_fields and primary_group and primary_group in row_fields:
                  old_x = x_field
                  x_field = primary_group
                  warning = json.dumps({'chart_field_autofix': True, 'x_field_before': old_x, 'x_field_after': x_field, 'reason': 'x_field not found in rows; fallback to group_fields[0]'}, ensure_ascii=False)
              if y_field not in row_fields and metric_alias and metric_alias in row_fields:
                  y_field = metric_alias
              if not x_field or not y_field or x_field not in row_fields or y_field not in row_fields:
                  return False, {}, '', x_field, y_field, chart_type, 'missing valid x_field or y_field'

              viz = dict(visualization)
              viz['enabled'] = True
              viz['chart_type'] = chart_type
              viz['x_field'] = x_field
              viz['y_field'] = y_field
