          import json, re
          def _strip(s):
              s='' if s is None else str(s).strip()
              m=re.match(r'^```(?:json)?\s*([\s\S]*?)\s*```$', s)
              return m.group(1).strip() if m else s
          def main(status_code=0, body='', error='') -> dict:
              try:
                  status=int(status_code or 0)
                  if status != 200:
                      return {'success':False,'content':'','error':'HTTP status %s'%status,'raw_response':{}}
                  if not body:
                      return {'success':False,'content':'','error':'empty body','raw_response':{}}
                  raw=json.loads(body) if isinstance(body,str) else (body or {})
                  content=''
                  if isinstance(raw,dict):
                      ch=raw.get('choices') or []
                      if ch and isinstance(ch[0],dict):
                          msg=ch[0].get('message') or {}
                          content=msg.get('content') if isinstance(msg,dict) else ''
                          content=content or ch[0].get('text') or ''
                      content=content or raw.get('content') or raw.get('text') or ''
