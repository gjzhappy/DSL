        code: |
          import json

          COMPACT_CONTEXT_TARGET_BYTES = 12000
          COMPACT_CONTEXT_HARD_BYTES = 60000
          MAX_PREVIEW_ROWS = 5
          MAX_PREVIEW_FIELDS = 20
          MAX_PREVIEW_STRING = 200

          BANNED_CONTEXT_KEYS = {
              'schema_metadata', 'schema_alias_index', 'schema_context', 'last_schema_metadata_json',
              'last_schema_alias_index_json', 'raw_schema_docs', 'raw_llm_response', 'full_prompt',
              'pipeline_json', 'request_body_json', 'compiler_debug_json', 'validated_ast', 'query_request_body', 'query_response_body',
              'query_response_headers', 'stage_execution_trace', 'last_merged_rows',
              'last_result_rows_json', 'chart.option', 'echarts_option', 'echarts_markdown',
              'last_chart_echarts_markdown', 'debug', 'option', 'data', 'rows', 'full_rows',
          }

          def _loads(value, default):
              if isinstance(value, (dict, list)):
                  return value
              if isinstance(value, str) and value.strip():
                  try:
                      return json.loads(value)
                  except Exception:
                      return default
              return default

          def _dumps(value):
              return json.dumps(value, ensure_ascii=False)

          def _text(value, max_len=0):
              text = str(value or '').strip()
              return text[:max_len] if max_len and len(text) > max_len else text

          def _int(value, default=0):
              try:
                  return int(value)
              except Exception:
                  return default

          def _list(value):
              if isinstance(value, list):
                  return value
              if value in (None, ''):
                  return []
              return [value]

          def _uniq(values, limit=0):
              out = []
              for value in values or []:
                  text = str(value or '').strip()
                  if text and text not in out:
                      out.append(text)
                      if limit and len(out) >= limit:
                          break
              return out

          def _strip_banned(value):
              if isinstance(value, dict):
                  clean = {}
                  for key, item in value.items():
                      skey = str(key)
                      if skey in BANNED_CONTEXT_KEYS or skey.lower() in BANNED_CONTEXT_KEYS:
                          continue
                      clean[skey] = _strip_banned(item)
                  return clean
              if isinstance(value, list):
                  return [_strip_banned(item) for item in value]
              return value

          def _default_time_range():
              return {'field': '', 'mode': '', 'relative_days': 0, 'start': '', 'end': ''}

          def _normalize_time_range(value):
              value = value if isinstance(value, dict) else {}
              return {
                  'field': _text(value.get('field')),
                  'mode': _text(value.get('mode')),
                  'relative_days': _int(value.get('relative_days'), 0),
                  'start': _text(value.get('start')),
                  'end': _text(value.get('end')),
              }

          def _default_plan_summary():
              return {
                  'primary_collection': '',
                  'related_collections': [],
                  'intent_type': '',
                  'time_range': _default_time_range(),
                  'filters': [],
                  'group_fields': [],
                  'metric_alias': '',
                  'metric_function': '',
                  'metric_field': '',
                  'sort': [],
                  'limit': 0,
                  'projection_fields': [],
              }

          def _default_chart_request():
              return {'enabled': False, 'chart_type': '', 'x_field': '', 'y_field': '', 'series_name': '', 'title': ''}

          def _default_result_profile():
              return {'row_count': 0, 'fields': [], 'numeric_fields': [], 'dimension_fields': [], 'preview_rows': []}

          def _default_schema_ref():
              return {'collections': [], 'schema_digest': '', 'schema_version': '', 'catalog_digest': ''}

          def _default_context():
              return {
                  'context_version': 'compact_context_contract',
                  'has_last_context': False,
                  'last_question': '',
                  'last_turn_intent': {'turn_intent': '', 'refine_type': ''},
                  'last_primary_collection': '',
                  'last_related_collections': [],
                  'last_plan_summary': _default_plan_summary(),
                  'last_resolved_fields': [],
                  'last_resolved_metrics': [],
                  'last_chart_request': _default_chart_request(),
                  'last_result_profile': _default_result_profile(),
                  'schema_context_ref': _default_schema_ref(),
                  'answer_summary': '',
                  'size_guard': {'max_bytes': COMPACT_CONTEXT_TARGET_BYTES, 'actual_bytes': 0, 'truncated': False, 'truncate_reason': ''},
                  'context_warnings': [],
              }

          def _first_stage(plan):
              if isinstance(plan, dict) and isinstance(plan.get('execution_plan'), dict):
                  plan = plan.get('execution_plan') or {}
              stages = plan.get('stages') if isinstance(plan, dict) and isinstance(plan.get('stages'), list) else []
              return stages[0] if stages and isinstance(stages[0], dict) else {}

          def _plan_summary_from_plan(plan):
              summary = _default_plan_summary()
              stage = _first_stage(plan)
              root = plan if isinstance(plan, dict) else {}
              primary = _text(root.get('primary_collection') or stage.get('primary_collection') or stage.get('collection'))
              related = _uniq(_list(root.get('related_collections')) + _list(stage.get('related_collections')), 20)
              summary.update({
                  'primary_collection': primary,
                  'related_collections': related,
                  'intent_type': _text(stage.get('intent_type')),
                  'time_range': _normalize_time_range(stage.get('time_range')),
                  'filters': _strip_banned(stage.get('filters') if isinstance(stage.get('filters'), list) else []),
                  'group_fields': _list(stage.get('group_fields'))[:40],
                  'metric_alias': _text(stage.get('metric_alias')),
                  'metric_function': _text(stage.get('metric_function')),
                  'metric_field': _text(stage.get('metric_field')),
                  'sort': _strip_banned(stage.get('sort') if isinstance(stage.get('sort'), list) else []),
                  'limit': _int(stage.get('limit'), 0),
                  'projection_fields': _list(stage.get('projection_fields'))[:80],
              })
              return summary

          def _rows_from(value):
              obj = _loads(value, None)
              if isinstance(obj, list):
                  return [x for x in obj if isinstance(x, dict)]
              if isinstance(obj, dict):
                  for key in ('rows', 'data', 'result', 'records', 'preview_rows'):
                      if isinstance(obj.get(key), list):
                          return [x for x in obj.get(key) if isinstance(x, dict)]
              return []

          def _compact_scalar(value):
              if isinstance(value, str):
                  return value[:MAX_PREVIEW_STRING]
              if isinstance(value, (int, float, bool)) or value is None:
                  return value
              try:
                  return json.dumps(value, ensure_ascii=False, default=str)[:MAX_PREVIEW_STRING]
              except Exception:
                  return str(value)[:MAX_PREVIEW_STRING]

          def _result_profile_from_rows(*sources):
              rows = []
              for src in sources:
                  rows = _rows_from(src)
                  if rows:
                      break
              profile = _default_result_profile()
              profile['row_count'] = len(rows)
              for row in rows:
                  for key, value in row.items():
                      name = str(key)
                      if name not in profile['fields']:
                          profile['fields'].append(name)
                      if isinstance(value, (int, float)) and not isinstance(value, bool):
                          if name not in profile['numeric_fields']:
                              profile['numeric_fields'].append(name)
                      elif isinstance(value, (str, bool)) or value is None:
                          if name not in profile['dimension_fields']:
                              profile['dimension_fields'].append(name)
                  if len(profile['preview_rows']) < MAX_PREVIEW_ROWS:
                      compact = {}
                      for key, value in row.items():
                          if len(compact) >= MAX_PREVIEW_FIELDS:
                              break
                          compact[str(key)] = _compact_scalar(value)
                      profile['preview_rows'].append(compact)
              profile['fields'] = profile['fields'][:80]
              return profile

          def _chart_from(value):
              obj = _loads(value, {})
              if not isinstance(obj, dict):
                  obj = {}
              return {
                  'enabled': bool(obj.get('enabled') or obj.get('chart_type') or obj.get('type')),
                  'chart_type': _text(obj.get('chart_type') or obj.get('type')),
                  'x_field': _text(obj.get('x_field') or obj.get('x')),
                  'y_field': _text(obj.get('y_field') or obj.get('y')),
                  'series_name': _text(obj.get('series_name') or obj.get('series')),
                  'title': _text(obj.get('title'), 200),
              }

          def _schema_ref_from_metadata(collections, schema_metadata_json):
              meta = _loads(schema_metadata_json, {})
              if not isinstance(meta, dict):
                  meta = {}
              digest = _text(meta.get('schema_digest'), 160)
              if digest and not digest.startswith('sha256:'):
                  digest = 'sha256:' + digest
              return {
                  'collections': _uniq(collections, 20),
                  'schema_digest': digest,
                  'schema_version': _text(meta.get('schema_version'), 128),
                  'catalog_digest': '',
              }

          def _normalize_context(raw, warnings):
              base = _default_context()
              if not isinstance(raw, dict):
                  warnings.append('conversation.last_context_json 非法，已尝试从旧 conversation 变量迁移。')
                  return None
              cleaned = _strip_banned(raw)
              base['has_last_context'] = bool(cleaned.get('has_last_context'))
              base['last_question'] = _text(cleaned.get('last_question'), 1000)
              turn = cleaned.get('last_turn_intent') if isinstance(cleaned.get('last_turn_intent'), dict) else {}
              base['last_turn_intent'] = {'turn_intent': _text(turn.get('turn_intent')), 'refine_type': _text(turn.get('refine_type'))}
              plan = cleaned.get('last_plan_summary') if isinstance(cleaned.get('last_plan_summary'), dict) else {}
              if not plan and isinstance(cleaned.get('plan'), dict):
                  plan = _plan_summary_from_plan(cleaned.get('plan'))
              normalized_plan = _default_plan_summary()
              normalized_plan.update({k: plan.get(k, normalized_plan[k]) for k in normalized_plan.keys() if isinstance(plan, dict)})
              normalized_plan['time_range'] = _normalize_time_range(normalized_plan.get('time_range'))
              normalized_plan['filters'] = normalized_plan.get('filters') if isinstance(normalized_plan.get('filters'), list) else []
              normalized_plan['group_fields'] = _list(normalized_plan.get('group_fields'))
              normalized_plan['sort'] = normalized_plan.get('sort') if isinstance(normalized_plan.get('sort'), list) else []
              normalized_plan['projection_fields'] = _list(normalized_plan.get('projection_fields'))
              normalized_plan['limit'] = _int(normalized_plan.get('limit'), 0)
              base['last_plan_summary'] = _strip_banned(normalized_plan)
              base['last_primary_collection'] = _text(cleaned.get('last_primary_collection') or normalized_plan.get('primary_collection'))
              base['last_related_collections'] = _uniq(cleaned.get('last_related_collections') or normalized_plan.get('related_collections') or [], 20)
              base['last_resolved_fields'] = _uniq(cleaned.get('last_resolved_fields') or [], 80)
              base['last_resolved_metrics'] = _uniq(cleaned.get('last_resolved_metrics') or [], 40)
              base['last_chart_request'] = _chart_from(cleaned.get('last_chart_request'))
              profile = cleaned.get('last_result_profile') if isinstance(cleaned.get('last_result_profile'), dict) else {}
              default_profile = _default_result_profile()
              default_profile.update({k: profile.get(k, default_profile[k]) for k in default_profile.keys() if isinstance(profile, dict)})
              default_profile['preview_rows'] = _strip_banned(default_profile.get('preview_rows') if isinstance(default_profile.get('preview_rows'), list) else [])[:MAX_PREVIEW_ROWS]
              base['last_result_profile'] = default_profile
              ref = cleaned.get('schema_context_ref') if isinstance(cleaned.get('schema_context_ref'), dict) else {}
              default_ref = _default_schema_ref()
              default_ref.update({k: ref.get(k, default_ref[k]) for k in default_ref.keys()})
              base['schema_context_ref'] = default_ref
              base['answer_summary'] = _text(cleaned.get('answer_summary'), 800)
              base['context_warnings'] = _uniq((cleaned.get('context_warnings') if isinstance(cleaned.get('context_warnings'), list) else []) + warnings, 40)
              return base

          def _migrate_from_legacy(last_question, last_normalized_semantic_plan_json, last_normalized_execution_plan, last_merged_rows, last_query_result_json_state, last_result_rows_json, last_final_answer_summary, last_chart, last_chart_request_json_state, last_result_summary, last_schema_metadata_json, warnings):
              plan = _loads(last_normalized_execution_plan, {})
              semantic = _loads(last_normalized_semantic_plan_json, {})
              if not plan and isinstance(semantic, dict):
                  plan = semantic.get('execution_plan') or semantic
              summary = _plan_summary_from_plan(plan)
              primary = summary.get('primary_collection') or ''
              related = summary.get('related_collections') or []
              collections = _uniq([primary] + related, 20)
              profile = _result_profile_from_rows(last_result_rows_json, last_query_result_json_state, last_merged_rows)
              chart = _chart_from(last_chart_request_json_state or last_chart)
              context = _default_context()
              context.update({
                  'has_last_context': bool(last_question and (primary or profile.get('row_count') or last_result_summary or last_final_answer_summary)),
                  'last_question': _text(last_question, 1000),
                  'last_primary_collection': primary,
                  'last_related_collections': related,
                  'last_plan_summary': summary,
                  'last_resolved_fields': _uniq(summary.get('group_fields') + summary.get('projection_fields') + [summary.get('metric_field')], 80),
                  'last_resolved_metrics': _uniq([summary.get('metric_alias'), summary.get('metric_field')], 40),
                  'last_chart_request': chart,
                  'last_result_profile': profile,
                  'schema_context_ref': _schema_ref_from_metadata(collections, last_schema_metadata_json),
                  'answer_summary': _text(last_result_summary or last_final_answer_summary, 800),
                  'context_warnings': warnings + ['已从旧 last_* conversation 变量迁移生成 compact_context。'],
              })
              if not context['schema_context_ref']['schema_digest']:
                  context['context_warnings'].append('旧变量迁移未能获得 schema_digest；下一轮结构性 refine 需要重新 schema retrieval。')
              return context

          def _dump_with_guard(context):
              context = _strip_banned(context)
              context['answer_summary'] = _text(context.get('answer_summary'), 800)
              context['size_guard'] = {'max_bytes': COMPACT_CONTEXT_TARGET_BYTES, 'actual_bytes': 0, 'truncated': False, 'truncate_reason': ''}
              text = _dumps(context)
              context['size_guard']['actual_bytes'] = len(text.encode('utf-8'))
              if context['size_guard']['actual_bytes'] > COMPACT_CONTEXT_TARGET_BYTES:
                  context['last_result_profile']['preview_rows'] = context['last_result_profile'].get('preview_rows', [])[:3]
                  context['answer_summary'] = _text(context.get('answer_summary'), 400)
                  reason = 'compact_context 超过 12000 bytes，已裁剪 preview_rows 与 answer_summary。'
                  context['size_guard']['truncated'] = True
                  context['size_guard']['truncate_reason'] = reason
                  context['context_warnings'] = _uniq((context.get('context_warnings') or []) + [reason], 40)
                  text = _dumps(context)
                  context['size_guard']['actual_bytes'] = len(text.encode('utf-8'))
              if context['size_guard']['actual_bytes'] > COMPACT_CONTEXT_HARD_BYTES:
                  context['last_result_profile']['preview_rows'] = []
                  context['answer_summary'] = _text(context.get('answer_summary'), 200)
                  reason = 'compact_context 超过 60000 bytes 硬上限，已清空 preview_rows。'
                  context['size_guard']['truncated'] = True
                  context['size_guard']['truncate_reason'] = reason
                  context['context_warnings'] = _uniq((context.get('context_warnings') or []) + [reason], 40)
              text = _dumps(context)
              context['size_guard']['actual_bytes'] = len(text.encode('utf-8'))
              return _dumps(context), context

          def main(last_question: str, last_normalized_semantic_plan_json: str, last_normalized_execution_plan, last_merged_rows, last_query_result_json_state: str, last_result_rows_json: str, last_final_answer_summary: str, last_chart, last_chart_request_json_state: str, last_chart_echarts_markdown: str, last_result_summary: str, last_schema_metadata_json: str='', last_schema_alias_index_json: str='', conversation_last_context_json: str=''):
              warnings = []
              raw_context = _loads(conversation_last_context_json, None)
              context = _normalize_context(raw_context, warnings) if raw_context is not None else None
              if context is None:
                  context = _migrate_from_legacy(last_question, last_normalized_semantic_plan_json, last_normalized_execution_plan, last_merged_rows, last_query_result_json_state, last_result_rows_json, last_final_answer_summary, last_chart, last_chart_request_json_state, last_result_summary, last_schema_metadata_json, warnings)
              compact_context_json, context = _dump_with_guard(context)
              old_semantic_plan_json = last_normalized_semantic_plan_json if isinstance(last_normalized_semantic_plan_json, str) and last_normalized_semantic_plan_json.strip() else '{}'
              preview_rows_json = _dumps(context['last_result_profile'].get('preview_rows') or [])
              last_chart_json = _dumps(context.get('last_chart_request') or _default_chart_request())
              return {
                  'has_last_context': bool(context.get('has_last_context')),
                  'last_context_json': compact_context_json,
                  'compact_context_json': compact_context_json,
                  'old_normalized_semantic_plan_json': old_semantic_plan_json or '{}',
