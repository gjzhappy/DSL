                  else:
                      selection.update({'selected_primary_collection': base, 'confidence': 0.85, 'requires_clarification': False, 'clarification_question': '', 'needs_schema_retrieval': True, 'needs_schema_hydration': True, 'selection_reason': 'inherited_primary_collection_missing_from_candidate_catalog'})
                      warnings.append('inherited_primary_collection_missing_from_candidate_catalog')
                      selection['warnings'] = warnings
                      return {
