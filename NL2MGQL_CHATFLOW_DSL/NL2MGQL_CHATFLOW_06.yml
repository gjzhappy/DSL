                          'request_id': request_id,
                      }
                      status_code, response_body, response_headers = _post_json(selected_url, request_body)
                      if status_code < 200 or status_code >= 300:
                          raise ValueError(f"stage `{stage['stage_name']}` query failed: status={status_code}, body={response_body[:1200]}")
                      response_json = _read_json_text(response_body)
