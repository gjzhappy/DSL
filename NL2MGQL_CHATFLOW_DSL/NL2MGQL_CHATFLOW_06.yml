    - data:
        code: |
          import json
          import time
          import traceback
          import urllib.error
          import urllib.request


          def _to_text(value):
              return '' if value is None else str(value)


          def _safe_json_loads(value):
              if isinstance(value, dict):
                  return value
              if isinstance(value, str):
                  return json.loads(value)
              raise ValueError('llm_request_body_json must be object or JSON object string')


          def _extract_prompt_length(messages):
              if not isinstance(messages, list):
                  return 0
              text_parts = []
              for item in messages:
                  if not isinstance(item, dict):
                      continue
                  content = item.get('content')
                  if isinstance(content, str):
                      text_parts.append(content)
                  elif isinstance(content, list):
                      for part in content:
                          if isinstance(part, dict):
                              t = part.get('text')
                              if isinstance(t, str):
                                  text_parts.append(t)
              return len(''.join(text_parts))


          MAX_RETRY = 2
          RETRY_SLEEP_SECONDS = [1, 3]
          RETRYABLE_STATUS_CODES = {500, 502, 503, 504}
          NON_RETRYABLE_STATUS_CODES = {400, 401, 403, 404, 422}


          def _extract_error_message(body_text):
              try:
                  body_json = json.loads(body_text) if isinstance(body_text, str) and body_text else {}
              except Exception:
                  body_json = {}
              if isinstance(body_json, dict):
                  error_obj = body_json.get('error')
                  if isinstance(error_obj, dict):
                      message = error_obj.get('message')
                      if message is not None:
                          return _to_text(message)
              return ''


          def _extract_tracer_id(body_text, headers):
              try:
                  body_json = json.loads(body_text) if isinstance(body_text, str) and body_text else {}
              except Exception:
                  body_json = {}
              if isinstance(body_json, dict):
                  error_obj = body_json.get('error')
                  if isinstance(error_obj, dict) and error_obj.get('tracer_id'):
                      return _to_text(error_obj.get('tracer_id'))
              if isinstance(headers, dict):
                  for key, value in headers.items():
                      if str(key).lower() == 'x-tracerid' and value is not None:
                          return _to_text(value)
              return ''


          def _is_retryable_error(status_code, body_text, exception_message=''):
              if status_code in NON_RETRYABLE_STATUS_CODES:
                  return False
              body_error_message = _extract_error_message(body_text)
              if status_code in RETRYABLE_STATUS_CODES:
                  return True
              if '模型网关连接错误' in body_error_message:
                  return True
              lower_exception = _to_text(exception_message).lower()
              transient_markers = ['timeout', 'timed out', 'connection reset', 'remote end closed connection', 'connection aborted', 'connection refused']
              return bool(lower_exception and any(marker in lower_exception for marker in transient_markers))


          def _format_error_message(prefix, status_code, body_text, headers, retry_count, exception_message=''):
              parts = [prefix]
              if status_code:
                  parts.append('status=%s' % status_code)
              message = _extract_error_message(body_text) or _to_text(exception_message)
              tracer_id = _extract_tracer_id(body_text, headers)
              if message:
                  parts.append('message=%s' % message)
              if tracer_id:
                  parts.append('tracer_id=%s' % tracer_id)
              parts.append('retry_count=%s' % retry_count)
              return ' '.join(parts)


          def _post_json_once(url, data, auth, timeout_sec):
              req = urllib.request.Request(
                  url,
                  data=data,
                  headers={
                      'Content-Type': 'application/json',
                      'Authorization': auth
                  },
                  method='POST'
              )
              try:
                  with urllib.request.urlopen(req, timeout=timeout_sec) as resp:
                      text = resp.read().decode('utf-8', errors='replace')
                      status_code = int(getattr(resp, 'status', 0) or 0)
                      return status_code, text, dict(resp.headers.items()), ''
              except urllib.error.HTTPError as e:
                  text = e.read().decode('utf-8', errors='replace')
                  headers = dict(e.headers.items()) if getattr(e, 'headers', None) else {}
                  return int(getattr(e, 'code', 0) or 0), text, headers, ''
              except Exception as e:
                  return 0, '', {}, str(e)


          def _post_json_with_retry(url, data, auth, timeout_sec):
              retry_count = 0
              last_status_code = 0
              last_body = ''
              last_headers = {}
              last_exception_message = ''
              for attempt in range(MAX_RETRY + 1):
                  status_code, body_text, headers, exception_message = _post_json_once(url, data, auth, timeout_sec)
                  last_status_code = status_code
                  last_body = body_text
                  last_headers = headers
                  last_exception_message = exception_message
                  if 200 <= status_code < 300:
                      return status_code, body_text, headers, retry_count, ''
                  if attempt >= MAX_RETRY or not _is_retryable_error(status_code, body_text, exception_message):
                      break
                  time.sleep(RETRY_SLEEP_SECONDS[attempt])
                  retry_count += 1
              prefix = 'HTTP_ERROR' if last_status_code else 'NETWORK_ERROR'
              error_message = _format_error_message(prefix, last_status_code, last_body, last_headers, retry_count, last_exception_message)
              return last_status_code, last_body, last_headers, retry_count, error_message


