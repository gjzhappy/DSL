        code: |
          import json
          import hashlib

          CATALOG_VERSION = 'collection_catalog_contract'
          SELECTION_VERSION = 'collection_selection_contract'

          def _loads(value):
              if isinstance(value, dict):
                  return dict(value)
              if isinstance(value, str) and value.strip():
                  try:
                      return json.loads(value)
                  except Exception:
                      return {}
              return {}

          def _list(value):
              if isinstance(value, list):
                  return [str(x).strip() for x in value if str(x).strip()]
              if value in (None, ''):
                  return []
              return [str(value).strip()]

          def _uniq(items, limit=0):
              out, seen = [], set()
              for item in items:
                  item = str(item or '').strip()
                  if item and item not in seen:
                      seen.add(item); out.append(item)
                      if limit and len(out) >= limit:
                          break
              return out

          def _digest(obj):
              tmp = dict(obj or {})
              tmp.pop('catalog_digest', None)
              return hashlib.sha256(json.dumps(tmp, sort_keys=True, ensure_ascii=False, separators=(',', ':')).encode('utf-8')).hexdigest()

          def _catalog_from_schema(schema_metadata_json, manual_catalog_json):
              manual = _loads(manual_catalog_json)
              if manual.get('catalog_version') == CATALOG_VERSION:
                  manual.setdefault('warnings', [])
                  manual.setdefault('collections', [])
                  manual['catalog_digest'] = manual.get('catalog_digest') or _digest(manual) if manual.get('collections') else manual.get('catalog_digest', '')
                  return manual
              return {'catalog_version': CATALOG_VERSION, 'catalog_digest': '', 'collections': [], 'warnings': ['collection catalog unavailable']}

          def _default_selection():
              return {
                  'contract_version': SELECTION_VERSION,
                  'selected_primary_collection': '',
                  'selected_related_collections': [],
                  'confidence': 0,
                  'needs_schema_retrieval': True,
                  'primary_candidates': [],
                  'related_candidates': [],
                  'low_confidence': False,
                  'requires_clarification': False,
                  'clarification_question': '',
                  'warnings': [],
              }


          def _term_matches(question, terms):
              q = str(question or '')
              return [t for t in _uniq(_list(terms), 100) if t and t in q]

          def _explicit_collection_matches(question, coll):
              return _term_matches(question, [coll.get('collection_name'), coll.get('collection_label')] + _list(coll.get('aliases')))

          def _coverage_matches(question, coll):
              return _term_matches(question, _list(coll.get('primary_terms')) + [coll.get('description')])

          def _has_cross_collection_intent(question):
              q = str(question or '').lower()
              return any(t in q for t in ['补充', '关联', '带出', '主数据', '详情', 'join', 'lookup', 'enrich'])

          def _negates_related(question, related_name):
              q = str(question or '').lower()
              name = str(related_name or '').lower()
              return bool(name and any(((neg + name) in q) or (neg in q and name in q) for neg in ['不要', '不需要', '无需', '不用', '排除', 'without', 'no ']))

          def main(question: str, turn_intent_json: str = '', compact_context_json: str = '', schema_metadata_json: str = '', collection_catalog_json: str = '', query_refinement_json: str = '', context_binding_json: str = '', planner=None, **kwargs):
              catalog = _catalog_from_schema(schema_metadata_json, collection_catalog_json)
              selection = _default_selection()
              selection['collection_catalog_digest'] = catalog.get('catalog_digest', '')
              q = str(question or '')
              ctx = _loads(compact_context_json)
              turn = _loads(turn_intent_json)
              cb = _loads(context_binding_json)
              base = str(cb.get('base_primary_collection') or cb.get('old_primary_collection') or '').strip()
              if not base:
                  base = str(ctx.get('last_primary_collection') or '').strip()
              inherit = (bool(cb.get('inherit_previous_collection')) or bool(turn.get('keep_previous_primary'))) and bool(base) and not (bool(cb.get('collection_switch')) or bool(turn.get('collection_switch')))
              if not catalog.get('collections'):
                  if inherit:
                      selection.update({
                          'selected_primary_collection': base,
                          'confidence': 0.85,
                          'requires_clarification': False,
                          'clarification_question': '',
                          'needs_schema_retrieval': True,
                          'needs_schema_hydration': True,
                          'schema_hydration_collections': [base],
                          'selection_reason': 'inherited_primary_collection_missing_from_candidate_catalog',
                          'warnings': ['inherited_primary_collection_missing_from_candidate_catalog'],
                      })
                      return {
                          'collection_catalog_json': json.dumps(catalog, ensure_ascii=False),
                          'collection_selection_json': json.dumps(selection, ensure_ascii=False),
                          'selected_primary_collection': base,
                          'selected_related_collections': selection.get('selected_related_collections') or [],
