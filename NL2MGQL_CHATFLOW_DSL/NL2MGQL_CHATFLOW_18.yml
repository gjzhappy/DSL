        code: |
          import json

          def _loads(value):
              if isinstance(value, dict):
                  return value
              if isinstance(value, str) and value.strip():
                  try:
                      parsed = json.loads(value)
                      return parsed if isinstance(parsed, dict) else {}
                  except Exception:
                      return {}
              return {}

          def _as_list(value):
              if isinstance(value, list):
                  return [str(x).strip() for x in value if str(x).strip()]
              if value in (None, '', {}, []):
                  return []
              return [str(value).strip()]

          def _first_stage(plan):
              stages = ((plan.get('execution_plan') or {}).get('stages') or plan.get('stages') or []) if isinstance(plan, dict) else []
              return stages[0] if isinstance(stages, list) and stages and isinstance(stages[0], dict) else {}

          def _add(out, value):
              text = str(value or '').strip()
              if text and text not in out:
                  out.append(text)

          def _hit_score(question, value, weight):
              text = str(value or '').strip()
              return weight if text and text.lower() in question.lower() else 0

          def _registry_match(question, registry):
              scores = []
              for item in registry.get('collections') or []:
                  if not isinstance(item, dict):
                      continue
                  name = str(item.get('collection_name') or '').strip()
                  if not name:
                      continue
                  score = 0; reasons = []
                  for key, weight in [('collection_name',100),('collection_label',90)]:
                      hit = _hit_score(question, item.get(key), weight)
                      if hit:
                          score += hit; reasons.append(key)
                  for key, weight in [('aliases',80),('primary_terms',60),('fields',45),('metrics',45)]:
                      hits = sum(1 for value in _as_list(item.get(key)) if _hit_score(question, value, weight))
                      if hits:
                          score += hits * weight; reasons.append(key)
                  desc_hits = 0
                  for token in str(item.get('description') or '').replace('，',' ').replace('。',' ').split():
                      if len(token) >= 2 and token in question:
                          desc_hits += 1
                  if desc_hits:
                      score += min(desc_hits, 3) * 10; reasons.append('description')
                  if score > 0:
                      scores.append({'collection_name': name, 'score': score, 'matched_fields': reasons})
              scores.sort(key=lambda x: x.get('score',0), reverse=True)
              if not scores:
                  return [], scores
              top = scores[0].get('score',0)
              winners = [x.get('collection_name') for x in scores if x.get('score',0) == top and x.get('collection_name')]
              return (winners if len(winners) == 1 else []), scores

          def _context_binding(qref, intent, old_plan):
              st = _first_stage(old_plan)
              base = str(old_plan.get('primary_collection') or st.get('collection') or st.get('primary_collection') or '').strip()
              return {'base_primary_collection': base, 'old_primary_collection': base, 'collection_switch': bool(qref.get('collection_switch'))}

          def main(question: str = '', query_refinement_json: str = '{}', normalized_turn_intent_json: str = '{}', last_context_json: str = '{}', old_normalized_semantic_plan_json: str = '{}', patch_reason: str = '', changed_fields: str = '', collection_registry_json: str = '', **kwargs):
              q = str(question or '').strip()
              qref = _loads(query_refinement_json)
              intent = _loads(normalized_turn_intent_json)
              old_plan = _loads(old_normalized_semantic_plan_json)
              registry = _loads(collection_registry_json)
              cb = _context_binding(qref, intent, old_plan)
              registry_names, scores = _registry_match(q, registry)
              old_primary = cb.get('base_primary_collection') or ''
              explicit_switch = bool(registry_names and old_primary and registry_names[0] != old_primary and qref.get('collection_switch'))
              selected = str(qref.get('selected_primary_collection') or qref.get('target_collection') or qref.get('collection') or '').strip()
              if explicit_switch:
                  names = registry_names; strategy = 'explicit_switch_by_registry'; collection_switch = True
              elif old_primary:
                  names = [old_primary]; strategy = 'inherit_previous'; collection_switch = False
              elif selected:
                  names = [selected]; strategy = 'selected_primary_collection'; collection_switch = False
              elif registry_names:
                  names = registry_names; strategy = 'registry_match'; collection_switch = False
              else:
                  names = []; strategy = 'registry_no_match'; collection_switch = False
              ready = bool(names); primary = names[0] if names else ''
              query = '\n'.join(['当前是 refine/full-replan。','metadata_type: mongo_schema','collection_name: '+primary,'只检索 candidate_collection_names 中 collection 对应的完整 schema metadata。','用户问题：'+q])
              debug = {'candidate_collection_scores': scores, 'strategy': strategy, 'context_binding': cb}
              return {
                  'query_text': query,
                  'old_normalized_semantic_plan_json': json.dumps(old_plan, ensure_ascii=False),
                  'query_refinement_json': json.dumps(qref, ensure_ascii=False),
                  'patch_reason': str(patch_reason or ''),
                  'changed_fields_json': json.dumps(_as_list(changed_fields), ensure_ascii=False),
                  'refine_retrieval_valid': ready,
                  'refine_retrieval_error': '' if ready else 'schema_missing',
                  'refine_query_debug_json': json.dumps(debug, ensure_ascii=False),
                  'context_binding_json': json.dumps(cb, ensure_ascii=False),
                  'must_include_collections_json': json.dumps(names, ensure_ascii=False),
                  'preferred_collections_json': json.dumps(names, ensure_ascii=False),
                  'deprecated_fields_json': '[]',
                  'collection_strategy': strategy,
                  'schema_strategy': 'metadata_exact' if ready else 'requires_clarification',
                  'base_primary_collection': old_primary,
                  'target_semantic_terms_json': json.dumps([q], ensure_ascii=False),
                  'candidate_collection_names': names,
                  'candidate_collection_name': primary,
                  'candidate_collection_ready': ready,
                  'candidate_collection_strategy': strategy,
                  'candidate_collection_scores_json': json.dumps(scores, ensure_ascii=False),
                  'candidate_collection_reason': 'matched by registry or inherited context' if ready else 'no collection available',
                  'collection_switch': collection_switch,
                  'requires_clarification': not ready,
                  'clarification_question': '' if ready else '请明确要查询的业务对象或 collection。',
              }
