        code: |
          import json
          import hashlib
          import re

          SCHEMA_CONTRACT_VERSION = 'schema_metadata_contract'
          ALIAS_INDEX_CONTRACT_VERSION = 'schema_alias_index_contract'
          CATALOG_VERSION = 'collection_catalog_contract'


          def _strip_quotes(v):
              v = str(v or '').strip()
              if len(v) >= 2 and v[0] == v[-1] and v[0] in {'"', "'"}:
                  return v[1:-1]
              return v


          def _split_inline_list(body):
              return [_strip_quotes(x.strip()) for x in re.split(r'\s*,\s*', str(body or '')) if x.strip()]


          def _parse_scalar(v):
              v = str(v or '').strip()
              if not v:
                  return ''
              if v in {'|', '>', '|-', '>-'}:
                  return ''
              if v in {'true', 'True'}:
                  return True
              if v in {'false', 'False'}:
                  return False
              if v in {'null', 'Null', 'NULL', '~'}:
                  return None
              if v.startswith('[') and v.endswith(']'):
                  return _split_inline_list(v[1:-1].strip())
              if v.startswith('{') and v.endswith('}'):
                  try:
                      return json.loads(v)
                  except Exception:
                      return _strip_quotes(v)
              if re.match(r'^-?\d+$', v):
                  try:
                      return int(v)
                  except Exception:
                      pass
              if re.match(r'^-?\d+\.\d+$', v):
                  try:
                      return float(v)
                  except Exception:
                      pass
              return _strip_quotes(v)


          def _parse_simple_yaml(text):
              root = {}
              stack = [(-1, root)]
              lines = str(text or '').replace('\r\n', '\n').replace('\r', '\n').split('\n')
              i = 0
              while i < len(lines):
                  raw = lines[i]
                  if not raw.strip() or raw.lstrip().startswith('#'):
                      i += 1
                      continue
                  indent = len(raw) - len(raw.lstrip(' '))
                  s = raw.strip()
                  mblock = re.match(r'^([A-Za-z_][\w\-]*)\s*:\s*([>|][\-+]?)\s*$', s)
                  if mblock:
                      key = mblock.group(1)
                      parts = []
                      base = None
                      j = i + 1
                      while j < len(lines):
                          nr = lines[j]
                          if nr.strip():
                              ni = len(nr) - len(nr.lstrip(' '))
                              if ni <= indent:
                                  break
                              if base is None:
                                  base = ni
                              parts.append(nr[base:] if len(nr) >= base else nr.strip())
                          else:
                              parts.append('')
                          j += 1
                      while stack and indent <= stack[-1][0]:
                          stack.pop()
                      parent = stack[-1][1]
                      if isinstance(parent, dict):
                          parent[key] = '\n'.join(parts).strip()
                      i = j
                      continue
                  while stack and indent <= stack[-1][0]:
                      stack.pop()
                  parent = stack[-1][1]
                  if s.startswith('- '):
                      item = s[2:].strip()
                      if not isinstance(parent, list):
                          i += 1
                          continue
                      if ':' in item and re.match(r'^[A-Za-z_][\w\-]*\s*:', item):
                          k, v = item.split(':', 1)
                          obj = {k.strip(): _parse_scalar(v)} if v.strip() else {k.strip(): {}}
                          parent.append(obj)
                          stack.append((indent, obj))
                          if not v.strip():
                              stack.append((indent + 2, obj[k.strip()]))
                      else:
                          parent.append(_parse_scalar(item))
                      i += 1
                      continue
                  if ':' in s:
                      k, v = s.split(':', 1)
                      key = k.strip()
                      val = v.strip()
                      if isinstance(parent, dict):
                          if val:
                              parent[key] = _parse_scalar(val)
                              i += 1
                              continue
                          j = i + 1
                          nxt = ''
                          while j < len(lines):
                              if lines[j].strip() and not lines[j].lstrip().startswith('#'):
                                  nxt = lines[j].strip()
                                  break
                              j += 1
                          container = [] if nxt.startswith('- ') else {}
                          parent[key] = container
                          stack.append((indent, container))
                  i += 1
              return root


          def _content(doc):
              if isinstance(doc, dict):
                  return str(doc.get('content') or doc.get('text') or doc.get('document') or '')
              return str(doc or '')


          def _extract_blocks(text):
              raw = str(text or '')
              blocks = []
              for pat in [
                  r'(^|\n)##\s*Schema Metadata\s*\n+```(?:yaml|yml|json)?\s*\n(.*?)\n```',
                  r'```(?:yaml|yml|json)?\s*\n(.*?(?:metadata_type\s*:\s*mongo_schema|"metadata_type"\s*:\s*"mongo_schema").*?)\n```',
              ]:
                  blocks.extend(m.group(2 if 'Schema Metadata' in pat else 1) for m in re.finditer(pat, raw, re.I | re.S))
              if not blocks and re.search(r'metadata_type\s*:\s*mongo_schema|"metadata_type"\s*:\s*"mongo_schema"', raw, re.I):
                  blocks.append(raw)
              return blocks


          def _parse_block(block):
              text = str(block or '').strip()
              if not text:
                  return {}
              if text.startswith('{'):
                  return json.loads(text)
              return _parse_simple_yaml(text)


          def _as_list(value):
              if value in (None, ''):
                  return []
              if isinstance(value, list):
                  return [x for x in value if x is not None and str(x).strip()]
              return [x for x in _split_inline_list(value) if str(x).strip()]


          def _str_list(value, limit=0):
              out, seen = [], set()
              for item in _as_list(value):
                  s = str(item or '').strip()
                  if s and s not in seen:
                      seen.add(s); out.append(s)
                      if limit and len(out) >= limit:
                          break
              return out


          def _named_map(value):
              result = {}
              if isinstance(value, dict):
                  for name, item in value.items():
                      if isinstance(item, dict):
                          obj = dict(item); obj.setdefault('name', name); result[str(obj.get('name') or name).strip()] = obj
              elif isinstance(value, list):
                  for item in value:
                      if isinstance(item, dict) and str(item.get('name') or '').strip():
                          result[str(item.get('name')).strip()] = dict(item)
              return result


          def _normalize_collection(doc):
              cname = str((doc or {}).get('collection_name') or '').strip()
              if not cname:
                  return None
              fields = _named_map(doc.get('fields'))
              metrics = _named_map(doc.get('metrics'))
              relations = doc.get('relations') if isinstance(doc.get('relations'), list) else []
              normalized = dict(doc)
              normalized.update({
                  'collection_name': cname,
                  'collection_label': str(doc.get('collection_label') or cname).strip() or cname,
                  'collection_aliases': _str_list(doc.get('collection_aliases')),
                  'fields': fields,
                  'metrics': metrics,
                  'relations': [r for r in relations if isinstance(r, dict)],
                  'query_rules': doc.get('query_rules') if isinstance(doc.get('query_rules'), dict) else {},
              })
              return normalized


          def _digest(obj, key):
              tmp = json.loads(json.dumps(obj or {}, ensure_ascii=False))
              if isinstance(tmp, dict):
                  tmp.pop(key, None)
              payload = json.dumps(tmp, ensure_ascii=False, sort_keys=True, separators=(',', ':'))
              return hashlib.sha256(payload.encode('utf-8')).hexdigest()


          def _add_alias(bucket, alias, collection, kind, canonical, label='', source='', field=''):
              alias = str(alias or '').strip()
              if not alias:
                  return
              bucket.setdefault(alias, [])
              item = {'collection': collection, 'kind': kind, 'canonical': canonical, 'label': str(label or '').strip(), 'source': source}
              if field:
                  item['field'] = field
              if item not in bucket[alias]:
                  bucket[alias].append(item)


          def _alias_index(meta):
              aliases, ca, fa, ma, va = {}, {}, {}, {}, {}
              simple = {'fields': {}, 'metrics': {}, 'collections': {}}
              for cname, coll in (meta.get('collections') or {}).items():
                  for alias, source in [(cname, 'collection.name'), (coll.get('collection_label'), 'collection.label')]:
                      _add_alias(aliases, alias, cname, 'collection', cname, coll.get('collection_label'), source)
                      _add_alias(ca, alias, cname, 'collection', cname, coll.get('collection_label'), source)
                      if alias: simple['collections'][str(alias)] = cname
                  for a in coll.get('collection_aliases') or []:
                      _add_alias(aliases, a, cname, 'collection', cname, coll.get('collection_label'), 'collection.aliases')
                      _add_alias(ca, a, cname, 'collection', cname, coll.get('collection_label'), 'collection.aliases')
                      simple['collections'][str(a)] = cname
                  for fname, f in (coll.get('fields') or {}).items():
                      for alias, source in [(fname, 'field.name'), (f.get('label'), 'field.label')] + [(a, 'field.aliases') for a in (f.get('aliases') or [])]:
                          _add_alias(aliases, alias, cname, 'field', fname, f.get('label'), source)
                          _add_alias(fa, alias, cname, 'field', fname, f.get('label'), source)
                          if alias: simple['fields'].setdefault(cname, {})[str(alias)] = fname
                      for val_alias, canonical_value in (f.get('value_aliases') or {}).items() if isinstance(f.get('value_aliases'), dict) else []:
                          _add_alias(aliases, val_alias, cname, 'value', canonical_value, val_alias, 'field.value_aliases', field=fname)
                          _add_alias(va, val_alias, cname, 'value', canonical_value, val_alias, 'field.value_aliases', field=fname)
                  for mname, m in (coll.get('metrics') or {}).items():
                      for alias, source in [(mname, 'metric.name'), (m.get('label'), 'metric.label')] + [(a, 'metric.aliases') for a in (m.get('aliases') or [])]:
                          _add_alias(aliases, alias, cname, 'metric', mname, m.get('label'), source)
                          _add_alias(ma, alias, cname, 'metric', mname, m.get('label'), source)
                          if alias: simple['metrics'].setdefault(cname, {})[str(alias)] = mname
              return {'contract_version': ALIAS_INDEX_CONTRACT_VERSION, 'aliases': aliases, 'collection_aliases': ca, 'field_aliases': fa, 'metric_aliases': ma, 'value_aliases': va, 'fields': simple['fields'], 'metrics': simple['metrics'], 'collections': simple['collections'], 'warnings': []}


          def _catalog(meta):
              cols = []
              warnings = []
              for idx, (cname, coll) in enumerate((meta.get('collections') or {}).items()):
                  metrics = []
                  for mname, m in (coll.get('metrics') or {}).items():
                      metrics.extend([mname, m.get('label')]); metrics.extend(m.get('aliases') or [])
                  dims = []
                  default_time = str(coll.get('default_time_field') or '').strip()
                  for fname, f in (coll.get('fields') or {}).items():
                      role = str(f.get('role') or f.get('semantic_type') or '').strip()
                      if role in {'dimension', 'time'} or f.get('groupable') or f.get('filterable') or (default_time and fname == default_time):
                          dims.extend([fname, f.get('label')]); dims.extend(f.get('aliases') or [])
                  related = []
                  for r in coll.get('relations') or []:
                      target = str((r or {}).get('target_collection') or '').strip()
                      if target and target not in related:
                          related.append(target)
                  try:
                      priority = int(coll.get('priority')) if str(coll.get('priority') or '').strip() != '' else 60
                  except Exception:
                      priority = 60
                  cols.append({'collection_name': cname, 'collection_label': str(coll.get('collection_label') or cname).strip() or cname, 'aliases': _str_list([cname, coll.get('collection_label')] + (coll.get('collection_aliases') or []), 32), 'description': str(coll.get('purpose') or coll.get('description') or '').strip(), 'default_time_field': default_time, 'primary_metrics': _str_list(metrics, 64), 'primary_dimensions': _str_list(dims, 80), 'supported_intents': _str_list(coll.get('supported_intents') or ['detail', 'aggregate_summary', 'trend', 'ranking', 'enrich'], 16), 'related_collections': related, 'priority': priority})
              if not cols:
                  warnings.append('schema metadata 中没有 collections，collection catalog 为空。')
              cat = {'catalog_version': CATALOG_VERSION, 'catalog_digest': '', 'collections': cols, 'warnings': warnings}
              cat['catalog_digest'] = _digest(cat, 'catalog_digest') if cols else ''
              return cat


          def _schema_context(meta):
              sections = []
              for cname, coll in (meta.get('collections') or {}).items():
                  sections.append('## collection=' + cname + '\n```json\n' + json.dumps(coll, ensure_ascii=False, indent=2) + '\n```')
              return '\n\n'.join(sections)


          def main(docs):
              warnings = []
              collections = {}
              schema_version = ''
              for doc in (docs or []):
                  text = _content(doc)
                  for block in _extract_blocks(text):
                      try:
                          raw = _parse_block(block)
                          if not isinstance(raw, dict):
                              warnings.append('跳过非对象 schema block')
                              continue
                          if raw.get('metadata_type') != 'mongo_schema' and not raw.get('collection_name'):
                              warnings.append('跳过非 mongo_schema block')
                              continue
                          if not schema_version:
                              schema_version = str(raw.get('schema_version') or raw.get('metadata_version') or '').strip()
                          coll = _normalize_collection(raw)
                          if coll:
                              collections[coll['collection_name']] = coll
                      except Exception as e:
                          warnings.append('CandidateSchemas block 解析失败: ' + str(e)[:160])
