                  content = str((item or {}).get('content') or '').strip()
                  metadata = (item or {}).get('metadata') or {}
                  score = metadata.get('score', '')
                  chunk = f"[{idx+1}] title={title} score={score}\n{content}".strip()
                  if chunk:
