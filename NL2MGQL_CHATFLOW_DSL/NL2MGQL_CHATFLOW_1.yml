          import json
          import random
          import re
          import ssl
          import urllib.error
          import urllib.request
          import uuid
          from datetime import datetime, timedelta, timezone

          # schema metadata C-MVP helpers


          def _strip_quotes(v):
              v = str(v or '').strip()
              if (len(v) >= 2 and v[0] == v[-1] and v[0] in {'"', "'"}):
                  return v[1:-1]
              return v


          def _parse_scalar(v):
              v = str(v or '').strip()
              if not v:
                  return ''
              if v in {'|', '>', '|-', '>-'}:
                  return ''
              if v in {'true', 'True'}:
                  return True
              if v in {'false', 'False'}:
                  return False
              if v.startswith('[') and v.endswith(']'):
                  body = v[1:-1].strip()
                  return [_strip_quotes(x.strip()) for x in re.split(r'\s*,\s*', body) if x.strip()]
              if re.match(r'^-?\d+$', v):
                  try: return int(v)
                  except Exception: pass
              if re.match(r'^-?\d+\.\d+$', v):
                  try: return float(v)
                  except Exception: pass
              return _strip_quotes(v)


          def _parse_simple_yaml(text):
              root = {}
              stack = [(-1, root)]
              pending_key = None
              lines = str(text or '').replace('\r\n','\n').replace('\r','\n').split('\n')
              i = 0
              while i < len(lines):
                  raw = lines[i]
                  if not raw.strip() or raw.lstrip().startswith('#'):
                      i += 1; continue
                  indent = len(raw) - len(raw.lstrip(' '))
                  s = raw.strip()
                  # block scalar continuation for key: > or |
                  mblock = re.match(r'^([A-Za-z_][\w\-]*)\s*:\s*([>|][\-+]?)\s*$', s)
                  if mblock:
                      key = mblock.group(1)
                      parts=[]; base=None; j=i+1
                      while j < len(lines):
                          nr=lines[j]
                          if nr.strip():
                              ni=len(nr)-len(nr.lstrip(' '))
                              if ni <= indent: break
                              if base is None: base=ni
                              parts.append(nr[base:] if len(nr)>=base else nr.strip())
                          else:
                              parts.append('')
                          j += 1
                      while stack and indent <= stack[-1][0]: stack.pop()
                      parent=stack[-1][1]
                      if isinstance(parent, dict): parent[key]='\n'.join(parts).strip()
                      i=j; continue
                  while stack and indent <= stack[-1][0]:
                      stack.pop()
                  parent = stack[-1][1]
                  if s.startswith('- '):
                      item = s[2:].strip()
                      if not isinstance(parent, list):
                          # malformed under scalar, skip
                          i += 1; continue
                      if ':' in item and re.match(r'^[A-Za-z_][\w\-]*\s*:', item):
                          k, v = item.split(':',1)
                          obj = {k.strip(): _parse_scalar(v)} if v.strip() else {k.strip(): {}}
                          parent.append(obj)
                          stack.append((indent, obj))
                          if not v.strip():
                              stack.append((indent+2, obj[k.strip()]))
                      else:
                          parent.append(_parse_scalar(item))
                      i += 1; continue
                  if ':' in s:
                      k, v = s.split(':',1)
                      key = k.strip()
                      val = v.strip()
                      if isinstance(parent, dict):
                          if val:
                              parent[key] = _parse_scalar(val)
                              i += 1; continue
                          # determine next container
                          j=i+1; nxt=''
                          while j < len(lines):
                              if lines[j].strip() and not lines[j].lstrip().startswith('#'):
                                  nxt=lines[j].strip(); break
                              j += 1
                          container = [] if nxt.startswith('- ') else {}
                          parent[key] = container
                          stack.append((indent, container))
                  i += 1
              return root


          def extract_schema_metadata_blocks(text):
              blocks = []
              pattern = re.compile(r'(^|\n)##\s*Schema Metadata\s*\n+```(?:yaml|yml)\s*\n(.*?)\n```', re.I|re.S)
              for m in pattern.finditer(str(text or '')):
                  blocks.append(m.group(2))
              if not blocks:
                  pattern2 = re.compile(r'```(?:yaml|yml)\s*\n(.*?metadata_type\s*:\s*mongo_schema.*?)\n```', re.I|re.S)
                  blocks = [m.group(1) for m in pattern2.finditer(str(text or ''))]
              return blocks


          def _normalize_schema_doc(doc, warnings):
              if not isinstance(doc, dict): return None
              if doc.get('metadata_type') != 'mongo_schema' and not (doc.get('collection_name') and isinstance(doc.get('fields'), list)):
                  return None
              cname = str(doc.get('collection_name') or '').strip()
              if not cname: return None
              fields={}
              for f in doc.get('fields') or []:
                  if isinstance(f, dict) and f.get('name'):
                      name=str(f.get('name')).strip(); item=dict(f); item['name']=name
                      item['aliases']=[str(x).strip() for x in (item.get('aliases') or []) if str(x).strip()]
                      fields[name]=item
              metrics={}
              for m in doc.get('metrics') or []:
                  if isinstance(m, dict) and m.get('name'):
                      name=str(m.get('name')).strip(); item=dict(m); item['name']=name
                      item['aliases']=[str(x).strip() for x in (item.get('aliases') or []) if str(x).strip()]
                      metrics[name]=item
              return {
                  'collection_name': cname,
                  'collection_label': str(doc.get('collection_label') or '').strip(),
                  'collection_aliases': [str(x).strip() for x in (doc.get('collection_aliases') or []) if str(x).strip()],
                  'primary_key': str(doc.get('primary_key') or '').strip(),
                  'default_time_field': str(doc.get('default_time_field') or '').strip(),
                  'fields': fields,
                  'metrics': metrics,
                  'relations': doc.get('relations') if isinstance(doc.get('relations'), list) else [],
                  'query_rules': doc.get('query_rules') if isinstance(doc.get('query_rules'), dict) else {},
              }


          def extract_schema_metadata(schema_context):
              warnings=[]; collections={}
              raw = schema_context if isinstance(schema_context, str) else json.dumps(schema_context, ensure_ascii=False)
              # allow already-json metadata
              if isinstance(schema_context, dict) and isinstance(schema_context.get('collections'), dict):
                  return {'collections': schema_context.get('collections') or {}, 'warnings': schema_context.get('warnings') or []}
              for block in extract_schema_metadata_blocks(raw):
                  try:
                      doc=_parse_simple_yaml(block)
                      norm=_normalize_schema_doc(doc, warnings)
                      if norm: collections[norm['collection_name']]=norm
                  except Exception as e:
                      warnings.append('Schema Metadata YAML 解析失败: '+str(e)[:160])
              return {'collections': collections, 'warnings': warnings}


          def _add_alias(index, alias, collection, kind, name, label):
              alias=str(alias or '').strip()
              if not alias: return
              item={'collection':collection,'kind':kind,'name':name,'label':str(label or '').strip()}
              bucket=index.setdefault(alias, [])
              if not any(x.get('collection')==collection and x.get('kind')==kind and x.get('name')==name for x in bucket):
                  bucket.append(item)


          def build_alias_index(schema_metadata):
              meta=schema_metadata if isinstance(schema_metadata, dict) else extract_schema_metadata(schema_metadata)
              index={}; coll_index={}
              for cname, coll in (meta.get('collections') or {}).items():
                  _add_alias(coll_index, cname, cname, 'collection', cname, coll.get('collection_label'))
                  _add_alias(coll_index, coll.get('collection_label'), cname, 'collection', cname, coll.get('collection_label'))
                  for a in coll.get('collection_aliases') or []: _add_alias(coll_index, a, cname, 'collection', cname, coll.get('collection_label'))
                  for fname, f in (coll.get('fields') or {}).items():
                      for a in [fname, f.get('label')] + list(f.get('aliases') or []): _add_alias(index, a, cname, 'field', fname, f.get('label'))
                  for mname, m in (coll.get('metrics') or {}).items():
                      for a in [mname, m.get('label')] + list(m.get('aliases') or []): _add_alias(index, a, cname, 'metric', mname, m.get('label'))
              return {'aliases': index, 'collection_aliases': coll_index}


          def prettify_field_name(field_name):
              return str(field_name or '').strip().replace('_',' ')


          def _meta_and_index(schema_metadata):
              meta=schema_metadata if isinstance(schema_metadata, dict) and 'collections' in schema_metadata else extract_schema_metadata(schema_metadata)
              return meta, build_alias_index(meta)


          def resolve_field_name(raw_name, schema_metadata, collection_name=None, old_plan_fields=None):
              raw=str(raw_name or '').strip(); old=set(str(x).strip() for x in (old_plan_fields or []) if str(x).strip())
              meta, idx=_meta_and_index(schema_metadata); colls=meta.get('collections') or {}
              cname=str(collection_name or '').strip()
              if cname in colls and raw in (colls[cname].get('fields') or {}):
                  f=colls[cname]['fields'][raw]; return {'input':raw,'resolved':raw,'kind':'field','collection':cname,'source':'schema_field_name','label':f.get('label') or prettify_field_name(raw),'confidence':1.0,'warning':''}
              candidates=[x for x in (idx.get('aliases') or {}).get(raw, []) if x.get('kind')=='field']
              if cname:
                  scoped=[x for x in candidates if x.get('collection')==cname]
                  if scoped:
                      x=scoped[0]; return {'input':raw,'resolved':x['name'],'kind':'field','collection':x['collection'],'source':'schema_alias','label':x.get('label') or prettify_field_name(x['name']),'confidence':1.0,'warning':''}
              if len(candidates)==1:
                  x=candidates[0]; return {'input':raw,'resolved':x['name'],'kind':'field','collection':x['collection'],'source':'schema_alias_unique','label':x.get('label') or prettify_field_name(x['name']),'confidence':1.0,'warning':''}
              if raw in old:
                  return {'input':raw,'resolved':raw,'kind':'field','collection':cname,'source':'old_plan_fields','label':prettify_field_name(raw),'confidence':0.8,'warning':''}
              warning = '字段别名未在 schema metadata 中声明，未自动归一。' if not candidates else '字段别名在多个 collection 中存在，缺少 collection 上下文，未自动归一。'
              return {'input':raw,'resolved':raw,'kind':'unknown','collection':cname,'source':'unresolved','label':raw or prettify_field_name(raw),'confidence':0,'warning':warning}


          def resolve_metric_name(raw_name, schema_metadata, collection_name=None):
              raw=str(raw_name or '').strip(); meta, idx=_meta_and_index(schema_metadata); colls=meta.get('collections') or {}; cname=str(collection_name or '').strip()
              if cname in colls and raw in (colls[cname].get('metrics') or {}):
                  m=colls[cname]['metrics'][raw]; return {'input':raw,'resolved':raw,'kind':'metric','collection':cname,'source':'schema_metric_name','label':m.get('label') or prettify_field_name(raw),'confidence':1.0,'warning':''}
              candidates=[x for x in (idx.get('aliases') or {}).get(raw, []) if x.get('kind')=='metric']
              if cname:
                  scoped=[x for x in candidates if x.get('collection')==cname]
                  if scoped:
                      x=scoped[0]; return {'input':raw,'resolved':x['name'],'kind':'metric','collection':x['collection'],'source':'schema_alias','label':x.get('label') or prettify_field_name(x['name']),'confidence':1.0,'warning':''}
              if len(candidates)==1:
                  x=candidates[0]; return {'input':raw,'resolved':x['name'],'kind':'metric','collection':x['collection'],'source':'schema_alias_unique','label':x.get('label') or prettify_field_name(x['name']),'confidence':1.0,'warning':''}
              return {'input':raw,'resolved':raw,'kind':'unknown','collection':cname,'source':'unresolved','label':raw,'confidence':0,'warning':'指标别名未在 schema metadata 中声明，未自动归一。'}


          def resolve_field_label(field_name, schema_metadata, collection_name=None):
              meta,_=_meta_and_index(schema_metadata); fname=str(field_name or '').strip(); cname=str(collection_name or '').strip()
              if cname and cname in meta.get('collections',{}) and fname in meta['collections'][cname].get('fields',{}):
                  return meta['collections'][cname]['fields'][fname].get('label') or prettify_field_name(fname)
              hits=[]
              for cn,c in (meta.get('collections') or {}).items():
                  if fname in c.get('fields',{}): hits.append(c['fields'][fname].get('label') or prettify_field_name(fname))
              return hits[0] if len(hits)==1 else prettify_field_name(fname)


          def resolve_metric_label(metric_name, schema_metadata, collection_name=None):
              meta,_=_meta_and_index(schema_metadata); name=str(metric_name or '').strip(); cname=str(collection_name or '').strip()
              if cname and cname in meta.get('collections',{}) and name in meta['collections'][cname].get('metrics',{}):
                  return meta['collections'][cname]['metrics'][name].get('label') or prettify_field_name(name)
              hits=[]
              for cn,c in (meta.get('collections') or {}).items():
                  if name in c.get('metrics',{}): hits.append(c['metrics'][name].get('label') or prettify_field_name(name))
              return hits[0] if len(hits)==1 else prettify_field_name(name)


          def build_chart_title(group_field, metric_name, schema_metadata, collection_name=None, user_title=''):
              if str(user_title or '').strip(): return str(user_title).strip(), 'chart_request'
              x=resolve_field_label(group_field, schema_metadata, collection_name)
              y=resolve_metric_label(metric_name, schema_metadata, collection_name)
              return ('按'+x+'统计'+y if x and y else (x+' 与 '+y+' 对比')).strip(), 'schema_label'
          # end schema metadata C-MVP helpers

          SGT = timezone(timedelta(hours=8))
          DEFAULT_TIMEOUT_SECONDS = 60

          FORBIDDEN_MONGO_TOKENS = {'$out','$merge','$function','$where','drop','delete','update','insert'}
          MAX_RETURN_ROWS = 200
          MAX_RESULT_JSON_CHARS = 200000


          def _safe_json_dumps(value, max_chars=75000):
              try:
                  text = json.dumps(value, ensure_ascii=False)
              except Exception as e:
                  text = json.dumps({'error': str(e)}, ensure_ascii=False)
              if len(text) > max_chars:
                  return text[:max_chars] + '...TRUNCATED'
              return text


          def _read_json_text(value):
              if value is None:
                  return None
              if isinstance(value, (dict, list)):
                  return value
              raw = str(value).strip()
              if not raw:
                  return None
              return json.loads(raw)


          def _ensure_obj(value, name):
              obj = _read_json_text(value)
              if obj is None:
                  return {}
              if not isinstance(obj, dict):
                  raise ValueError(f'{name} must be a JSON object')
              return obj


          def _ensure_non_empty_string(value, name):
              text = str(value or '').strip()
              if not text:
                  raise ValueError(f'{name} is required')
              return text


          def _ensure_string_list(value, name):
              if value is None:
                  return []
              if not isinstance(value, list):
                  raise ValueError(f'{name} must be an array')
              result = []
              for idx, item in enumerate(value):
                  text = str(item or '').strip()
                  if not text:
                      raise ValueError(f'{name}[{idx}] must be a non-empty string')
                  result.append(text)
              return result


          def _parse_scalar(value):
              if value is None:
                  return None
              if isinstance(value, (int, float, bool, list)):
                  return value
              text = str(value).strip()
              if text.lower() == 'true':
                  return True
              if text.lower() == 'false':
                  return False
              if re.fullmatch(r'-?\d+', text):
                  return int(text)
              if re.fullmatch(r'-?\d+\.\d+', text):
                  return float(text)
              return text


          def _parse_query_urls(raw_value):
              text = str(raw_value or '').strip()
              if not text:
                  return []
              parts = []
              for chunk in text.replace('\r', '\n').split('\n'):
                  for item in chunk.split(','):
                      url = str(item or '').strip()
                      if url:
                          parts.append(url)
              return parts


          def _build_match_expr(path, operator, value):
              parsed = _parse_scalar(value)
              if operator == 'eq':
                  return {path: parsed}
              if operator == 'in':
                  values = parsed if isinstance(parsed, list) else [parsed]
                  return {path: {'$in': values}}
              mongo_op = {'gt': '$gt', 'gte': '$gte', 'lt': '$lt', 'lte': '$lte', 'regex': '$regex'}.get(operator)
              if not mongo_op:
                  raise ValueError(f'unsupported operator: {operator}')
              return {path: {mongo_op: parsed}}


          def _merge_match(parts):
              parts = [p for p in parts if p]
              if not parts:
                  return None
              if len(parts) == 1:
                  return parts[0]
              return {'$and': parts}


          def _extract_returnable_fields(schema_context, collection_name):
              text = str(schema_context or '')
              pattern = rf'## collection={re.escape(collection_name)}\n.*?(?=(\n## collection=|\Z))'
              m = re.search(pattern, text, flags=re.DOTALL)
              section = m.group(0) if m else ''
              if not section:
                  return []
              lines = section.splitlines()
              fields = []
              i = 0
              name_re = re.compile(r'^[A-Za-z_][A-Za-z0-9_]*$')
              while i < len(lines):
                  line = lines[i].strip()
                  next_line = lines[i + 1].strip() if i + 1 < len(lines) else ''
                  if name_re.fullmatch(line) and next_line.startswith('- type:'):
                      field_name = line
                      block = []
                      j = i + 1
                      while j < len(lines):
                          cur = lines[j].strip()
                          nxt = lines[j + 1].strip() if j + 1 < len(lines) else ''
                          if j > i + 1 and cur and name_re.fullmatch(cur) and nxt.startswith('- type:'):
                              break
                          if cur.startswith('## collection='):
                              break
                          block.append(cur)
                          j += 1
                      block_text = '\n'.join(block)
                      if 'returnable: true' in block_text and 'sensitive: true' not in block_text:
                          fields.append(field_name)
                      i = j
                      continue
                  i += 1
              return fields


          def _normalize_time_range(value, collection_name, default_field='created_at'):
              if not isinstance(value, dict):
                  return {
                      'collection': collection_name,
                      'field': default_field,
                      'mode': 'none',
                      'relative_days': 0,
                      'start': '',
                      'end': '',
                  }
              mode = str(value.get('mode') or 'none').strip() or 'none'
              if mode not in {'none', 'relative_days', 'absolute'}:
                  mode = 'none'
              field = str(value.get('field') or default_field).strip() or default_field
              relative_days = max(int(value.get('relative_days') or 0), 0)
              start = str(value.get('start') or '').strip()
              end = str(value.get('end') or '').strip()
              if mode != 'absolute':
                  start = ''
                  end = ''
              if mode == 'absolute' and not start and not end:
                  mode = 'none'
              return {
                  'collection': collection_name,
                  'field': field,
                  'mode': mode,
                  'relative_days': relative_days,
                  'start': start,
                  'end': end,
              }


          def _force_relative_month_time_range(question_text, time_range, collection_name, default_field='created_at'):
              text = str(question_text or '').strip()
              if not text:
                  return time_range
              month_tokens = ['过去一个月', '近一个月', '最近一个月', '近30天', '最近30天']
              if not any(token in text for token in month_tokens):
                  return time_range
              fixed = dict(time_range or {})
              fixed['collection'] = collection_name
              fixed['field'] = str(fixed.get('field') or default_field).strip() or default_field
              fixed['mode'] = 'relative_days'
              fixed['relative_days'] = 30
              fixed['start'] = ''
              fixed['end'] = ''
              return fixed


          def _sanitize_stage_filters(filters, time_range):
              if not isinstance(filters, list):
                  return []
              normalized = []
              dedup = set()
              time_mode = str((time_range or {}).get('mode') or 'none').strip()
              time_field = str((time_range or {}).get('field') or '').strip()
              for item in filters:
                  if not isinstance(item, dict):
                      continue
                  field = str(item.get('field') or '').strip()
                  operator = str(item.get('operator') or '').strip()
                  if not field or not operator:
                      continue
                  if time_mode != 'none' and field == time_field:
                      continue
                  value = item.get('value')
                  key = (field, operator, json.dumps(value, ensure_ascii=False, sort_keys=True))
                  if key in dedup:
                      continue
                  dedup.add(key)
                  normalized.append({'field': field, 'operator': operator, 'value': value})
              return normalized


          def _normalize_stage_field_ref(text):
              raw = str(text or '').strip()
              if not raw:
                  return ''
              raw = raw.lstrip('$')
              if '.' in raw:
                  return raw.split('.')[-1].strip()
              return raw


          def _sanitize_stage_for_compile(stage):
              if not isinstance(stage, dict):
                  return {}
              cleaned = dict(stage)
              time_range = _normalize_time_range(cleaned.get('time_range'), str(cleaned.get('collection') or '').strip() or 'unknown')
              cleaned['time_range'] = time_range
              raw_filters = cleaned.get('filters') or []
              cleaned['filters'] = _sanitize_stage_filters(raw_filters, time_range)
              dropped_stage_ref_filters = 0
              if str(cleaned.get('intent_type') or '').strip() == 'enrich_related':
                  cleaned['join_source_field'] = _normalize_stage_field_ref(cleaned.get('join_source_field'))
                  kept_filters = []
                  for f in cleaned.get('filters') or []:
                      value = (f or {}).get('value')
                      if isinstance(value, str) and value.strip().startswith('$stage'):
                          dropped_stage_ref_filters += 1
                          continue
                      kept_filters.append(f)
                  cleaned['filters'] = kept_filters
              cleaned['sanitize_report'] = {
                  'original_filter_count': len(raw_filters) if isinstance(raw_filters, list) else 0,
                  'effective_filter_count': len(cleaned['filters']),
                  'time_mode': time_range.get('mode'),
                  'dropped_stage_ref_filters': dropped_stage_ref_filters,
              }
              return cleaned


          def _apply_time_range(time_range):
              mode = str((time_range or {}).get('mode') or 'none').strip()
              if mode == 'none':
                  return None
              field = str((time_range or {}).get('field') or 'created_at').strip() or 'created_at'
              if mode == 'relative_days':
                  days = int((time_range or {}).get('relative_days') or 0)
                  start_dt = datetime.now(SGT) - timedelta(days=days)
                  return {field: {'$gte': start_dt.isoformat()}}
              if mode == 'absolute':
                  cond = {}
                  start = str((time_range or {}).get('start') or '').strip()
                  end = str((time_range or {}).get('end') or '').strip()
                  if start:
                      cond['$gte'] = start
                  if end:
                      cond['$lte'] = end
                  return {field: cond} if cond else None
              raise ValueError(f'unsupported time_range.mode: {mode}')


          def _collect_expected_row_fields(stage=None, validated_ast=None, normalized_plan=None):
              fields = set()

              def add(value):
                  if isinstance(value, str) and value.strip():
                      fields.add(value.strip())

              def add_many(values):
                  if isinstance(values, list):
                      for value in values:
                          if isinstance(value, dict):
                              add(value.get('alias') or value.get('field'))
                          else:
                              add(value)

              for src in [stage or {}]:
                  if not isinstance(src, dict):
                      continue
                  add_many(src.get('group_fields'))
                  add(src.get('metric_alias'))
                  add(src.get('metric_field'))
                  add(src.get('x_field'))
                  add(src.get('y_field'))

              ast = validated_ast if isinstance(validated_ast, dict) else {}
              add_many(ast.get('group_by'))
              add_many(ast.get('aggregations'))

              plan = normalized_plan if isinstance(normalized_plan, dict) else {}
              visualization = plan.get('visualization') if isinstance(plan.get('visualization'), dict) else {}
              chart_request = plan.get('chart_request') if isinstance(plan.get('chart_request'), dict) else {}
              for src in (visualization, chart_request):
                  add(src.get('x_field') or src.get('x_axis'))
                  add(src.get('y_field') or src.get('y_axis'))

              return fields


          def _is_scalar_value(value):
              return value is None or isinstance(value, (str, int, float, bool))


          def _find_best_rows(obj, expected_fields=None):
              expected_fields = set(expected_fields or [])
              preferred_path_keys = {'rows', 'merged_rows', 'records', 'items', 'list', 'docs'}
              container_path_keys = {'data', 'result', 'payload'}
              metadata_path_keys = {'debug', 'headers', 'raw_response', 'trace', 'pipeline', 'request', 'metadata'}
              best = []
              best_score = -1

              def score_rows(rows, path):
                  if not isinstance(rows, list) or not rows:
                      return -1
                  sample = rows[:20]
                  dict_items = [item for item in sample if isinstance(item, dict)]
                  if not dict_items:
                      return -1

                  score = min(len(rows), 100)
                  dict_ratio = len(dict_items) / float(len(sample))
                  if dict_ratio < 0.8:
                      score -= 30
                  score += int(dict_ratio * 20)

                  field_counts = {}
                  numeric_fields = set()
                  dimension_fields = set()
                  for item in dict_items:
                      for key, value in item.items():
                          field = str(key or '').strip()
                          if not field:
                              continue
                          field_counts[field] = field_counts.get(field, 0) + 1
                          if isinstance(value, (int, float)) and not isinstance(value, bool):
                              numeric_fields.add(field)
                          elif _is_scalar_value(value):
                              dimension_fields.add(field)

                  if not field_counts:
                      return -1

                  stable_threshold = max(1, int(len(dict_items) * 0.6))
                  stable_fields = {field for field, count in field_counts.items() if count >= stable_threshold}
                  score += min(len(stable_fields), 20) * 2

                  avg_field_count = sum(len(item.keys()) for item in dict_items) / float(len(dict_items))
                  if 1 <= avg_field_count <= 50:
                      score += 10
                  elif avg_field_count > 80:
                      score -= 20

                  expected_hits = stable_fields & expected_fields
                  score += len(expected_hits) * 8
                  if dimension_fields:
                      score += 12
                  if numeric_fields:
                      score += 12
                  if dimension_fields and numeric_fields:
                      score += 10

                  path_keys = {str(part or '').lower() for part in path}
                  if path_keys & preferred_path_keys:
                      score += 30
                  if path_keys & container_path_keys:
                      score += 8
                  if path_keys & metadata_path_keys:
                      score -= 40

                  return score

              def visit(node, path=()):
                  nonlocal best, best_score
                  if isinstance(node, list):
                      s = score_rows(node, path)
                      if s > best_score:
                          best, best_score = node, s
                      for idx, item in enumerate(node[:20]):
                          visit(item, path + (str(idx),))
                  elif isinstance(node, dict):
                      ordered_keys = ('rows', 'merged_rows', 'records', 'items', 'list', 'docs', 'data', 'result', 'payload')
                      visited = set()
                      for key in ordered_keys:
                          if key in node:
                              visited.add(key)
                              visit(node.get(key), path + (key,))
                      for key, value in node.items():
                          if key not in visited:
                              visit(value, path + (str(key),))

              visit(obj)
              return best


          def _unique_values(rows, field):
              values = []
              seen = set()
              for row in rows or []:
                  if not isinstance(row, dict):
                      continue
                  value = row.get(field)
                  if isinstance(value, list):
                      for item in value:
                          text = str(item or '').strip()
                          if text and text not in seen:
                              seen.add(text)
                              values.append(text)
                  else:
                      text = str(value or '').strip()
                      if text and text not in seen:
                          seen.add(text)
                          values.append(text)
              return values


          def _detect_visualization_intent(query_text):
              text = str(query_text or '').strip()

              if not text:
                  return {'enabled': False, 'chart_type': ''}
              has_generic = any(k in text for k in ['图表', '可视化'])
              has_bar = any(k in text for k in ['柱状图', '条形图', '对比图'])
              has_line = any(k in text for k in ['折线图', '趋势图'])
              has_pie = '饼图' in text
              enabled = has_generic or has_bar or has_line or has_pie
              chart_type = ''
              if has_bar:
                  chart_type = 'bar'
              elif has_line:
                  chart_type = 'line'
              elif has_pie:
                  chart_type = 'pie'
              elif has_generic:
                  chart_type = 'bar'
              return {'enabled': enabled, 'chart_type': chart_type}


          def _is_effectively_empty_stage(stage):
              if not isinstance(stage, dict):
                  return True
              intent = str(stage.get('intent_type') or '').strip()
              filters = stage.get('filters') or []
              group_fields = stage.get('group_fields') or []
              projection_fields = stage.get('projection_fields') or []
              metric_function = str(stage.get('metric_function') or '').strip()
              join_source_field = str(stage.get('join_source_field') or '').strip()
              join_target_field = str(stage.get('join_target_field') or '').strip()
              limit = int(stage.get('limit') or 0)
              tr_mode = str(((stage.get('time_range') or {}).get('mode')) or 'none').strip() or 'none'
              return (
                  intent in {'', 'detail_query'}
                  and not filters
                  and not group_fields
                  and not projection_fields
                  and not metric_function
                  and not join_source_field
                  and not join_target_field
                  and tr_mode == 'none'
                  and limit == 0
              )


          def _coerce_semantic_execution_plan(plan):
              if not isinstance(plan, dict):
                  return {}
              root = plan
              execution_plan = root.get('execution_plan')
              if isinstance(execution_plan, dict):
                  coerced = dict(execution_plan)
                  for key in ('needs_chart', 'chart_request', 'answer_mode', 'visualization'):
                      if key in root and key not in coerced:
                          coerced[key] = root.get(key)
              else:
                  coerced = dict(root)
              stages = coerced.get('stages') if isinstance(coerced.get('stages'), list) else []
              normalized_stages = []
              for idx, raw in enumerate(stages):
                  if not isinstance(raw, dict):
                      normalized_stages.append(raw)
                      continue
                  stage = dict(raw)
                  stage['stage_name'] = str(stage.get('stage_name') or stage.get('stage_id') or f'stage{idx + 1}').strip()
                  stage['collection'] = str(stage.get('collection') or stage.get('primary_collection') or coerced.get('primary_collection') or '').strip()
                  intent_type = str(stage.get('intent_type') or '').strip()
                  intent = str(stage.get('intent') or '').strip().lower()
                  if not intent_type:
                      if intent in {'find', 'detail', 'detail_query'}:
                          intent_type = 'detail_query'
                      elif intent in {'aggregate', 'aggregation', 'summary', 'aggregate_summary'}:
                          intent_type = 'aggregate_summary'
                      elif intent in {'group_top_entity', 'top_entity'}:
                          intent_type = 'group_top_entity'
                      elif intent in {'group_top_record', 'top_record'}:
                          intent_type = 'group_top_record'
                      elif intent in {'enrich_related', 'join'}:
                          intent_type = 'enrich_related'
                      else:
                          has_group = bool(stage.get('group_by') or stage.get('group_fields'))
                          has_metric = bool(stage.get('metrics') or stage.get('metric_function'))
                          intent_type = 'aggregate_summary' if (has_group or has_metric) else 'detail_query'
                      stage['intent_type'] = intent_type
                  if not stage.get('group_fields') and isinstance(stage.get('group_by'), list):
                      group_fields = []
                      for item in stage.get('group_by') or []:
                          if isinstance(item, str):
                              group_fields.append(item)
                          elif isinstance(item, dict):
                              group_fields.append(str(item.get('field') or item.get('name') or item.get('alias') or '').strip())
                      stage['group_fields'] = [field for field in group_fields if field]
                  metrics = stage.get('metrics') if isinstance(stage.get('metrics'), list) else []
                  if metrics and not stage.get('metric_function'):
                      metric = metrics[0] if isinstance(metrics[0], dict) else {'function': str(metrics[0])}
                      stage['metric_function'] = str(metric.get('function') or metric.get('op') or metric.get('name') or 'count').strip()
                      stage['metric_field'] = str(metric.get('field') or '').strip()
                      stage['metric_alias'] = str(metric.get('alias') or metric.get('name') or stage['metric_function']).strip()
                  if not stage.get('projection_fields') and isinstance(stage.get('projection'), list):
                      stage['projection_fields'] = [str(item.get('field') if isinstance(item, dict) else item).strip() for item in stage.get('projection') or [] if str(item.get('field') if isinstance(item, dict) else item).strip()]
                  normalized_stages.append(stage)
              coerced['stages'] = normalized_stages
              if not str(coerced.get('primary_collection') or '').strip() and normalized_stages:
                  first = normalized_stages[0] if isinstance(normalized_stages[0], dict) else {}
                  coerced['primary_collection'] = str(first.get('collection') or first.get('primary_collection') or '').strip()
              if 'collections' not in coerced:
                  collections = []
                  for stage in normalized_stages:
                      if isinstance(stage, dict) and str(stage.get('collection') or '').strip():
                          collections.append(str(stage.get('collection')).strip())
                  coerced['collections'] = list(dict.fromkeys(collections))
              chart_request = coerced.get('chart_request') if isinstance(coerced.get('chart_request'), dict) else {}
              if coerced.get('needs_chart') and chart_request and not isinstance(coerced.get('visualization'), dict):
                  coerced['visualization'] = {
                      'enabled': True,
                      'chart_type': str(chart_request.get('chart_type') or chart_request.get('type') or '').strip(),
                      'x_field': str(chart_request.get('x_field') or chart_request.get('x_axis') or '').strip(),
                      'y_field': str(chart_request.get('y_field') or chart_request.get('y_axis') or '').strip(),
                      'title': str(chart_request.get('title') or '').strip(),
                  }
              return coerced


          def _normalize_plan(plan, planner, question=''):
              plan = _coerce_semantic_execution_plan(plan)
