          def _to_bool(value):
              if isinstance(value, bool):
                  return value
              text = str(value or "").strip().lower()
              return text in {"1", "true", "yes", "y", "on"}


          def _to_int(value, default):
              try:
                  return int(value)
              except Exception:
                  return int(default)




          def _sanitize_schema_context_text(text):
              raw = str(text or '')
              if not raw:
                  return ''
              # Remove output-format examples that use forbidden top-level plan fields from retrieved knowledge.
              raw = re.sub(r'(?is)example\s*' + 'a' + r'st\s*[:：]?.*?(?=\n\s*#{1,6}\s|\n\s*collection\s*=|\Z)', '', raw)
              raw = re.sub(r'(?is)' + 'a' + r'st\s*fragment\s*[:：]?.*?(?=\n\s*#{1,6}\s|\n\s*collection\s*=|\Z)', '', raw)
              forbidden_shape = re.compile(r'\{\s*"collection"\s*:\s*"[^"]*"\s*,\s*"filters"\s*:\s*\[[\s\S]*?\]\s*,\s*"group_by"\s*:\s*\[[\s\S]*?\]\s*,\s*"metrics"\s*:\s*\[[\s\S]*?\]\s*\}', re.IGNORECASE)
              replacement = '{"execution_plan":{"stages":[{"stage_id":"stage1","stage_type":"primary_query","primary_collection":"orders","intent_type":"aggregate_summary","filters":[],"group_fields":[],"metric_function":"count","metric_field":"order_id","metric_alias":"order_count","sort":[],"limit":100}]},"needs_chart":false,"chart_request":{},"answer_mode":"data"}'
              return forbidden_shape.sub(replacement, raw)

          def main(
              arg1: list,
