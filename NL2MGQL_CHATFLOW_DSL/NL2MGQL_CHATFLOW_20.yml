        title: 代码执行_构造满血LLM多轮意图识别请求
        type: code
        code: |
          import json
          UNSUPPORTED_JSON_SCHEMA_KEYS = {'uniqueItems'}
          INTENT_SCHEMA = {"type":"object","additionalProperties":False,"required":["turn_intent","need_previous_context","need_requery","need_rechart","need_analysis","can_answer_directly","reason","missing_info","chart_modification","query_refinement","analysis_focus"],"properties":{"turn_intent":{"type":"string","enum":["new_query","modify_chart","refine_query","explain_result","reanalyze_result","fix_result","continue_previous","clarify"]},"need_previous_context":{"type":"boolean"},"need_requery":{"type":"boolean"},"need_rechart":{"type":"boolean"},"need_analysis":{"type":"boolean"},"can_answer_directly":{"type":"boolean"},"reason":{"type":"string"},"missing_info":{"type":"array","items":{"type":"string"}},"chart_modification":{"type":"object","additionalProperties":True},"query_refinement":{"type":"object","additionalProperties":True},"analysis_focus":{"type":"string"},"refine_route":{"type":"string","enum":["patch","full_replan","none"]},"needed_collections":{"type":"array","items":{"type":"string"}},"keep_previous_primary":{"type":"boolean"},"collection_switch":{"type":"boolean"},"collection_reason":{"type":"string"},"unresolved_collection_terms":{"type":"array","items":{"type":"string"}}}}

          def _truncate_text(text, limit=2000):
              text = '' if text is None else str(text)
              return text if len(text) <= limit else text[:limit] + '...'

          def _read_json_text(text):
              if text is None:
                  return None
              if isinstance(text, (dict, list)):
                  return text
              raw = str(text).strip()
              if not raw:
                  return None
              return json.loads(raw)

          def _first_non_empty_string(*values):
              for value in values:
                  if isinstance(value, str) and value.strip():
                      return value.strip()
              return ''

          def _sanitize_json_schema(value):
              if isinstance(value, dict):
                  return {key: _sanitize_json_schema(item) for key, item in value.items() if key not in UNSUPPORTED_JSON_SCHEMA_KEYS}
              if isinstance(value, list):
                  return [_sanitize_json_schema(item) for item in value]
              return value

          def _to_bool(value):
              if isinstance(value, bool):
                  return value
              return str(value or '').strip().lower() in {'1','true','yes','y','on'}

          def main(status_code=0, body='', intent_prompt='', chat_url='', llm_config_json='{}', request_id='', full_llm_response_format_enabled='false', **kwargs):
              try:
                  code = int(status_code or 0)
                  if code < 200 or code >= 300:
                      raise ValueError(f"动态token获取失败, status={code}, body={_truncate_text(body, 2000)}")
                  token_body = _read_json_text(body)
                  if not isinstance(token_body, dict):
                      raise ValueError(f"动态token响应不是合法JSON: {_truncate_text(body, 1200)}")
                  token_result = token_body.get('result')
                  if token_result is None:
                      raise ValueError('TOKEN_RESULT_EMPTY')
                  if not isinstance(token_result, str):
                      raise ValueError('TOKEN_RESULT_INVALID_TYPE')
                  authorization_value = token_result.strip()
                  if not authorization_value:
                      raise ValueError('TOKEN_RESULT_EMPTY')
                  if not authorization_value.startswith('Basic '):
                      print('WARN:TOKEN_RESULT_UNEXPECTED_PREFIX')
                  if not str(chat_url or '').strip():
                      raise ValueError('missing_chat_url')
                  llm_config = _read_json_text(llm_config_json)
                  if not isinstance(llm_config, dict):
                      raise ValueError('llm_config_json 不是合法JSON对象')
                  schema = _sanitize_json_schema(INTENT_SCHEMA)
                  model = _first_non_empty_string(str(llm_config.get('model') or '').strip(), 'DeepSeek-V4-Flash')
                  prompt = str(intent_prompt or '') + '\n\n只输出 JSON object，不要 markdown、解释文字、代码块。不要输出 schema 外字段。array 字段必须输出数组，例如 []。object 字段必须输出对象，例如 {}。string 字段必须输出字符串，例如 ""。boolean 字段必须输出 true/false。不要输出 null。不要用空字符串代替 array/object。'
                  request_body = {'model':model,'messages':[{'role':'system','content':'你是多轮数据查询 Chatflow 的意图识别器。'},{'role':'user','content':prompt}],'stream':False,'temperature':0}
                  rf_enabled = _to_bool(full_llm_response_format_enabled)
                  if rf_enabled:
                      request_body['response_format'] = {'type':'json_schema','json_schema':{'name':'turn_intent_schema','strict':False,'schema':schema}}
                  debug = {
                      'request_url': str(chat_url or '').strip(),
                      'model': model,
                      'prompt_length': len(prompt),
                      'auth_present': bool(authorization_value),
                      'auth_from': 'token_response.result',
                      'auth_scheme': 'Basic' if authorization_value.startswith('Basic ') else '',
                      'auth_len': len(authorization_value),
                      'body_keys': list(request_body.keys()),
                      'response_format_enabled': rf_enabled,
                      'response_format_type': 'json_schema' if rf_enabled else '',
                      'schema_name': 'turn_intent_schema' if rf_enabled else '',
                      'schema_required': schema.get('required') or [],
                      'prompt_preview': _truncate_text(prompt, 1000),
                  }
                  return {'request_enabled':'true','chat_url':str(chat_url or '').strip(),'authorization_value':authorization_value,'llm_request_body_json':json.dumps(request_body,ensure_ascii=False),'request_id':str(request_id or '').strip(),'intent_json_schema':json.dumps(INTENT_SCHEMA,ensure_ascii=False),'debug_summary':json.dumps(debug,ensure_ascii=False)}
              except Exception as e:
                  return {'request_enabled':'false','chat_url':str(chat_url or '').strip(),'authorization_value':'','llm_request_body_json':'','request_id':str(request_id or '').strip(),'intent_json_schema':json.dumps(INTENT_SCHEMA,ensure_ascii=False),'debug_summary':_truncate_text(str(e),2000)}
        code_language: python3
