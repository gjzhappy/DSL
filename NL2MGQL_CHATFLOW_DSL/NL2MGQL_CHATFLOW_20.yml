    - data:
        desc: ''
        selected: false
        title: 代码执行_判断满血LLM意图识别状态
        type: code
        code: |
          import json,re
          ALLOWED={'new_query','modify_chart','refine_query','explain_result','reanalyze_result','fix_result','continue_previous','clarify'}
          REQ=['turn_intent','need_previous_context','need_requery','need_rechart','need_analysis','can_answer_directly','reason','missing_info','chart_modification','query_refinement','analysis_focus']
          def _loads(v): return json.loads(v) if isinstance(v,str) and v.strip() else (v if isinstance(v,dict) else {})
          def _content(body):
              d=_loads(body); ch=d.get('choices') if isinstance(d,dict) else None
              if isinstance(ch,list) and ch:
                  m=ch[0].get('message') if isinstance(ch[0],dict) else {}; return str((m or {}).get('content') or '').strip()
              return str(d.get('content') or d.get('text') or '').strip() if isinstance(d,dict) else ''
          def _obj(text):
              raw=re.sub(r'^```(?:json)?\s*|\s*```$','',str(text or '').strip(),flags=re.I|re.S); return json.loads(raw)
          def main(status_code=0, body='', error_message='', request_debug=None, **kwargs):
              code=int(status_code or 0); debug={'status_code':code,'error_message':str(error_message or ''),'request_debug':request_debug or {}}
              try:
                  if code < 200 or code >= 300: raise ValueError('http_status_not_2xx')
                  content=_content(body)
                  if not content: raise ValueError('empty_content')
                  obj=_obj(content)
                  if not isinstance(obj,dict): raise ValueError('content is not JSON object')
                  miss=[k for k in REQ if k not in obj]
                  if miss: raise ValueError('missing_required:'+','.join(miss))
                  if obj.get('turn_intent') not in ALLOWED: raise ValueError('invalid_turn_intent')
                  for k in ['need_previous_context','need_requery','need_rechart','need_analysis','can_answer_directly']:
                      if not isinstance(obj.get(k), bool): raise ValueError('invalid_bool:'+k)
                  if not isinstance(obj.get('missing_info'), list): raise ValueError('invalid_missing_info')
                  if not isinstance(obj.get('chart_modification'), dict): raise ValueError('invalid_chart_modification')
                  if not isinstance(obj.get('query_refinement'), dict): raise ValueError('invalid_query_refinement')
                  if not isinstance(obj.get('analysis_focus'), str): raise ValueError('invalid_analysis_focus')
                  text=json.dumps(obj,ensure_ascii=False)
                  return {'full_intent_ok':'true','full_intent_status_code':code,'full_intent_text':text,'full_intent_structured_json':text,'full_intent_error_message':'','full_intent_debug_json':json.dumps(debug,ensure_ascii=False)}
              except Exception as e:
                  debug['body_preview']=str(body or '')[:800]
                  return {'full_intent_ok':'false','full_intent_status_code':code,'full_intent_text':'','full_intent_structured_json':'{}','full_intent_error_message':str(e),'full_intent_debug_json':json.dumps(debug,ensure_ascii=False)}
        code_language: python3
        outputs:
          full_intent_ok:
            children:
            type: string
          full_intent_status_code:
            children:
            type: number
          full_intent_text:
            children:
            type: string
          full_intent_structured_json:
            children:
            type: string
          full_intent_error_message:
            children:
            type: string
          full_intent_debug_json:
            children:
            type: string
