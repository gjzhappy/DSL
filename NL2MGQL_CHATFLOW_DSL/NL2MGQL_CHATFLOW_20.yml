        code: |
          import json

          def _loads(value):
              if isinstance(value, dict):
                  return dict(value)
              if isinstance(value, str) and value.strip():
                  try:
                      parsed = json.loads(value)
                      return parsed if isinstance(parsed, dict) else {}
                  except Exception:
                      return {}
              return {}

          def main(question: str, collection_selection_json: str = '', collection_catalog_json: str = ''):
              selection = _loads(collection_selection_json)
              catalog = _loads(collection_catalog_json)
              warnings = selection.get('warnings') if isinstance(selection.get('warnings'), list) else []
              if not catalog.get('collections'):
                  text = '未检索到可用 schema，无法确定要查询的数据集合，请检查知识库 schema 文档。'
              else:
                  text = selection.get('clarification_question') or '无法从候选 schema 中确定本次查询的主集合，请补充说明要查询的数据对象。'
              payload = {
                  'contract_version': 'answer_payload_contract',
                  'answer_type': 'clarification',
                  'answer_text': text,
                  'chart_echarts_markdown': '',
                  'result_summary': text,
                  'message': '',
                  'chart_payload': {},
                  'query_result_profile': {'row_count': 0, 'fields': [], 'preview_rows': []},
                  'state_update': {'should_save_context': False, 'context_summary': {}},
                  'warnings': warnings,
              }
              update = {'contract_version': 'context_update_contract', 'should_save_context': False, 'compact_context': {}, 'last_context_json': '', 'warnings': warnings, 'clear_fields': []}
              return {
                  'final_answer_markdown': text,
                  'answer_payload_markdown': text,
                  'answer_payload_json': json.dumps(payload, ensure_ascii=False),
                  'context_update_json': json.dumps(update, ensure_ascii=False),
              }
