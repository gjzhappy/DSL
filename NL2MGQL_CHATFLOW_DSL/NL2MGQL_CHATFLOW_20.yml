        desc: ''
        selected: false
        title: 代码执行_判断满血LLM意图识别状态
        type: code
        code: |
          import json
          import re

          ALLOWED = {'new_query','modify_chart','refine_query','explain_result','reanalyze_result','fix_result','continue_previous','clarify'}
          REQ = ['turn_intent','need_previous_context','need_requery','need_rechart','need_analysis','can_answer_directly','reason','missing_info','chart_modification','query_refinement','analysis_focus']
          BOOL_FIELDS = ['need_previous_context','need_requery','need_rechart','need_analysis','can_answer_directly']

          def _truncate_text(text, limit=1200):
              text = '' if text is None else str(text)
              return text if len(text) <= limit else text[:limit] + '...'

          def _loads(value):
              if isinstance(value, dict):
                  return value
              if isinstance(value, str) and value.strip():
                  return json.loads(value)
              return {}

          def _extract_chat_text(resp):
              if not isinstance(resp, dict):
                  return ''
              choices = resp.get('choices')
              if isinstance(choices, list) and choices:
                  msg = choices[0].get('message') if isinstance(choices[0], dict) else {}
                  if isinstance(msg, dict):
                      return str(msg.get('content') or '').strip()
              return str(resp.get('text') or resp.get('content') or '').strip()

          def _extract_json_object_text(text):
              raw = re.sub(r'<think>.*?</think>', ' ', str(text or ''), flags=re.I | re.S).strip()
              raw = re.sub(r'^```(?:json)?\s*|\s*```$', '', raw, flags=re.I | re.S).strip()
              if not raw:
                  raise ValueError('empty_content')
              decoder = json.JSONDecoder()
              obj, end = decoder.raw_decode(raw)
              if not isinstance(obj, dict):
                  raise ValueError('content is not JSON object')
              return raw[:end]

          def _coerce_bool(value, field_name, normalized):
              if isinstance(value, bool):
                  return value
              if isinstance(value, str):
                  lowered = value.strip().lower()
                  if lowered in {'true','false'}:
                      normalized.append(field_name)
                      return lowered == 'true'
              raise ValueError('invalid_bool:' + field_name)

          def _coerce_missing_info(value, normalized):
              if isinstance(value, list):
                  if any(not isinstance(item, str) for item in value):
                      raise ValueError('invalid_missing_info')
                  return value
              if value is None or value == '':
                  normalized.append('missing_info')
                  return []
              raise ValueError('invalid_missing_info')

          def _coerce_object_field(value, field_name, normalized):
              if isinstance(value, dict):
                  return value
              if value is None or value == '':
                  normalized.append(field_name)
                  return {}
              raise ValueError('invalid_' + field_name)

          def _coerce_query_refinement(value, normalized):
              if isinstance(value, dict):
                  return value
              if value is None or value == '':
                  normalized.append('query_refinement')
                  return {}
              if isinstance(value, str):
                  text = value.strip()
                  if not text:
                      normalized.append('query_refinement')
                      return {}
                  normalized.append('query_refinement')
                  return {'summary': text}
              raise ValueError('invalid_query_refinement')

          def _coerce_chart_modification(value, normalized):
              if isinstance(value, dict):
                  return value
              if value is None or value == '':
                  normalized.append('chart_modification')
                  return {}
              if isinstance(value, str):
                  chart_type = {
                      '柱状图': 'bar', '条形图': 'bar', 'bar': 'bar', 'bar chart': 'bar', 'bar_chart': 'bar',
                      '折线图': 'line', 'line': 'line', 'line chart': 'line', 'line_chart': 'line',
                      '饼图': 'pie', 'pie': 'pie', 'pie chart': 'pie', 'pie_chart': 'pie',
                      '散点图': 'scatter', 'scatter': 'scatter', 'scatter chart': 'scatter',
                      'scatter plot': 'scatter', 'scatter_plot': 'scatter'
                  }.get(value.strip().lower())
                  if chart_type:
                      normalized.append('chart_modification')
                      return {'chart_type': chart_type}
              raise ValueError('invalid_chart_modification')

          def _normalize_refine_route(value, turn_intent, normalized):
              route = str(value or '').strip()
              allowed = {'patch','full_replan','none'}
              if route in allowed and (turn_intent == 'refine_query' or route == 'none'):
                  return route
              normalized.append('refine_route')
              return 'full_replan' if turn_intent == 'refine_query' else 'none'

          def _normalize_intent_object(obj):
              if not isinstance(obj, dict):
                  raise ValueError('content is not JSON object')
              missing = [k for k in REQ if k not in obj]
              if missing:
                  raise ValueError('missing_required:' + ','.join(missing))
              out = dict(obj)
              normalized = []
              if out.get('turn_intent') not in ALLOWED:
                  raise ValueError('invalid_turn_intent')
              for key in BOOL_FIELDS:
                  out[key] = _coerce_bool(out.get(key), key, normalized)
              if not isinstance(out.get('reason'), str):
                  raise ValueError('invalid_reason')
              out['missing_info'] = _coerce_missing_info(out.get('missing_info'), normalized)
              out['chart_modification'] = _coerce_chart_modification(out.get('chart_modification'), normalized)
              out['refine_route'] = _normalize_refine_route(out.get('refine_route'), out.get('turn_intent'), normalized)
              out['query_refinement'] = _coerce_query_refinement(out.get('query_refinement'), normalized)
              if out.get('analysis_focus') is None:
                  out['analysis_focus'] = ''
                  normalized.append('analysis_focus')
              if not isinstance(out.get('analysis_focus'), str):
                  raise ValueError('invalid_analysis_focus')
              return out, normalized

          def main(status_code=0, body='', error_message='', request_debug=None, **kwargs):
              code = int(status_code or 0)
              debug = {
                  'status_code': code,
                  'error_message': str(error_message or ''),
                  'request_debug': request_debug or {},
                  'body_preview': _truncate_text(body, 1200),
                  'content_preview': '',
                  'normalized_fields': [],
                  'checker_error': ''
              }
              try:
                  body_text = '' if body is None else str(body).strip()
                  if code < 200 or code >= 300:
                      raise ValueError('http_status_not_2xx')
                  if not body_text:
                      raise ValueError('empty_body')
                  resp = _loads(body_text)
                  content = _extract_chat_text(resp) or body_text
                  debug['content_preview'] = _truncate_text(content, 1200)
                  obj = json.loads(_extract_json_object_text(content))
                  normalized_obj, normalized_fields = _normalize_intent_object(obj)
                  debug['normalized_fields'] = normalized_fields
