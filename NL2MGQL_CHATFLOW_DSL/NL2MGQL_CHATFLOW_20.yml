          def _to_float(v, default):
              try: return float(v)
              except Exception: return default
          def _to_bool(v):
              return str(v or '').strip().lower() in {'1','true','yes','y','on'}
          def main(llm_token_url='', llm_chat_url='', llm_app_id='', llm_static_token='', llm_model='', llm_user='', llm_basic_auth='', llm_timeout_ms=600000, llm_temperature=0, llm_top_p=1, llm_max_completion_tokens=12288, llm_stream='', **kwargs):
              llm_config = {
                  'tokenUrl': str(llm_token_url or '').strip(),
                  'chatUrl': str(llm_chat_url or '').strip(),
                  'appId': str(llm_app_id or '').strip(),
                  'staticToken': str(llm_static_token or ''),
                  'model': str(llm_model or '').strip(),
                  'user': str(llm_user or '').strip(),
                  'basic_auth': str(llm_basic_auth or '').strip(),
                  'timeout-millis': _to_int(llm_timeout_ms, 600000),
                  'temperature': _to_float(llm_temperature, 0),
                  'top_p': _to_float(llm_top_p, 1),
                  'max_completion_tokens': _to_int(llm_max_completion_tokens, 12288),
                  'stream': _to_bool(llm_stream),
              }
