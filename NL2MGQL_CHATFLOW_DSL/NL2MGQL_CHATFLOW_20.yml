        title: 代码执行_构造满血LLM多轮意图识别请求
        type: code
        code: |
          import json
          UNSUPPORTED_JSON_SCHEMA_KEYS={'uniqueItems'}
          def _loads(v):
              if isinstance(v,(dict,list)): return v
              return json.loads(v) if isinstance(v,str) and v.strip() else None
          def _bool(v):
              return v if isinstance(v,bool) else str(v or '').strip().lower() in {'1','true','yes','y','on'}
          def _clean(v):
              if isinstance(v,dict): return {k:_clean(x) for k,x in v.items() if k not in UNSUPPORTED_JSON_SCHEMA_KEYS}
              if isinstance(v,list): return [_clean(x) for x in v]
              return v
          def main(status_code=0, body='', intent_prompt='', chat_url='', llm_config_json='{}', request_id='', full_llm_response_format_enabled='false', **kwargs):
              try:
                  code=int(status_code or 0)
                  if code < 200 or code >= 300: raise ValueError('token_http_failed')
                  if not str(chat_url or '').strip(): raise ValueError('missing_chat_url')
                  cfg=_loads(llm_config_json) or {}
                  if not isinstance(cfg, dict): raise ValueError('missing_llm_config')
                  token=(_loads(body) or {}).get('result')
                  if not isinstance(token,str) or not token.strip(): raise ValueError('TOKEN_RESULT_EMPTY')
                  model=str(cfg.get('model') or 'DeepSeek-V4-Flash')
                  schema={"type":"object","additionalProperties":False,"required":["turn_intent","need_previous_context","need_requery","need_rechart","need_analysis","can_answer_directly","reason","missing_info","chart_modification","query_refinement","analysis_focus"],"properties":{"turn_intent":{"type":"string","enum":["new_query","modify_chart","refine_query","explain_result","reanalyze_result","fix_result","continue_previous","clarify"]},"need_previous_context":{"type":"boolean"},"need_requery":{"type":"boolean"},"need_rechart":{"type":"boolean"},"need_analysis":{"type":"boolean"},"can_answer_directly":{"type":"boolean"},"reason":{"type":"string"},"missing_info":{"type":"array","items":{"type":"string"}},"chart_modification":{"type":"object","additionalProperties":True},"query_refinement":{"type":"object","additionalProperties":True},"analysis_focus":{"type":"string"}}}
                  prompt=(intent_prompt or '')+'\n\n只输出 JSON object，不要 markdown，不要解释文字，不要代码块，不要 schema 外字段，必须满足当前 turn_intent JSON schema。'
                  req={'model':model,'messages':[{'role':'system','content':'你是多轮数据查询 Chatflow 的意图识别器。'},{'role':'user','content':prompt}],'stream':False,'temperature':0}
                  if _bool(full_llm_response_format_enabled):
                      req['response_format']={'type':'json_schema','json_schema':{'name':'turn_intent_schema','strict':True,'schema':_clean(schema)}}
                  return {'request_enabled':'true','chat_url':str(chat_url or '').strip(),'authorization_value':token.strip(),'llm_request_body_json':json.dumps(req,ensure_ascii=False),'request_id':str(request_id or '').strip(),'intent_json_schema':json.dumps(schema,ensure_ascii=False),'debug_summary':json.dumps({'schema_name':'turn_intent_schema','response_format_enabled':_bool(full_llm_response_format_enabled)},ensure_ascii=False)}
              except Exception as e:
                  return {'request_enabled':'false','chat_url':str(chat_url or '').strip(),'authorization_value':'','llm_request_body_json':'','request_id':str(request_id or '').strip(),'intent_json_schema':'{}','debug_summary':str(e)}
