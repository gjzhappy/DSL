    - data:
        code: |
          import json
          import re

          def _loads(value, default):
              if isinstance(value, (dict, list)):
                  return value
              if isinstance(value, str) and value.strip():
                  try:
                      return json.loads(value)
                  except Exception:
                      return default
              return default

          def _list(value):
              if isinstance(value, list):
                  return [str(x).strip() for x in value if str(x).strip()]
              if isinstance(value, str) and value.strip():
                  parsed = _loads(value, None)
                  if isinstance(parsed, list):
                      return [str(x).strip() for x in parsed if str(x).strip()]
                  return [value.strip()]
              return []

          def _content(doc):
              if not isinstance(doc, dict):
                  return ''
              for key in ('content', 'text', 'page_content'):
                  if doc.get(key):
                      return str(doc.get(key) or '')
              data = doc.get('data') if isinstance(doc.get('data'), dict) else {}
              for key in ('content', 'text', 'page_content'):
                  if data.get(key):
                      return str(data.get(key) or '')
              return ''

          def _metadata(doc):
              if not isinstance(doc, dict):
                  return {}
              meta = doc.get('metadata') if isinstance(doc.get('metadata'), dict) else {}
              data = doc.get('data') if isinstance(doc.get('data'), dict) else {}
              if not meta and isinstance(data.get('metadata'), dict):
                  meta = data.get('metadata')
              return meta or {}

          def _extract_collection(doc):
              meta = _metadata(doc)
              for key in ('collection_name', 'collection'):
                  if meta.get(key):
                      return str(meta.get(key) or '').strip()
              text = _content(doc)
              patterns = [r'collection_name\s*[:=]\s*["\']?([A-Za-z0-9_\-]+)', r'collection\s*[:=]\s*["\']?([A-Za-z0-9_\-]+)']
              for pattern in patterns:
                  m = re.search(pattern, text)
                  if m:
                      return m.group(1).strip()
              try:
                  raw = json.loads(text)
                  if isinstance(raw, dict) and raw.get('collection_name'):
                      return str(raw.get('collection_name') or '').strip()
              except Exception:
                  pass
              return ''

          def main(hydrated_results=None, expected_collections=None):
              expected = _list(expected_collections)
              expected_set = set(expected)
              merged_docs = []
              actual = []
              warnings = []
              for raw in hydrated_results or []:
                  item = _loads(raw, {})
                  requested = str(item.get('collection_name') or '').strip()
                  docs = item.get('docs') if isinstance(item.get('docs'), list) else []
                  if not docs:
                      warnings.append({'type': 'schema_hydration_empty_retrieval', 'collection_name': requested})
                  for doc in docs:
                      if not isinstance(doc, dict):
                          continue
                      cname = _extract_collection(doc) or requested
                      if cname and cname not in actual:
                          actual.append(cname)
                      if expected_set and cname and cname not in expected_set:
                          warnings.append({'type': 'schema_hydration_unexpected_collection', 'collection_name': cname, 'requested_collection': requested})
                      merged_docs.append(doc)
              missing = [name for name in expected if name not in set(actual)]
              complete = bool(expected) and not missing
              summary = {
                  'expected_collections': expected,
                  'actual_collections': actual,
                  'missing_collections': missing,
                  'schema_hydration_complete': complete,
                  'warnings': warnings,
              }
              return {
                  'result': merged_docs,
                  'hydration_expected_collections_json': json.dumps(expected, ensure_ascii=False),
                  'hydration_actual_collections_json': json.dumps(actual, ensure_ascii=False),
                  'hydration_missing_collections_json': json.dumps(missing, ensure_ascii=False),
                  'schema_hydration_complete': complete,
                  'schema_hydration_summary_json': json.dumps(summary, ensure_ascii=False),
                  'hydration_warnings_json': json.dumps(warnings, ensure_ascii=False),
              }
        code_language: python3
        desc: 合并逐 collection schema retrieval 结果，计算 expected/actual/missing；missing 非空时由后续裁剪节点阻断 planner。
        outputs:
          result:
            type: array[object]
          hydration_expected_collections_json:
            children:
            type: string
          hydration_actual_collections_json:
            children:
            type: string
          hydration_missing_collections_json:
            children:
            type: string
          schema_hydration_complete:
            children:
            type: boolean
          schema_hydration_summary_json:
            children:
            type: string
          hydration_warnings_json:
            children:
            type: string
        selected: false
        title: 代码执行_合并HydratedCandidateSchemas
        type: code
        variables:
        - value_selector:
          - '1791000000001'
