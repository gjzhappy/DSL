        type: code
        code: |
          import json, time, traceback, urllib.error, urllib.request
          MAX_RETRY=2
          RETRYABLE={500,502,503,504}
          def _text(v): return '' if v is None else str(v)
          def _prompt_length(messages):
              if not isinstance(messages,list): return 0
              return sum(len(_text(item.get('content'))) for item in messages if isinstance(item,dict))
          def _loads(v):
              if isinstance(v,dict): return v
              if isinstance(v,str) and v.strip(): return json.loads(v)
              raise ValueError('llm_request_body_json empty')
          def _tracer_id(text, headers):
              for key in ['x-trace-id','x-request-id','trace-id','request-id']:
                  for actual,value in (headers or {}).items():
                      if str(actual).lower()==key and value: return _text(value)
              try:
                  obj=json.loads(text)
                  if isinstance(obj,dict): return _text(obj.get('tracer_id') or obj.get('trace_id') or obj.get('request_id'))
              except Exception: pass
              return ''
          def _post(url,data,auth,timeout=70):
              req=urllib.request.Request(url,data=data,headers={'Content-Type':'application/json','Authorization':auth},method='POST')
              try:
                  with urllib.request.urlopen(req,timeout=timeout) as r:
                      return int(getattr(r,'status',0) or 0), r.read().decode('utf-8','replace'), dict(r.headers.items()), ''
              except urllib.error.HTTPError as e:
                  return int(getattr(e,'code',0) or 0), e.read().decode('utf-8','replace'), dict(e.headers.items()) if getattr(e,'headers',None) else {}, ''
              except Exception as e:
                  return 0,'',{},str(e)
          def main(chat_url='', authorization_value='', llm_request_body_json='', request_id='', **kwargs):
              out={'status_code':0,'ok':False,'body':'','body_preview':'','headers_json':'{}','error_message':'','request_debug':{},'retry_count':0,'tracer_id':'','last_status_code':0,'last_error_message':'','request_id':str(request_id or '')}
              try:
                  body=_loads(llm_request_body_json)
                  data=json.dumps(body,ensure_ascii=False).encode('utf-8')
                  messages=body.get('messages') or []
                  response_format=body.get('response_format') if isinstance(body.get('response_format'),dict) else {}
                  json_schema=response_format.get('json_schema') if isinstance(response_format.get('json_schema'),dict) else {}
                  auth=_text(authorization_value)
                  out['request_debug']={'url':_text(chat_url),'auth_present':bool(auth),'auth_scheme':auth.split(' ',1)[0] if ' ' in auth else ('unknown' if auth else ''),'auth_len':len(auth),'model':body.get('model'),'body_keys':list(body.keys()),'messages_count':len(messages) if isinstance(messages,list) else 0,'prompt_length':_prompt_length(messages),'response_format_enabled':'response_format' in body,'response_format_type':response_format.get('type') if isinstance(response_format,dict) else None,'schema_name':_text(json_schema.get('name')) if isinstance(json_schema,dict) else '','timeout_sec':70,'request_id':str(request_id or '')}
                  last=(0,'',{},'')
                  retry=0
                  for i in range(MAX_RETRY+1):
                      last=_post(_text(chat_url),data,auth)
                      code,text,headers,err=last
                      if 200 <= code < 300 or code not in RETRYABLE or i == MAX_RETRY: break
                      retry += 1; time.sleep([1,3][i])
                  code,text,headers,err=last
                  out.update({'status_code':code,'ok':200<=code<300,'body':text,'body_preview':text[:4000],'headers_json':json.dumps(headers,ensure_ascii=False),'retry_count':retry,'tracer_id':_tracer_id(text,headers),'last_status_code':code})
                  if not out['ok']:
                      out['error_message']=err or ('HTTP_ERROR status=%s retry_count=%s'%(code,retry)); out['last_error_message']=out['error_message']
                  return out
              except Exception as e:
                  out['error_message']='REQUEST_FAILED: '+str(e); out['last_error_message']=out['error_message']; out['body_preview']=traceback.format_exc()[:4000]; return out
        code_language: python3
