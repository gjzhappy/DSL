                  'pipeline_json': '[]',
                  'request_body_json': '{}',
                  'query_result_json': '{}',
                  'rows_json': '[]',
                  'row_count': 0,
                  'fields_json': '[]',
                  'compile_warnings_json': '[]',
                  'execution_error': str(error or ''),
                  'compiler_debug_json': '{}',
