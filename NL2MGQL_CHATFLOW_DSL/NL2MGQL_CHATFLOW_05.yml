                      'query_request_body': request_body,
                      'query_status_code': status_code,
                      'query_response_body': response_body,
                      'query_response_headers': response_headers,
                      'rows': rows,
                      'skipped': bool(skip_query),
                      'skip_reason': reason,
                  }
                  stage_execution_trace.append(trace_item)
                  stage_outputs[stage['stage_name']] = trace_item

              execution_mode = normalized_execution_plan.get('execution_mode')
              final_merge = normalized_execution_plan.get('final_merge') or {}
              if execution_mode == 'multi_stage' and final_merge.get('left_stage') and final_merge.get('right_stage'):
                  left_rows = (stage_outputs.get(final_merge['left_stage']) or {}).get('rows') or []
                  right_rows = (stage_outputs.get(final_merge['right_stage']) or {}).get('rows') or []
                  merged_rows = _merge_rows(left_rows, right_rows, final_merge.get('left_field'), final_merge.get('right_field'), final_merge.get('attach_as') or 'related_info')
              else:
                  first_stage_name = normalized_execution_plan['stages'][0]['stage_name']
                  merged_rows = (stage_outputs.get(first_stage_name) or {}).get('rows') or []
              visualization = normalized_execution_plan.get('visualization') or {}
              chart_decision = _choose_chart_type(visualization, merged_rows, {'bar', 'line', 'pie'})
              chart_option = _build_echarts_option(visualization, merged_rows)
              chart_x_field = str(chart_decision.get('x_field') or '')
              chart_y_field = str(chart_decision.get('y_field') or '')
              chart_enabled, chart_option, chart_markdown, chart_x_field, chart_y_field, chart_type_final, chart_warning = _build_chart_payload(visualization, merged_rows, {'bar', 'line', 'pie'}, normalized_execution_plan, question)
              if chart_enabled and chart_option:
                  viz_out = normalized_execution_plan.setdefault('visualization', {})
                  chart_stage0 = ((normalized_execution_plan.get('stages') or [{}])[0] or {})
                  metric_alias_for_chart = str(chart_stage0.get('metric_alias') or '').strip()
