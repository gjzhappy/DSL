          def _result_profile(rows):
              rows = rows if isinstance(rows, list) else []
              fields = []
              numeric_fields = []
              dimension_fields = []
              for row in rows:
                  if not isinstance(row, dict):
                      continue
                  for key in row.keys():
                      name = str(key)
                      if name not in fields:
                          fields.append(name)
              for name in fields:
                  vals = [row.get(name) for row in rows if isinstance(row, dict) and row.get(name) is not None]
                  if vals and all(isinstance(v, (int, float)) and not isinstance(v, bool) for v in vals):
                      numeric_fields.append(name)
                  else:
                      dimension_fields.append(name)
              return {
                  'row_count': len(rows),
                  'fields': fields,
                  'numeric_fields': numeric_fields,
                  'dimension_fields': dimension_fields,
                  'preview_rows': rows[:10],
              }


          def _select_compiler_plan(semantic_plan, validator_result_json=None):
              debug = {'plan_source': '', 'legacy_unvalidated_plan_fallback': False, 'legacy_compiler_resolution_used': False}
              validator_result = _ensure_obj(validator_result_json, 'validator_result') if validator_result_json else {}
              for key in ('normalized_plan_json', 'normalized_semantic_plan_json', 'semantic_plan_json'):
                  raw = validator_result.get(key) if isinstance(validator_result, dict) else None
                  if isinstance(raw, str) and raw.strip():
                      debug['plan_source'] = 'validator_result.' + key
                      return _ensure_obj(raw, key), debug
                  if isinstance(raw, dict) and raw:
                      debug['plan_source'] = 'validator_result.' + key
                      return raw, debug
              plan = _ensure_obj(semantic_plan, 'semantic_plan')
              if plan:
                  debug['plan_source'] = 'validator.normalized_plan_json_input'
                  return plan, debug
              debug['legacy_unvalidated_plan_fallback'] = True
              debug['plan_source'] = 'empty_or_legacy_unvalidated_fallback'
              return {}, debug


          def _schema_from_runtime(schema_runtime_context_json='', schema_metadata_json='', schema_alias_index_json='', fallback_context=''):
              ctx = _ensure_obj(schema_runtime_context_json, 'schema_runtime_context_json') if schema_runtime_context_json else {}
              meta = _ensure_obj(ctx.get('schema_metadata_json'), 'runtime.schema_metadata_json') if isinstance(ctx, dict) and ctx.get('schema_metadata_json') else {}
              alias = _ensure_obj(ctx.get('schema_alias_index_json'), 'runtime.schema_alias_index_json') if isinstance(ctx, dict) and ctx.get('schema_alias_index_json') else {}
              if not meta and schema_metadata_json:
                  meta = _ensure_obj(schema_metadata_json, 'schema_metadata_json')
              if not _alias_index_has_content(alias) and schema_alias_index_json:
                  alias = _ensure_obj(schema_alias_index_json, 'schema_alias_index_json')
              if not meta:
                  meta = extract_schema_metadata(fallback_context)
              if not _alias_index_has_content(alias):
                  alias = build_alias_index(meta)
              return meta, alias


          def _sync_limit(validated_ast, pipeline):
              limit = 0
              if isinstance(pipeline, list):
                  for stage in pipeline:
                      if isinstance(stage, dict) and '$limit' in stage:
                          try: limit = int(stage.get('$limit') or 0)
                          except Exception: limit = 0
              if isinstance(validated_ast, dict) and limit > 0:
                  validated_ast['limit'] = limit
              return validated_ast


          def _projection_aliases_from_ast(validated_ast):
              aliases = []
              if not isinstance(validated_ast, dict):
                  return aliases
              for item in validated_ast.get('projection') or []:
                  if isinstance(item, dict):
                      alias = str(item.get('alias') or item.get('field') or '').strip()
                      if alias and alias not in aliases:
                          aliases.append(alias)
              return aliases

          def _ensure_primary_projection_fields_for_enrich(stage, plan, validated_ast, pipeline):
              if not isinstance(stage, dict) or str(stage.get('stage_type') or '') != 'primary_query' or str(stage.get('intent_type') or '') != 'aggregate_summary':
                  return validated_ast, pipeline
              required = []
              for gb in stage.get('group_fields') or stage.get('group_by') or []:
                  if isinstance(gb, dict):
                      name = str(gb.get('alias') or gb.get('field') or '').strip()
                  else:
                      name = str(gb or '').strip()
                  if name and name not in required:
                      required.append(name)
              for metric in stage.get('aggregations') or stage.get('metrics') or []:
                  if isinstance(metric, dict):
                      name = str(metric.get('alias') or metric.get('metric_alias') or metric.get('name') or '').strip()
                      if name and name not in required:
                          required.append(name)
              metric_alias = str(stage.get('metric_alias') or '').strip()
              if metric_alias and metric_alias not in required:
                  required.append(metric_alias)
              final_merge = plan.get('final_merge') if isinstance(plan, dict) and isinstance(plan.get('final_merge'), dict) else {}
              left_stage = str(final_merge.get('left_stage') or '').strip()
              stage_name = str(stage.get('stage_name') or '').strip()
              if (not left_stage) or left_stage == stage_name:
                  for name in (final_merge.get('left_field'),):
                      name = str(name or '').strip()
                      if name and name not in required:
                          required.append(name)
                  for enrich_stage in plan.get('stages') or [] if isinstance(plan, dict) else []:
                      if isinstance(enrich_stage, dict) and str(enrich_stage.get('stage_type') or '') == 'enrich_related':
                          dep = str(enrich_stage.get('depends_on') or left_stage or '').strip()
                          if (not dep) or dep == stage_name:
                              name = str(enrich_stage.get('join_source_field') or '').strip()
                              if name and name not in required:
                                  required.append(name)
              if not required:
                  return validated_ast, pipeline
              aliases = _projection_aliases_from_ast(validated_ast)
              changed = False
              for name in required:
                  if name not in aliases:
                      validated_ast.setdefault('projection', []).append({'collection': stage.get('collection') or '', 'field': name, 'alias': name})
                      aliases.append(name)
                      changed = True
              if isinstance(pipeline, list):
                  for st in reversed(pipeline):
                      if isinstance(st, dict) and isinstance(st.get('$project'), dict):
                          project = st['$project']
                          for name in required:
                              if name not in project:
                                  project[name] = '$' + name
                                  changed = True
                          break
              if changed:
                  stage['projection_fields'] = aliases
              return validated_ast, pipeline

          def _dedupe_validated_ast_projection(validated_ast):
              if not isinstance(validated_ast, dict):
                  return validated_ast
              projection = validated_ast.get('projection')
              if not isinstance(projection, list) or not projection:
                  return validated_ast
              names = []
              for item in projection:
                  if isinstance(item, dict):
                      name = str(item.get('alias') or item.get('field') or '').strip()
                  else:
                      name = str(item or '').strip()
                  if name:
                      names.append(name)
              cleaned_names, dropped_names = _dedupe_projection_path_collisions(names)
              if not dropped_names:
                  return validated_ast
              cleaned_set = set(cleaned_names)
              new_projection = []
              for item in projection:
                  if isinstance(item, dict):
                      name = str(item.get('alias') or item.get('field') or '').strip()
                  else:
                      name = str(item or '').strip()
                  if name in cleaned_set:
                      new_projection.append(item)
              validated_ast['projection'] = new_projection
              return validated_ast


          def _dedupe_pipeline_project_path_collisions(pipeline):
              if not isinstance(pipeline, list):
                  return pipeline
              for stage in pipeline:
                  if not isinstance(stage, dict) or not isinstance(stage.get('$project'), dict):
                      continue
                  project = stage['$project']
                  keys = [k for k in project.keys() if k != '_id']
                  _, dropped_keys = _dedupe_projection_path_collisions(keys)
                  for key in dropped_keys:
                      project.pop(key, None)
              return pipeline


          def _dedupe_equivalent_project(pipeline):
              out=[]
              for st in pipeline or []:
                  if out and isinstance(st,dict) and isinstance(out[-1],dict) and '$project' in st and '$project' in out[-1] and st.get('$project') == out[-1].get('$project'):
                      continue
                  out.append(st)
              return out


          def main(semantic_plan, planner, question: str, schema_context: str, query_urls: str, validator_route: str='valid', validator_result_json: str='', schema_runtime_context_json: str='', schema_metadata_json: str='', schema_alias_index_json: str=''):
              if str(validator_route or '').strip() != 'valid':
                  out = _compiler_contract_defaults('validator_route is not valid; compiler execution is blocked')
                  out['question'] = str(question or '').strip()
                  out['compiler_debug_json'] = _safe_json_dumps({'validator_route': str(validator_route or ''), 'blocked_before_compile': True})
                  return out
              plan, compiler_debug = _select_compiler_plan(semantic_plan, validator_result_json)
              if not plan:
                  out = _compiler_contract_defaults('compiler received empty validator normalized plan')
                  out['question'] = str(question or '').strip()
                  out['compiler_debug_json'] = _safe_json_dumps(compiler_debug)
