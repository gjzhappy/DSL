              meta = _schema_metadata_from_plan(normalized_plan)
              collection_name = _collection_from_normalized_plan(normalized_plan)
              if role == 'metric':
                  return resolve_metric_label(field, meta, collection_name)
              return resolve_field_label(field, meta, collection_name)


          def build_short_chart_title(normalized_plan=None, visualization=None, chart_type='', x_field='', y_field='', question=''):
              visualization = visualization or {}
              stages = (normalized_plan or {}).get('stages') or []
              stage0 = stages[0] if stages and isinstance(stages[0], dict) else {}
              raw_title = str(visualization.get('title') or '').strip()
              question = str(question or '').strip()
              group_fields = stage0.get('group_fields') or []
              dim_src = str((group_fields[0] if group_fields else '') or x_field or visualization.get('x_field') or '').strip()
              metric_src = str(stage0.get('metric_alias') or y_field or visualization.get('y_field') or '').strip()
              dim = _field_label_from_plan(normalized_plan, dim_src)
              metric = _field_label_from_plan(normalized_plan, metric_src, 'metric')

              # Preserve an explicit chart_request title when it is not just the full user question.
              if raw_title and raw_title != question and len(raw_title) <= 48:
                  return raw_title[:32]

              chart_kind = str(chart_type or visualization.get('chart_type') or '').lower()
              if chart_kind == 'line':
                  suffix = '趋势'
              elif chart_kind == 'pie':
                  suffix = '分布'
              else:
                  suffix = '对比'
              if dim and metric:
                  return ('按' + dim + '统计' + metric)[:32]
              if dim:
                  return (dim + suffix)[:32]
              if metric:
                  return (metric + suffix)[:32]
              return '统计结果' + suffix

