    - data:
        code: |
          import json, re
          def _strip(s):
              s='' if s is None else str(s).strip()
              m=re.match(r'^```(?:json)?\s*([\s\S]*?)\s*```$', s)
              return m.group(1).strip() if m else s
          def main(status_code=0, body='', headers=None) -> dict:
              try:
                  status=int(status_code or 0)
                  if status and not (200 <= status < 300):
                      return {'success':False,'content':'','error':'HTTP status %s'%status,'raw_response':{}}
                  if not body:
                      return {'success':False,'content':'','error':'empty body','raw_response':{}}
                  raw=json.loads(body) if isinstance(body,str) else (body or {})
                  if not status and isinstance(raw,dict):
                      alt_status=raw.get('status_code') or raw.get('status')
                      if alt_status:
                          status=int(alt_status or 0)
                          if status and not (200 <= status < 300):
                              return {'success':False,'content':'','error':'HTTP status %s'%status,'raw_response':raw}
                  content=''
                  if isinstance(raw,dict):
                      ch=raw.get('choices') or []
                      if ch and isinstance(ch[0],dict):
                          msg=ch[0].get('message') or {}
                          content=msg.get('content') if isinstance(msg,dict) else ''
                          content=content or ch[0].get('text') or ''
                      content=content or raw.get('content') or raw.get('text') or ''
                  content=_strip(content)
                  if not content:
                      return {'success':False,'content':'','error':'empty content','raw_response':raw if isinstance(raw,dict) else {}}
                  json.loads(_strip(content))
                  return {'success':True,'content':content,'error':'','raw_response':raw if isinstance(raw,dict) else {}}
              except Exception as e:
                  return {'success':False,'content':'','error':str(e),'raw_response':{}}
