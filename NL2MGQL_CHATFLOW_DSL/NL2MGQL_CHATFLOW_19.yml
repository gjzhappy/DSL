    - data:
        code: |
          import hashlib
          import json
          import re

          def _loads(v, default=None):
              if default is None:
                  default = {}
              if isinstance(v, (dict, list)):
                  return v
              if isinstance(v, str) and v.strip():
                  try:
                      return json.loads(v)
                  except Exception:
                      return default
              return default

          def _dumps(v):
              return json.dumps(v if v is not None else {}, ensure_ascii=False, separators=(',', ':'))

          def _is_ast_like(obj):
              if not isinstance(obj, dict):
                  return False
              if 'collection' in obj and any(k in obj for k in ('filters', 'group_by', 'sort', 'limit')):
                  return True
              return False

          def _looks_like_schema_doc(obj):
              if not isinstance(obj, dict): return False
              if _is_ast_like(obj): return False
              if str(obj.get('metadata_type') or '').strip() == 'mongo_schema': return True
              if str(obj.get('contract_version') or '').strip() == 'schema_metadata_contract': return True
              if obj.get('collection_name') and any(k in obj for k in ('fields', 'metrics', 'relations', 'query_rules', 'default_time_field', 'primary_key')): return True
              if isinstance(obj.get('collections'), dict): return True
              return False

          def _extract_fenced_blocks(text):
              blocks = []
              if not isinstance(text, str):
                  return blocks
              pattern = re.compile(r'```([^\n`]*)\n(.*?)```', flags=re.S)
              for m in pattern.finditer(text):
                  raw_lang = (m.group(1) or '').strip()
                  lang = raw_lang.lower().split()[0] if raw_lang else ''
                  body = (m.group(2) or '').strip()
                  blocks.append({'lang': lang, 'raw_lang': raw_lang, 'body': body})
              return blocks

          def _extract_schema_objects(text, warnings=None, errors=None):
              out = []
              blocks = _extract_fenced_blocks(text)
              json_blocks = [b for b in blocks if b.get('lang') == 'json']
              if not json_blocks:
                  if errors is not None: errors.append({'type': 'hydration_json_schema_block_missing'})
                  if warnings is not None: warnings.append({'type': 'hydration_json_schema_block_missing', 'action': 'fail_safe_no_schema_output'})
                  return out
              for b in json_blocks:
                  try:
                      obj = json.loads(b.get('body') or '')
                  except Exception as e:
                      if warnings is not None: warnings.append({'type': 'hydration_json_block_parse_failed', 'error': str(e)[:300]})
                      continue
                  if _looks_like_schema_doc(obj):
                      out.append(obj)
                  elif warnings is not None:
                      warnings.append({'type': 'hydration_non_schema_json_block_skipped'})
              if not out:
                  if errors is not None: errors.append({'type': 'hydration_json_schema_metadata_not_found'})
                  if warnings is not None: warnings.append({'type': 'hydration_json_schema_metadata_not_found', 'action': 'fail_safe_no_schema_output'})
              return out
          def _first_non_empty(*vals):
              for v in vals:
                  s = str(v or '').strip()
                  if s: return s
              return ''

          def _iter_named_items(container, name_keys):
              if not container: return
              if isinstance(container, dict):
                  for key, val in container.items():
                      if isinstance(val, dict): name = _first_non_empty(*(val.get(k) for k in name_keys), key); item = val
                      else: name = str(key or '').strip(); item = {'name': name, 'label': str(val or '').strip()}
                      if name: yield name, item
                  return
              if isinstance(container, list):
                  for item in container:
                      if isinstance(item, dict):
                          name = _first_non_empty(*(item.get(k) for k in name_keys))
                          if name: yield name, item

          def _iter_alias_entries(container):
              if not container: return
              if isinstance(container, dict):
                  for key, val in container.items():
                      alias = str(key or '').strip()
                      if not alias: continue
                      yield alias, _first_non_empty(*([val.get(k) for k in ('value','name','canonical','field','label')] if isinstance(val, dict) else [val]), alias), val if isinstance(val, dict) else {}
                  return
              if isinstance(container, list):
                  for item in container:
                      if isinstance(item, dict): alias = _first_non_empty(item.get('alias'), item.get('name'), item.get('label'), item.get('value')); value = _first_non_empty(item.get('value'), item.get('canonical'), item.get('name'), item.get('label'), alias)
                      else: alias = str(item or '').strip(); value = alias
                      if alias: yield alias, value, item if isinstance(item, dict) else {}
                  return
              alias = str(container or '').strip()
              if alias: yield alias, alias, {}

          def _normalize_collection(cname, coll):
              coll = dict(coll or {}) if isinstance(coll, dict) else {}
              coll.setdefault('collection_name', cname)
              coll.setdefault('fields', {})
              coll.setdefault('metrics', {})
              coll.setdefault('relations', [])
              coll.setdefault('array_fields', [])
              coll.setdefault('query_rules', {})
              return coll

          def _add_alias(idx, alias, collection, kind, name, label='', source='', field=None):
              alias = str(alias or '').strip()
              if not alias: return
              item = {'collection': collection, 'kind': kind, 'name': name, 'label': str(label or '').strip(), 'confidence': 1.0, 'source': source}
              if field: item['field'] = field
              bucket = idx.setdefault(alias, [])
              if not any(x.get('collection') == collection and x.get('kind') == kind and x.get('name') == name and x.get('field') == field for x in bucket):
                  bucket.append(item)

          def _build_alias(meta):
              aliases, ca, fa, ma, va = {}, {}, {}, {}, {}
              for cname, coll in _iter_named_items((meta.get('collections') or {}), ['collection_name', 'name']):
                  coll = coll if isinstance(coll, dict) else {}
                  _add_alias(aliases, cname, cname, 'collection', cname, coll.get('collection_label'), 'collection.name')
                  _add_alias(ca, cname, cname, 'collection', cname, coll.get('collection_label'), 'collection.name')
                  _add_alias(aliases, coll.get('collection_label'), cname, 'collection', cname, coll.get('collection_label'), 'collection.label')
                  _add_alias(ca, coll.get('collection_label'), cname, 'collection', cname, coll.get('collection_label'), 'collection.label')
                  for a, _, _ in _iter_alias_entries(coll.get('collection_aliases')):
                      _add_alias(aliases, a, cname, 'collection', cname, coll.get('collection_label'), 'collection.aliases')
                      _add_alias(ca, a, cname, 'collection', cname, coll.get('collection_label'), 'collection.aliases')
                  for fname, f in _iter_named_items(coll.get('fields') or {}, ['name', 'field_name']):
                      f = f if isinstance(f, dict) else {}
                      for a, src in ((fname, 'field.name'), (f.get('label'), 'field.label')):
                          _add_alias(aliases, a, cname, 'field', fname, f.get('label'), src); _add_alias(fa, a, cname, 'field', fname, f.get('label'), src)
                      for a, _, _ in _iter_alias_entries(f.get('aliases')):
                          _add_alias(aliases, a, cname, 'field', fname, f.get('label'), 'field.aliases'); _add_alias(fa, a, cname, 'field', fname, f.get('label'), 'field.aliases')
                      for va0, cv, _ in _iter_alias_entries(f.get('value_aliases')):
                          _add_alias(aliases, va0, cname, 'value', cv, va0, 'field.value_aliases', field=fname); _add_alias(va, va0, cname, 'value', cv, va0, 'field.value_aliases', field=fname)
                  for mname, m in _iter_named_items(coll.get('metrics') or {}, ['name', 'metric_name']):
                      m = m if isinstance(m, dict) else {}
                      for a, src in ((mname, 'metric.name'), (m.get('label'), 'metric.label')):
                          _add_alias(aliases, a, cname, 'metric', mname, m.get('label'), src); _add_alias(ma, a, cname, 'metric', mname, m.get('label'), src)
                      for a, _, _ in _iter_alias_entries(m.get('aliases')):
                          _add_alias(aliases, a, cname, 'metric', mname, m.get('label'), 'metric.aliases'); _add_alias(ma, a, cname, 'metric', mname, m.get('label'), 'metric.aliases')
              return {'contract_version': 'schema_alias_index_contract', 'aliases': aliases, 'collection_aliases': ca, 'field_aliases': fa, 'metric_aliases': ma, 'value_aliases': va, 'warnings': []}

          def _digest(meta):
              clone = json.loads(json.dumps(meta, ensure_ascii=False))
              clone.pop('schema_digest', None)
              payload = json.dumps(clone, ensure_ascii=False, sort_keys=True, separators=(',', ':'))
              return hashlib.sha256(payload.encode('utf-8')).hexdigest()

          def _as_ref_list(v):
              if isinstance(v, list): return [str(x).strip() for x in v if str(x).strip()]
              if isinstance(v, str) and v.strip(): return [x.strip() for x in v.split(',') if x.strip()]
              return []
          def _prune_ref_to_parsed(ref, meta, warnings):
              ref = dict(ref or {})
              parsed = set((meta.get('collections') or {}).keys()) if isinstance(meta, dict) else set()
              requested = _as_ref_list(ref.get('collections'))
              if parsed and requested:
                  kept = [c for c in requested if c in parsed]
                  removed = [c for c in requested if c not in parsed]
                  if removed:
                      warnings.append({'type': 'schema_context_ref_pruned_to_parsed_collections', 'removed': removed, 'reason': 'requested collection was not parsed into schema_metadata.collections'})
                  ref['collections'] = kept
              return ref

          def main(hydrated_schema_results=None, hydration_collections=None, compact_context_json='{}', hydration_warnings_json='[]'):
              warnings = _loads(hydration_warnings_json, []) or []
              errors = []
              collections = {}
              compact = _loads(compact_context_json, {}) or {}
              ref = compact.get('schema_context_ref') if isinstance(compact.get('schema_context_ref'), dict) else {}
              wanted = [str(c or '').strip() for c in (hydration_collections or []) if str(c or '').strip()]
              if not wanted:
                  wanted = _as_ref_list(ref.get('collections'))
              wanted_set = set(wanted)

              def _add_collection(cname, coll, item_collection=''):
                  cname = str(cname or '').strip()
                  item_collection = str(item_collection or '').strip()
                  if not cname:
                      warnings.append({'type': 'hydrated_schema_collection_missing', 'action': 'discarded'}); return
                  if item_collection and cname != item_collection:
                      warnings.append({'type': 'hydrated_schema_collection_mismatch', 'expected': item_collection, 'actual': cname, 'action': 'discarded'}); return
                  if wanted_set and cname not in wanted_set:
                      warnings.append({'type': 'hydrated_schema_collection_mismatch', 'expected': wanted, 'actual': cname, 'action': 'discarded'}); return
                  collections[cname] = _normalize_collection(cname, coll)

              for raw in hydrated_schema_results or []:
                  item = _loads(raw, {}) or {}
                  cname_hint = str(item.get('collection_name') or '').strip()
                  text = str(item.get('context_text') or '')
                  for obj in _extract_schema_objects(text, warnings, errors):
                      if isinstance(obj, dict) and 'collections' in obj:
                          for cname, coll in _iter_named_items(obj.get('collections'), ['collection_name', 'name']):
                              _add_collection(cname, coll, cname_hint)
                      elif isinstance(obj, dict) and _looks_like_schema_doc(obj):
                          cname = str(obj.get('collection_name') or '').strip()
                          _add_collection(cname, obj, cname_hint)
                      else:
                          warnings.append({'type': 'hydration_non_schema_json_skipped', 'reason': 'json_object_does_not_look_like_schema_metadata'})
              if not collections:
                  errors.append({'type': 'hydrated_schema_metadata_empty'})
              meta = {'contract_version': 'schema_metadata_contract', 'schema_version': '', 'schema_digest': '', 'collections': collections, 'warnings': warnings, 'parse_errors': errors}
              meta['schema_digest'] = _digest(meta)
              alias = _build_alias(meta)
              if ref.get('schema_digest') and ref.get('schema_digest') != meta['schema_digest']:
                  warnings.append('hydrated_schema_digest_mismatch_with_compact_ref')
              version = str(meta.get('schema_version') or ref.get('schema_version') or '').strip()
              catalog_digest = str(ref.get('catalog_digest') or '').strip()
              context_ref = {'collections': wanted or list(collections.keys()), 'schema_digest': meta['schema_digest'], 'schema_version': version, 'catalog_digest': catalog_digest}
              context_ref = _prune_ref_to_parsed(context_ref, meta, warnings)
              return {
                  'hydrated_schema_metadata_json': _dumps(meta),
                  'hydrated_schema_alias_index_json': _dumps(alias),
                  'hydrated_schema_digest': meta['schema_digest'],
                  'hydrated_schema_version': version,
                  'hydrated_schema_context_ref_json': _dumps(context_ref),
                  'hydration_success': bool(collections) and not errors,
                  'hydration_warnings_json': _dumps(warnings),
                  'hydration_errors_json': _dumps(errors),
              }
