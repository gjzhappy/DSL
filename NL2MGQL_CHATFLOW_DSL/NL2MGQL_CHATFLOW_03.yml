                  "仍然必须输出 semantic_plan_contract JSON；",
                  "requires_clarification=true；",
                  "clarification_question 写需要澄清的问题；",
                  "不要输出自然语言解释。",
              ])
              prompt_body = f"用户问题:\n{question}\n\nSchema上下文:\n{schema_context}{refine_context}{planning_rules}"
              prompt_body = limit_text(prompt_body, output_limits['semantic_plan_user_prompt'] - len(json_only_closure), 'semantic_plan_user_prompt_body')
              semantic_plan_user_prompt = prompt_body + json_only_closure
              semantic_plan_user_prompt = limit_text(semantic_plan_user_prompt, output_limits['semantic_plan_user_prompt'], 'semantic_plan_user_prompt')
              llm_config = {
                  "tokenUrl": str(llm_token_url or "").strip(),
