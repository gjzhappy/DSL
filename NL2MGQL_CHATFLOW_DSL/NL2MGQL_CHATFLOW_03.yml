                      'relation_targets': orders_names['relation_targets'],
                  },
                  'products': {
                      'has_product_name': 'product_name' in products_names['fields'],
                      'has_category': 'category' in products_names['fields'],
                      'has_brand': 'brand' in products_names['fields'],
                      'relation_targets': products_names['relation_targets'],
                  },
                  'has_join_key_orders_product_name_to_products_product_name': any(
                      r.get('target_collection') == 'products' and any(j.get('source_field') == 'product_name' and j.get('target_field') == 'product_name' for j in r.get('join_keys') or [])
                      for r in ((compact_schema.get('collections', {}).get('orders') or {}).get('relations') or [])
                  ),
              }
              compact_schema_check_json = limit_text(json.dumps({'compact_schema_check': compact_schema_check}, ensure_ascii=False, separators=(',', ':')), 5000)
              schema_context = (
                  f"### 用户问题\n{question}\n\n"
                  f"### current_date\n{effective_current_date}\n\n"
                  f"### timezone\n{effective_timezone}\n\n"
                  f"### collection_selection_json（primary_collection 必须来自 selected_primary_collection）\n{collection_selection_text}\n\n"
                  f"### collection_selection_context（只用于约束 collection，不是最终查询计划）\n"
                  f"该 JSON 不是 semantic_plan_contract。不得直接复制该 JSON 作为最终输出。最终必须生成新的 semantic_plan_contract。\n{planner_json}\n\n"
                  f"### compact_schema_context（仅含 planner 必需字段/指标/relation/query_rules；禁止猜测未列字段）\n{compact_schema_json}\n\n"
                  f"### compact_schema_check\n{compact_schema_check_json}\n\n"
                  f"### compact_context_json（弱上下文；不得继承用户已否定字段）\n{compact_context_text}"
              )
              schema_context = limit_text(schema_context, output_limits['schema_context'], 'schema_context')
              refine_context = ''
              if str(turn_intent or '').strip() == 'refine_query':
                  refine_context = limit_text(
                      "\n\n### 多轮 refine_query 要求\n"
                      "本轮必须重新生成完整 semantic_plan_contract，不输出 patch diff。compact context 只作弱上下文；当前用户明确修改/否定的字段优先，不能继承被否定的旧字段。\n"
                      "如果用户要求改变 group_fields，必须输出新的 group_fields；如果用户说“不再按 X”，旧 plan 中对应 X 字段必须删除；如果用户说“改按 Y/按 Y 统计”，group_fields 必须替换为 Y 的 schema canonical field。metric/filter/time_range/chart_request 必须同步更新。\n"
                      f"上一轮上下文JSON:\n{limit_text(last_context_json, 8000)}\n\n"
                      f"本轮意图JSON:\n{limit_text(normalized_turn_intent_json, 4000)}\n\n"
                      f"query_refinement_json:\n{limit_text(query_refinement_json, 4000)}\n",
