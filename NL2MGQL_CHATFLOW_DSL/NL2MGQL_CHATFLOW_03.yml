              current_date: str = '',
              **kwargs
          ):
              schema_context = schema_context or arg1
              collection_selection_json = collection_selection_json or arg2
              question = question or arg3
              planner = json.loads(collection_selection_json) if isinstance(collection_selection_json, str) and collection_selection_json.strip() else (collection_selection_json or {})
              effective_current_date = str(current_date or '').strip() or '2026-06-16'
              effective_timezone = 'Asia/Singapore'

              output_limits = {
                  'schema_context': 30000,
                  'schema_metadata_json': 35000,
                  'schema_alias_index_json': 15000,
                  'prompt': 65000,
                  'prompt_json': 40000,
                  'planner_json': 40000,
                  'semantic_plan_system_prompt': 20000,
                  'semantic_plan_user_prompt': 60000,
                  'semantic_plan_json_schema': 40000,
                  'token_request_body_json': 70000,
              }
              truncation_audit = {'truncated_outputs': [], 'original_lengths': {}, 'final_lengths': {}}

              def limit_text(value, max_chars, name=None, suffix='...[TRUNCATED]'):
                  text = value if isinstance(value, str) else str(value or '')
                  original_len = len(text)
                  if original_len > max_chars:
                      keep = max(0, max_chars - len(suffix))
                      text = text[:keep] + suffix
                      if name:
                          truncation_audit['truncated_outputs'].append(name)
                          truncation_audit['original_lengths'][name] = original_len
                          truncation_audit['final_lengths'][name] = len(text)
                  elif name:
                      truncation_audit['original_lengths'][name] = original_len
                      truncation_audit['final_lengths'][name] = len(text)
                  return text

              def load_json_obj(value, fallback):
                  if isinstance(value, (dict, list)):
                      return value
                  text = str(value or '').strip()
                  if not text:
                      return fallback
                  try:
                      return json.loads(text)
                  except Exception:
                      return fallback

              def as_items(value):
                  if isinstance(value, dict):
                      for name, item in value.items():
                          if isinstance(item, dict):
                              merged = dict(item)
                              merged.setdefault('name', name)
                              yield merged
                  elif isinstance(value, list):
                      for item in value:
                          if isinstance(item, dict):
                              yield item

              def short_text(value, max_chars=120):
                  text = str(value or '').strip()
                  return text if len(text) <= max_chars else text[:max_chars - 14] + '...[TRUNCATED]'

              def compact_aliases(value, max_items=5):
                  aliases = []
                  if isinstance(value, list):
                      aliases = [str(x).strip() for x in value if str(x).strip()]
                  elif isinstance(value, str) and value.strip():
                      aliases = [x.strip() for x in value.split(',') if x.strip()]
                  return aliases[:max_items]

              def compact_values(value, max_items=20):
                  vals = []
                  if isinstance(value, list):
                      vals = [str(x).strip() for x in value if str(x).strip()]
                  elif isinstance(value, str) and value.strip():
                      vals = [x.strip() for x in value.split(',') if x.strip()]
                  return vals[:max_items]

              def extract_selected_collections(planner_obj, schema_ref_obj, meta_obj):
                  names = []
                  def add(v):
                      v = str(v or '').strip()
                      if v and v not in names:
                          names.append(v)
                  if isinstance(planner_obj, dict):
                      for key in ('selected_primary_collection', 'primary_collection'):
                          add(planner_obj.get(key))
                      for key in ('selected_collections', 'schema_hydration_collections', 'selected_related_collections', 'related_collections', 'collections'):
                          for item in planner_obj.get(key) or []:
                              add(item.get('collection') if isinstance(item, dict) else item)
                  if isinstance(schema_ref_obj, dict):
                      for item in schema_ref_obj.get('collections') or []:
                          add(item.get('collection_name') if isinstance(item, dict) else item)
                  if not names and isinstance(meta_obj, dict):
                      for cname in (meta_obj.get('collections') or {}).keys():
                          add(cname)
                  return names

              def compact_query_rules(rules):
                  rules = rules if isinstance(rules, dict) else {}
                  return {
                      'require_time_range_for_aggregate': bool(rules.get('require_time_range_for_aggregate', True)),
                      'max_limit': rules.get('max_limit', 100),
                      'allowed_operations': rules.get('allowed_operations') if isinstance(rules.get('allowed_operations'), list) else ['find', 'aggregate'],
                  }

              def build_compact_schema_for_planner(schema_metadata_json, schema_alias_index_json, schema_context_ref_json):
                  meta = load_json_obj(schema_metadata_json, {})
                  alias_index = load_json_obj(schema_alias_index_json, {})
                  schema_ref = load_json_obj(schema_context_ref_json, {})
                  selected = extract_selected_collections(planner, schema_ref, meta)
                  collections_src = meta.get('collections') if isinstance(meta, dict) else {}
                  compact = {
                      'contract_version': 'compact_schema_for_semantic_planner_v1',
                      'schema_version': meta.get('schema_version', '') if isinstance(meta, dict) else '',
                      'schema_digest': meta.get('schema_digest', '') if isinstance(meta, dict) else '',
                      'collections': {},
                      'schema_context_ref': schema_ref,
                  }
                  alias_entries = {'collection_aliases': {}, 'field_aliases': {}, 'metric_aliases': {}}
                  alias_count = 0
                  for cname in selected:
                      coll = collections_src.get(cname) if isinstance(collections_src, dict) else None
                      if not isinstance(coll, dict):
                          continue
                      fields = []
                      for f in as_items(coll.get('fields') or {}):
                          fields.append({
                              'name': str(f.get('name') or '').strip(),
                              'label': str(f.get('label') or f.get('name') or '').strip(),
                              'type': str(f.get('type') or '').strip(),
                              'role': str(f.get('role') or f.get('semantic_type') or '').strip(),
                              'filterable': bool(f.get('filterable', False)),
                              'groupable': bool(f.get('groupable', False)),
                              'sortable': bool(f.get('sortable', False)),
                              'returnable': bool(f.get('returnable', f.get('projectable', False))),
                              'aggregatable': f.get('aggregatable') if isinstance(f.get('aggregatable'), list) else compact_values(f.get('aggregatable'), 10),
                              'default_time_field': bool(str(f.get('name') or '').strip() == str(coll.get('default_time_field') or '').strip()),
                              'sensitive': bool(f.get('sensitive', False)),
                              'pii': bool(f.get('pii', False)),
                              'aliases': compact_aliases(f.get('aliases'), 5),
                              'allowed_values': compact_values(f.get('allowed_values'), 20),
                          })
                      metrics = []
                      for m in as_items(coll.get('metrics') or {}):
                          metrics.append({
                              'name': str(m.get('name') or '').strip(),
                              'label': str(m.get('label') or m.get('name') or '').strip(),
                              'function': str(m.get('function') or '').strip(),
                              'field': str(m.get('field') or '').strip(),
                              'expression': str(m.get('expression') or '').strip(),
                              'source_fields': compact_values(m.get('source_fields'), 10),
                              'aggregate_only': bool(m.get('aggregate_only', True)),
                              'aliases': compact_aliases(m.get('aliases'), 5),
                          })
                      relations = []
                      for r in coll.get('relations') or []:
                          if not isinstance(r, dict):
                              continue
                          relations.append({
                              'target_collection': str(r.get('target_collection') or '').strip(),
                              'relation_type': str(r.get('relation_type') or 'enrich').strip() or 'enrich',
                              'join_keys': [
                                  {
                                      'source_field': str(jk.get('source_field') or '').strip(),
                                      'target_field': str(jk.get('target_field') or '').strip(),
                                      'match_type': str(jk.get('match_type') or 'exact').strip() or 'exact',
                                      **({'source_cardinality': str(jk.get('source_cardinality') or '').strip()} if str(jk.get('source_cardinality') or '').strip() else {}),
                                      **({'source_array_path': str(jk.get('source_array_path') or '').strip()} if str(jk.get('source_array_path') or '').strip() else {}),
                                      **({'source_item_field': str(jk.get('source_item_field') or '').strip()} if str(jk.get('source_item_field') or '').strip() else {}),
                                  }
                                  for jk in (r.get('join_keys') or []) if isinstance(jk, dict)
                              ],
                              'description': short_text(r.get('description'), 120),
                          })
                      compact['collections'][cname] = {
                          'collection_name': cname,
                          'collection_label': str(coll.get('collection_label') or cname).strip(),
                          'purpose': short_text(coll.get('purpose') or coll.get('description'), 120),
                          'primary_key': str(coll.get('primary_key') or '').strip(),
                          'default_time_field': str(coll.get('default_time_field') or '').strip(),
                          'query_rules': compact_query_rules(coll.get('query_rules')),
                          'fields': fields,
                          'metrics': metrics,
                          'relations': relations,
                          'array_fields': coll.get('array_fields') if isinstance(coll.get('array_fields'), list) else [],
                      }
                      if alias_count < 300:
                          caliases = [cname, coll.get('collection_label')] + compact_aliases(coll.get('collection_aliases'), 5)
                          alias_entries['collection_aliases'][cname] = [str(x).strip() for x in caliases if str(x).strip()][:7]
                          alias_count += len(alias_entries['collection_aliases'][cname])
                          alias_entries['field_aliases'][cname] = {f['name']: f['aliases'] for f in fields if f.get('aliases')}
                          alias_count += sum(len(v) for v in alias_entries['field_aliases'][cname].values())
                          alias_entries['metric_aliases'][cname] = {m['name']: m['aliases'] for m in metrics if m.get('aliases')}
                          alias_count += sum(len(v) for v in alias_entries['metric_aliases'][cname].values())
                  compact['schema_alias_index_compact'] = alias_entries
                  return compact

              schema_context_ref = load_json_obj(schema_context_ref_json, {})
              schema_context_ref_warning = '' if schema_context_ref else ('schema_context_ref_json parse failed' if schema_context_ref_json else '')
              compact_schema = build_compact_schema_for_planner(schema_metadata_summary_json or '{}', schema_alias_index_summary_json or '{}', schema_context_ref_json or '{}')
              compact_schema_json = json.dumps(compact_schema, ensure_ascii=False, separators=(',', ':'))
              schema_metadata_summary_text = compact_schema_json
              schema_alias_index_summary_text = json.dumps(compact_schema.get('schema_alias_index_compact', {}), ensure_ascii=False, separators=(',', ':'))
              planner_json = json.dumps(planner, ensure_ascii=False, indent=2)
              planner_json = limit_text(planner_json, output_limits['planner_json'], 'planner_json')
              collection_selection_text = limit_text(str(collection_selection_json or '{}'), 12000)
              compact_context_text = limit_text(str(compact_context_json or '{}'), 8000)

              def names_in_collection(cname):
                  coll = compact_schema.get('collections', {}).get(cname, {})
                  return {
                      'fields': [f.get('name') for f in coll.get('fields') or []],
