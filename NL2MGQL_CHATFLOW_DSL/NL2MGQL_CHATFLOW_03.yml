                  "3. 如果用户要求“关联/补充/带出/合并/join/lookup/enrich”，且 compact_schema_context 中存在 relation，则 execution_mode 应为 \"multi_stage\"。",
                  "4. primary_query stage 使用 primary_collection。",
                  "5. enrich_related stage 使用 related collection。",
                  "6. join_source_field / join_target_field 必须来自 compact_schema_context.collections[primary].relations[].join_keys。",
                  "7. 用户要求的补充字段必须来自 related collection 的 fields。",
                  "8. 用户要求的分组字段必须来自 primary collection 或明确的最终合并字段。",
                  "9. 用户要求统计数量时，优先使用对应 collection 的 count metric；若 metric 存在 order_count，则 metric_alias 使用该 metric name。",
                  "10. 相对时间“过去三个月”使用 time_range.mode=\"relative_days\"，relative_days=90，field 使用 primary collection 的 default_time_field；relative_days 必须是正整数，禁止输出 relative_days=0。用户没有提供时间范围时，必须读取 compact_schema_context.query_rules.require_time_range_for_aggregate：若为 true，输出 requires_clarification=true 且 clarification_question=\"请提供要统计的时间范围，例如最近30天、今年、某个月。\"，不要生成非法 time_range；若 schema 明确允许默认全量，则不要使用 relative_days=0，也不要发明 schema 未支持的 all_time mode。",
