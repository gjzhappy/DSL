                      'relation_targets': [r.get('target_collection') for r in coll.get('relations') or []],
                  }
              orders_names = names_in_collection('orders')
              products_names = names_in_collection('products')
              compact_schema_check = {
                  'collections': list((compact_schema.get('collections') or {}).keys()),
                  'orders': {
