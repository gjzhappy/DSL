    - data:
        code: |-
          import json
          import re


          SEMANTIC_PLAN_SCHEMA_INVALID = 'SEMANTIC_PLAN_SCHEMA_INVALID'
          FORBIDDEN_TOP_LEVEL_PLAN_KEYS = {'collection', 'group_by', 'metrics'}


          def _truncate_text(text, limit=2000):
              text = '' if text is None else str(text)
              return text if len(text) <= limit else text[:limit] + '...'


          def _read_json_text(text):
              if text is None:
                  return None
              if isinstance(text, (dict, list)):
                  return text
              raw = str(text).strip()
              if not raw:
                  return None
              return json.loads(raw)


          def _content_to_text(content):
              if isinstance(content, str):
                  return content.strip()
              if isinstance(content, list):
                  parts = []
                  for item in content:
                      if isinstance(item, str) and item.strip():
                          parts.append(item.strip())
                      elif isinstance(item, dict):
                          text = str(item.get('text') or item.get('content') or '').strip()
                          if text:
                              parts.append(text)
                  return '\n'.join(parts).strip()
              return ''


          def _extract_chat_text(resp_json):
              if not isinstance(resp_json, dict):
                  return ''
              choices = resp_json.get('choices')
              if isinstance(choices, list) and choices:
                  first = choices[0] or {}
                  if isinstance(first, dict):
                      msg = first.get('message') or {}
                      if isinstance(msg, dict):
                          text = _content_to_text(msg.get('content'))
                          if text:
                              return text
                      text = _content_to_text(first.get('text'))
                      if text:
                          return text
              output = resp_json.get('output')
              text = _content_to_text(output)
              if text:
                  return text
              if isinstance(output, list):
                  for item in output:
                      if isinstance(item, dict):
                          text = _content_to_text(item.get('content'))
                          if text:
                              return text
              for key in ('result', 'text', 'content', 'answer'):
                  text = _content_to_text(resp_json.get(key))
                  if text:
                      return text
              data = resp_json.get('data')
              if isinstance(data, dict):
                  for key in ('result', 'text', 'content', 'answer'):
                      text = _content_to_text(data.get(key))
                      if text:
                          return text
              return ''


          def _strip_code_fence(text):
              raw = str(text or '').strip()
              full_match = re.match(r'^```(?:json)?\s*(.*?)\s*```$', raw, flags=re.IGNORECASE | re.DOTALL)
              if full_match:
                  return full_match.group(1).strip()
              return raw


          def _remove_think_blocks(text):
              raw = str(text or '')
              raw = re.sub(r'<think>.*?</think>', ' ', raw, flags=re.IGNORECASE | re.DOTALL)
              return raw.strip()


          def _plan_candidate_score(obj):
              if not isinstance(obj, dict):
                  return -1
              keys = set(obj.keys())
              score = 0
              if isinstance(obj.get('execution_plan'), dict):
                  score += 10
                  stages = obj['execution_plan'].get('stages')
                  if isinstance(stages, list) and stages:
                      score += 10
              if keys:
                  score += 1
              return score


          def _try_decode_object(raw):
              try:
                  decoder = json.JSONDecoder()
                  obj, end = decoder.raw_decode(raw)
                  if isinstance(obj, dict):
                      return obj, raw[:end], raw[end:].strip()
              except Exception:
                  return None
              return None


          def _extract_json_object_text(text):
              raw = _remove_think_blocks(_strip_code_fence(text))
              if not raw:
                  raise ValueError('LLM返回内容为空')
              direct = _try_decode_object(raw)
              if direct and not direct[2]:
                  return direct[1]
              candidates = []
              for block in re.findall(r'```(?:json)?\s*(.*?)```', raw, flags=re.IGNORECASE | re.DOTALL):
                  parsed = _try_decode_object(block.strip())
                  if parsed:
                      obj, obj_text, tail = parsed
                      candidates.append((_plan_candidate_score(obj), 1 if tail else 0, obj_text))
              seen_positions = set()
              for match in re.finditer(r'\{', raw):
                  pos = match.start()
                  if pos in seen_positions:
                      continue
                  seen_positions.add(pos)
                  parsed = _try_decode_object(raw[pos:])
                  if parsed:
                      obj, obj_text, tail = parsed
                      candidates.append((_plan_candidate_score(obj), 1 if tail else 0, obj_text))
              if candidates:
                  candidates.sort(key=lambda item: (-item[0], item[1], -len(item[2])))
                  return candidates[0][2]
              raise ValueError(f'LLM返回内容不是合法JSON对象: {_truncate_text(raw, 1200)}')


          def _pick_response(full_status_code, full_body, local_status_code, local_body):
              local_body_text = '' if local_body is None else str(local_body).strip()
              if local_body_text:
                  return int(local_status_code or 0), local_body, 'local_llm'
              return int(full_status_code or 0), full_body, 'full_llm'


          def _contains_forbidden_top_level_shape(plan):
              return isinstance(plan, dict) and bool(set(plan.keys()) & FORBIDDEN_TOP_LEVEL_PLAN_KEYS)


          def _default_count_field(stage):
              collection = str(stage.get('primary_collection') or '').strip()
              if collection == 'orders':
                  return 'order_id'
              return '_id'


          def _normalize_chart_request(plan):
              chart_request = plan.get('chart_request') if isinstance(plan.get('chart_request'), dict) else {}
              if chart_request:
                  if chart_request.get('x_axis') and not chart_request.get('x_field'):
                      chart_request['x_field'] = chart_request.get('x_axis')
                  if chart_request.get('y_axis') and not chart_request.get('y_field'):
                      chart_request['y_field'] = chart_request.get('y_axis')
                  plan['chart_request'] = chart_request


          def _normalize_stage(stage, index):
              if not isinstance(stage, dict):
                  return None, f'execution_plan.stages[{index}] must be an object'
              if 'group_by' in stage:
                  return None, 'INVALID_SEMANTIC_PLAN_SCHEMA: stage.group_by is not allowed; use stage.group_fields'
              if 'metrics' in stage:
                  return None, 'INVALID_SEMANTIC_PLAN_SCHEMA: stage.metrics is not allowed; use metric_function/metric_field/metric_alias'
              normalized = dict(stage)
              for field in ('stage_id', 'stage_type', 'primary_collection', 'intent_type'):
                  if not str(normalized.get(field) or '').strip():
                      return None, f'INVALID_SEMANTIC_PLAN_SCHEMA: execution_plan.stages[{index}].{field} is required'
              if 'filters' in normalized and not isinstance(normalized.get('filters'), list):
                  return None, f'INVALID_SEMANTIC_PLAN_SCHEMA: execution_plan.stages[{index}].filters must be an array'
              if 'group_fields' in normalized and not isinstance(normalized.get('group_fields'), list):
                  return None, f'INVALID_SEMANTIC_PLAN_SCHEMA: execution_plan.stages[{index}].group_fields must be an array'
              if 'sort' in normalized and not isinstance(normalized.get('sort'), list):
                  return None, f'INVALID_SEMANTIC_PLAN_SCHEMA: execution_plan.stages[{index}].sort must be an array'
              metric_function = str(normalized.get('metric_function') or '').strip()
              metric_field = str(normalized.get('metric_field') or '').strip()
              metric_alias = str(normalized.get('metric_alias') or '').strip()
              if metric_function.lower() == 'count' and not metric_field:
                  normalized['metric_field'] = _default_count_field(normalized)
              if metric_function and not metric_alias:
                  normalized['metric_alias'] = f"{metric_function}_{normalized.get('metric_field') or 'value'}"
              return normalized, ''


          def _validate_and_normalize(plan):
              if not isinstance(plan, dict):
                  return {}, False, '', f'{SEMANTIC_PLAN_SCHEMA_INVALID}: plan must be a JSON object', 'not_object'
              if _contains_forbidden_top_level_shape(plan) and not isinstance(plan.get('execution_plan'), dict):
                  return {}, False, '', 'INVALID_SEMANTIC_PLAN_SCHEMA: top-level collection/group_by/metrics is not allowed', 'forbidden_top_level_shape'
              execution_plan = plan.get('execution_plan')
              if not isinstance(execution_plan, dict):
                  return {}, False, '', f'{SEMANTIC_PLAN_SCHEMA_INVALID}: missing execution_plan', 'missing_execution_plan'
              stages = execution_plan.get('stages')
              if not isinstance(stages, list) or not stages:
                  return {}, False, '', f'{SEMANTIC_PLAN_SCHEMA_INVALID}: execution_plan.stages must be a non-empty array', 'missing_stages'
              normalized = dict(plan)
              normalized_execution_plan = dict(execution_plan)
              normalized_stages = []
              warnings = []
              for idx, stage in enumerate(stages):
                  normalized_stage, stage_error = _normalize_stage(stage, idx)
                  if stage_error:
                      return {}, False, '', stage_error, 'invalid_stage'
                  before_field = str((stage or {}).get('metric_field') or '').strip()
                  after_field = str((normalized_stage or {}).get('metric_field') or '').strip()
                  if not before_field and after_field:
                      warnings.append(f'execution_plan.stages[{idx}].metric_field filled with {after_field}')
                  normalized_stages.append(normalized_stage)
              normalized_execution_plan['stages'] = normalized_stages
              normalized['execution_plan'] = normalized_execution_plan
              _normalize_chart_request(normalized)
              return normalized, True, '; '.join(warnings), '', ''


          def main(full_status_code, full_body, local_status_code, local_body, question=''):
              code, body, source = _pick_response(full_status_code, full_body, local_status_code, local_body)
              payload = None
              result = ''
              try:
                  if code < 200 or code >= 300:
                      result = _truncate_text(body, 4000)
                  elif not body:
                      result = ''
                  else:
                      resp_json = _read_json_text(body)
                      payload = resp_json
                      if not resp_json:
                          result = _truncate_text(body, 4000)
                      else:
                          result = _extract_chat_text(resp_json) or _truncate_text(body, 4000)
              except Exception as e:
                  result = _truncate_text(f"{body}\n\nexception={e}", 4000)
              parsed = None
              json_parse_ok = False
              parse_error = ''
              semantic_plan_raw_text = result
              try:
                  semantic_plan_text = _extract_json_object_text(result)
                  semantic_plan_raw_text = semantic_plan_text or result
                  parsed = json.loads(semantic_plan_text)
                  json_parse_ok = True
              except Exception as e:
                  parse_error = str(e)
              parsed_keys = list(parsed.keys()) if isinstance(parsed, dict) else []
              normalized, plan_valid, warning, normalizer_error, invalid_reason = _validate_and_normalize(parsed)
              if parse_error and not plan_valid and not normalizer_error:
                  normalizer_error = f'{SEMANTIC_PLAN_SCHEMA_INVALID}: {parse_error}'
                  invalid_reason = 'parse_error'
              execution_plan = normalized.get('execution_plan') if isinstance(normalized, dict) else None
              stages = execution_plan.get('stages') if isinstance(execution_plan, dict) else None
              has_execution_plan = isinstance(execution_plan, dict)
              has_stages = isinstance(stages, list) and len(stages) > 0
              content_preview = str(semantic_plan_raw_text or '')[:1000]
              debug_summary = {
                  'source': source,
                  'http_status_code': code,
                  'body_type': type(payload).__name__ if payload is not None else 'none',
                  'content_extracted': bool(result),
                  'content_length': len(str(semantic_plan_raw_text or '')),
                  'content_preview': content_preview,
                  'json_parse_ok': json_parse_ok,
                  'parsed_type': type(parsed).__name__ if parsed is not None else 'none',
                  'parsed_keys': parsed_keys,
                  'input_keys': parsed_keys,
                  'plan_valid': plan_valid,
                  'has_execution_plan': has_execution_plan,
                  'has_stages': has_stages,
                  'stages_count': len(stages or []),
                  'invalid_reason': invalid_reason,
                  'normalizer_warning': warning,
                  'normalizer_error': normalizer_error,
                  'request_debug': {
                      'content_preview': content_preview,
                      'parsed_keys': parsed_keys,
                  },
              }
              return {
                  'semantic_plan_json': json.dumps(parsed or {}, ensure_ascii=False),
                  'normalized_semantic_plan_json': json.dumps(normalized or {}, ensure_ascii=False),
                  'semantic_plan_raw_text': str(semantic_plan_raw_text or '')[:4000],
                  'plan_valid': plan_valid,
                  'normalizer_warning': warning,
                  'normalizer_error': normalizer_error,
                  'parse_error': str(parse_error or ''),
                  'debug_summary_json': json.dumps(debug_summary, ensure_ascii=False),
                  'selected_source': source,
              }
