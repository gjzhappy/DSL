                  first = choices[0] or {}
                  if isinstance(first, dict):
                      msg = first.get('message') or {}
                      if isinstance(msg, dict):
                          text = _content_to_text(msg.get('content'))
                          if text:
                              return text
                      text = _content_to_text(first.get('text'))
                      if text:
                          return text
              output = resp_json.get('output')
              text = _content_to_text(output)
              if text:
                  return text
              if isinstance(output, list):
                  for item in output:
                      if isinstance(item, dict):
                          text = _content_to_text(item.get('content'))
                          if text:
                              return text
              for key in ('result', 'text', 'content', 'answer'):
                  text = _content_to_text(resp_json.get(key))
                  if text:
                      return text
              data = resp_json.get('data')
              if isinstance(data, dict):
                  for key in ('result', 'text', 'content', 'answer'):
                      text = _content_to_text(data.get(key))
                      if text:
                          return text
              return ''


          def _strip_code_fence(text):
              raw = str(text or '').strip()
              full_match = re.match(r'^```(?:json)?\s*(.*?)\s*```$', raw, flags=re.IGNORECASE | re.DOTALL)
              if full_match:
                  return full_match.group(1).strip()
              return raw


          def _remove_think_blocks(text):
              raw = str(text or '')
              raw = re.sub(r'<think>.*?</think>', ' ', raw, flags=re.IGNORECASE | re.DOTALL)
              return raw.strip()


          def _ast_candidate_score(obj):
              if not isinstance(obj, dict):
                  return -1
              score = 0
              keys = set(obj.keys())
              for key in ('primary_collection', 'projection', 'filters', 'sort', 'group_by', 'aggregate', 'expands', 'time_range', 'limit'):
                  if key in keys:
                      score += 2
              if keys:
                  score += 1
              return score


          def _try_decode_object(raw):
              try:
                  decoder = json.JSONDecoder()
                  obj, end = decoder.raw_decode(raw)
                  if isinstance(obj, dict):
                      return obj, raw[:end], raw[end:].strip()
              except Exception:
                  return None
              return None


          def _extract_json_object_text(text):
              raw = _remove_think_blocks(_strip_code_fence(text))
              if not raw:
                  raise ValueError('LLM返�内容为空')
              direct = _try_decode_object(raw)
              if direct and not direct[2]:
                  return direct[1]
              candidates = []
              for block in re.findall(r'```(?:json)?\s*(.*?)```', raw, flags=re.IGNORECASE | re.DOTALL):
                  parsed = _try_decode_object(block.strip())
                  if parsed:
                      obj, obj_text, tail = parsed
                      candidates.append((_ast_candidate_score(obj), 1 if tail else 0, obj_text))
              seen_positions = set()
              for match in re.finditer(r'\{', raw):
                  pos = match.start()
                  if pos in seen_positions:
                      continue
                  seen_positions.add(pos)
                  parsed = _try_decode_object(raw[pos:])
                  if parsed:
                      obj, obj_text, tail = parsed
                      candidates.append((_ast_candidate_score(obj), 1 if tail else 0, obj_text))
              if candidates:
                  candidates.sort(key=lambda item: (-item[0], item[1], -len(item[2])))
                  return candidates[0][2]
              raise ValueError(f'LLM返�内容不是合法JSON对象: {_truncate_text(raw, 1200)}')


          def _pick_response(full_status_code, full_body, local_status_code, local_body):
              local_body_text = '' if local_body is None else str(local_body).strip()
              if local_body_text:
                  return int(local_status_code or 0), local_body, 'local_llm'
              return int(full_status_code or 0), full_body, 'full_llm'


          def _contains_chart_intent(question: str):
              q = str(question or '')
              return any(k in q for k in ['柱状图', '折线图', '饼图', '图表', '可视化'])


          def _detect_relative_days(question_text):
              q = str(question_text or '')
              if any(t in q for t in ['近7天', '最近7天']):
                  return 7
              if any(t in q for t in ['过去一个月', '近一个月', '最近一个月', '最近30天', '近30天']):
                  return 30
              return 0


          def _is_abs_date_between_filter(item):
              if not isinstance(item, dict):
                  return False
              if str(item.get('field') or '').strip() != 'created_at':
                  return False
              if str(item.get('op') or '').strip() != 'between':
                  return False
              value = item.get('value')
              if not isinstance(value, list) or len(value) != 2:
                  return False
              return all(isinstance(v, dict) and '$date' in v for v in value)


          def main(full_status_code, full_body, local_status_code, local_body, question=''):
              code, body, _source = _pick_response(full_status_code, full_body, local_status_code, local_body)
              source = 'full_llm_or_local'
              payload = None
              result = ''
              try:
                  if code < 200 or code >= 300:
                      result = _truncate_text(body, 4000)
                  elif not body:
                      result = ''
                  else:
                      resp_json = _read_json_text(body)
                      payload = resp_json
                      if not resp_json:
                          result = _truncate_text(body, 4000)
                      else:
                          result = _extract_chat_text(resp_json) or _truncate_text(body, 4000)
              except Exception as e:
                  result = _truncate_text(f"{body}\n\nexception={e}", 4000)
              semantic_plan = {}
              normalizer_error = ''
              parsed = None
              json_parse_ok = False
              parsed_type = ''
              parsed_keys = []
              has_exec = False
              has_stages = False
              stage_count = 0
              legacy = False
              warning = ''
              error = ''
              normalized = {}
              absolute_date_filter_detected = False
              time_range_normalized = False
              semantic_plan_raw_text = result
              try:
                  semantic_plan_text = _extract_json_object_text(result)
                  semantic_plan_raw_text = semantic_plan_text or result
                  parsed = json.loads(semantic_plan_text)
                  json_parse_ok = True
              except Exception as e:
                  error = str(e)
                  parsed = None
              if isinstance(parsed, dict):
                  semantic_plan = parsed
              legacy_keys = {'collection', 'filters', 'group_by', 'metrics', 'sort', 'limit'}
              has_exec = isinstance(semantic_plan.get('execution_plan'), dict)
              has_stages = has_exec and isinstance(semantic_plan['execution_plan'].get('stages'), list) and len(semantic_plan['execution_plan'].get('stages') or []) > 0
              legacy = bool(set(semantic_plan.keys()) & legacy_keys) and not has_stages
              if isinstance(semantic_plan, dict):
                  parsed_type = type(semantic_plan).__name__
                  parsed_keys = list(semantic_plan.keys())
                  has_exec = isinstance(semantic_plan.get('execution_plan'), dict)
                  has_stages = has_exec and isinstance(semantic_plan['execution_plan'].get('stages'), list) and len(semantic_plan['execution_plan'].get('stages') or []) > 0
                  legacy = bool(set(semantic_plan.keys()) & legacy_keys) and not has_stages
                  normalized = semantic_plan
              if has_stages:
                  pass
              elif isinstance(semantic_plan.get('stages'), list) and len(semantic_plan.get('stages') or []) > 0:
                  normalized = dict(semantic_plan)
                  normalized = {'execution_plan': {'stages': semantic_plan.get('stages', [])}, **{k:v for k,v in semantic_plan.items() if k!='stages'}}
              elif legacy:
                  warning = 'FULL_LLM_LEGACY_AST_DETECTED'
                  group_by = semantic_plan.get('group_by') if isinstance(semantic_plan.get('group_by'), list) else []
                  metrics = semantic_plan.get('metrics') if isinstance(semantic_plan.get('metrics'), list) else []
                  stage = {
                      'stage_id': 'stage1',
                      'primary_collection': semantic_plan.get('collection') or '',
                      'intent': 'aggregate' if (group_by or metrics) else 'find',
                      'filters': semantic_plan.get('filters') if isinstance(semantic_plan.get('filters'), list) else [],
                      'group_by': group_by,
                      'metrics': metrics,
                      'sort': semantic_plan.get('sort') if isinstance(semantic_plan.get('sort'), list) else [],
                      'limit': semantic_plan.get('limit') if isinstance(semantic_plan.get('limit'), int) else 100,
                  }
                  needs_chart = bool(semantic_plan.get('needs_chart')) or (_contains_chart_intent(question) and bool(group_by and metrics))
                  chart_request = semantic_plan.get('chart_request') if isinstance(semantic_plan.get('chart_request'), dict) else {}
                  if needs_chart and not chart_request and group_by and metrics:
                      first_metric = metrics[0] if metrics else {}
                      m_name = first_metric.get('alias') or first_metric.get('name') or 'value'
                      q = str(question or '')
                      chart_type = 'bar' if '柱状图' in q else ('line' if '折线图' in q else ('pie' if '饼图' in q else 'bar'))
                      chart_request = {'chart_type': chart_type, 'x_field': group_by[0], 'y_field': m_name}
                  normalized = {
                      'execution_plan': {'stages': [stage]},
                      'needs_chart': needs_chart,
                      'chart_request': chart_request,
                      'answer_mode': semantic_plan.get('answer_mode') or 'data',
                  }
              else:
                  error = 'SEMANTIC_PLAN_INVALID'
              if isinstance(normalized, dict):
                  rel_days = _detect_relative_days(question)
                  stages = ((normalized.get('execution_plan') or {}).get('stages') or []) if isinstance(normalized.get('execution_plan'), dict) else []
                  if rel_days > 0 and isinstance(stages, list):
                      for stage in stages:
                          if not isinstance(stage, dict):
                              continue
                          raw_filters = stage.get('filters') if isinstance(stage.get('filters'), list) else []
                          kept = []
                          converted = False
                          for f in raw_filters:
                              if _is_abs_date_between_filter(f):
                                  absolute_date_filter_detected = True
                                  converted = True
                                  continue
                              kept.append(f)
                          if converted:
                              stage['filters'] = kept
                              tr = stage.get('time_range') if isinstance(stage.get('time_range'), dict) else {}
                              tr.update({'field': str(tr.get('field') or 'created_at'), 'mode': 'relative_days', 'relative_days': rel_days})
                              stage['time_range'] = tr
                              warning = 'absolute_date_filter_converted_to_relative_time'
                              time_range_normalized = True
                  chart_request = normalized.get('chart_request') if isinstance(normalized.get('chart_request'), dict) else {}
                  if chart_request:
                      if chart_request.get('x_axis') and not chart_request.get('x_field'):
                          chart_request['x_field'] = chart_request.get('x_axis')
                      if chart_request.get('y_axis') and not chart_request.get('y_field'):
                          chart_request['y_field'] = chart_request.get('y_axis')
                      normalized['chart_request'] = chart_request
              n_has_exec = isinstance(normalized, dict) and isinstance(normalized.get('execution_plan'), dict)
              n_stages = normalized.get('execution_plan', {}).get('stages') if n_has_exec else None
              n_has_stages = isinstance(n_stages, list) and len(n_stages)>0
              stage_count = len(n_stages or [])
              plan_valid = bool(n_has_stages)
              if not plan_valid:
                  normalizer_error = f"SEMANTIC_PLAN_INVALID: {error or 'missing execution_plan.stages'}"
                  normalized = {}
              content_preview = str(semantic_plan_raw_text or '')[:1000]
              debug_summary = {
                  'source': source,
                  'http_status_code': code,
                  'body_type': type(payload).__name__ if payload is not None else 'none',
                  'content_extracted': bool(result),
                  'content_length': len(str(semantic_plan_raw_text or '')),
                  'content_preview': content_preview,
                  'json_parse_ok': json_parse_ok,
                  'parsed_type': parsed_type or (type(parsed).__name__ if parsed is not None else 'none'),
                  'parsed_keys': parsed_keys,
                  'plan_valid': plan_valid,
                  'has_execution_plan': n_has_exec,
                  'has_stages': n_has_stages,
                  'stages_count': stage_count,
                  'legacy_ast_detected': legacy,
                  'normalized': True,
                  'normalizer_warning': warning,
                  'normalizer_error': normalizer_error,
                  'absolute_date_filter_detected': absolute_date_filter_detected,
                  'time_range_normalized': time_range_normalized,
                  'error': error,
              }
              return {
                  'semantic_plan_json': json.dumps(normalized or {}, ensure_ascii=False),
                  'normalized_semantic_plan_json': json.dumps(normalized or {}, ensure_ascii=False),
                  'semantic_plan_raw_text': str(semantic_plan_raw_text or '')[:4000],
                  'plan_valid': plan_valid,
                  'legacy_ast_detected': legacy,
                  'normalizer_warning': warning,
                  'normalizer_error': normalizer_error,
                  'parse_error': str(error or ''),
                  'debug_summary_json': json.dumps(debug_summary, ensure_ascii=False),
              }
