              return bool(lower_exception and any(marker in lower_exception for marker in transient_markers))


          def _format_error_message(prefix, status_code, body_text, headers, retry_count, exception_message=''):
              parts = [prefix]
              if status_code:
                  parts.append('status=%s' % status_code)
              message = _extract_error_message(body_text) or _to_text(exception_message)
              tracer_id = _extract_tracer_id(body_text, headers)
              if message:
                  parts.append('message=%s' % message)
              if tracer_id:
                  parts.append('tracer_id=%s' % tracer_id)
              parts.append('retry_count=%s' % retry_count)
              return ' '.join(parts)


          def _post_json_once(url, data, auth, timeout_sec):
              req = urllib.request.Request(
                  url,
                  data=data,
                  headers={
                      'Content-Type': 'application/json',
                      'Authorization': auth
                  },
                  method='POST'
              )
              try:
                  with urllib.request.urlopen(req, timeout=timeout_sec) as resp:
                      text = resp.read().decode('utf-8', errors='replace')
                      status_code = int(getattr(resp, 'status', 0) or 0)
                      return status_code, text, dict(resp.headers.items()), ''
              except urllib.error.HTTPError as e:
                  text = e.read().decode('utf-8', errors='replace')
                  headers = dict(e.headers.items()) if getattr(e, 'headers', None) else {}
                  return int(getattr(e, 'code', 0) or 0), text, headers, ''
              except Exception as e:
                  return 0, '', {}, str(e)


          def _post_json_with_retry(url, data, auth, timeout_sec):
              retry_count = 0
              last_status_code = 0
              last_body = ''
              last_headers = {}
              last_exception_message = ''
              for attempt in range(MAX_RETRY + 1):
                  status_code, body_text, headers, exception_message = _post_json_once(url, data, auth, timeout_sec)
                  last_status_code = status_code
                  last_body = body_text
                  last_headers = headers
                  last_exception_message = exception_message
                  if 200 <= status_code < 300:
                      return status_code, body_text, headers, retry_count, ''
                  if attempt >= MAX_RETRY or not _is_retryable_error(status_code, body_text, exception_message):
                      break
                  time.sleep(RETRY_SLEEP_SECONDS[attempt])
                  retry_count += 1
              prefix = 'HTTP_ERROR' if last_status_code else 'NETWORK_ERROR'
              error_message = _format_error_message(prefix, last_status_code, last_body, last_headers, retry_count, last_exception_message)
              return last_status_code, last_body, last_headers, retry_count, error_message


          def main(chat_url: str, authorization_value: str, llm_request_body_json: str) -> dict:
              timeout_sec = 70
              result = {
                  'status_code': 0,
                  'ok': False,
                  'body': '',
                  'body_preview': '',
                  'headers_json': '{}',
                  'error_message': '',
                  'request_debug': {},
                  'retry_count': 0,
                  'tracer_id': '',
                  'last_status_code': 0,
                  'last_error_message': ''
              }

              try:
                  body_obj = _safe_json_loads(llm_request_body_json)
              except Exception as e:
                  result['error_message'] = 'REQUEST_BUILD_FAILED: ' + str(e)
                  result['body_preview'] = traceback.format_exc()[:4000]
                  return result

              messages = body_obj.get('messages') or []
              response_format = body_obj.get('response_format') if isinstance(body_obj.get('response_format'), dict) else {}
              json_schema = response_format.get('json_schema') if isinstance(response_format.get('json_schema'), dict) else {}
              auth = _to_text(authorization_value)
              auth_scheme = auth.split(' ', 1)[0] if ' ' in auth else ('unknown' if auth else '')

              result['request_debug'] = {
                  'url': _to_text(chat_url),
                  'auth_present': bool(auth),
                  'auth_scheme': auth_scheme,
                  'auth_len': len(auth),
                  'model': body_obj.get('model'),
                  'body_keys': list(body_obj.keys()),
                  'messages_count': len(messages) if isinstance(messages, list) else 0,
                  'prompt_length': _extract_prompt_length(messages),
                  'response_format_enabled': 'response_format' in body_obj,
                  'response_format_type': response_format.get('type') if isinstance(response_format, dict) else None,
                  'schema_name': _to_text(json_schema.get('name')) if isinstance(json_schema, dict) else '',
                  'timeout_sec': timeout_sec
              }

              data = json.dumps(body_obj, ensure_ascii=False).encode('utf-8')
              try:
                  status_code, text, headers, retry_count, error_message = _post_json_with_retry(_to_text(chat_url), data, auth, timeout_sec)
                  result['status_code'] = status_code
                  result['ok'] = 200 <= status_code < 300
                  result['body'] = text
                  result['body_preview'] = text[:4000]
                  result['headers_json'] = json.dumps(headers, ensure_ascii=False)
                  result['error_message'] = '' if result['ok'] else error_message
                  result['retry_count'] = retry_count
                  result['tracer_id'] = _extract_tracer_id(text, headers)
                  result['last_status_code'] = status_code
                  result['last_error_message'] = '' if result['ok'] else error_message
                  return result
              except Exception as e:
                  result['status_code'] = 0
                  result['ok'] = False
                  result['error_message'] = str(e)
                  result['last_error_message'] = str(e)
                  result['body_preview'] = traceback.format_exc()[:4000]
                  return result
