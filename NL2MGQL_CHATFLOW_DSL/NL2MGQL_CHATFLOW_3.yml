        code: |
          import json
          import re


          def _truncate_text(text, limit=2000):
              text = '' if text is None else str(text)
              return text if len(text) <= limit else text[:limit] + '...'


          def _read_json_text(text):
              if text is None:
                  return None
              if isinstance(text, (dict, list)):
                  return text
              raw = str(text).strip()
              if not raw:
                  return None
              return json.loads(raw)


          def _content_to_text(content):
              if isinstance(content, str):
                  return content.strip()
              if isinstance(content, list):
                  parts = []
                  for item in content:
                      if isinstance(item, str) and item.strip():
                          parts.append(item.strip())
                      elif isinstance(item, dict):
                          text = str(item.get('text') or item.get('content') or '').strip()
                          if text:
                              parts.append(text)
                  return '\n'.join(parts).strip()
              return ''


          def _extract_chat_text(resp_json):
              if not isinstance(resp_json, dict):
                  return ''
              choices = resp_json.get('choices')
              if isinstance(choices, list) and choices:
                  first = choices[0] or {}
                  if isinstance(first, dict):
                      msg = first.get('message') or {}
                      if isinstance(msg, dict):
                          text = _content_to_text(msg.get('content'))
                          if text:
                              return text
                      text = _content_to_text(first.get('text'))
                      if text:
                          return text
              output = resp_json.get('output')
              text = _content_to_text(output)
              if text:
                  return text
              if isinstance(output, list):
                  for item in output:
                      if isinstance(item, dict):
                          text = _content_to_text(item.get('content'))
                          if text:
                              return text
              for key in ('result', 'text', 'content', 'answer'):
                  text = _content_to_text(resp_json.get(key))
                  if text:
                      return text
              data = resp_json.get('data')
              if isinstance(data, dict):
                  for key in ('result', 'text', 'content', 'answer'):
                      text = _content_to_text(data.get(key))
                      if text:
                          return text
              return ''


          def _strip_code_fence(text):
              raw = str(text or '').strip()
              full_match = re.match(r'^```(?:json)?\s*(.*?)\s*```$', raw, flags=re.IGNORECASE | re.DOTALL)
              if full_match:
                  return full_match.group(1).strip()
              return raw


          def _remove_think_blocks(text):
              raw = str(text or '')
              raw = re.sub(r'<think>.*?</think>', ' ', raw, flags=re.IGNORECASE | re.DOTALL)
              return raw.strip()


          def _ast_candidate_score(obj):
              if not isinstance(obj, dict):
                  return -1
              score = 0
              keys = set(obj.keys())
              if 'execution_plan' in keys:
                  score += 10
              stages = (obj.get('execution_plan') or {}).get('stages') if isinstance(obj.get('execution_plan'), dict) else None
              if isinstance(stages, list) and stages:
                  score += 10
              if keys:
                  score += 1
              return score


          def _try_decode_object(raw):
              try:
                  decoder = json.JSONDecoder()
                  obj, end = decoder.raw_decode(raw)
                  if isinstance(obj, dict):
                      return obj, raw[:end], raw[end:].strip()
              except Exception:
                  return None
              return None


          def _extract_json_object_text(text):
              raw = _remove_think_blocks(_strip_code_fence(text))

              if not raw:
                  raise ValueError('LLM返�内容为空')
              direct = _try_decode_object(raw)
              if direct and not direct[2]:
                  return direct[1]
              candidates = []
              for block in re.findall(r'```(?:json)?\s*(.*?)```', raw, flags=re.IGNORECASE | re.DOTALL):
                  parsed = _try_decode_object(block.strip())
                  if parsed:
                      obj, obj_text, tail = parsed
                      candidates.append((_ast_candidate_score(obj), 1 if tail else 0, obj_text))
              seen_positions = set()
              for match in re.finditer(r'\{', raw):
                  pos = match.start()

                  if pos in seen_positions:
                      continue
                  seen_positions.add(pos)
                  parsed = _try_decode_object(raw[pos:])
                  if parsed:
                      obj, obj_text, tail = parsed
                      candidates.append((_ast_candidate_score(obj), 1 if tail else 0, obj_text))
              if candidates:
                  candidates.sort(key=lambda item: (-item[0], item[1], -len(item[2])))
                  return candidates[0][2]
              raise ValueError(f'LLM返�内容不是合法JSON对象: {_truncate_text(raw, 1200)}')


          def _pick_response(full_status_code, full_body, local_status_code, local_body):
              local_body_text = '' if local_body is None else str(local_body).strip()
              if local_body_text:
                  return int(local_status_code or 0), local_body, 'local_llm'
              return int(full_status_code or 0), full_body, 'full_llm'


          def _contains_chart_intent(question: str):
              q = str(question or '')
              return any(k in q for k in ['柱状图', '折线图', '饼图', '图表', '可视化'])


          def _detect_relative_days(question_text):
              q = str(question_text or '')
              if any(t in q for t in ['近7天', '最近7天']):
                  return 7
              if any(t in q for t in ['过去一个月', '近一个月', '最近一个月', '最近30天', '近30天']):
                  return 30
              return 0


          def _is_abs_date_between_filter(item):
              if not isinstance(item, dict):
                  return False
              if str(item.get('field') or '').strip() != 'created_at':
                  return False
              if str(item.get('op') or '').strip() != 'between':
                  return False
              value = item.get('value')
              if not isinstance(value, list) or len(value) != 2:
                  return False
              return all(isinstance(v, dict) and '$date' in v for v in value)


          def _fill_count_metric_field(stage):
              if not isinstance(stage, dict):
                  return ''
              metric_function = str(stage.get('metric_function') or '').strip().lower()
              if metric_function != 'count':
                  return ''
              if str(stage.get('metric_field') or '').strip():
                  return ''
              primary_collection = str(stage.get('primary_collection') or '').strip().lower()
              preferred = 'order_id' if primary_collection == 'orders' else '_id'
              stage['metric_field'] = preferred
              return f'count_metric_field_filled:{preferred}'


          def _validate_and_normalize_semantic_execution_plan(plan):
              if not isinstance(plan, dict):
                  return {}, False, 'INVALID_SEMANTIC_PLAN_SCHEMA', ''
              execution_plan = plan.get('execution_plan')
              stages = execution_plan.get('stages') if isinstance(execution_plan, dict) else None
              if not isinstance(stages, list) or not stages:
                  return {}, False, 'INVALID_SEMANTIC_PLAN_SCHEMA', ''
              normalized = dict(plan)
              normalized_execution_plan = dict(execution_plan)
              normalized_stages = []
              warnings = []
              for idx, raw_stage in enumerate(stages):
                  if not isinstance(raw_stage, dict):
                      return {}, False, 'INVALID_SEMANTIC_PLAN_SCHEMA', ''
                  stage = dict(raw_stage)
                  stage.setdefault('stage_id', f'stage{idx + 1}')
                  stage.setdefault('stage_type', 'primary_query')
                  if not str(stage.get('primary_collection') or '').strip() or not str(stage.get('intent_type') or '').strip():
                      return {}, False, 'INVALID_SEMANTIC_PLAN_SCHEMA', ''
                  warn = _fill_count_metric_field(stage)
                  if warn:
                      warnings.append(warn)
                  normalized_stages.append(stage)
              normalized_execution_plan['stages'] = normalized_stages
              normalized['execution_plan'] = normalized_execution_plan
              return normalized, True, '', ';'.join(warnings)


          def main(full_status_code, full_body, local_status_code, local_body, question=''):
              code, body, source = _pick_response(full_status_code, full_body, local_status_code, local_body)
              payload = None
              result = ''
              try:
                  if code < 200 or code >= 300:
                      result = _truncate_text(body, 4000)
                  elif not body:
                      result = ''
                  else:
                      resp_json = _read_json_text(body)
                      payload = resp_json
                      result = (_extract_chat_text(resp_json) if resp_json else '') or _truncate_text(body, 4000)
              except Exception as e:
                  result = _truncate_text(f"{body}\n\nexception={e}", 4000)
              semantic_plan_raw_text = result
              parsed = None
              json_parse_ok = False
              parse_error = ''
              try:
                  semantic_plan_text = _extract_json_object_text(result)
                  semantic_plan_raw_text = semantic_plan_text or result
                  parsed = json.loads(semantic_plan_text)
                  json_parse_ok = True
              except Exception as e:
                  parse_error = str(e)
              parsed_keys = list(parsed.keys()) if isinstance(parsed, dict) else []
              normalized, plan_valid, schema_error, warning = _validate_and_normalize_semantic_execution_plan(parsed)
              normalizer_error = '' if plan_valid else (schema_error or 'INVALID_SEMANTIC_PLAN_SCHEMA')
              stages = ((normalized.get('execution_plan') or {}).get('stages') or []) if isinstance(normalized, dict) else []
              content_preview = str(semantic_plan_raw_text or '')[:1000]
              debug_summary = {
                  'source': source,
                  'http_status_code': code,
                  'body_type': type(payload).__name__ if payload is not None else 'none',
                  'content_extracted': bool(result),
                  'content_length': len(str(semantic_plan_raw_text or '')),
                  'content_preview': content_preview,
                  'json_parse_ok': json_parse_ok,
                  'parsed_type': type(parsed).__name__ if parsed is not None else 'none',
                  'parsed_keys': parsed_keys,
                  'plan_valid': plan_valid,
                  'has_execution_plan': isinstance(parsed, dict) and isinstance(parsed.get('execution_plan'), dict),
                  'has_stages': bool(stages),
                  'stages_count': len(stages),
                  'normalized': plan_valid,
                  'normalizer_warning': warning,
                  'normalizer_error': normalizer_error,
                  'content_protocol': 'semantic_execution_plan',
                  'error': parse_error,
              }
              answer_mode = ''
              needs_chart = False
              chart_request = {}
              if isinstance(normalized, dict):
                  answer_mode = str(normalized.get('answer_mode') or '').strip()
                  needs_chart = bool(normalized.get('needs_chart'))
                  chart_request = normalized.get('chart_request') if isinstance(normalized.get('chart_request'), dict) else {}
              if isinstance(parsed, dict):
                  answer_mode = answer_mode or str(parsed.get('answer_mode') or '').strip()
                  needs_chart = needs_chart or bool(parsed.get('needs_chart'))
                  if not chart_request and isinstance(parsed.get('chart_request'), dict):
                      chart_request = parsed.get('chart_request')
              return {
                  'semantic_plan_json': json.dumps(parsed if isinstance(parsed, dict) else {}, ensure_ascii=False),
                  'normalized_semantic_plan_json': json.dumps(normalized if plan_valid else {}, ensure_ascii=False),
                  'semantic_plan_raw_text': str(semantic_plan_raw_text or '')[:4000],
                  'plan_valid': plan_valid,
                  'legacy_ast_detected': False,
                  'normalizer_warning': warning,
                  'normalizer_error': normalizer_error,
                  'parse_error': parse_error,
                  'debug_summary_json': json.dumps(debug_summary, ensure_ascii=False),
                  'answer_mode': answer_mode,
                  'needs_chart': needs_chart,
                  'chart_request_json': json.dumps(chart_request, ensure_ascii=False),
              }
