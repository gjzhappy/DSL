    - data:
        code: |-
          import json
          from datetime import datetime, timezone


          INTENT_WORDS = ('描述', '分析', '总结', '说明', '对比')


          def _loads_obj(value):
              if isinstance(value, dict):
                  return value
              if isinstance(value, str) and value.strip():
                  try:
                      parsed = json.loads(value)
                      return parsed if isinstance(parsed, dict) else {}
                  except Exception:
                      return {}
              return {}


          def _rows(value):
              if isinstance(value, list):
                  return [row for row in value if isinstance(row, dict)]
              if isinstance(value, str) and value.strip():
                  try:
                      parsed = json.loads(value)
                      if isinstance(parsed, list):
                          return [row for row in parsed if isinstance(row, dict)]
                  except Exception:
                      return []
              return []


          def _answer_mode(explicit_mode, normalized_plan, semantic_plan):
              return (
                  str(explicit_mode or '').strip()
                  or str(normalized_plan.get('answer_mode') or '').strip()
                  or str(semantic_plan.get('answer_mode') or '').strip()
              )


          def _needs_analysis(question, answer_mode):
              q = str(question or '')
              return answer_mode == 'data_with_analysis' or any(word in q for word in INTENT_WORDS)


          def _execution_stages(plan):
              if not isinstance(plan, dict):
                  return []
              stages = ((plan.get('execution_plan') or {}).get('stages') or plan.get('stages') or [])
              return stages if isinstance(stages, list) else []


          def _first_stage(plan):
              stages = _execution_stages(plan)
              return stages[0] if stages and isinstance(stages[0], dict) else {}


          def _chart_request(plan):
              if not isinstance(plan, dict):
                  return {}
              chart = plan.get('chart_request') if isinstance(plan.get('chart_request'), dict) else {}
              viz = plan.get('visualization') if isinstance(plan.get('visualization'), dict) else {}
              merged = dict(chart)
              merged.update({k: v for k, v in viz.items() if v not in (None, '')})
              return merged


          def _validated_ast(plan):
              if not isinstance(plan, dict):
                  return {}
              ast = plan.get('validated_ast')
              if isinstance(ast, dict):
                  return ast
              for stage in _execution_stages(plan):
                  if isinstance(stage, dict) and isinstance(stage.get('validated_ast'), dict):
                      return stage.get('validated_ast')
              return {}


          def _field_from_ast_group(ast):
              groups = ast.get('group_by') if isinstance(ast, dict) else []
              if not isinstance(groups, list):
                  return ''
              for item in groups:
                  if isinstance(item, dict):
                      field = str(item.get('alias') or item.get('field') or '').strip()
                      if field:
                          return field
                  elif isinstance(item, str) and item.strip():
                      return item.strip()
              return ''


          def _field_from_ast_metric(ast):
              aggs = ast.get('aggregations') if isinstance(ast, dict) else []
              if not isinstance(aggs, list):
                  return ''
              for item in aggs:
                  if isinstance(item, dict):
                      field = str(item.get('alias') or item.get('field') or '').strip()
                      if field:
                          return field
                  elif isinstance(item, str) and item.strip():
                      return item.strip()
              return ''


          def _pick_group_field(rows, normalized_plan=None):
              normalized_plan = normalized_plan or {}
              row_keys = list(rows[0].keys()) if rows and isinstance(rows[0], dict) else []
              row_key_set = set(row_keys)
              for stage in _execution_stages(normalized_plan):
                  group_fields = stage.get('group_fields') if isinstance(stage, dict) else []
                  if isinstance(group_fields, list) and group_fields:
                      group = str(group_fields[0] or '').strip()
                      if group and (not row_keys or group in row_key_set):
                          return group
              ast_group = _field_from_ast_group(_validated_ast(normalized_plan))
              if ast_group and (not row_keys or ast_group in row_key_set):
                  return ast_group
              chart_x = str(_chart_request(normalized_plan).get('x_field') or _chart_request(normalized_plan).get('x_axis') or '').strip()
              if chart_x and (not row_keys or chart_x in row_key_set):
                  return chart_x
              if rows:
                  for key in row_keys:
                      if not isinstance(rows[0].get(key), (int, float)) or isinstance(rows[0].get(key), bool):
                          return key
              return row_keys[0] if row_keys else ''


          def _pick_metric_field(rows, group_field, normalized_plan=None):
              normalized_plan = normalized_plan or {}
              row_keys = list(rows[0].keys()) if rows and isinstance(rows[0], dict) else []
              row_key_set = set(row_keys)
              for stage in _execution_stages(normalized_plan):
                  metric_alias = str((stage or {}).get('metric_alias') or '').strip() if isinstance(stage, dict) else ''
                  if metric_alias and (not row_keys or metric_alias in row_key_set):
                      return metric_alias
              ast_metric = _field_from_ast_metric(_validated_ast(normalized_plan))
              if ast_metric and (not row_keys or ast_metric in row_key_set):
                  return ast_metric
              chart_y = str(_chart_request(normalized_plan).get('y_field') or _chart_request(normalized_plan).get('y_axis') or '').strip()
              if chart_y and (not row_keys or chart_y in row_key_set):
                  return chart_y
              if rows:
                  for key in row_keys:
                      value = rows[0].get(key)
                      if key != group_field and isinstance(value, (int, float)) and not isinstance(value, bool):
                          return key
              for key in row_keys:
                  if key != group_field:
                      return key
              return ''


          def _prettify(field):
              text = str(field or '').strip()
              if not text:
                  return '字段'
              return text.replace('_', ' ')


          def _schema_label_map(plan):
              labels = {}
              schema = plan.get('schema_context') if isinstance(plan, dict) else None
              if isinstance(schema, dict):
                  fields = schema.get('fields') or schema.get('field_metadata') or []
                  if isinstance(fields, dict):
                      iterable = [{'name': k, **(v if isinstance(v, dict) else {})} for k, v in fields.items()]
                  elif isinstance(fields, list):
                      iterable = fields
                  else:
                      iterable = []
                  for item in iterable:
                      if isinstance(item, dict):
                          name = str(item.get('name') or item.get('field') or '').strip()
                          label = str(item.get('label') or item.get('description') or '').strip()
                          aliases = item.get('aliases') if isinstance(item.get('aliases'), list) else []
                          if name and label:
                              labels[name] = label
                          if name and aliases and name not in labels:
                              labels[name] = str(aliases[0] or '').strip()
              return labels


          def _ast_alias_map(plan):
              aliases = {}
              ast = _validated_ast(plan)
              for item in (ast.get('group_by') or []) if isinstance(ast, dict) else []:
                  if isinstance(item, dict):
                      field = str(item.get('field') or '').strip()
                      alias = str(item.get('alias') or '').strip()
                      if field and alias:
                          aliases[field] = alias
              for item in (ast.get('aggregations') or []) if isinstance(ast, dict) else []:
                  if isinstance(item, dict):
                      field = str(item.get('field') or item.get('alias') or '').strip()
                      alias = str(item.get('alias') or '').strip()
                      if field and alias:
                          aliases[field] = alias
              return aliases


          def _field_label(field, normalized_plan=None, role=''):
              field = str(field or '').strip()
              if not field:
                  return '字段'
              labels = _schema_label_map(normalized_plan or {})
              if field in labels:
                  return labels[field]
              aliases = _ast_alias_map(normalized_plan or {})
              if field in aliases:
                  return aliases[field]
              chart = _chart_request(normalized_plan or {})
              axis_key = 'x_label' if role == 'group' else 'y_label'
              axis_label = str(chart.get(axis_key) or chart.get(role + '_label') or '').strip()
              if axis_label:
                  return axis_label
              return _prettify(field)


          def _fmt(value):
              if isinstance(value, float):
                  if value.is_integer():
                      return str(int(value))
                  return ('%.2f' % value).rstrip('0').rstrip('.')
              return str(value)


          def _summary(question, rows, normalized_plan=None):
              row_count = len(rows)
              group_field = _pick_group_field(rows, normalized_plan)
              metric_field = _pick_metric_field(rows, group_field, normalized_plan)
              group_label = _field_label(group_field, normalized_plan, 'group')
              metric_label = _field_label(metric_field, normalized_plan, 'metric')
              title = '结果摘要'
              if not rows:
                  return title + '：\n- 当前筛选条件下未查询到符合条件的数据记录。'

              bullets = [f'- 查询完成，共返回 {row_count} 条统计结果。']
              if group_field and metric_field:
                  sorted_rows = sorted(rows, key=lambda row: row.get(metric_field) if isinstance(row.get(metric_field), (int, float)) else 0, reverse=True)
                  top = sorted_rows[0]
                  top_name = top.get(group_field, '未知')
                  top_value = top.get(metric_field, '')
                  bullets.append(f'- 按 {group_label} 分组后，{top_name} 的 {metric_label} 最高，为 {_fmt(top_value)}。')
                  if row_count > 1:
                      tail = sorted_rows[-1]
                      bullets.append(f'- 排名靠后的分组是 {tail.get(group_field, "未知")}，{metric_label} 为 {_fmt(tail.get(metric_field, ""))}。')
                  preview = '、'.join([f'{row.get(group_field, "未知")}({_fmt(row.get(metric_field, ""))})' for row in sorted_rows[:5]])
                  if preview:
                      bullets.append(f'- 主要分组数据：{preview}。')
              return title + '：\n' + '\n'.join(bullets)


          def _analysis(rows, normalized_plan=None, chart_available=False):
              if not rows:
                  return '简单分析：\n- 当前筛选条件下没有可用于对比的数据记录，建议放宽时间范围或检查筛选条件。'
              group_field = _pick_group_field(rows, normalized_plan)
              metric_field = _pick_metric_field(rows, group_field, normalized_plan)
              group_label = _field_label(group_field, normalized_plan, 'group')
              metric_label = _field_label(metric_field, normalized_plan, 'metric')
              if not group_field or not metric_field:
                  return '简单分析：\n- 已返回查询结果，但字段结构不足以自动识别分组维度和指标，可结合统计结果查看整体分布。'
              numeric = [row for row in rows if isinstance(row.get(metric_field), (int, float)) and not isinstance(row.get(metric_field), bool)]
              if len(numeric) < 2:
                  return '简单分析：\n- 分组数量较少，暂不适合做明显的横向对比。'
              sorted_rows = sorted(numeric, key=lambda row: row.get(metric_field), reverse=True)
              top, second = sorted_rows[0], sorted_rows[1]
              gap = top.get(metric_field) - second.get(metric_field)
              prefix = '从图表看' if chart_available else '从统计结果看'
              return (
                  '简单分析：\n'
                  f'- {prefix}，{top.get(group_field, "未知")} 的 {metric_label} 最高，比第二名 '
                  f'{second.get(group_field, "未知")} 高 {_fmt(gap)}。\n'
                  f'- 可优先关注排名靠前的分组（{top.get(group_field, "未知")}、{second.get(group_field, "未知")}）以及排名靠后的分组，继续分析不同 {group_label} 的差异情况。'
              )


          def _result_fields_json(rows):
              seen = []
              for row in rows[:10]:
                  for key in row.keys():
                      if key not in seen:
                          seen.append(key)
              return json.dumps(seen, ensure_ascii=False)


          def _plan_needs_chart(normalized_plan, semantic_plan, question):
              viz = normalized_plan.get('visualization') if isinstance(normalized_plan.get('visualization'), dict) else {}
              chart_request = normalized_plan.get('chart_request') if isinstance(normalized_plan.get('chart_request'), dict) else {}
              text = str(question or '')
              asked = any(k in text for k in ['图', '柱状图', '折线图', '饼图', '图表', '做图', '可视化'])
              return bool(normalized_plan.get('needs_chart') or semantic_plan.get('needs_chart') or viz.get('enabled') or chart_request.get('enabled') or asked)


          def main(question: str, semantic_plan_json: str, normalized_semantic_plan_json: str, rows, chart_echarts_markdown: str, answer_mode: str):
              semantic_plan = _loads_obj(semantic_plan_json)
              normalized_plan = _loads_obj(normalized_semantic_plan_json)
              mode = _answer_mode(answer_mode, normalized_plan, semantic_plan)
              result_rows = _rows(rows)
              chart = str(chart_echarts_markdown or '').strip()
              chart_enabled = bool(_chart_request(normalized_plan).get('enabled') or normalized_plan.get('needs_chart'))
              chart_available = bool(chart_enabled and chart)
              needs_text = _needs_analysis(question, mode)

              parts = []
              if chart_available:
                  parts.append(chart)
              if chart_available or needs_text or not chart_available or not result_rows:
                  parts.append(_summary(question, result_rows, normalized_plan))
                  parts.append(_analysis(result_rows, normalized_plan, chart_available))
              if _plan_needs_chart(normalized_plan, semantic_plan, question) and not chart_available and result_rows:
                  warning = (((normalized_plan.get('visualization') or {}).get('warning')) if isinstance(normalized_plan.get('visualization'), dict) else '') or '图表字段未匹配或图表配置不可用'
                  parts.append('图表说明：\n- 本次查询已返回可统计数据，但图表未生成，原因：' + str(warning))
              if not parts:
                  parts.append('当前筛选条件下未查询到符合条件的数据记录。')

              answer = '\n\n'.join(part for part in parts if part)
              if not chart_available:
                  for phrase in ['从柱状图看', '从图表看', '如图所示']:
                      answer = answer.replace(phrase, '从统计结果看')
              return {
                  'final_answer_markdown': answer,
                  'answer_mode': mode,
                  'final_answer_summary': ('\n\n'.join(part for part in parts if part and part != chart))[:4000],
                  'last_result_fields_json': _result_fields_json(result_rows),
                  'last_updated_at': datetime.now(timezone.utc).isoformat(),
                  'has_last_context_state': 'true' if (result_rows or chart or parts) else 'false',
              }
