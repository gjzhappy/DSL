    - data:
        code: |
          import json
          import re

          ALLOWED = {'new_query','modify_chart','refine_query','explain_result','reanalyze_result','fix_result','continue_previous','clarify'}
          SCHEMA_KEYS = {'turn_intent','need_previous_context','need_requery','need_rechart','need_analysis','can_answer_directly','reason','missing_info','chart_modification','query_refinement','analysis_focus'}


          def _strip_code_block(text):
              text = str(text or '').strip()
              m = re.match(r'^```(?:json)?\s*(.*?)\s*```$', text, flags=re.I | re.S)
              return m.group(1).strip() if m else text


          def _extract_json(text):
              text = _strip_code_block(text)
              start, end = text.find('{'), text.rfind('}')
              return text[start:end + 1] if start >= 0 and end >= start else text


          def _loads_obj(value):
              if isinstance(value, dict):
                  return dict(value)
              if isinstance(value, str) and value.strip():
                  try:
                      parsed = json.loads(_extract_json(value))
                      return parsed if isinstance(parsed, dict) else {}
                  except Exception:
                      return {}
              return {}


          def _bool(value, default=False):
              if isinstance(value, bool):
                  return value
              if value is None or value == '':
                  return default
              return str(value).strip().lower() in {'1','true','yes','y','on'}


          def _defaults(intent):
              base = {'need_previous_context': False, 'need_requery': True, 'need_rechart': False, 'need_analysis': True, 'can_answer_directly': False}
              if intent == 'modify_chart':
                  base.update({'need_previous_context': True, 'need_requery': False, 'need_rechart': True, 'need_analysis': True})
              elif intent in {'explain_result','reanalyze_result'}:
                  base.update({'need_previous_context': True, 'need_requery': False, 'need_rechart': False, 'need_analysis': True})
              elif intent == 'continue_previous':
                  base.update({'need_previous_context': True, 'need_requery': False, 'need_rechart': False, 'need_analysis': True})
              elif intent == 'clarify':
                  base.update({'need_previous_context': False, 'need_requery': False, 'need_rechart': False, 'need_analysis': False, 'can_answer_directly': True})
              elif intent == 'refine_query':
                  base.update({'need_previous_context': True, 'need_requery': True, 'need_rechart': True, 'need_analysis': True})
              elif intent == 'fix_result':
                  base.update({'need_previous_context': True, 'need_requery': True, 'need_rechart': True, 'need_analysis': True})
              return base


          def main(intent_structured, intent_text: str, last_context_json: str, question: str):
              ctx = _loads_obj(last_context_json)
              obj = _loads_obj(intent_structured)
              source = 'structured_output' if obj else 'text'
              if not obj:
                  obj = _loads_obj(intent_text)
              valid = bool(obj)
              err = '' if valid else 'intent json parse failed; fallback to new_query'
              obj = {k: obj.get(k) for k in SCHEMA_KEYS}
              intent = str(obj.get('turn_intent') or 'new_query').strip()
              if intent not in ALLOWED:
                  intent = 'new_query'; valid = False; err = (err + '; invalid intent').strip('; ')
              d = _defaults(intent)
              for k in ['need_previous_context','need_requery','need_rechart','need_analysis','can_answer_directly']:
                  obj[k] = _bool(obj.get(k), d[k])
              obj['turn_intent'] = intent
              obj['missing_info'] = obj.get('missing_info') if isinstance(obj.get('missing_info'), list) else []
              obj['chart_modification'] = obj.get('chart_modification') if isinstance(obj.get('chart_modification'), dict) else {}
              obj['query_refinement'] = obj.get('query_refinement') if isinstance(obj.get('query_refinement'), dict) else {}
              obj['analysis_focus'] = str(obj.get('analysis_focus') or '')
              obj['reason'] = str(obj.get('reason') or '')
