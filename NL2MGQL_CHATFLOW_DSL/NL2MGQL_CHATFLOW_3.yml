        code: |
          import json


          def _safe_json(value):
              if value is None or value == '':
                  return ''
              try:
                  return json.dumps(value, ensure_ascii=False) if not isinstance(value, str) else value
              except Exception:
                  return str(value)


          def _rows(value):
              if isinstance(value, list):
                  return [x for x in value if isinstance(x, dict)]
              if isinstance(value, str) and value.strip():
                  try:
                      parsed = json.loads(value)
                      return [x for x in parsed if isinstance(x, dict)] if isinstance(parsed, list) else []
                  except Exception:
                      return []
              return []


          def main(last_question: str, last_normalized_semantic_plan_json: str, last_normalized_execution_plan, last_merged_rows, last_query_result_json_state: str, last_chart, last_chart_request_json_state: str, last_chart_echarts_markdown: str, last_result_summary: str):
              rows = _rows(last_query_result_json_state) or _rows(last_merged_rows)
              result_fields = []
              if rows:
                  seen = []
                  for row in rows[:10]:
                      for key in row.keys():
                          if key not in seen:
                              seen.append(key)
                  result_fields = seen
              old_semantic_plan_json = _safe_json(last_normalized_semantic_plan_json)
              last_rows_json = json.dumps(rows, ensure_ascii=False)
              last_chart_json = str(last_chart_request_json_state or '').strip() or _safe_json(last_chart)
              last_question_text = str(last_question or '').strip()
              has_plan = bool(str(old_semantic_plan_json or '').strip())
              has_rows = bool(rows)
              has_chart = bool(str(last_chart_json or '').strip())
              has_last_context = bool(last_question_text and (has_plan or has_rows or has_chart))
              payload = {
                  'has_last_context': has_last_context,
                  'last_question': str(last_question or ''),
                  'last_normalized_semantic_plan_json': old_semantic_plan_json,
                  'last_normalized_execution_plan_debug_json': _safe_json(last_normalized_execution_plan),
                  'last_query_result_json': last_rows_json,
                  'last_chart_request_json': last_chart_json,
                  'last_chart_echarts_markdown': str(last_chart_echarts_markdown or ''),
                  'last_final_answer_summary': str(last_result_summary or ''),
                  'result_rows_count': len(rows),
                  'result_fields': result_fields,
                  'result_preview': rows[:5],
              }
              return {
                  'has_last_context': has_last_context,
                  'last_context_json': json.dumps(payload, ensure_ascii=False),
                  'old_normalized_semantic_plan_json': old_semantic_plan_json,
                  'last_query_result_json': last_rows_json,
                  'last_chart_request_json': last_chart_json,
              }
