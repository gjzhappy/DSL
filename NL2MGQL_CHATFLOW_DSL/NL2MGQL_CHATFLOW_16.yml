          def _shallow_row(row, max_fields=20, max_str=160):
              out = {}
              if not isinstance(row, dict):
                  return out
              for k, v in row.items():
                  if len(out) >= max_fields:
                      break
                  key = str(k)
                  if isinstance(v, (str, int, float, bool)) or v is None:
                      out[key] = v[:max_str] if isinstance(v, str) else v
                  elif isinstance(v, dict):
                      out[key] = json.dumps(v, ensure_ascii=False, default=str)[:max_str]
                  elif isinstance(v, list):
                      out[key] = json.dumps(v[:5], ensure_ascii=False, default=str)[:max_str]
                  else:
                      out[key] = str(v)[:max_str]
              return out

          def _shallow_result_profile(profile):
