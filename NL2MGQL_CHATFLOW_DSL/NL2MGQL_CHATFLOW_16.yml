              plan = plan if isinstance(plan, dict) else {}
              chart = plan.get("chart_request") if isinstance(plan.get("chart_request"), dict) else {}
              related = plan.get("related_collections") if isinstance(plan.get("related_collections"), list) else []
              stages = plan.get("stages") if isinstance(plan.get("stages"), list) else []
              return {
                  "contract_version": _str(plan.get("contract_version")),
                  "primary_collection": _str(plan.get("primary_collection")),
                  "related_collections": [str(x) for x in related[:10]],
                  "execution_mode": _str(plan.get("execution_mode")),
                  "stage_count": len(stages),
                  "needs_chart": bool(plan.get("needs_chart")),
                  "chart_request": {
                      "enabled": bool(chart.get("enabled")),
                      "chart_type": _str(chart.get("chart_type")),
                      "x_field": _str(chart.get("x_field")),
                      "y_field": _str(chart.get("y_field")),
                      "series_name": _str(chart.get("series_name")),
                  },
              }

          def _debug_output(debug, route, plan, warnings, errors):
              debug = debug if isinstance(debug, dict) else {}
              schema_ref = debug.get("schema_context_ref") if isinstance(debug.get("schema_context_ref"), dict) else {}
              stages = plan.get("stages") if isinstance(plan, dict) and isinstance(plan.get("stages"), list) else []
              return {
                  "validator_route": route or "",
                  "schema_context_ready": bool(schema_ref),
                  "schema_context_ref": {
                      "collections": [str(x) for x in (schema_ref.get("collections") or [])[:20]],
                      "schema_digest": _str(schema_ref.get("schema_digest")),
                      "schema_version": _str(schema_ref.get("schema_version")),
                      "catalog_digest": _str(schema_ref.get("catalog_digest")),
                  },
                  "stage_count": len(stages),
                  "warnings_count": len(warnings if isinstance(warnings, list) else []),
                  "errors_count": len(errors if isinstance(errors, list) else []),
              }


          def _finalize(res: Dict[str, Any]) -> Dict[str, Any]:
              route = res.get("validator_route")
              if route == "valid":
                  text = ""
                  answer_type = "query_only"
                  should_save = False
              elif route == "requires_clarification":
                  text = res.get("clarification_question") or "我需要确认一下查询字段后再执行。"
                  answer_type = "clarification"
                  should_save = False
              elif route in {"blocked", "needs_replan"}:
                  reason = res.get("blocked_reason") or "; ".join(_list(res.get("errors"))) or "语义计划未通过校验。"
                  text = "当前查询无法执行：" + reason
                  answer_type = "validation_error"
                  should_save = False
              else:
                  text = "系统在处理该查询时出现异常，请调整问题后重试。"
                  answer_type = "system_error"
                  should_save = False
              res["answer_type"] = answer_type if route != "valid" else res.get("answer_type")
              res["final_answer_markdown"] = text
              res["answer_payload_markdown"] = text
              schema_ref = {}
              dbg = res.get("debug") if isinstance(res.get("debug"), dict) else {}
              if isinstance(dbg.get("schema_context_ref"), dict):
                  schema_ref = dbg.get("schema_context_ref")
              prior = dbg.get("prior_compact_context") if isinstance(dbg.get("prior_compact_context"), dict) else {}
              compact = {
                  "context_version": "compact_context_contract",
                  "has_last_context": bool(prior.get("has_last_context")),
                  "last_question": _str(dbg.get("question")),
                  "last_turn_intent": {"validator_route": route or "invalid", "answer_type": answer_type},
                  "last_primary_collection": prior.get("last_primary_collection") or "",
                  "last_related_collections": prior.get("last_related_collections") if isinstance(prior.get("last_related_collections"), list) else [],
                  "last_plan_summary": prior.get("last_plan_summary") if isinstance(prior.get("last_plan_summary"), dict) else {},
                  "last_resolved_fields": prior.get("last_resolved_fields") if isinstance(prior.get("last_resolved_fields"), list) else [],
                  "last_resolved_metrics": prior.get("last_resolved_metrics") if isinstance(prior.get("last_resolved_metrics"), list) else [],
                  "last_chart_request": prior.get("last_chart_request") if isinstance(prior.get("last_chart_request"), dict) else {},
                  "last_result_profile": _shallow_result_profile(prior.get("last_result_profile")),
                  "schema_context_ref": schema_ref or prior.get("schema_context_ref") or {"collections": [], "schema_digest": "", "schema_version": "", "catalog_digest": ""},
                  "answer_summary": text[:800],
                  "size_guard": {},
                  "context_warnings": [],
              }
              compact_json = json.dumps(compact, ensure_ascii=False)
              answer_payload = {
                  "contract_version": "answer_payload_contract",
                  "answer_type": answer_type if route != "valid" else (res.get("answer_type") or "query_only"),
                  "answer_text": text,
                  "chart_echarts_markdown": "",
                  "result_summary": text[:800],
                  "message": "",
                  "chart_payload": {},
                  "query_result_profile": {"row_count": 0, "fields": [], "preview_rows": []},
                  "state_update": {"should_save_context": should_save, "context_summary": compact},
              }
              context_update = {"contract_version": "context_update_contract", "should_save_context": should_save, "compact_context": compact, "last_context_json": compact_json, "warnings": [], "clear_fields": []}
              full_plan = res.get("normalized_plan") if isinstance(res.get("normalized_plan"), dict) else {}
              full_debug = res.get("debug") if isinstance(res.get("debug"), dict) else {}
              res["normalized_plan"] = _normalized_plan_output(full_plan)
              res["debug"] = _debug_output(full_debug, route, full_plan, _list(res.get("warnings")), _list(res.get("errors")))
              res["answer_payload_json"] = json.dumps(answer_payload, ensure_ascii=False)
              res["context_update_json"] = json.dumps(context_update, ensure_ascii=False)
              res["compact_context_json"] = compact_json
              res["validator_result_json"] = json.dumps({k: v for k, v in res.items() if k not in {"validator_result_json"}}, ensure_ascii=False)
              return res


          def main(**kwargs: Any) -> Dict[str, Any]:
              return semantic_plan_validator(**kwargs)

