    - data:
        code: |
          import json
          import re

          ALLOWED = {'new_query','modify_chart','refine_query','explain_result','reanalyze_result','fix_result','continue_previous','clarify'}
          SCHEMA_KEYS = {'turn_intent','need_previous_context','need_requery','need_rechart','need_analysis','can_answer_directly','reason','missing_info','chart_modification','query_refinement','analysis_focus','refine_route','needed_collections','keep_previous_primary','collection_switch','collection_reason','unresolved_collection_terms'}


          def _strip_code_block(text):
              text = str(text or '').strip()
              m = re.match(r'^```(?:json)?\s*(.*?)\s*```$', text, flags=re.I | re.S)
              return m.group(1).strip() if m else text


          def _extract_json(text):
              text = _strip_code_block(text)
              start, end = text.find('{'), text.rfind('}')
              return text[start:end + 1] if start >= 0 and end >= start else text


          def _loads_obj(value):
              if isinstance(value, dict):
                  return dict(value)
              if isinstance(value, str) and value.strip():
                  try:
                      parsed = json.loads(_extract_json(value))
                      return parsed if isinstance(parsed, dict) else {}
                  except Exception:
                      return {}
              return {}


          def _bool(value, default=False):
              if isinstance(value, bool):
                  return value
              if value is None or value == '':
                  return default
              return str(value).strip().lower() in {'1','true','yes','y','on'}


          def _list(value):
              if isinstance(value, list):
                  return [str(x).strip() for x in value if str(x).strip()]
              if value in (None, ''):
                  return []
              return [str(value).strip()]

          def _first_stage(plan):
              stages = ((plan.get('execution_plan') or {}).get('stages') or plan.get('stages') or []) if isinstance(plan, dict) else []
              return stages[0] if isinstance(stages, list) and stages and isinstance(stages[0], dict) else {}

          def _add(out, value):
              text = str(value or '').strip()
              if text and text not in out:
                  out.append(text)

          def _same_semantic(a, b):
              def clean(v):
                  if isinstance(v, dict):
                      return {k: x for k, x in v.items() if x not in (None, '', [], {})}
                  if isinstance(v, list):
                      return [x for x in v if str(x or '').strip()]
                  return str(v or '').strip()
              return json.dumps(clean(a), ensure_ascii=False, sort_keys=True) == json.dumps(clean(b), ensure_ascii=False, sort_keys=True)

          def _context_binding(obj, old_plan):
              qref = obj.get('query_refinement') if isinstance(obj.get('query_refinement'), dict) else {}
              st = _first_stage(old_plan)
              tr = st.get('time_range') if isinstance(st.get('time_range'), dict) else {}
              base = str(old_plan.get('primary_collection') or st.get('collection') or st.get('primary_collection') or '').strip()
              explicit_switch = bool(qref.get('collection_switch') or qref.get('target_collection') or qref.get('collection'))
              changed, replaced, deprecated = [], {}, []
              old_groups = _list(st.get('group_fields'))
              new_group = qref.get('group_by_dimension') or qref.get('dimension') or qref.get('group_fields')
              if new_group not in (None, '', [], {}) and old_groups:
                  changed.append('group_by_dimension')
                  replaced['group_by_dimension'] = {'old': old_groups, 'new_semantic': new_group}
                  for f in old_groups: _add(deprecated, f)
