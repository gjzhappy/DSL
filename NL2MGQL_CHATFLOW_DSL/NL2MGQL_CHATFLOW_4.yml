        code: |
          import json, re

          def _extract(text):
              text = str(text or '').strip()
              m = re.match(r'^```(?:json)?\s*(.*?)\s*```$', text, flags=re.I | re.S)
              if m:
                  text = m.group(1).strip()
              s, e = text.find('{'), text.rfind('}')
              return text[s:e + 1] if s >= 0 and e >= s else text

          def _loads(v):
              if isinstance(v, dict):
                  return v
              if isinstance(v, str) and v.strip():
                  try:
                      return json.loads(_extract(v))
                  except Exception:
                      return {}
              return {}

          def _as_list(v):
              if isinstance(v, list):
                  return [str(x).strip() for x in v if str(x).strip()]
              if isinstance(v, str) and v.strip():
                  return [v.strip()]
              return []

          def _build_markdown_from_debug(debug):
              if not isinstance(debug, dict):
                  return ''

              observations = _as_list(debug.get('observations'))
              insights = _as_list(debug.get('insights'))
              suggestions = _as_list(debug.get('suggestions'))

              parts = []

              if observations:
                  parts.append('### 看到的现象')
                  parts.extend([f'{i + 1}. {x}' for i, x in enumerate(observations)])

              if insights:
                  if parts:
                      parts.append('')
                  parts.append('### 初步判断')
                  parts.extend([f'{i + 1}. {x}' for i, x in enumerate(insights)])

              if suggestions:
                  if parts:
                      parts.append('')
                  parts.append('### 建议下一步')
                  parts.extend([f'{i + 1}. {x}' for i, x in enumerate(suggestions)])

              return '\n'.join(parts).strip()

          def main(analysis_structured, analysis_text: str, last_context_json: str):
              obj = _loads(analysis_structured) or _loads(analysis_text)

              debug = obj.get('analysis_debug_json') if isinstance(obj.get('analysis_debug_json'), dict) else {}
              text = str(obj.get('analysis_markdown') or '').strip()

              if not text:
                  text = _build_markdown_from_debug(debug)

              fallback_used = False
              if not text:
                  fallback_used = True
                  try:
                      ctx = json.loads(last_context_json or '{}')
                      count = int(ctx.get('result_rows_count') or 0)
                      fields = ', '.join(ctx.get('result_fields') or [])
                  except Exception:
                      count = 0
                      fields = ''

                  text = '从当前统计结果看，已返回 %s 行结果%s。LLM 分析暂不可用，建议结合图表和结果摘要判断差异；如需验证原因，需要进一步补充筛选条件或重新查询。' % (
                      count,
                      ('，字段包括：' + fields) if fields else ''
                  )

              if fallback_used and not debug:
                  debug = {'fallback': True}

              return {
                  'analysis_markdown': text,
                  'analysis_debug_json': json.dumps(debug, ensure_ascii=False),
                  'final_answer_markdown': text,
                  'final_answer_summary': text[:4000]
              }
