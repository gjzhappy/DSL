    - data:
        code: |
          import json
          import re
          from copy import deepcopy

          COMPLEX_TERMS = ('真实厂商', '供应商', '高价值客户', '异常订单', '有效订单', '退款订单', '产品线', '业务归属', '客户等级', '真实口径', '厂商口径')
          CHART_ONLY_TERMS = ('换成饼图', '换为饼图', '改成饼图', '换成折线图', '换为折线图', '改成折线图', '换成柱状图', '换为柱状图', '改成柱状图')


          def _loads(v):
              if isinstance(v, dict):
                  return v
              if isinstance(v, str) and v.strip():
                  try:
                      x = json.loads(v)
                      return x if isinstance(x, dict) else {}
                  except Exception:
                      return {}
              return {}


          def _bool(v):
              if isinstance(v, bool):
                  return v
              return str(v or '').strip().lower() in {'1', 'true', 'yes', 'y', 'on'}


          def _stages(plan):
              ep = plan.get('execution_plan') if isinstance(plan, dict) else {}
              stages = ep.get('stages') if isinstance(ep, dict) else plan.get('stages')
              return stages if isinstance(stages, list) else []


          def _set_all_stage_time(plan, days=None, mode=None):
              changed = False
              for st in _stages(plan):
                  if not isinstance(st, dict):
                      continue
                  tr = st.get('time_range') if isinstance(st.get('time_range'), dict) else {}
                  if days:
                      tr.update({'mode': 'relative_days', 'relative_days': int(days), 'start': '', 'end': ''})
                  elif mode:
                      tr.update({'mode': mode, 'start': '', 'end': ''})
                  st['time_range'] = tr
                  changed = True
              return changed


          def _patch_limit(plan, n):
              changed = False
              for st in _stages(plan):
                  if isinstance(st, dict):
                      st['limit'] = min(max(int(n), 1), 500)
                      changed = True
              return changed


          def _patch_sort(plan, direction):
              changed = False
              for st in _stages(plan):
                  if not isinstance(st, dict):
                      continue
                  sort = st.get('sort') if isinstance(st.get('sort'), list) else []
                  if not sort:
                      sort = [{'field': st.get('metric_alias') or st.get('metric_field') or '', 'direction': direction}]
                  for item in sort:
                      if isinstance(item, dict):
                          item['direction'] = direction
                  st['sort'] = sort
                  changed = True
              return changed


          def _patch_display(plan, q):
              changed = []
              if any(x in q for x in ('不要图', '不用图', '不画图', '只描述结果')):
                  plan['needs_chart'] = False
                  plan['chart_request'] = {}
                  if isinstance(plan.get('visualization'), dict):
                      plan['visualization']['enabled'] = False
                  changed.extend(['needs_chart', 'chart_request'])
              if any(x in q for x in ('加分析', '简单分析')):
                  plan['answer_mode'] = 'data_with_analysis'
                  changed.append('answer_mode')
              if '只描述结果' in q:
                  plan['answer_mode'] = 'data_only'
                  changed.append('answer_mode')
              return changed


          def main(question: str, old_normalized_semantic_plan_json: str, query_refinement_json: str, turn_intent: str, need_requery, last_chart_request_json: str):
              q = str(question or '')
              old = _loads(old_normalized_semantic_plan_json)
              debug = {'turn_intent': str(turn_intent or ''), 'need_requery': _bool(need_requery), 'has_old_plan': bool(old)}
              if not old:
                  return {'patch_applied': False, 'requires_full_replan': True, 'patched_normalized_semantic_plan_json': '', 'changed_fields': '[]', 'patch_reason': '缺少上一轮 normalized semantic plan，无法执行确定性 patch', 'patch_error': 'missing_old_plan', 'patch_debug_json': json.dumps(debug, ensure_ascii=False)}
              if any(term in q for term in CHART_ONLY_TERMS):
                  return {'patch_applied': False, 'requires_full_replan': False, 'patched_normalized_semantic_plan_json': '', 'changed_fields': '[]', 'patch_reason': '本轮看起来只是图表类型修改，应由 chart 分支复用上一轮结果，不应触发 Mongo 重查', 'patch_error': 'chart_only_refine', 'patch_debug_json': json.dumps(debug, ensure_ascii=False)}
              if any(term in q for term in COMPLEX_TERMS):
                  return {'patch_applied': False, 'requires_full_replan': True, 'patched_normalized_semantic_plan_json': '', 'changed_fields': '[]', 'patch_reason': '用户引入了可能涉及新字段、新 collection 或新业务口径的复杂语义，必须重新检索 schema 并重规划', 'patch_error': '', 'patch_debug_json': json.dumps({**debug, 'complex_terms': [t for t in COMPLEX_TERMS if t in q]}, ensure_ascii=False)}
              plan = deepcopy(old)
              changed = []
              m = re.search(r'(?:近|最近|过去)\s*(7|30)\s*天', q)
              if m and _set_all_stage_time(plan, days=m.group(1)):
                  changed.append('time_range')
              elif '过去一个月' in q or '最近一个月' in q or '近一个月' in q:
                  if _set_all_stage_time(plan, days=30):
                      changed.append('time_range')
              elif '今年' in q:
                  if _set_all_stage_time(plan, mode='this_year'):
                      changed.append('time_range')
              elif '上个月' in q:
                  if _set_all_stage_time(plan, mode='last_month'):
                      changed.append('time_range')
              m = re.search(r'(?:top|前|只看前|限制)\s*(\d+)\s*(?:条|名|个)?', q, flags=re.I)
              if m and _patch_limit(plan, m.group(1)):
                  changed.append('limit')
              if any(x in q for x in ('升序', '从小到大', '从低到高')) and _patch_sort(plan, 'asc'):
                  changed.append('sort')
              if any(x in q for x in ('降序', '从大到小', '从高到低')) and _patch_sort(plan, 'desc'):
                  changed.append('sort')
              changed.extend(_patch_display(plan, q))
              changed = sorted(set(changed))
              if not changed:
                  return {'patch_applied': False, 'requires_full_replan': True, 'patched_normalized_semantic_plan_json': '', 'changed_fields': '[]', 'patch_reason': '未发现可安全确定性修正的字段，进入 refine full replan', 'patch_error': '', 'patch_debug_json': json.dumps(debug, ensure_ascii=False)}
              return {'patch_applied': True, 'requires_full_replan': False, 'patched_normalized_semantic_plan_json': json.dumps(plan, ensure_ascii=False), 'changed_fields': json.dumps(changed, ensure_ascii=False), 'patch_reason': '高确定性规则修正：' + ','.join(changed), 'patch_error': '', 'patch_debug_json': json.dumps(debug, ensure_ascii=False)}
        code_language: python3
        desc: refine_query 高确定性 patch：仅处理时间范围、TopN/limit、排序方向等，不硬猜复杂业务语义。
        outputs:
          patch_applied:
            children:
            type: boolean
          requires_full_replan:
            children:
