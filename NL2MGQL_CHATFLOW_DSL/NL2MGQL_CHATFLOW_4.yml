          import json, re
          PROTECT=['primary_collection','related_collections','group_fields','metric_function','metric_field','metric_alias','filters','time_range','sort','limit','needs_chart','chart_request','answer_mode']

          def _loads(v):
              if isinstance(v,dict): return v
              if isinstance(v,str) and v.strip():
                  try:
                      x=json.loads(v); return x if isinstance(x,dict) else {}
                  except Exception: return {}
              return {}

          def _list(v):
              if isinstance(v,list): return v
              if isinstance(v,str) and v.strip():
                  try:
                      x=json.loads(v); return x if isinstance(x,list) else []
                  except Exception: return []
              return []

          def _first_stage(plan):
              stages=((plan.get('execution_plan') or {}).get('stages') or plan.get('stages') or []) if isinstance(plan,dict) else []
              return stages[0] if isinstance(stages,list) and stages and isinstance(stages[0],dict) else {}

          def _set_stage(plan, stage):
              if not isinstance(plan.get('execution_plan'),dict): plan['execution_plan']={}
              stages=plan['execution_plan'].get('stages')
              if not isinstance(stages,list) or not stages: stages=[{}]
              stages[0].update(stage); plan['execution_plan']['stages']=stages
