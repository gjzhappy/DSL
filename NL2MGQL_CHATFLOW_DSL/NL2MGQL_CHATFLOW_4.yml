              stage0 = stages[0] if isinstance(stages, list) and stages and isinstance(stages[0], dict) else {}
              return str(normalized_plan.get('primary_collection') or stage0.get('primary_collection') or stage0.get('collection') or '').strip()


          def _schema_metadata_from_plan(normalized_plan=None):
              normalized_plan = normalized_plan or {}
              meta = normalized_plan.get('schema_metadata') or normalized_plan.get('schema_metadata_json')
              if isinstance(meta, str) and meta.strip():
                  try:
                      meta = json.loads(meta)
                  except Exception:
                      meta = None
              if isinstance(meta, dict) and isinstance(meta.get('collections'), dict):
                  return meta
              schema_context = normalized_plan.get('schema_context') if isinstance(normalized_plan.get('schema_context'), str) else ''
              return extract_schema_metadata(schema_context)


          def _field_label_from_plan(normalized_plan=None, field='', role='field'):
              field = str(field or '').strip()
