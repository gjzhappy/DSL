    - data:
        code: |
          import json
          from datetime import datetime, timezone

          def _now_iso():
              return datetime.now(timezone.utc).isoformat()

          def _loads(value, fallback):
              if isinstance(value, (dict, list)): return value
              if isinstance(value, str) and value.strip():
                  try: return json.loads(value)
                  except Exception: return fallback
              return fallback

          def _rows(value):
              parsed=_loads(value,value)
              return [x for x in parsed if isinstance(x,dict)] if isinstance(parsed,list) else []

          def _num(v):
              if v is None or isinstance(v,bool): return None
              try:
                  if isinstance(v,str) and not v.strip(): return None
                  return float(v)
              except Exception: return None

          def _markdown(option):
              fence=chr(96)*3
              return fence+'echarts\n'+json.dumps(option,ensure_ascii=False,indent=2)+'\n'+fence

          def clean_chart_request_for_context(req):
              allowed_keys=['enabled','renderer','chart_type','x_field','y_field','title','series_name','top_n','sort','label','warning']
              return {k:req.get(k) for k in allowed_keys if k in req}

          def _apply_sort_top(rows, req):
              data=list(rows)
              sort=req.get('sort') if isinstance(req.get('sort'),dict) else {}
              field=str(sort.get('field') or req.get('y_field') or '').strip()
              direction=str(sort.get('direction') or '').lower().strip()
              if field and direction in {'asc','desc'}:
                  data=sorted(data, key=lambda r: (_num(r.get(field)) if _num(r.get(field)) is not None else str(r.get(field) or '')), reverse=(direction=='desc'))
              try: top_n=int(req.get('top_n') or 0)
              except Exception: top_n=0
              return data[:top_n] if top_n>0 else data

          def main(last_merged_rows, normalized_chart_request_json: str, chart_valid, chart_warning: str, chart_error: str):
              rows=_rows(last_merged_rows); req=_loads(normalized_chart_request_json,{}) if isinstance(_loads(normalized_chart_request_json,{}),dict) else {}
              if not chart_valid or not rows:
                  text=(chart_error or '当前结果不适合生成图表。') + ('\n\n'+chart_warning if chart_warning else '')
                  return {'final_answer_markdown': text, 'chart_request': req, 'chart_request_for_context': clean_chart_request_for_context(req), 'chart_echarts_markdown': '', 'final_answer_summary': text, 'updated_at': _now_iso()}
              x=str(req.get('x_field') or '').strip(); y=str(req.get('y_field') or '').strip(); chart_type=str(req.get('chart_type') or 'bar').strip().lower(); title=str(req.get('title') or '上一轮结果图表').strip()
              data_rows=_apply_sort_top(rows[:200], req)
              categories=[]; values=[]; pie_data=[]; scatter_data=[]
              for row in data_rows:
                  name=str(row.get(x) if row.get(x) is not None else '未分类')
                  val=_num(row.get(y)) or 0
                  categories.append(name); values.append(val); pie_data.append({'name':name,'value':val})
                  if chart_type=='scatter':
                      xv=_num(row.get(x)); yv=_num(row.get(y))
                      if xv is not None and yv is not None: scatter_data.append([xv,yv])
              if chart_type=='pie':
                  option={'title':{'text':title},'tooltip':{'trigger':'item'},'series':[{'name':y,'type':'pie','data':pie_data}]}
              elif chart_type=='scatter':
                  option={'title':{'text':title},'tooltip':{'trigger':'item'},'xAxis':{'type':'value','name':x},'yAxis':{'type':'value','name':y},'series':[{'name':req.get('series_name') or y,'type':'scatter','data':scatter_data}]}
              else:
                  series={'name':req.get('series_name') or y,'type':'line' if chart_type in {'line','area'} else 'bar','data':values}
                  if chart_type=='area': series['areaStyle']={}
                  option={'title':{'text':title},'tooltip':{'trigger':'axis'},'xAxis':{'type':'category','data':categories},'yAxis':{'type':'value'},'series':[series]}
              note='已基于上一轮查询结果复用数据并更新图表展示。'
              if chart_warning: note+='\n\n提示：'+chart_warning
              md=_markdown(option); final=md+'\n\n'+note
              return {'final_answer_markdown': final, 'chart_request': req, 'chart_request_for_context': clean_chart_request_for_context(req), 'chart_echarts_markdown': md, 'final_answer_summary': note, 'updated_at': _now_iso()}
