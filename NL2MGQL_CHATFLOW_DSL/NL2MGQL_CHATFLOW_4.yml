          def _bool(v):
              if isinstance(v, bool):
                  return v
              return str(v or '').strip().lower() in {'1', 'true', 'yes', 'y', 'on'}


          def _stages(plan):
              ep = plan.get('execution_plan') if isinstance(plan, dict) else {}
              stages = ep.get('stages') if isinstance(ep, dict) else plan.get('stages')
              return stages if isinstance(stages, list) else []


          def _cn_number_to_float(raw):
              s = str(raw or '').strip()
              if not s:
                  return None
              if re.fullmatch(r'\d+', s):
                  return float(int(s))
              if s in CN_NUMBERS:
                  return float(CN_NUMBERS[s])
              if s.startswith('十') and len(s) > 1 and s[1:] in CN_NUMBERS:
                  return float(10 + int(CN_NUMBERS[s[1:]]))
              if s.endswith('十') and s[:-1] in CN_NUMBERS:
                  return float(int(CN_NUMBERS[s[:-1]]) * 10)
              if '十' in s:
                  left, right = s.split('十', 1)
                  if (not left or left in CN_NUMBERS) and (not right or right in CN_NUMBERS):
                      return float((int(CN_NUMBERS.get(left, 1)) * 10) + int(CN_NUMBERS.get(right, 0)))
              return None


          def _parse_relative_time(q):
              text = str(q or '')
              prefix = r'(?:过去|最近|近)'

              m = re.search(prefix + r'\s*(半年|一年)', text)
              if m:
                  source = m.group(0).replace(' ', '')
                  days = 180 if m.group(1) == '半年' else 365
                  return {'mode': 'relative_days', 'relative_days': days, 'source': source}

              m = re.search(prefix + r'\s*([0-9]+|一|二|两|三|四|五|六|七|八|九|十|十一|十二|半)\s*(天|日|周|星期|个月|月|季度|季|年)', text)
              if not m:
                  return None
              n = _cn_number_to_float(m.group(1))
              if n is None or n <= 0:
                  return None
              unit = m.group(2)
              if unit in ('天', '日'):
                  days = int(n)
              elif unit in ('周', '星期'):
                  days = int(n * 7)
              elif unit in ('个月', '月'):
                  days = int(n * 30)
              elif unit in ('季度', '季'):
                  days = int(n * 90)
              elif unit == '年':
                  days = int(n * 365)
              else:
                  return None
              source = m.group(0).replace(' ', '')
              return {'mode': 'relative_days', 'relative_days': days, 'source': source}


          def _safe_time_only_refine(refine, turn_intent, need_requery):
              return (
                  str(turn_intent or '') == 'refine_query'
                  and _bool(need_requery)
                  and _bool(refine.get('time_range_change'))
                  and _bool(refine.get('group_fields_unchanged'))
                  and _bool(refine.get('metric_unchanged'))
              )


          def _refine_has_time_guard(refine):
              return any(k in refine for k in ('time_range_change', 'group_fields_unchanged', 'metric_unchanged'))


          def _set_all_stage_time(plan, days=None, mode=None):
              changed = False
              for st in _stages(plan):
                  if not isinstance(st, dict):
                      continue
                  tr = st.get('time_range') if isinstance(st.get('time_range'), dict) else {}
                  if days:
                      tr.update({'mode': 'relative_days', 'relative_days': int(days), 'start': '', 'end': ''})
                  elif mode:
                      tr.update({'mode': mode, 'start': '', 'end': ''})
                  st['time_range'] = tr
                  changed = True
              return changed


          def _patch_title_time(plan, new_source, debug):
              cr = plan.get('chart_request') if isinstance(plan.get('chart_request'), dict) else None
              if not cr or not isinstance(cr.get('title'), str) or not cr.get('title'):
                  debug['title_patch'] = 'no_chart_title'
                  return False
              title = cr['title']
              for old_text in OLD_TITLE_TIME_PATTERNS:
                  if old_text in title:
                      cr['title'] = title.replace(old_text, new_source, 1)
                      debug['title_patch'] = {'from': old_text, 'to': new_source}
                      return cr['title'] != title
              debug['title_patch'] = 'no_safe_old_time_text_found'
              return False


          def _unique_keep_order(values):
              seen = set()
              result = []
              for value in values:
                  if value not in seen:
                      seen.add(value)
                      result.append(value)
              return result


          def _patch_limit(plan, n):
              changed = False
              for st in _stages(plan):
                  if isinstance(st, dict):
                      st['limit'] = min(max(int(n), 1), 500)
                      changed = True
              return changed


          def _patch_sort(plan, direction):
              changed = False
              for st in _stages(plan):
                  if not isinstance(st, dict):
                      continue
                  sort = st.get('sort') if isinstance(st.get('sort'), list) else []
                  if not sort:
                      sort = [{'field': st.get('metric_alias') or st.get('metric_field') or '', 'direction': direction}]
                  for item in sort:
                      if isinstance(item, dict):
                          item['direction'] = direction
                  st['sort'] = sort
                  changed = True
              return changed


          def _patch_display(plan, q):
              changed = []
              if any(x in q for x in ('不要图', '不用图', '不画图', '只描述结果')):
                  plan['needs_chart'] = False
                  plan['chart_request'] = {}
                  if isinstance(plan.get('visualization'), dict):
                      plan['visualization']['enabled'] = False
                  changed.extend(['needs_chart', 'chart_request'])
              if any(x in q for x in ('加分析', '简单分析')):
                  plan['answer_mode'] = 'data_with_analysis'
                  changed.append('answer_mode')
              if '只描述结果' in q:
                  plan['answer_mode'] = 'data_only'
                  changed.append('answer_mode')
              return changed


          def main(question: str, old_normalized_semantic_plan_json: str, query_refinement_json: str, turn_intent: str, need_requery, last_chart_request_json: str):
              q = str(question or '')
              old = _loads(old_normalized_semantic_plan_json)
              refine = _loads(query_refinement_json)
              parsed_time = _parse_relative_time(q)
              safe_time_only = _safe_time_only_refine(refine, turn_intent, need_requery)
              debug = {
                  'turn_intent': str(turn_intent or ''),
                  'need_requery': _bool(need_requery),
                  'has_old_plan': bool(old),
                  'query_refinement_json': refine,
                  'safe_time_only_refine': safe_time_only,
              }
              if parsed_time:
                  debug['parsed_time_range'] = parsed_time
              if not old:
                  return {'patch_applied': False, 'requires_full_replan': True, 'patched_normalized_semantic_plan_json': '', 'changed_fields': '[]', 'patch_reason': '缺少上一轮 normalized semantic plan，无法执行确定性 patch', 'patch_error': 'missing_old_plan', 'patch_debug_json': json.dumps(debug, ensure_ascii=False)}
              if any(term in q for term in CHART_ONLY_TERMS):
                  return {'patch_applied': False, 'requires_full_replan': False, 'patched_normalized_semantic_plan_json': '', 'changed_fields': '[]', 'patch_reason': '本轮看起来只是图表类型修改，应由 chart 分支复用上一轮结果，不应触发 Mongo 重查', 'patch_error': 'chart_only_refine', 'patch_debug_json': json.dumps(debug, ensure_ascii=False)}
              if any(term in q for term in COMPLEX_TERMS):
                  return {'patch_applied': False, 'requires_full_replan': True, 'patched_normalized_semantic_plan_json': '', 'changed_fields': '[]', 'patch_reason': '用户引入了可能涉及新字段、新 collection 或新业务口径的复杂语义，必须重新检索 schema 并重规划', 'patch_error': '', 'patch_debug_json': json.dumps({**debug, 'complex_terms': [t for t in COMPLEX_TERMS if t in q]}, ensure_ascii=False)}
              plan = deepcopy(old)
              changed = []

              if parsed_time:
                  if safe_time_only or not _refine_has_time_guard(refine):
                      if _set_all_stage_time(plan, days=parsed_time['relative_days']):
                          changed.append('execution_plan.stages[0].time_range.relative_days')
                          if _patch_title_time(plan, parsed_time['source'], debug):
                              changed.append('chart_request.title')
                  else:
                      debug['time_patch_skipped'] = 'query_refinement_json 未确认 group_fields_unchanged=true 且 metric_unchanged=true，避免覆盖非纯时间修改'
              elif '今年' in q:
                  if _set_all_stage_time(plan, mode='this_year'):
                      changed.append('time_range')
              elif '上个月' in q:
                  if _set_all_stage_time(plan, mode='last_month'):
                      changed.append('time_range')

              m = re.search(r'(?:top|前|只看前|限制)\s*(\d+)\s*(?:条|名|个)?', q, flags=re.I)
              if m and _patch_limit(plan, m.group(1)):
                  changed.append('limit')
              if any(x in q for x in ('升序', '从小到大', '从低到高')) and _patch_sort(plan, 'asc'):
                  changed.append('sort')
              if any(x in q for x in ('降序', '从大到小', '从高到低')) and _patch_sort(plan, 'desc'):
                  changed.append('sort')
              changed.extend(_patch_display(plan, q))
              changed = _unique_keep_order(changed)
              if not changed:
                  return {'patch_applied': False, 'requires_full_replan': True, 'patched_normalized_semantic_plan_json': '', 'changed_fields': '[]', 'patch_reason': '未发现可安全确定性修正的字段，进入 refine full replan', 'patch_error': '', 'patch_debug_json': json.dumps(debug, ensure_ascii=False)}
              if 'execution_plan.stages[0].time_range.relative_days' in changed:
                  patch_reason = '检测到仅时间范围变更：%s -> relative_days=%s，保留分组、指标、排序和图表配置' % (parsed_time['source'], parsed_time['relative_days'])
              else:
                  patch_reason = '高确定性规则修正：' + ','.join(changed)
              return {'patch_applied': True, 'requires_full_replan': False, 'patched_normalized_semantic_plan_json': json.dumps(plan, ensure_ascii=False), 'changed_fields': json.dumps(changed, ensure_ascii=False), 'patch_reason': patch_reason, 'patch_error': '', 'patch_debug_json': json.dumps(debug, ensure_ascii=False)}
