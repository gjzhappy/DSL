          import json, re
          from datetime import datetime, timezone

          def _loads(v, fb):
              if isinstance(v, (dict, list)): return v
              if isinstance(v, str) and v.strip():
                  try: return json.loads(v)
                  except Exception: return fb
              return fb
          def _dumps(v): return json.dumps(v, ensure_ascii=False)
          def _bool(v):
              if isinstance(v, bool): return v
              if isinstance(v, str): return v.strip().lower() in {'true','1','yes','y'}
              return bool(v)
          def _num(v):
              if v is None or isinstance(v,bool): return None
              try:
                  if isinstance(v,str) and not v.strip(): return None
                  return float(v)
              except Exception: return None
          def _numeric(rows,f):
              vals=[r.get(f) for r in rows[:200] if isinstance(r,dict) and r.get(f) is not None]
              return bool(vals) and sum(1 for v in vals if _num(v) is not None)>=max(1,int(len(vals)*0.7))
          def _markdown(option):
              fence=chr(96)*3
              return fence+'echarts\n'+json.dumps(option,ensure_ascii=False,indent=2)+'\n'+fence
          def _chart_req(v):
              default={'enabled':False,'chart_type':'','x_field':'','y_field':'','series_name':'','title':'','field_labels':{}}
              obj=_loads(v,{})
              cand=obj.get('chart_request') if isinstance(obj,dict) and isinstance(obj.get('chart_request'),dict) else obj
              out=dict(default)
              if isinstance(cand,dict):
                  for k in default:
                      if k in cand: out[k]=cand[k]
              out['enabled']=_bool(out.get('enabled', True)); out['chart_type']=str(out.get('chart_type') or '').strip().lower()
              out['x_field']=str(out.get('x_field') or '').strip(); out['y_field']=str(out.get('y_field') or '').strip()
              out['series_name']=str(out.get('series_name') or '').strip(); out['title']=str(out.get('title') or '').strip()
              out['field_labels']=out.get('field_labels') if isinstance(out.get('field_labels'),dict) else {}
              return out
          def _title(req):
              if req.get('title'): return str(req.get('title'))
              labels=req.get('field_labels') if isinstance(req.get('field_labels'),dict) else {}
              return '按%s统计%s' % (labels.get(req.get('x_field')) or req.get('x_field') or '维度', labels.get(req.get('y_field')) or req.get('series_name') or req.get('y_field') or '指标')
          def _payload(req, rows, fields, chart_plan_warning=''):
              fields=set([str(f) for f in (fields or [])])
              for r in rows[:20]: fields.update(r.keys())
              p={'contract_version':'chart_payload_contract','enabled':False,'renderer':'echarts','chart_type':str(req.get('chart_type') or ''),'option':{},'echarts_markdown':'','summary':'','warning':'','data_profile':{'row_count':len(rows),'x_field':str(req.get('x_field') or ''),'y_field':str(req.get('y_field') or ''),'fields':[str(f) for f in fields],'preview_rows':rows[:5]},'chart_error':'','chart_debug':{'mode':'chart_only'}}
              if not req.get('enabled'):
                  p['warning']='chart_request disabled'; return p
              if not rows:
                  p['warning']='上一轮结果摘要不足以重新生成图表'; return p
              x=str(req.get('x_field') or ''); y=str(req.get('y_field') or '')
              if not x or not y or x not in fields or y not in fields:
                  p['warning']='图表字段不在查询结果中'; return p
              if not _numeric(rows,y):
                  p['warning']='图表纵轴字段不是数字，未生成图表。'; return p
              ctype=str(req.get('chart_type') or 'bar')
              if ctype not in {'bar','line','pie','scatter'}:
                  p['warning']='暂不支持该图表类型'; return p
              title=_title(req); series=req.get('series_name') or y
              if ctype=='pie':
                  option={'title':{'text':title},'tooltip':{'trigger':'item'},'series':[{'name':series,'type':'pie','data':[{'name':str(r.get(x) if r.get(x) is not None else '未分类'),'value':_num(r.get(y)) or 0} for r in rows[:20]]}]}
              elif ctype=='scatter':
                  if not _numeric(rows,x): p['warning']='散点图横轴字段不是数字，未生成图表。'; return p
                  option={'title':{'text':title},'tooltip':{'trigger':'item'},'xAxis':{'type':'value','name':x},'yAxis':{'type':'value','name':y},'series':[{'name':series,'type':'scatter','data':[[_num(r.get(x)),_num(r.get(y))] for r in rows if _num(r.get(x)) is not None and _num(r.get(y)) is not None]}]}
              else:
                  option={'title':{'text':title},'tooltip':{'trigger':'axis'},'xAxis':{'type':'category','name':x,'data':[str(r.get(x) if r.get(x) is not None else '未分类') for r in rows]},'yAxis':{'type':'value','name':y},'series':[{'name':series,'type':'line' if ctype=='line' else 'bar','data':[_num(r.get(y)) or 0 for r in rows]}]}
                  if ctype=='line' and not re.search(r'date|time|day|month|year|日期|时间|日|月|年',x,re.I): p['warning']='折线图横轴不是明显时间或有序字段。'
              p.update({'enabled':True,'chart_type':ctype,'option':option,'echarts_markdown':_markdown(option),'summary':'已基于上一轮结果摘要重新生成%s图表。' % ctype})
              if chart_plan_warning and not p.get('warning'): p['warning']=str(chart_plan_warning)
              return p
          def main(chart_request_json: str, last_result_profile_json: str, chart_plan_warning: str=''):
              req=_chart_req(chart_request_json); profile=_loads(last_result_profile_json,{})
              rows=profile.get('preview_rows') if isinstance(profile.get('preview_rows'),list) else []
              rows=[r for r in rows if isinstance(r,dict)]
              fields=profile.get('fields') if isinstance(profile.get('fields'),list) else (list(rows[0].keys()) if rows else [])
              payload=_payload(req, rows, fields, chart_plan_warning)
              md=payload.get('echarts_markdown') or ''
              note=payload.get('summary') or payload.get('warning') or '未生成图表。'
              final=(md+'\n\n'+note).strip() if md else note
              return {'chart_payload_json':_dumps(payload),'chart_payload_contract':'chart_payload_contract','chart_echarts_markdown':md,'chart_summary':payload.get('summary') or '','chart_warning':payload.get('warning') or '','chart_enabled':bool(payload.get('enabled')),'data_profile_json':_dumps(payload.get('data_profile') or {}),'chart_debug_json':_dumps(payload.get('chart_debug') or {}),'final_answer_markdown':final,'final_answer_summary':note,'updated_at':datetime.now(timezone.utc).isoformat()}
