    - data:
        code: |
          import json


          def _loads_obj(v):
              if isinstance(v, dict):
                  return v
              if isinstance(v, str) and v.strip():
                  try:
                      x = json.loads(v)
                      return x if isinstance(x, dict) else {}
                  except Exception:
                      return {}
              return {}


          def _loads_list(v):
              if isinstance(v, list):
                  return v
              if isinstance(v, str) and v.strip():
                  try:
                      x = json.loads(v)
                      return x if isinstance(x, list) else []
                  except Exception:
                      return []
              return []


          def _add(xs, value):
              value = str(value or '').strip()
              if value and value not in xs:
                  xs.append(value)


          def _first_stage(plan):
              stages = ((plan.get('execution_plan') or {}).get('stages') or plan.get('stages') or []) if isinstance(plan, dict) else []
              return stages[0] if isinstance(stages, list) and stages and isinstance(stages[0], dict) else {}


          def _old_collections_and_fields(old):
              st = _first_stage(old)
              primary = str(old.get('primary_collection') or st.get('primary_collection') or st.get('collection') or '').strip()
              collections = []
              _add(collections, primary)
              for source in (old.get('related_collections'), st.get('related_collections'), old.get('collections')):
                  for c in _loads_list(source):
                      _add(collections, c)
              fields = []
              for x in _loads_list(st.get('group_fields')):
                  _add(fields, x)
              _add(fields, st.get('metric_field'))
              tr = st.get('time_range') if isinstance(st.get('time_range'), dict) else {}
              _add(fields, tr.get('field'))
              for f in _loads_list(st.get('filters')):
                  if isinstance(f, dict):
                      _add(fields, f.get('field'))
              for s in _loads_list(st.get('sort')):
                  if isinstance(s, dict):
                      _add(fields, s.get('field'))
              return primary, collections, fields


          def main(question: str, old_normalized_semantic_plan_json: str, query_refinement_json: str, refine_planning_structured=None, refine_planning_text: str='', patch_reason: str='', changed_fields: str='', collection_selection_json: str=''):
              old = _loads_obj(old_normalized_semantic_plan_json)
              primary, old_collections, old_fields = _old_collections_and_fields(old)
              selection = _loads_obj(collection_selection_json)
              selected_primary = str(selection.get('selected_primary_collection') or '').strip()
              selected_related = _loads_list(selection.get('selected_related_collections'))
              if selected_primary:
                  primary = selected_primary
              planning = refine_planning_structured if isinstance(refine_planning_structured, dict) and refine_planning_structured else _loads_obj(refine_planning_text)
              collection_hints, field_hints, business_terms = [], [], []
              if selected_primary:
                  _add(collection_hints, selected_primary)
              for c in selected_related:
                  _add(collection_hints, c)
              for c in old_collections:
                  _add(collection_hints, c)
              _add(collection_hints, planning.get('primary_collection_hint'))
              for c in _loads_list(planning.get('collection_hints')):
                  _add(collection_hints, c)
              for f in old_fields:
                  _add(field_hints, f)
              for f in _loads_list(planning.get('field_hints')) + _loads_list(planning.get('old_plan_fields')):
                  _add(field_hints, f)
              for t in _loads_list(planning.get('business_terms')) + _loads_list(planning.get('possible_new_concepts')):
                  _add(business_terms, t)
              tasks = []
              seen = set()
              for raw in _loads_list(planning.get('retrieval_tasks')):
                  if not isinstance(raw, dict):
                      continue
                  col = str(selected_primary or raw.get('collection_hint') or primary or '').strip()
                  q = str(raw.get('query') or question or '').strip()
                  reason = str(raw.get('reason') or planning.get('planning_reason') or patch_reason or '').strip()
                  if not col:
                      continue
                  key = (col, q[:160])
                  if key in seen:
                      continue
                  seen.add(key)
                  tasks.append({'collection_name': col, 'role': 'primary' if col == primary else 'candidate', 'query_text': q, 'reason': reason, 'fields': field_hints, 'selection_reason': (selection.get('primary_candidates') or [{}])[0].get('reason', '') if selected_primary and col == selected_primary else '', 'selection_confidence': float(selection.get('confidence') or 0), 'matched_aliases': (selection.get('primary_candidates') or [{}])[0].get('matched_aliases', []) if selected_primary and col == selected_primary else []})
              for col in collection_hints:
                  if len(tasks) >= 8:
                      break
                  if not col or any(t.get('collection_name') == col for t in tasks):
                      continue
                  q = ' '.join([str(question or ''), col] + field_hints + business_terms + [str(patch_reason or '')]).strip()
                  tasks.append({'collection_name': col, 'role': 'primary' if col == primary else 'candidate', 'query_text': q[:1600], 'reason': 'fallback collection hint retrieval', 'fields': field_hints, 'selection_reason': (selection.get('primary_candidates') or [{}])[0].get('reason', '') if selected_primary and col == selected_primary else '', 'selection_confidence': float(selection.get('confidence') or 0), 'matched_aliases': (selection.get('primary_candidates') or [{}])[0].get('matched_aliases', []) if selected_primary and col == selected_primary else []})
              if not tasks and primary:
                  tasks.append({'collection_name': primary, 'role': 'primary', 'query_text': ' '.join([str(question or ''), primary] + old_fields + business_terms)[:1600], 'reason': 'fallback to old primary_collection', 'fields': old_fields, 'selection_reason': (selection.get('primary_candidates') or [{}])[0].get('reason', ''), 'selection_confidence': float(selection.get('confidence') or 0), 'matched_aliases': (selection.get('primary_candidates') or [{}])[0].get('matched_aliases', [])})
              valid = bool(old and tasks and not planning.get('clarify_needed'))
              error = ''
              if not old:
                  error = '缺少上一轮 normalized semantic plan，无法构建 refine 检索任务'
              elif planning.get('clarify_needed') and not tasks:
                  error = str(planning.get('clarify_question') or 'refine planning requested clarification')
              elif not tasks:
                  error = '无法构造 refine schema 检索任务'
              schema_query = '\n'.join([t.get('query_text', '') for t in tasks])[:4000]
              return {
                  'refine_retrieval_tasks_json': json.dumps(tasks[:8], ensure_ascii=False),
                  'refine_collection_hints_json': json.dumps(collection_hints, ensure_ascii=False),
                  'refine_field_hints_json': json.dumps(field_hints, ensure_ascii=False),
                  'refine_business_terms_json': json.dumps(business_terms, ensure_ascii=False),
                  'refine_schema_query_text': schema_query,
                  'refine_retrieval_valid': valid,
                  'refine_retrieval_error': error,
                  'refine_retrieval_debug_json': json.dumps({'used_structured_output': isinstance(refine_planning_structured, dict) and bool(refine_planning_structured), 'task_count': len(tasks), 'clarify_needed': bool(planning.get('clarify_needed')), 'collection_selection_used': bool(selected_primary)}, ensure_ascii=False),
                  'collection_selection_json': json.dumps(selection, ensure_ascii=False),
                  'old_normalized_semantic_plan_json': json.dumps(old, ensure_ascii=False) if old else '',
                  'query_refinement_json': json.dumps(_loads_obj(query_refinement_json), ensure_ascii=False),
                  'patch_reason': str(patch_reason or ''),
                  'changed_fields_json': str(changed_fields or '[]'),
                  'refine_replan_schema_tasks_json': json.dumps(tasks[:8], ensure_ascii=False),
                  'refine_collection_tasks': tasks[:8]
              }
