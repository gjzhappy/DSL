    - data:
        code: |
          import json
          CATALOG_KEYS = ['collection_name','collection_label','aliases','description','primary_terms','fields','metrics','relations']
          def _loads(value):
              if isinstance(value, dict):
                  return value
              if isinstance(value, str) and value.strip():
                  return json.loads(value)
              return {}
          def _compact_registry(registry):
              collections = []
              for item in registry.get('collections') or []:
                  if not isinstance(item, dict):
                      continue
                  collections.append({k: item.get(k, [] if k in ['aliases','primary_terms','fields','metrics','relations'] else '') for k in CATALOG_KEYS})
              return {
                  'registry_version': str(registry.get('registry_version') or ''),
                  'database': str(registry.get('database') or ''),
                  'collections': collections,
              }
          def main(question: str, collection_registry_json: str = ''):
              q = str(question or '').strip()
              try:
                  registry = _loads(collection_registry_json)
                  catalog = _compact_registry(registry)
                  names = [str(c.get('collection_name') or '').strip() for c in catalog.get('collections') or [] if str(c.get('collection_name') or '').strip()]
                  if not names:
                      raise ValueError('registry collections is empty')
                  prompt = '\n'.join([
                      '用户问题：' + q,
                      'collection_catalog_json：',
                      json.dumps(catalog, ensure_ascii=False),
                      '请只从 collection_catalog_json.collections[].collection_name 中选择需要 hydration 的集合。',
                  ])
                  return {
                      'collection_selector_prompt': prompt,
                      'collection_catalog_json': json.dumps(catalog, ensure_ascii=False),
                      'collection_registry_valid': True,
                      'collection_registry_error': '',
                      'available_collection_names_json': json.dumps(names, ensure_ascii=False),
                      'requires_clarification': False,
                      'clarification_question': '',
                  }
              except Exception as exc:
                  question_text = '当前集合目录不可用，无法判断需要查询的数据集合。'
                  return {
                      'collection_selector_prompt': '用户问题：' + q,
                      'collection_catalog_json': '{}',
                      'collection_registry_valid': False,
                      'collection_registry_error': str(exc),
                      'available_collection_names_json': '[]',
                      'requires_clarification': True,
                      'clarification_question': question_text,
                  }
        code_language: python3
        desc: 读取 COLLECTION_REGISTRY_JSON 并压缩为 LLM collection selector catalog；不做打分、top1 或 primary/related 判断。
        outputs:
          collection_selector_prompt:
            children:
            type: string
          collection_catalog_json:
            children:
            type: string
          collection_registry_valid:
