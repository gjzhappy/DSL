              raw = str(text or '')
              raw = re.sub(r'<think>.*?</think>', ' ', raw, flags=re.IGNORECASE | re.DOTALL)
              return raw.strip()


          def _ast_candidate_score(obj):
              if not isinstance(obj, dict):
                  return -1
              score = 0
              keys = set(obj.keys())
              if 'execution_plan' in keys:
                  score += 10
              stages = (obj.get('execution_plan') or {}).get('stages') if isinstance(obj.get('execution_plan'), dict) else None
              if isinstance(stages, list) and stages:
                  score += 10
              if keys:
                  score += 1
              return score


          def _try_decode_object(raw):
              try:
                  decoder = json.JSONDecoder()
                  obj, end = decoder.raw_decode(raw)
                  if isinstance(obj, dict):
                      return obj, raw[:end], raw[end:].strip()
              except Exception:
                  return None
              return None


          def _extract_json_object_text(text):
              raw = _remove_think_blocks(_strip_code_fence(text))

              if not raw:
                  raise ValueError('LLM返�内容为空')
              direct = _try_decode_object(raw)
              if direct and not direct[2]:
                  return direct[1]
              candidates = []
              for block in re.findall(r'```(?:json)?\s*(.*?)```', raw, flags=re.IGNORECASE | re.DOTALL):
                  parsed = _try_decode_object(block.strip())
                  if parsed:
                      obj, obj_text, tail = parsed
                      candidates.append((_ast_candidate_score(obj), 1 if tail else 0, obj_text))
              seen_positions = set()
              for match in re.finditer(r'\{', raw):
                  pos = match.start()

                  if pos in seen_positions:
                      continue
                  seen_positions.add(pos)
                  parsed = _try_decode_object(raw[pos:])
                  if parsed:
                      obj, obj_text, tail = parsed
                      candidates.append((_ast_candidate_score(obj), 1 if tail else 0, obj_text))
              if candidates:
                  candidates.sort(key=lambda item: (-item[0], item[1], -len(item[2])))
                  return candidates[0][2]
              raise ValueError(f'LLM返�内容不是合法JSON对象: {_truncate_text(raw, 1200)}')


          def _pick_response(full_status_code, full_body, local_status_code, local_body):
              local_body_text = '' if local_body is None else str(local_body).strip()
              if local_body_text:
                  return int(local_status_code or 0), local_body, 'local_llm'
              return int(full_status_code or 0), full_body, 'full_llm'


          def _contains_chart_intent(question: str):
              q = str(question or '')
              return any(k in q for k in ['柱状图', '折线图', '饼图', '图表', '可视化'])


          def _detect_relative_days(question_text):
              q = str(question_text or '')
              if any(t in q for t in ['近7天', '最近7天']):
                  return 7
              if any(t in q for t in ['过去一个月', '近一个月', '最近一个月', '最近30天', '近30天']):
                  return 30
              return 0


          def _is_abs_date_between_filter(item):
              if not isinstance(item, dict):
                  return False
              if str(item.get('field') or '').strip() != 'created_at':
                  return False
              if str(item.get('op') or '').strip() != 'between':
                  return False
              value = item.get('value')
              if not isinstance(value, list) or len(value) != 2:
                  return False
              return all(isinstance(v, dict) and '$date' in v for v in value)


          BIG_FIELD_KEYS = {
              'schema_context','schema_metadata','schema_alias_index','collection_catalog','collection_selection',
              'raw_llm_response','full_prompt','mongo_pipeline','pipeline','pipeline_json','rows','merged_rows',
              'query_response_body','query_response_headers','stage_execution_trace','chart_option','echarts_option',
              'echarts_markdown','debug'
          }

          def _deepcopy_json(value):
              try:
                  return json.loads(json.dumps(value, ensure_ascii=False))
              except Exception:
                  return value if isinstance(value, dict) else {}

          def _as_list(value):
              return value if isinstance(value, list) else []

          def _message_to_text(value):
              if value is None:
                  return ""
              if isinstance(value, str):
                  return value.strip()
              if isinstance(value, dict):
                  typ = value.get('type') or value.get('code') or value.get('warning_type') or ''
                  msg = value.get('message') or value.get('reason') or value.get('detail') or ''
                  if typ and msg:
                      return f"{typ}: {msg}"
                  if typ:
                      return str(typ).strip()
                  if msg:
                      return str(msg).strip()
              try:
                  return json.dumps(value, ensure_ascii=False, sort_keys=True)
              except Exception:
                  return str(value).strip()

          def _safe_join_messages(values, sep="\n"):
              if values is None:
                  return ""
              if not isinstance(values, list):
                  values = [values]
              parts = []
              for item in values:
                  text = _message_to_text(item)
                  if text:
                      parts.append(text)
              return sep.join(parts)

          def _normalize_merge_mode(value):
              mode = str(value or "").strip().lower()
              if mode in ("enrich", "enrich_join", "join", "lookup", "left_join", "left_enrich", "enrichment"):
                  return "enrich"
              if mode in ("", "none", "no_merge", "null"):
                  return "none"
              return mode

          def _as_dict(value):
              return value if isinstance(value, dict) else {}

          def _strip_runtime_fields_from_semantic_plan(plan):
              if not isinstance(plan, dict):
                  return plan
              plan.pop('normalizer_warnings', None)
              plan.pop('normalizer_errors', None)
              plan.pop('normalizer_debug', None)
              return plan

          def _merge_key_field(merge_keys, stage_name):
              if not isinstance(merge_keys, list):
                  return ''
              target_stage = str(stage_name or '').strip()
              for item in merge_keys:
                  if not isinstance(item, dict):
                      continue
                  item_stage = str(item.get('stage_name') or item.get('stage') or '').strip()
                  if item_stage != target_stage:
                      continue
                  return str(item.get('source_field') or item.get('field') or item.get('field_name') or '').strip()
              return ''

          def _clean_for_contract(value, warnings, path=''):
              if isinstance(value, dict):
                  cleaned = {}
                  for k, v in value.items():
                      key = str(k)
                      child_path = (path + '.' + key).strip('.')
                      if key in BIG_FIELD_KEYS or key.startswith('debug_'):
                          warnings.append('removed_large_field:' + child_path)
                          continue
                      cleaned[key] = _clean_for_contract(v, warnings, child_path)
                  return cleaned
              if isinstance(value, list):
                  return [_clean_for_contract(v, warnings, path + '[]') for v in value]
              return value

          def _pick_collection(plan):
              planner = plan.get('planner') if isinstance(plan.get('planner'), dict) else {}
              selection = plan.get('collection_selection') if isinstance(plan.get('collection_selection'), dict) else {}
              return str(plan.get('primary_collection') or plan.get('collection') or planner.get('primary_collection') or selection.get('selected_primary_collection') or '').strip()

          def _default_chart_request(chart=None):
              chart = chart if isinstance(chart, dict) else {}
              return {
                  'enabled': bool(chart.get('enabled')),
                  'chart_type': str(chart.get('chart_type') or chart.get('type') or '').strip(),
                  'x_field': str(chart.get('x_field') or chart.get('x_axis') or '').strip(),
                  'y_field': str(chart.get('y_field') or chart.get('y_axis') or '').strip(),
                  'series_name': str(chart.get('series_name') or '').strip(),
                  'title': str(chart.get('title') or '').strip(),
              }

          def _metric_from_metrics(stage):
              metrics = stage.get('metrics') if isinstance(stage, dict) else None
              first = metrics[0] if isinstance(metrics, list) and metrics and isinstance(metrics[0], dict) else {}
              return {
                  'metric_alias': first.get('metric_alias') or first.get('alias') or first.get('name') or first.get('output_field') or '',
                  'metric_function': first.get('metric_function') or first.get('function') or '',
                  'metric_field': first.get('metric_field') or first.get('field') or first.get('source_field') or '',
              }

          def _normalize_time_range(value):
              tr = value if isinstance(value, dict) else {}
              try:
                  relative_days = int(tr.get('relative_days') or 0)
              except Exception:
                  relative_days = 0
              return {'field': str(tr.get('field') or '').strip(), 'mode': str(tr.get('mode') or '').strip(), 'relative_days': relative_days, 'start': str(tr.get('start') or '').strip(), 'end': str(tr.get('end') or '').strip()}

          def _normalize_stage(raw_stage, idx, primary_collection):
              stage = _deepcopy_json(raw_stage) if isinstance(raw_stage, dict) else {}
              metric = _metric_from_metrics(stage)
              collection = str(stage.get('collection') or stage.get('primary_collection') or primary_collection or '').strip()
              stage.setdefault('stage_name', stage.get('stage_id') or 'stage' + str(idx + 1))
              stage.setdefault('stage_type', 'primary_query')
              stage['collection'] = collection
              stage.setdefault('intent_type', '')
              stage['time_range'] = _normalize_time_range(stage.get('time_range'))
              stage['filters'] = _as_list(stage.get('filters'))
              stage['group_fields'] = _as_list(stage.get('group_fields'))
              stage['metric_function'] = str(stage.get('metric_function') or metric.get('metric_function') or '').strip()
              stage['metric_field'] = str(stage.get('metric_field') or metric.get('metric_field') or '').strip()
              stage['metric_alias'] = str(stage.get('metric_alias') or metric.get('metric_alias') or '').strip()
              stage['sort'] = _as_list(stage.get('sort'))
              try:
                  stage['limit'] = int(stage.get('limit') or 0)
              except Exception:
                  stage['limit'] = 0
              stage['projection_fields'] = _as_list(stage.get('projection_fields'))
              return stage

          def semantic_plan_normalizer(raw_plan, source='unknown'):
              warnings = []
              try:
                  if not isinstance(raw_plan, dict) or not raw_plan:
                      return {}, False, 'empty', '', warnings, source or 'unknown'
                  plan = _deepcopy_json(raw_plan)
                  for wrapper_key in ('semantic_plan_contract','semantic_plan','normalized_semantic_plan','guarded_semantic_plan','replanned_semantic_plan'):
                      wrapped = plan.get(wrapper_key)
                      if isinstance(wrapped, dict):
                          plan = _deepcopy_json(wrapped)
                          break
                  plan = _clean_for_contract(plan, warnings)
                  execution_plan = plan.get('execution_plan') if isinstance(plan.get('execution_plan'), dict) else {}
                  if isinstance(execution_plan.get('stages'), list):
                      plan['stages'] = execution_plan.get('stages')
                      if isinstance(execution_plan.get('final_merge'), dict) and not isinstance(plan.get('final_merge'), dict):
                          plan['final_merge'] = execution_plan.get('final_merge')
                      if execution_plan.get('execution_mode') and not plan.get('execution_mode'):
                          plan['execution_mode'] = execution_plan.get('execution_mode')
                  if not isinstance(plan.get('chart_request'), dict) and isinstance(plan.get('visualization'), dict):
                      plan['chart_request'] = plan.get('visualization')
                  if not isinstance(plan.get('chart_request'), dict):
                      top_chart = {k: plan.get(k) for k in ('enabled','chart_type','x_field','y_field','series_name','title') if k in plan}
                      plan['chart_request'] = top_chart if top_chart else {}
                  primary_collection = _pick_collection(plan)
                  raw_stages = plan.get('stages') if isinstance(plan.get('stages'), list) else []
                  if not primary_collection and raw_stages and isinstance(raw_stages[0], dict):
                      primary_collection = str(raw_stages[0].get('collection') or raw_stages[0].get('primary_collection') or '').strip()
                  stages = [_normalize_stage(s, i, primary_collection) for i, s in enumerate(raw_stages) if isinstance(s, dict)]
                  if not primary_collection and stages:
                      primary_collection = str(stages[0].get('collection') or '').strip()
                  chart_request = _default_chart_request(plan.get('chart_request'))
                  needs_chart = bool(plan.get('needs_chart')) or bool(chart_request.get('enabled'))
                  chart_request['enabled'] = bool(chart_request.get('enabled')) or needs_chart
                  final_merge = plan.get('final_merge') if isinstance(plan.get('final_merge'), dict) else {'merge_mode': 'none'}
                  final_merge['merge_mode'] = _normalize_merge_mode(final_merge.get('merge_mode'))
                  normalizer_warnings = _as_list(plan.get('normalizer_warnings')) + warnings
                  primary_stages = [s for s in stages if isinstance(s, dict) and str(s.get('stage_type') or '').strip() == 'primary_query']
                  if not primary_stages and primary_collection:
                      primary_stages = [s for s in stages if isinstance(s, dict) and str(s.get('stage_name') or '').strip() == 'stage1' and str(s.get('collection') or '').strip() == primary_collection]
                  enrich_stages = [s for s in stages if isinstance(s, dict) and str(s.get('stage_type') or '').strip() == 'enrich_related']
                  if str(plan.get('execution_mode') or 'single_stage').strip() != 'single_stage' and enrich_stages:
                      for enrich_stage in enrich_stages:
                          if not str(enrich_stage.get('depends_on') or '').strip():
                              prior_primary = [s for s in primary_stages if stages.index(s) < stages.index(enrich_stage)]
                              if len(prior_primary) == 1 and str(prior_primary[0].get('stage_name') or '').strip():
                                  enrich_stage['depends_on'] = str(prior_primary[0].get('stage_name') or '').strip()
                                  normalizer_warnings.append({'type': 'enrich_related_depends_on_fill', 'stage_name': enrich_stage.get('stage_name'), 'depends_on': enrich_stage.get('depends_on')})
                              elif str(final_merge.get('left_stage') or '').strip():
                                  enrich_stage['depends_on'] = str(final_merge.get('left_stage') or '').strip()
                                  normalizer_warnings.append({'type': 'enrich_related_depends_on_fill_from_final_merge', 'stage_name': enrich_stage.get('stage_name'), 'depends_on': enrich_stage.get('depends_on')})
                      if str(final_merge.get('merge_mode') or '').strip() == 'enrich':
                          enrich_stage = enrich_stages[0]
                          merge_keys = final_merge.get('merge_keys')
                          merge_key = final_merge.get('merge_key')
                          if not merge_key and isinstance(merge_keys, list) and merge_keys:
                              merge_key = ''
                              for item in merge_keys:
                                  if isinstance(item, dict):
                                      merge_key = str(item.get('source_field') or item.get('field') or item.get('field_name') or '').strip()
                                  else:
                                      merge_key = str(item or '').strip()
                                  if merge_key:
                                      break
                          changed = False
                          if not str(final_merge.get('right_stage') or '').strip():
                              final_merge['right_stage'] = str(final_merge.get('merge_stage_name') or enrich_stage.get('stage_name') or '').strip(); changed = True
                          if not str(final_merge.get('left_stage') or '').strip() and str(enrich_stage.get('depends_on') or '').strip():
                              final_merge['left_stage'] = str(enrich_stage.get('depends_on') or '').strip(); changed = True
                          left_field = str(final_merge.get('left_field') or '').strip()
                          right_field = str(final_merge.get('right_field') or '').strip()
                          if not left_field or left_field.startswith('{'):
                              fixed_left_field = str(_merge_key_field(merge_keys, final_merge.get('left_stage')) or enrich_stage.get('join_source_field') or merge_key or '').strip()
                              if fixed_left_field:
                                  final_merge['left_field'] = fixed_left_field; changed = True
                          if not right_field or right_field.startswith('{'):
                              fixed_right_field = str(_merge_key_field(merge_keys, final_merge.get('right_stage')) or enrich_stage.get('join_target_field') or merge_key or '').strip()
                              if fixed_right_field:
                                  final_merge['right_field'] = fixed_right_field; changed = True
                          if not str(final_merge.get('attach_as') or '').strip():
                              final_merge['attach_as'] = str(enrich_stage.get('attach_as') or 'product_info').strip(); changed = True
                          if changed:
                              normalizer_warnings.append({'type': 'final_merge_enrich_fields_fill', 'right_stage': final_merge.get('right_stage'), 'left_stage': final_merge.get('left_stage')})
                  contract = {
                      'contract_version': 'semantic_plan_contract',
                      'primary_collection': primary_collection,
                      'related_collections': _as_list(plan.get('related_collections')),
                      'execution_mode': str(plan.get('execution_mode') or 'single_stage').strip() or 'single_stage',
                      'answer_mode': str(plan.get('answer_mode') or 'data').strip() or 'data',
                      'needs_chart': bool(needs_chart),
                      'stages': stages,
                      'final_merge': final_merge,
                      'chart_request': chart_request,
                      'requires_clarification': bool(plan.get('requires_clarification')),
                      'clarification_question': str(plan.get('clarification_question') or '').strip(),
                      'needs_schema_retrieval': bool(plan.get('needs_schema_retrieval')),
                      'warnings': _as_list(plan.get('warnings')),
                  }
                  _strip_runtime_fields_from_semantic_plan(contract)
                  route = 'requires_clarification' if contract['requires_clarification'] else 'ok'
                  return contract, True, route, '', normalizer_warnings, source or 'unknown'
              except Exception as e:
                  return {}, False, 'system_error', str(e), warnings, source or 'unknown'

          def main(full_status_code, full_body, local_status_code, local_body, question=''):
              code, body, source = _pick_response(full_status_code, full_body, local_status_code, local_body)
              payload = None
              result = ''
              try:
                  if code < 200 or code >= 300:
                      result = _truncate_text(body, 4000)
                  elif not body:
                      result = ''
                  else:
                      resp_json = _read_json_text(body)
                      payload = resp_json
                      result = (_extract_chat_text(resp_json) if resp_json else '') or _truncate_text(body, 4000)
              except Exception as e:
                  result = _truncate_text(f"{body}\n\nexception={e}", 4000)
              semantic_plan_raw_text = result
              parsed = None
              json_parse_ok = False
              parse_error = ''
              try:
                  semantic_plan_text = _extract_json_object_text(result)
                  semantic_plan_raw_text = semantic_plan_text or result
                  parsed = json.loads(semantic_plan_text)
                  json_parse_ok = True
              except Exception as e:
                  parse_error = str(e)
              parsed_keys = list(parsed.keys()) if isinstance(parsed, dict) else []
              semantic_source = 'fallback' if source == 'local_llm' else 'planner'
              normalized, plan_valid, normalizer_route, normalizer_error, normalizer_warnings, semantic_source = semantic_plan_normalizer(parsed if isinstance(parsed, dict) else {}, semantic_source)
              if not json_parse_ok:
                  normalized = {}
                  plan_valid = False
                  normalizer_route = 'invalid'
                  normalizer_error = parse_error or 'LLM返回内容不是合法JSON对象'
              warning = _safe_join_messages(normalizer_warnings, ';')
              stages = (normalized.get('stages') or []) if isinstance(normalized, dict) else []
              content_preview = str(semantic_plan_raw_text or '')[:1000]
              debug_summary = {
                  'source': source,
                  'http_status_code': code,
                  'body_type': type(payload).__name__ if payload is not None else 'none',
                  'content_extracted': bool(result),
                  'content_length': len(str(semantic_plan_raw_text or '')),
                  'content_preview': content_preview,
                  'json_parse_ok': json_parse_ok,
                  'parsed_type': type(parsed).__name__ if parsed is not None else 'none',
                  'parsed_keys': parsed_keys,
                  'plan_valid': plan_valid,
                  'has_execution_plan': isinstance(parsed, dict) and isinstance(parsed.get('execution_plan'), dict),
                  'has_stages': bool(stages),
                  'contract_version': normalized.get('contract_version') if isinstance(normalized, dict) else '',
                  'normalizer_route': normalizer_route,
                  'normalizer_warnings': normalizer_warnings,
                  'semantic_plan_source': semantic_source,
                  'stages_count': len(stages),
                  'normalized': plan_valid,
                  'normalizer_warning': warning,
                  'normalizer_error': normalizer_error,
                  'content_protocol': 'semantic_execution_plan',
                  'error': parse_error,
              }
              answer_mode = ''
              needs_chart = False
              chart_request = {}
              if isinstance(normalized, dict):
                  answer_mode = str(normalized.get('answer_mode') or '').strip()
                  needs_chart = bool(normalized.get('needs_chart'))
                  chart_request = normalized.get('chart_request') if isinstance(normalized.get('chart_request'), dict) else {}
              if isinstance(parsed, dict):
                  answer_mode = answer_mode or str(parsed.get('answer_mode') or '').strip()
                  needs_chart = needs_chart or bool(parsed.get('needs_chart'))
                  if not chart_request and isinstance(parsed.get('chart_request'), dict):
                      chart_request = parsed.get('chart_request')
              output_plan = _strip_runtime_fields_from_semantic_plan(_deepcopy_json(normalized)) if plan_valid else {}
              return {
                  'semantic_plan_json': json.dumps(output_plan, ensure_ascii=False),
                  'normalized_semantic_plan_json': json.dumps(output_plan, ensure_ascii=False),
                  'semantic_plan_contract_json': json.dumps(output_plan, ensure_ascii=False),
                  'semantic_plan_raw_text': str(semantic_plan_raw_text or '')[:4000],
                  'plan_valid': plan_valid,
                  'normalizer_valid': plan_valid,
                  'normalizer_route': normalizer_route,
                  'legacy_ast_detected': False,
                  'normalizer_warning': warning,
                  'normalizer_error': normalizer_error,
                  'normalizer_warnings_json': json.dumps(normalizer_warnings, ensure_ascii=False),
                  'semantic_plan_source': semantic_source,
                  'parse_error': parse_error,
                  'debug_summary_json': json.dumps(debug_summary, ensure_ascii=False),
                  'answer_mode': answer_mode,
                  'needs_chart': needs_chart,
                  'chart_request_json': json.dumps(chart_request, ensure_ascii=False),
              }
