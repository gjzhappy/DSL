    - data:
        code: |
          import json
          import re

          def _strip_code_block(text):
              text = str(text or '').strip()
              m = re.match(r'^```(?:json)?\s*(.*?)\s*```$', text, flags=re.I | re.S)
              return m.group(1).strip() if m else text

          def _extract_json(text):
              text = _strip_code_block(text)
              start, end = text.find('{'), text.rfind('}')
              return text[start:end + 1] if start >= 0 and end >= start else text

          def _loads(value, fallback):
              if isinstance(value, (dict, list)):
                  return value
              if isinstance(value, str) and value.strip():
                  try:
                      return json.loads(value)
                  except Exception:
                      try:
                          return json.loads(_extract_json(value))
                      except Exception:
                          return fallback
              return fallback

          def _loads_obj(value):
              parsed = _loads(value, {})
              return parsed if isinstance(parsed, dict) else {}

          def _loads_list(value):
              parsed = _loads(value, [])
              return parsed if isinstance(parsed, list) else []

          def _clip_text(value, limit):
              text = str(value or '')
              return text[:limit]

          def _rows_preview(value, limit=20):
              rows = _loads(value, value)
              if not isinstance(rows, list):
                  return []
              return [r for r in rows if isinstance(r, dict)][:limit]

          def _int(value, default=0):
              try:
                  if value is None or value == '':
                      return default
                  return int(value)
              except Exception:
                  return default

          def _decision_trace(*items):
              trace = []
              for item in items:
                  if not item:
                      continue
                  if isinstance(item, list):
                      trace.extend(str(x) for x in item if x)
                  elif isinstance(item, dict):
                      trace.append(json.dumps(item, ensure_ascii=False)[:1200])
                  else:
                      text = str(item).strip()
                      if text:
                          trace.append(text[:1200])
              return trace[:20]

          def _pick_candidate(main_answer, chart_answer, analysis_answer):
              candidates = [
                  ('main', main_answer),
                  ('chart', chart_answer),
                  ('analysis', analysis_answer),
              ]
              for source, answer in reversed(candidates):
                  if str(answer or '').strip():
                      return source, str(answer or '')
              return 'unknown', ''

          def main(current_question: str,
                   turn_intent: str,
                   route_decision_json: str,
                   last_context_json: str,
                   normalized_semantic_plan_json: str,
                   patch_result_json: str,
                   chart_request_json: str,
                   query_result_summary: str,
                   result_rows_preview_json: str,
                   analysis_debug_json: str,
                   main_final_answer_candidate: str,
                   chart_final_answer_candidate: str,
                   analysis_final_answer_candidate: str,
                   chart_echarts_markdown: str,
                   decision_trace: str,
                   repair_attempts: str):
              answer_source, final_answer_candidate = _pick_candidate(
                  main_final_answer_candidate,
                  chart_final_answer_candidate,
                  analysis_final_answer_candidate,
              )
              attempts = _int(repair_attempts, 0)
              ctx = {
                  'current_question': str(current_question or ''),
                  'turn_intent': str(turn_intent or ''),
                  'answer_source': answer_source,
                  'last_context_summary': _loads_obj(last_context_json),
                  'route_decision': _loads_obj(route_decision_json),
                  'semantic_plan': _loads_obj(normalized_semantic_plan_json),
                  'patch_result': _loads_obj(patch_result_json),
                  'chart_request': _loads_obj(chart_request_json),
                  'query_result_summary': _clip_text(query_result_summary, 2000),
                  'result_rows_preview': _rows_preview(result_rows_preview_json, 20),
                  'analysis_debug': _loads_obj(analysis_debug_json),
                  'final_answer_candidate': _clip_text(final_answer_candidate, 4000),
                  'chart_present': bool(str(chart_echarts_markdown or '').strip()),
                  'decision_trace': _decision_trace(decision_trace, route_decision_json, patch_result_json),
                  'repair_attempts': attempts,
              }
              return {
                  'validation_context_json': json.dumps(ctx, ensure_ascii=False),
                  'final_answer_candidate': final_answer_candidate,
                  'answer_source': answer_source,
                  'repair_attempts': attempts,
                  'max_repair_attempts': 1,
              }
