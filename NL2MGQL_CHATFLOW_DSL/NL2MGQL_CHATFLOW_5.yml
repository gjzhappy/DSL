              if errors:
                  joined = "；".join(errors)
                  if any("敏感/PII" in e or "forbidden_usage" in e or "relation" in e or "join" in e for e in errors):
                      return _finalize(_result("blocked", plan, errors, warnings, autofixes, blocked="这个查询涉及敏感字段或非法关联，不能直接执行。", debug=debug))
                  if any("未知字段" in e or "多个候选" in e or "枚举值" in e for e in errors):
                      return _finalize(_result("requires_clarification", plan, errors, warnings, autofixes, clarification="我需要确认一下：当前查询中的字段、指标或枚举值对应哪个 schema 定义？", debug=debug))
                  return _finalize(_result("needs_replan", plan, errors, warnings, autofixes, debug=debug))

              return _finalize(_result(route_hint, plan, [], warnings, autofixes, debug=debug))


          def _finalize(res: Dict[str, Any]) -> Dict[str, Any]:
              route = res.get("validator_route")
              if route == "valid":
                  text = ""
                  answer_type = "query_only"
                  should_save = False
              elif route == "requires_clarification":
                  text = res.get("clarification_question") or "我需要确认一下查询字段后再执行。"
                  answer_type = "clarification"
                  should_save = False
              elif route in {"blocked", "needs_replan"}:
                  reason = res.get("blocked_reason") or "; ".join(_list(res.get("errors"))) or "语义计划未通过校验。"
                  text = "当前查询无法执行：" + reason
                  answer_type = "validation_error"
                  should_save = False
              else:
                  text = "系统在处理该查询时出现异常，请调整问题后重试。"
                  answer_type = "system_error"
                  should_save = False
              res["answer_type"] = answer_type if route != "valid" else res.get("answer_type")
              res["final_answer_markdown"] = text
              res["answer_payload_markdown"] = text
              schema_ref = {}
              dbg = res.get("debug") if isinstance(res.get("debug"), dict) else {}
              if isinstance(dbg.get("schema_context_ref"), dict):
                  schema_ref = dbg.get("schema_context_ref")
              prior = dbg.get("prior_compact_context") if isinstance(dbg.get("prior_compact_context"), dict) else {}
              compact = {
                  "context_version": "compact_context_contract",
                  "has_last_context": bool(prior.get("has_last_context")),
                  "last_question": _str(dbg.get("question")),
                  "last_turn_intent": {"validator_route": route or "invalid", "answer_type": answer_type},
                  "last_primary_collection": prior.get("last_primary_collection") or "",
                  "last_related_collections": prior.get("last_related_collections") if isinstance(prior.get("last_related_collections"), list) else [],
                  "last_plan_summary": prior.get("last_plan_summary") if isinstance(prior.get("last_plan_summary"), dict) else {},
                  "last_resolved_fields": prior.get("last_resolved_fields") if isinstance(prior.get("last_resolved_fields"), list) else [],
                  "last_resolved_metrics": prior.get("last_resolved_metrics") if isinstance(prior.get("last_resolved_metrics"), list) else [],
                  "last_chart_request": prior.get("last_chart_request") if isinstance(prior.get("last_chart_request"), dict) else {},
                  "last_result_profile": prior.get("last_result_profile") if isinstance(prior.get("last_result_profile"), dict) else {"row_count": 0, "fields": [], "preview_rows": []},
                  "schema_context_ref": schema_ref or prior.get("schema_context_ref") or {"collections": [], "schema_digest": "", "schema_version": "", "catalog_digest": ""},
                  "answer_summary": text[:800],
                  "size_guard": {},
                  "context_warnings": [],
              }
              compact_json = json.dumps(compact, ensure_ascii=False)
              answer_payload = {
                  "contract_version": "answer_payload_contract",
                  "answer_type": answer_type if route != "valid" else (res.get("answer_type") or "query_only"),
                  "answer_text": text,
                  "chart_echarts_markdown": "",
                  "result_summary": text[:800],
                  "message": "",
                  "chart_payload": {},
                  "query_result_profile": {"row_count": 0, "fields": [], "preview_rows": []},
                  "state_update": {"should_save_context": should_save, "context_summary": compact},
