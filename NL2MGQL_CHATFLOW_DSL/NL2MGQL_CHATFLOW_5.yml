    - data:
        code: |
          import json


          def _loads(value, fallback):
              if isinstance(value, (dict, list)):
                  return value
              if isinstance(value, str) and value.strip():
                  try:
                      return json.loads(value)
                  except Exception:
                      return fallback
              return fallback


          def _rows(value):
              parsed = _loads(value, value)
              return [x for x in parsed if isinstance(x, dict)] if isinstance(parsed, list) else []


          def _fmt(v):
              if isinstance(v, float) and v.is_integer():
                  return str(int(v))
              return str(v)


          def main(question: str, last_merged_rows, last_normalized_execution_plan, last_result_summary: str, analysis_focus: str):
              rows = _rows(last_merged_rows)
              if not rows:
                  text = '当前没有可复用的上一轮查询结果。请先提出一个完整的数据查询问题，再让我继续分析。'
                  return {'final_answer_markdown': text, 'final_answer_summary': text}
              first = rows[0]
              group = next((k for k, v in first.items() if not isinstance(v, (int, float))), '')
              metric = next((k for k, v in first.items() if k != group and isinstance(v, (int, float))), '')
              lines = ['从当前已查询到的统计结果看：']
              lines.append(f'- 本次复用上一轮聚合结果，共 {len(rows)} 条记录；以下分析不重新查询数据库。')
              if group and metric:
                  sorted_rows = sorted(rows, key=lambda r: r.get(metric) if isinstance(r.get(metric), (int, float)) else 0, reverse=True)
                  top = sorted_rows[0]
                  lines.append(f'- {group} 维度中，{top.get(group, "未知")} 的 {metric} 最高，为 {_fmt(top.get(metric, ""))}。')
                  if len(sorted_rows) > 1:
                      second = sorted_rows[1]
                      gap = (top.get(metric) or 0) - (second.get(metric) or 0)
                      lines.append(f'- 与第二名 {second.get(group, "未知")} 相比，差值为 {_fmt(gap)}。')
                  lines.append('- 造成差异的真实业务原因需要结合订单来源、活动、库存、渠道等明细进一步验证；仅凭当前聚合结果不能断言具体原因。')
              else:
                  lines.append('- 当前结果字段不足以稳定识别分组维度和数值指标，只能做整体描述，不能推断具体业务原因。')
              if last_result_summary:
                  lines.append('\n上一轮摘要可作为参考：' + str(last_result_summary)[:800])
              text = '\n'.join(lines)
              return {'final_answer_markdown': text, 'final_answer_summary': text}
