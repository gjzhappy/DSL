              return {}


          def main(refine_schema_outputs, refine_retrieval_tasks_json: str, old_normalized_semantic_plan_json: str, refine_retrieval_valid=True, refine_retrieval_error: str=''):
              outputs = _list(refine_schema_outputs)
              tasks = _list(refine_retrieval_tasks_json)
              sections = []
              for idx, raw in enumerate(outputs):
                  item = _loads(raw)
                  collection = str(item.get('collection_name') or (tasks[idx].get('collection_name') if idx < len(tasks) and isinstance(tasks[idx], dict) else '') or '').strip()
                  role = str(item.get('role') or (tasks[idx].get('role') if idx < len(tasks) and isinstance(tasks[idx], dict) else '') or '').strip()
                  context_text = str(item.get('context_text') or '').strip()
                  if context_text:
                      sections.append('## collection=%s\nrole=%s\n%s' % (collection, role, context_text))
              if not sections:
