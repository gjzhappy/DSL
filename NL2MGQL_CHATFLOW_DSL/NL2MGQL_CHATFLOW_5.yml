              valid=not bool(error)
              warn='；'.join([w for w in [chart_plan_warning]+warnings if w])
              return {'chart_valid':valid,'chart_warning':warn,'chart_error':error,'normalized_chart_request_json':json.dumps(req,ensure_ascii=False),'recommended_chart_type':rec,'should_generate_chart':valid}
