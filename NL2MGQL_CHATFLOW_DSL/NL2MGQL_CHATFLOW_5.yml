        code: |
          import json,re
          PROTECT=['primary_collection','group_fields','metric_function','metric_field','metric_alias','filters','time_range','sort','limit','chart_request']

          def _loads(v):
              if isinstance(v,dict): return v
              if isinstance(v,str) and v.strip():
                  try: return json.loads(v)
                  except Exception: return {}
              return {}

          def main(old_plan, new_plan, current_question: str):
              old=_loads(old_plan); new=_loads(new_plan) or old; warnings=[]; q=str(current_question or '')
              # conservative: if question does not mention obvious field-changing words, preserve core collection/metric/group fields
              mutable=[]
              if any(w in q for w in ['时间','近','最近','过去']): mutable.append('time_range')
              if any(w in q.lower() for w in ['top','前','limit']): mutable.append('limit')
              if any(w in q for w in ['排序','升序','降序']): mutable.append('sort')
              if any(w in q for w in ['图','饼图','折线图','柱状图']): mutable.append('chart_request')
              os=((old.get('execution_plan') or {}).get('stages') or [{}])[0] if old else {}
              ns=((new.get('execution_plan') or {}).get('stages') or [{}])[0] if new else {}
              for k in PROTECT:
                  if k in ['chart_request']:
                      if k not in mutable and old.get(k) and new.get(k)!=old.get(k): new[k]=old.get(k); warnings.append(k)
                  elif k not in mutable and os.get(k) not in (None,'',[],{}) and ns.get(k)!=os.get(k): ns[k]=os.get(k); warnings.append(k)
              return {'normalized_semantic_plan_json':json.dumps(new,ensure_ascii=False),'plan_guard_warning':json.dumps(warnings,ensure_ascii=False)}
        code_language: python3
        desc: 比较 old_plan/new_plan/current_question，回滚明显漂移字段。
