          def main(question: str, last_context_json: str, query_refinement_json: str):
              ctx=_loads(last_context_json); old=_loads(ctx.get('last_normalized_semantic_plan_json'))
              q=str(question or ''); changed=[]; plan=json.loads(json.dumps(old, ensure_ascii=False)) if old else {}
              stages=((plan.get('execution_plan') or {}).get('stages') or []) if isinstance(plan,dict) else []
              st=stages[0] if stages else {}
              m=re.search(r'近\s*(\d+)\s*天|最近\s*(\d+)\s*天', q)
              if m and st:
                  days=int(m.group(1) or m.group(2)); tr=st.get('time_range') if isinstance(st.get('time_range'),dict) else {}; tr.update({'mode':'relative_days','relative_days':days,'start':'','end':''}); st['time_range']=tr; changed.append('time_range')
              m=re.search(r'(?:top|前)\s*(\d+)', q, flags=re.I)
              if m and st:
                  st['limit']=min(max(int(m.group(1)),1),200); changed.append('limit')
              if ('升序' in q or '从低到高' in q) and st.get('sort'):
                  for s in st['sort']:
                      if isinstance(s,dict): s['direction']='asc'
                  changed.append('sort')
              if ('降序' in q or '从高到低' in q) and st.get('sort'):
                  for s in st['sort']:
                      if isinstance(s,dict): s['direction']='desc'
                  changed.append('sort')
              patch=bool(changed)
