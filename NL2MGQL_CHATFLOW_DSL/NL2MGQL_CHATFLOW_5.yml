        code: |
          import json
          import re

          ALLOWED_ACTIONS = {'pass', 'use_validator_answer', 'replan', 'reroute', 'clarify'}
          ALLOWED_STAGES = {'none', 'route', 'plan', 'query', 'chart', 'analysis', 'answer', 'unknown'}
          ALLOWED_RISK = {'low', 'medium', 'high'}

          def _strip_code_block(text):
              text = str(text or '').strip()
              m = re.match(r'^```(?:json)?\s*(.*?)\s*```$', text, flags=re.I | re.S)
              return m.group(1).strip() if m else text

          def _extract_json(text):
              text = _strip_code_block(text)
              start, end = text.find('{'), text.rfind('}')
              return text[start:end + 1] if start >= 0 and end >= start else text

          def _loads_obj(value):
              if isinstance(value, dict):
                  return dict(value)
              if isinstance(value, str) and value.strip():
                  return json.loads(_extract_json(value))
              return {}

          def _int(value, default=0):
              try:
                  if value is None or value == '':
                      return default
                  return int(value)
              except Exception:
                  return default

          def _float(value, default=0.0):
              try:
                  if value is None or value == '':
                      return default
                  return float(value)
              except Exception:
                  return default

          def _list(value):
              return value if isinstance(value, list) else ([] if value in (None, '') else [str(value)])

          def _safe_clarify(repair_hint):
              hint = str(repair_hint or '').strip()
              if hint:
                  return hint
              return '当前需求与已有上下文无法安全唯一对应。请明确要修改查询条件、图表类型，还是分析口径。'

          def main(validation_structured,
                   validation_text: str,
                   final_answer_candidate: str,
                   answer_source: str,
                   repair_attempts,
                   max_repair_attempts):
              parse_error = ''
              try:
                  obj = _loads_obj(validation_structured) or _loads_obj(validation_text)
                  if not isinstance(obj, dict):
                      obj = {}
              except Exception as exc:
                  obj = {}
                  parse_error = str(exc)

              if not obj:
                  action = 'pass'
                  stage = 'none'
                  risk = 'low'
                  issues = []
                  repair_hint = ''
                  answer_rewrite = ''
                  passed = True
                  confidence = 0.0
              else:
                  passed = bool(obj.get('passed'))
                  action = str(obj.get('suggested_action') or ('pass' if passed else 'clarify')).strip()
                  stage = str(obj.get('failure_stage') or ('none' if passed else 'unknown')).strip()
                  risk = str(obj.get('risk_level') or ('low' if passed else 'medium')).strip()
                  issues = _list(obj.get('issues'))
                  repair_hint = str(obj.get('repair_hint') or '')
                  answer_rewrite = str(obj.get('answer_rewrite') or '')
                  confidence = _float(obj.get('confidence'), 0.0)

              if action not in ALLOWED_ACTIONS:
                  action = 'pass' if passed else 'clarify'
              if stage not in ALLOWED_STAGES:
                  stage = 'none' if passed else 'unknown'
              if risk not in ALLOWED_RISK:
                  risk = 'low' if passed else 'medium'
              if action == 'reroute' and stage not in {'route', 'chart'}:
                  action = 'clarify'
                  repair_hint = repair_hint or '验收器要求重新路由，但失败阶段无法安全映射到 route/chart。请明确要修改查询、图表还是分析口径。'
              if passed:
                  action = 'pass'
                  stage = 'none'

              attempts = _int(repair_attempts, 0)
              max_attempts = max(1, _int(max_repair_attempts, 1))
              blocked = False
              if (not passed) and action in {'replan', 'reroute'} and attempts >= max_attempts:
                  blocked = True
                  action = 'clarify'
                  repair_hint = _safe_clarify(repair_hint)

              should_save = action in {'pass', 'use_validator_answer'}
              if action == 'pass':
                  final_answer_to_use = str(final_answer_candidate or '')
                  next_attempts = attempts
              elif action == 'use_validator_answer':
                  final_answer_to_use = answer_rewrite.strip() or str(final_answer_candidate or '')
                  next_attempts = attempts + 1
              elif action == 'clarify':
                  final_answer_to_use = _safe_clarify(repair_hint)
                  next_attempts = attempts + 1 if not passed else attempts
              else:
                  final_answer_to_use = ''
                  next_attempts = attempts + 1

              debug = {
                  'raw_validation': obj,
                  'validation_parse_error': parse_error,
                  'repair_attempts': attempts,
                  'max_repair_attempts': max_attempts,
                  'blocked_by_max_attempts': blocked,
                  'answer_source': str(answer_source or ''),
              }
              return {
                  'validation_passed': bool(passed),
                  'suggested_action': action,
                  'failure_stage': stage,
                  'risk_level': risk,
                  'issues_json': json.dumps(issues, ensure_ascii=False),
                  'repair_hint': repair_hint,
                  'answer_rewrite': answer_rewrite,
                  'final_answer_to_use': final_answer_to_use,
                  'answer_source': str(answer_source or ''),
                  'repair_attempts_next': next_attempts,
                  'should_save_context': should_save,
                  'validation_debug_json': json.dumps(debug, ensure_ascii=False),
              }
