                      for cname, coll in extracted.get('collections', {}).items():
                          schema_metadata['collections'][cname] = coll
                      schema_metadata['warnings'].extend(extracted.get('warnings') or [])
                      for cname, coll in extracted.get('collections', {}).items():
                          lines = ['collection: ' + cname]
                          if coll.get('collection_label'):
                              lines.append('collection_label: ' + str(coll.get('collection_label')))
                          if coll.get('primary_key'):
