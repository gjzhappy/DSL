          import json
          import re

          # schema metadata C-MVP helpers


          def _strip_quotes(v):
              v = str(v or '').strip()
              if (len(v) >= 2 and v[0] == v[-1] and v[0] in {'"', "'"}):
                  return v[1:-1]
              return v


          def _parse_scalar(v):
              v = str(v or '').strip()
              if not v:
                  return ''
              if v in {'|', '>', '|-', '>-'}:
                  return ''
              if v in {'true', 'True'}:
                  return True
              if v in {'false', 'False'}:
                  return False
              if v.startswith('[') and v.endswith(']'):
                  body = v[1:-1].strip()
                  return [_strip_quotes(x.strip()) for x in re.split(r'\s*,\s*', body) if x.strip()]
              if re.match(r'^-?\d+$', v):
                  try: return int(v)
                  except Exception: pass
              if re.match(r'^-?\d+\.\d+$', v):
                  try: return float(v)
                  except Exception: pass
              return _strip_quotes(v)


          def _parse_simple_yaml(text):
              root = {}
              stack = [(-1, root)]
              pending_key = None
              lines = str(text or '').replace('\r\n','\n').replace('\r','\n').split('\n')
              i = 0
              while i < len(lines):
                  raw = lines[i]
                  if not raw.strip() or raw.lstrip().startswith('#'):
                      i += 1; continue
                  indent = len(raw) - len(raw.lstrip(' '))
                  s = raw.strip()
                  # block scalar continuation for key: > or |
                  mblock = re.match(r'^([A-Za-z_][\w\-]*)\s*:\s*([>|][\-+]?)\s*$', s)
                  if mblock:
                      key = mblock.group(1)
                      parts=[]; base=None; j=i+1
                      while j < len(lines):
                          nr=lines[j]
                          if nr.strip():
                              ni=len(nr)-len(nr.lstrip(' '))
                              if ni <= indent: break
                              if base is None: base=ni
                              parts.append(nr[base:] if len(nr)>=base else nr.strip())
                          else:
                              parts.append('')
                          j += 1
                      while stack and indent <= stack[-1][0]: stack.pop()
                      parent=stack[-1][1]
                      if isinstance(parent, dict): parent[key]='\n'.join(parts).strip()
                      i=j; continue
                  while stack and indent <= stack[-1][0]:
                      stack.pop()
                  parent = stack[-1][1]
                  if s.startswith('- '):
                      item = s[2:].strip()
                      if not isinstance(parent, list):
                          # malformed under scalar, skip
                          i += 1; continue
                      if ':' in item and re.match(r'^[A-Za-z_][\w\-]*\s*:', item):
                          k, v = item.split(':',1)
                          obj = {k.strip(): _parse_scalar(v)} if v.strip() else {k.strip(): {}}
                          parent.append(obj)
                          stack.append((indent, obj))
                          if not v.strip():
                              stack.append((indent+2, obj[k.strip()]))
                      else:
                          parent.append(_parse_scalar(item))
                      i += 1; continue
                  if ':' in s:
                      k, v = s.split(':',1)
                      key = k.strip()
                      val = v.strip()
                      if isinstance(parent, dict):
                          if val:
                              parent[key] = _parse_scalar(val)
                              i += 1; continue
                          # determine next container
                          j=i+1; nxt=''
                          while j < len(lines):
                              if lines[j].strip() and not lines[j].lstrip().startswith('#'):
                                  nxt=lines[j].strip(); break
                              j += 1
                          container = [] if nxt.startswith('- ') else {}
                          parent[key] = container
                          stack.append((indent, container))
                  i += 1
              return root


          def extract_schema_metadata_blocks(text):
              blocks = []
              pattern = re.compile(r'(^|\n)##\s*Schema Metadata\s*\n+```(?:yaml|yml)\s*\n(.*?)\n```', re.I|re.S)
              for m in pattern.finditer(str(text or '')):
                  blocks.append(m.group(2))
              if not blocks:
                  pattern2 = re.compile(r'```(?:yaml|yml)\s*\n(.*?metadata_type\s*:\s*mongo_schema.*?)\n```', re.I|re.S)
                  blocks = [m.group(1) for m in pattern2.finditer(str(text or ''))]
              return blocks


          def _normalize_schema_doc(doc, warnings):
              if not isinstance(doc, dict): return None
              if doc.get('metadata_type') != 'mongo_schema' and not (doc.get('collection_name') and isinstance(doc.get('fields'), list)):
                  return None
              cname = str(doc.get('collection_name') or '').strip()
              if not cname: return None
              fields={}
              for f in doc.get('fields') or []:
                  if isinstance(f, dict) and f.get('name'):
                      name=str(f.get('name')).strip(); item=dict(f); item['name']=name
                      item['aliases']=[str(x).strip() for x in (item.get('aliases') or []) if str(x).strip()]
                      fields[name]=item
              metrics={}
              for m in doc.get('metrics') or []:
                  if isinstance(m, dict) and m.get('name'):
                      name=str(m.get('name')).strip(); item=dict(m); item['name']=name
                      item['aliases']=[str(x).strip() for x in (item.get('aliases') or []) if str(x).strip()]
                      metrics[name]=item
              return {
                  'collection_name': cname,
                  'collection_label': str(doc.get('collection_label') or '').strip(),
                  'collection_aliases': [str(x).strip() for x in (doc.get('collection_aliases') or []) if str(x).strip()],
                  'primary_key': str(doc.get('primary_key') or '').strip(),
                  'default_time_field': str(doc.get('default_time_field') or '').strip(),
                  'fields': fields,
                  'metrics': metrics,
                  'relations': doc.get('relations') if isinstance(doc.get('relations'), list) else [],
                  'query_rules': doc.get('query_rules') if isinstance(doc.get('query_rules'), dict) else {},
              }


          def extract_schema_metadata(schema_context):
              warnings=[]; collections={}
              raw = schema_context if isinstance(schema_context, str) else json.dumps(schema_context, ensure_ascii=False)
              # allow already-json metadata
              if isinstance(schema_context, dict) and isinstance(schema_context.get('collections'), dict):
                  return {'collections': schema_context.get('collections') or {}, 'warnings': schema_context.get('warnings') or []}
              for block in extract_schema_metadata_blocks(raw):
                  try:
                      doc=_parse_simple_yaml(block)
                      norm=_normalize_schema_doc(doc, warnings)
                      if norm: collections[norm['collection_name']]=norm
                  except Exception as e:
                      warnings.append('Schema Metadata YAML 解析失败: '+str(e)[:160])
              return {'collections': collections, 'warnings': warnings}


          def _add_alias(index, alias, collection, kind, name, label):
              alias=str(alias or '').strip()
              if not alias: return
              item={'collection':collection,'kind':kind,'name':name,'label':str(label or '').strip()}
              bucket=index.setdefault(alias, [])
              if not any(x.get('collection')==collection and x.get('kind')==kind and x.get('name')==name for x in bucket):
                  bucket.append(item)


          def build_alias_index(schema_metadata):
              meta=schema_metadata if isinstance(schema_metadata, dict) else extract_schema_metadata(schema_metadata)
              index={}; coll_index={}
              for cname, coll in (meta.get('collections') or {}).items():
                  _add_alias(coll_index, cname, cname, 'collection', cname, coll.get('collection_label'))
                  _add_alias(coll_index, coll.get('collection_label'), cname, 'collection', cname, coll.get('collection_label'))
                  for a in coll.get('collection_aliases') or []: _add_alias(coll_index, a, cname, 'collection', cname, coll.get('collection_label'))
                  for fname, f in (coll.get('fields') or {}).items():
                      for a in [fname, f.get('label')] + list(f.get('aliases') or []): _add_alias(index, a, cname, 'field', fname, f.get('label'))
                  for mname, m in (coll.get('metrics') or {}).items():
                      for a in [mname, m.get('label')] + list(m.get('aliases') or []): _add_alias(index, a, cname, 'metric', mname, m.get('label'))
              return {'aliases': index, 'collection_aliases': coll_index}


          def prettify_field_name(field_name):
              return str(field_name or '').strip().replace('_',' ')


          def _meta_and_index(schema_metadata):
              meta=schema_metadata if isinstance(schema_metadata, dict) and 'collections' in schema_metadata else extract_schema_metadata(schema_metadata)
              return meta, build_alias_index(meta)


          def resolve_field_name(raw_name, schema_metadata, collection_name=None, old_plan_fields=None):
              raw=str(raw_name or '').strip(); old=set(str(x).strip() for x in (old_plan_fields or []) if str(x).strip())
              meta, idx=_meta_and_index(schema_metadata); colls=meta.get('collections') or {}
              cname=str(collection_name or '').strip()
              if cname in colls and raw in (colls[cname].get('fields') or {}):
                  f=colls[cname]['fields'][raw]; return {'input':raw,'resolved':raw,'kind':'field','collection':cname,'source':'schema_field_name','label':f.get('label') or prettify_field_name(raw),'confidence':1.0,'warning':''}
              candidates=[x for x in (idx.get('aliases') or {}).get(raw, []) if x.get('kind')=='field']
              if cname:
                  scoped=[x for x in candidates if x.get('collection')==cname]
                  if scoped:
                      x=scoped[0]; return {'input':raw,'resolved':x['name'],'kind':'field','collection':x['collection'],'source':'schema_alias','label':x.get('label') or prettify_field_name(x['name']),'confidence':1.0,'warning':''}
              if len(candidates)==1:
                  x=candidates[0]; return {'input':raw,'resolved':x['name'],'kind':'field','collection':x['collection'],'source':'schema_alias_unique','label':x.get('label') or prettify_field_name(x['name']),'confidence':1.0,'warning':''}
              if raw in old:
                  return {'input':raw,'resolved':raw,'kind':'field','collection':cname,'source':'old_plan_fields','label':prettify_field_name(raw),'confidence':0.8,'warning':''}
              warning = '字段别名未在 schema metadata 中声明，未自动归一。' if not candidates else '字段别名在多个 collection 中存在，缺少 collection 上下文，未自动归一。'
              return {'input':raw,'resolved':raw,'kind':'unknown','collection':cname,'source':'unresolved','label':raw or prettify_field_name(raw),'confidence':0,'warning':warning}


          def resolve_metric_name(raw_name, schema_metadata, collection_name=None):
              raw=str(raw_name or '').strip(); meta, idx=_meta_and_index(schema_metadata); colls=meta.get('collections') or {}; cname=str(collection_name or '').strip()
              if cname in colls and raw in (colls[cname].get('metrics') or {}):
                  m=colls[cname]['metrics'][raw]; return {'input':raw,'resolved':raw,'kind':'metric','collection':cname,'source':'schema_metric_name','label':m.get('label') or prettify_field_name(raw),'confidence':1.0,'warning':''}
              candidates=[x for x in (idx.get('aliases') or {}).get(raw, []) if x.get('kind')=='metric']
              if cname:
                  scoped=[x for x in candidates if x.get('collection')==cname]
                  if scoped:
                      x=scoped[0]; return {'input':raw,'resolved':x['name'],'kind':'metric','collection':x['collection'],'source':'schema_alias','label':x.get('label') or prettify_field_name(x['name']),'confidence':1.0,'warning':''}
              if len(candidates)==1:
                  x=candidates[0]; return {'input':raw,'resolved':x['name'],'kind':'metric','collection':x['collection'],'source':'schema_alias_unique','label':x.get('label') or prettify_field_name(x['name']),'confidence':1.0,'warning':''}
              return {'input':raw,'resolved':raw,'kind':'unknown','collection':cname,'source':'unresolved','label':raw,'confidence':0,'warning':'指标别名未在 schema metadata 中声明，未自动归一。'}


          def resolve_field_label(field_name, schema_metadata, collection_name=None):
              meta,_=_meta_and_index(schema_metadata); fname=str(field_name or '').strip(); cname=str(collection_name or '').strip()
              if cname and cname in meta.get('collections',{}) and fname in meta['collections'][cname].get('fields',{}):
                  return meta['collections'][cname]['fields'][fname].get('label') or prettify_field_name(fname)
              hits=[]
              for cn,c in (meta.get('collections') or {}).items():
                  if fname in c.get('fields',{}): hits.append(c['fields'][fname].get('label') or prettify_field_name(fname))
              return hits[0] if len(hits)==1 else prettify_field_name(fname)


          def resolve_metric_label(metric_name, schema_metadata, collection_name=None):
              meta,_=_meta_and_index(schema_metadata); name=str(metric_name or '').strip(); cname=str(collection_name or '').strip()
              if cname and cname in meta.get('collections',{}) and name in meta['collections'][cname].get('metrics',{}):
                  return meta['collections'][cname]['metrics'][name].get('label') or prettify_field_name(name)
              hits=[]
              for cn,c in (meta.get('collections') or {}).items():
                  if name in c.get('metrics',{}): hits.append(c['metrics'][name].get('label') or prettify_field_name(name))
              return hits[0] if len(hits)==1 else prettify_field_name(name)


          def build_chart_title(group_field, metric_name, schema_metadata, collection_name=None, user_title=''):
              if str(user_title or '').strip(): return str(user_title).strip(), 'chart_request'
              x=resolve_field_label(group_field, schema_metadata, collection_name)
              y=resolve_metric_label(metric_name, schema_metadata, collection_name)
              return ('按'+x+'统计'+y if x and y else (x+' 与 '+y+' 对比')).strip(), 'schema_label'
          # end schema metadata C-MVP helpers

          SEMANTIC_SCHEMA = {'type': 'object', 'required': ['execution_plan', 'needs_chart', 'chart_request', 'answer_mode'], 'properties': {'execution_plan': {'type': 'object'}, 'needs_chart': {'type': 'boolean'}, 'chart_request': {'type': 'object'}, 'answer_mode': {'type': 'string'}}, 'additionalProperties': True}
          MAX_REPLAN_PROMPT_CHARS = 16000
          MAX_SCHEMA_CONTEXT_CHARS = 8000
          MAX_RESULT_PREVIEW_ROWS = 5
          def _loads(v, default):
              if isinstance(v, (dict, list)):
                  return v
              if isinstance(v, str) and v.strip():
                  try:
                      return json.loads(v)
                  except Exception:
                      return default
              return default


          def _dumps(v):
              return json.dumps(v, ensure_ascii=False, separators=(',', ':'))


          def _compact_text(v, limit):
              s = v if isinstance(v, str) else _dumps(v)
              s = re.sub(r'\n{3,}', '\n\n', str(s or '').strip())
              return s if len(s) <= limit else s[:limit].rstrip() + '\n...[truncated]'


          def _bool(v):
              if isinstance(v, bool):
                  return v
              if isinstance(v, str):
                  x = v.strip().lower()
                  if x in {'true', '1', 'yes', 'y'}:
                      return True
                  if x in {'false', '0', 'no', 'n'}:
                      return False
              return bool(v)


          def _normalize_old_plan(raw):
              plan = _loads(raw, {})
              if not isinstance(plan, dict):
                  plan = {}
              plan['needs_chart'] = _bool(plan.get('needs_chart', False))
              if not isinstance(plan.get('chart_request'), dict):
                  plan['chart_request'] = {}
              if not plan.get('answer_mode'):
                  plan['answer_mode'] = 'data'
              ep = plan.get('execution_plan')
              if not isinstance(ep, dict):
                  ep = {}
              stages = ep.get('stages')
              if isinstance(stages, dict):
                  stages = [stages]
              elif not isinstance(stages, list):
                  stages = []
              ep['stages'] = stages
              plan['execution_plan'] = ep
              return plan


          def _schema_alias_map(schema_context):
              schema_metadata = extract_schema_metadata(schema_context)
              schema_alias_index = build_alias_index(schema_metadata)
              alias_map = {}
              real_fields = set()
              for alias, candidates in (schema_alias_index.get('aliases') or {}).items():
                  for item in candidates:
                      if item.get('kind') == 'field':
                          alias_map.setdefault(alias, []).append(item)
                          real_fields.add(str(item.get('name') or ''))
              return alias_map, real_fields, schema_metadata, schema_alias_index


          def _old_plan_collection(old_plan):
              if not isinstance(old_plan, dict):
                  return ''
              stages = ((old_plan.get('execution_plan') or {}).get('stages') or old_plan.get('stages') or [])
              stage0 = stages[0] if isinstance(stages, list) and stages and isinstance(stages[0], dict) else {}
              return str(old_plan.get('primary_collection') or stage0.get('primary_collection') or stage0.get('collection') or '').strip()


          def _collect_plan_fields(obj, out):
              if isinstance(obj, dict):
                  for k, v in obj.items():
                      lk = str(k).lower()
                      if isinstance(v, str) and any(x in lk for x in ('field', 'group', 'metric', 'x_', 'y_', 'sort')):
                          out.add(v)
                      elif isinstance(v, list) and any(x in lk for x in ('field', 'group', 'metric', 'sort')):
                          for item in v:
                              if isinstance(item, str):
                                  out.add(item)
                      _collect_plan_fields(v, out)
              elif isinstance(obj, list):
                  for item in obj:
                      _collect_plan_fields(item, out)


          def _normalize_field_value(value, alias_map, real_fields, old_plan_fields, warnings, schema_metadata=None, collection_name='', metric=False):
              if not isinstance(value, str):
                  return value
              raw = value.strip()
              if metric:
                  resolved = resolve_metric_name(raw, schema_metadata or {'collections': {}}, collection_name)
              else:
                  resolved = resolve_field_name(raw, schema_metadata or {'collections': {}}, collection_name, old_plan_fields)
              warning = str(resolved.get('warning') or '').strip()
              if warning:
                  warnings.append(warning + ': ' + raw)
              return resolved.get('resolved') or raw


          def _normalize_refinement(obj, alias_map, real_fields, old_plan_fields, warnings, schema_metadata=None, collection_name=""):
              if isinstance(obj, dict):
                  out = {}
                  for k, v in obj.items():
                      lk = str(k).lower()
                      if isinstance(v, str) and any(x in lk for x in ('field', 'group', 'x_', 'y_', 'metric')):
                          out[k] = _normalize_field_value(v, alias_map, real_fields, old_plan_fields, warnings, schema_metadata, collection_name, metric=('metric' in lk or 'y_' in lk))
                      elif isinstance(v, list) and any(x in lk for x in ('field', 'group', 'sort')):
                          out[k] = [_normalize_field_value(x, alias_map, real_fields, old_plan_fields, warnings, schema_metadata, collection_name, metric=('metric' in lk)) for x in v]
                      else:
                          out[k] = _normalize_refinement(v, alias_map, real_fields, old_plan_fields, warnings, schema_metadata, collection_name)
                  return out
              if isinstance(obj, list):
                  return [_normalize_refinement(x, alias_map, real_fields, old_plan_fields, warnings, schema_metadata, collection_name) for x in obj]
              return obj


          def _summarize_turn_intent(raw):
              obj = _loads(raw, {})
              if not isinstance(obj, dict):
                  return _compact_text(raw, 1200)
              keys = ['turn_intent', 'need_requery', 'need_rechart', 'query_refinement', 'chart_modification', 'reason', 'analysis_focus']
              return _dumps({k: obj.get(k) for k in keys if k in obj})


          def _summarize_refine_planning(raw):
              obj = _loads(raw, {})
              if not isinstance(obj, dict):
                  return _compact_text(raw, 1200)
              keys = ['primary_collection_hint', 'collection_hints', 'field_hints', 'business_terms', 'old_plan_fields', 'possible_new_concepts', 'retrieval_tasks', 'planning_reason']
              slim = {k: obj.get(k) for k in keys if k in obj}
              if isinstance(slim.get('planning_reason'), str):
                  slim['planning_reason'] = _compact_text(slim['planning_reason'], 500)
              return _compact_text(_dumps(slim), 1800)


          def _preview_result(raw):
              obj = _loads(raw, None)
              if obj is None:
                  return _compact_text(raw, 1500)
              rows = None
              if isinstance(obj, list):
                  rows = obj
              elif isinstance(obj, dict):
                  for key in ('rows', 'data', 'result', 'records', 'preview'):
                      if isinstance(obj.get(key), list):
                          rows = obj.get(key)
                          break
              if rows is not None:
                  fields = []
                  if rows and isinstance(rows[0], dict):
                      fields = list(rows[0].keys())
                  return _dumps({'fields': fields, 'preview_rows': rows[:MAX_RESULT_PREVIEW_ROWS]})
              return _compact_text(_dumps(obj), 1500)


          def main(question: str, old_normalized_semantic_plan_json: str, query_refinement_json: str, patch_reason: str, changed_fields_json: str, refine_planning_json: str, refine_schema_context: str, refine_schema_warning: str, last_chart_request_json: str, last_query_result_json: str, normalized_turn_intent_json: str, replan_input_valid=True, replan_input_error: str=''):
              schema_warning_parts = [str(refine_schema_warning or '').strip()] if str(refine_schema_warning or '').strip() else []
              schema_context = _compact_text(refine_schema_context, MAX_SCHEMA_CONTEXT_CHARS)
              schema_truncated = len(str(refine_schema_context or '')) > len(schema_context)
              if schema_truncated:
                  schema_warning_parts.append('schema_context 超过长度阈值，已截断。')

              alias_map, real_fields, schema_metadata, schema_alias_index = _schema_alias_map(schema_context)
              norm_warnings = []
              old_plan = _normalize_old_plan(old_normalized_semantic_plan_json)
              old_plan_fields = set()
              _collect_plan_fields(old_plan, old_plan_fields)
              qref_obj = _loads(query_refinement_json, {})
              if not isinstance(qref_obj, dict):
                  qref_obj = {}
              collection_name = _old_plan_collection(old_plan)
              normalized_qref = _normalize_refinement(qref_obj, alias_map, real_fields, old_plan_fields, norm_warnings, schema_metadata, collection_name)
              schema_warning_parts.extend(norm_warnings)

              system = '你是 refine_query full replan 语义计划重规划器。只输出符合 semantic_plan JSON Schema 的 JSON 对象；不得输出 markdown、解释文字或代码块。必须在上一轮 normalized semantic plan 基础上按本轮修改要求生成完整 semantic plan。'
              hard_rules = '\n'.join([
                  '1. 用户未明确要求修改的字段必须保持上一轮不变。',
                  '2. 输出 semantic plan 时必须使用 schema_context 中存在的真实字段名。',
                  '3. 如果用户词无法映射到 schema 字段，不要编造字段。',
                  '4. 无法确认字段时，保留 warning，必要时让后续流程澄清或失败，不要静默改成旧业务字段。',
                  '5. 只有当前用户问题或 normalized query_refinement_json 明确要求修改，或 schema_context 证明原字段不适合时，才允许变更字段。',
                  '6. 不允许随意修改 primary_collection、metric_function、metric_field、metric_alias、filters、sort、limit、answer_mode。',
                  '7. schema_context 为空时，只能基于 old plan 进行保守重规划。',
                  '8. 输出完整 JSON，必须包含 execution_plan、execution_plan.stages、needs_chart(boolean)、chart_request、answer_mode；needs_chart 必须是 JSON boolean true/false，不得输出字符串 "true"/"false"。',
                  '9. 如果当前用户问题包含“图、柱状图、折线图、饼图、生成新的图表、做图、可视化”等图表需求，则 needs_chart 必须为 boolean true。',
                  '10. 如果 query_refinement_json 明确修改 group_fields，或当前用户问题明确“不再按 X，改为按 Y 统计”，则 execution_plan.stages[0].group_fields 必须使用新的真实 schema 字段，chart_request.x_field 必须同步改为新的 group_fields[0]。',
                  '11. 不输出 Mongo pipeline、markdown、解释文字或代码块。'
              ])
              parts = [
                  '当前用户问题：\n' + str(question or ''),
                  'normalized old_plan（基准，needs_chart 已转 boolean）：\n' + _dumps(old_plan),
                  'normalized query_refinement_json（仅使用 schema_context 显式 aliases 或 old_plan 既有字段归一）：\n' + _dumps(normalized_qref),
                  'normalized_turn_intent_json 关键字段：\n' + _summarize_turn_intent(normalized_turn_intent_json),
                  '确定性 patch 失败原因：\n' + _compact_text(patch_reason, 700),
                  'changed_fields_json：\n' + _compact_text(changed_fields_json, 900),
                  'LLM_Refine查询规划的检索意图摘要：\n' + _summarize_refine_planning(refine_planning_json),
                  '上一轮 chart_request 简短信息：\n' + _compact_text(last_chart_request_json, 800),
                  '上一轮查询结果字段/最多5行预览：\n' + _preview_result(last_query_result_json),
                  'schema_metadata 摘要（字段/指标必须以 name 为准，用户自然语言字段只能经 aliases/label 映射）：\n' + _compact_text(json.dumps(schema_metadata, ensure_ascii=False), 3000),
                  '压缩后的 schema_context_for_replan：\n' + schema_context,
                  'schema warning：\n' + '; '.join(x for x in schema_warning_parts if x),
                  '硬性保留规则：\n' + hard_rules,
                  '输出 schema 要求：\n' + _dumps(SEMANTIC_SCHEMA),
              ]
              user = '\n\n'.join(parts)
              valid = str(replan_input_valid).lower() not in {'false', '0', 'no'} and bool(old_plan.get('execution_plan'))
              if not valid:
                  user += '\n\n注意：replan_input_valid=false，错误：' + str(replan_input_error or '') + '。请输出结构化错误，不要编造计划。'

              prompt_truncated = False
              replan_prompt = system + '\n\n' + user
              if len(replan_prompt) > MAX_REPLAN_PROMPT_CHARS:
                  prompt_truncated = True
                  overflow = len(replan_prompt) - MAX_REPLAN_PROMPT_CHARS
                  keep_schema = max(1200, len(schema_context) - overflow - 200)
                  schema_context = _compact_text(schema_context, keep_schema)
                  parts[10] = '压缩后的 schema_context_for_replan：\n' + schema_context
                  schema_warning_parts.append('replan_prompt 超过长度阈值，已二次压缩 schema_context。')
                  parts[11] = 'schema warning：\n' + '; '.join(x for x in schema_warning_parts if x)
                  user = '\n\n'.join(parts)
                  replan_prompt = system + '\n\n' + user
                  if len(replan_prompt) > MAX_REPLAN_PROMPT_CHARS:
                      replan_prompt = replan_prompt[:MAX_REPLAN_PROMPT_CHARS].rstrip() + '\n...[replan_prompt truncated]'
                      user = replan_prompt[len(system) + 2:]
                      schema_warning_parts.append('replan_prompt 仍超长，已最终截断。')

              debug = {
                  'schema_dedup_count': 0,
                  'schema_compressed': True,
                  'field_alias_map': alias_map,
                  'schema_metadata_used': bool(schema_metadata.get('collections')),
                  'schema_metadata_json': json.dumps(schema_metadata, ensure_ascii=False),
                  'schema_alias_index_json': json.dumps(schema_alias_index, ensure_ascii=False),
                  'normalized_query_refinement_json': _dumps(normalized_qref),
                  'old_plan_normalized': True,
                  'prompt_chars': len(replan_prompt),
                  'schema_context_chars': len(schema_context),
                  'prompt_truncated': prompt_truncated,
                  'schema_warning': '; '.join(x for x in schema_warning_parts if x),
              }
              return {
                  'replan_system_prompt': system,
                  'replan_user_prompt': user,
                  'replan_prompt': replan_prompt,
                  'old_normalized_semantic_plan_json': _dumps(old_plan),
                  'query_refinement_json': _dumps(normalized_qref),
                  'patch_reason': patch_reason,
                  'changed_fields_json': changed_fields_json,
                  'schema_context_for_replan': schema_context,
                  'replan_json_schema': json.dumps(SEMANTIC_SCHEMA, ensure_ascii=False),
                  'replan_input_valid': valid,
                  'replan_input_error': str(replan_input_error or ''),
                  'replan_prompt_debug_json': json.dumps(debug, ensure_ascii=False),
                  'schema_metadata_json': json.dumps(schema_metadata, ensure_ascii=False),
                  'schema_alias_index_json': json.dumps(schema_alias_index, ensure_ascii=False),
                  'schema_warning': '; '.join(x for x in schema_warning_parts if x)
              }
