    - data:
        code: |
          import json


          def _loads(value, fallback):
              if isinstance(value, (dict, list)):
                  return value
              if isinstance(value, str) and value.strip():
                  try:
                      return json.loads(value)
                  except Exception:
                      return fallback
              return fallback


          def _rows(value):
              parsed = _loads(value, value)
              return [x for x in parsed if isinstance(x, dict)] if isinstance(parsed, list) else []


          def _num(v):
              try:
                  return float(v)
              except Exception:
                  return None


          def _pick_fields(rows, chart):
              x = str(chart.get('x_field') or chart.get('axis_x_title') or '').strip()
              y = str(chart.get('y_field') or chart.get('series_name') or chart.get('axis_y_title') or '').strip()
              option = chart.get('option') if isinstance(chart.get('option'), dict) else {}
              if option and not x:
                  xdata = option.get('xAxis', {}).get('data') if isinstance(option.get('xAxis'), dict) else None
                  if rows and isinstance(xdata, list):
                      for k in rows[0].keys():
                          if str(rows[0].get(k)) in [str(v) for v in xdata[:3]]:
                              x = k; break
              if rows:
                  first = rows[0]
                  if not x:
                      for k, v in first.items():
                          if _num(v) is None:
                              x = k; break
                  if not y:
                      for k, v in first.items():
                          if k != x and _num(v) is not None:
                              y = k; break
              return x, y


          def _markdown(option):
              fence = chr(96) * 3
              return fence + 'echarts\n' + json.dumps(option, ensure_ascii=False, indent=2) + '\n' + fence


          def main(question: str, last_merged_rows, last_chart, chart_modification_json: str):
              rows = _rows(last_merged_rows)
              chart = _loads(last_chart, {})
              mod = _loads(chart_modification_json, {})
              q = str(question or '')
              chart_type = str(mod.get('chart_type') or chart.get('chart_type') or '').strip().lower()
              if '饼图' in q or 'pie' in q.lower():
                  chart_type = 'pie'
              elif '折线' in q or 'line' in q.lower():
                  chart_type = 'line'
              elif '柱状' in q or 'bar' in q.lower():
                  chart_type = 'bar'
              chart_type = chart_type or 'bar'
              x, y = _pick_fields(rows, chart)
              title = str(mod.get('title') or chart.get('title') or '').strip() or '上一轮结果图表'
              if not rows:
                  text = '没有可复用的上一轮查询结果，无法直接改图。请先发起一次完整查询。'
                  return {'final_answer_markdown': text, 'chart_request': chart, 'chart_echarts_markdown': '', 'final_answer_summary': text}
              if not x or not y:
                  text = '已找到上一轮结果，但无法识别图表横轴或纵轴字段，无法安全改图。'
                  return {'final_answer_markdown': text, 'chart_request': chart, 'chart_echarts_markdown': '', 'final_answer_summary': text}
              categories, values, pie_data = [], [], []
              for row in rows:
                  name = str(row.get(x) if row.get(x) is not None else '未分类')
                  val = _num(row.get(y)) or 0
                  categories.append(name); values.append(val); pie_data.append({'name': name, 'value': val})
              if chart_type == 'pie':
                  option = {'title': {'text': title}, 'tooltip': {'trigger': 'item'}, 'series': [{'name': y, 'type': 'pie', 'data': pie_data}]}
                  note = '已基于上一轮查询结果复用数据并改为饼图。'
                  if len(pie_data) > 12:
                      note += '分类较多，饼图可读性可能较弱，建议必要时改回柱状图或增加 TopN。'
              else:
                  option = {'title': {'text': title}, 'tooltip': {'trigger': 'axis'}, 'xAxis': {'type': 'category', 'data': categories}, 'yAxis': {'type': 'value'}, 'series': [{'name': y, 'type': 'line' if chart_type == 'line' else 'bar', 'data': values}]}
                  note = '已基于上一轮查询结果复用数据并更新图表展示。'
              request = {'enabled': True, 'renderer': 'echarts', 'chart_type': chart_type, 'x_field': x, 'y_field': y, 'title': title, 'option': option}
              final = _markdown(option) + '\n\n' + note
              return {'final_answer_markdown': final, 'chart_request': request, 'chart_echarts_markdown': _markdown(option), 'final_answer_summary': note}
        code_language: python3
