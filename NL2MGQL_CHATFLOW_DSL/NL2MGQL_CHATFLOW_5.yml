                  cname_hint = str(item.get('collection_name') or '').strip()
                  text = str(item.get('context_text') or '')
                  for obj in _extract_json_objects(text):
                      if isinstance(obj, dict) and isinstance(obj.get('collections'), dict):
                          for cname, coll in obj.get('collections', {}).items():
                              collections[str(cname).strip()] = _normalize_collection(str(cname).strip(), coll)
                      elif isinstance(obj, dict) and (obj.get('collection_name') or cname_hint):
                          cname = str(obj.get('collection_name') or cname_hint).strip()
                          collections[cname] = _normalize_collection(cname, obj)
              wanted = [str(c or '').strip() for c in (hydration_collections or []) if str(c or '').strip()]
              if wanted:
