                          if coll.get('default_time_field'):
                              lines.append('default_time_field: ' + str(coll.get('default_time_field')))
                          if coll.get('fields'):
                              lines.append('relevant fields:')
                              for fname, f in list((coll.get('fields') or {}).items())[:24]:
                                  label = str(f.get('label') or '').strip()
                                  aliases = f.get('aliases') or []
                                  lines.append('- ' + fname + ((': label=' + label) if label else '') + ((' aliases=' + json.dumps(aliases, ensure_ascii=False)) if aliases else ''))
                          if coll.get('metrics'):
                              lines.append('metrics:')
                              for mname, m in list((coll.get('metrics') or {}).items())[:12]:
                                  label = str(m.get('label') or '').strip()
                                  aliases = m.get('aliases') or []
                                  lines.append('- ' + mname + ((': label=' + label) if label else '') + ((' aliases=' + json.dumps(aliases, ensure_ascii=False)) if aliases else ''))
                          sections.append('\n'.join(lines))
                  else:
                      summary, aliases = _compress_schema(x['collection'], x['role'], x['context_text'], relevant_terms)
                      alias_map.update(aliases)
                      sections.append(summary)
              if schema_metadata.get('collections'):
                  schema_alias_index = build_alias_index(schema_metadata)

              warning = ''
              if not sections:
                  warning = 'Refine schema 检索失败或为空，将只允许基于上一轮 semantic plan 已有字段做保守重规划。'
              elif str(refine_retrieval_valid).lower() in {'false', '0', 'no'}:
                  warning = str(refine_retrieval_error or '')

              ctx = '### refine_query schema_context_for_replan (compressed)\n' + '\n\n'.join(sections)
              truncated = False
              if len(ctx) > MAX_SCHEMA_CONTEXT_CHARS:
                  ctx = ctx[:MAX_SCHEMA_CONTEXT_CHARS].rstrip() + '\n...[schema_context truncated for replan prompt budget]'
                  truncated = True
