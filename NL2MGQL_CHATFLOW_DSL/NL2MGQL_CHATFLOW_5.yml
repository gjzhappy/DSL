        code: |-
          import hashlib
          import json
          import re

          MAX_SCHEMA_CONTEXT_CHARS = 8000
          def _list(v):
              if isinstance(v, list):
                  return v
              if isinstance(v, str) and v.strip():
                  try:
                      x = json.loads(v)
                      return x if isinstance(x, list) else []
                  except Exception:
                      return []
              return []


          def _loads(v):
              if isinstance(v, dict):
                  return v
              if isinstance(v, str) and v.strip():
                  try:
                      x = json.loads(v)
                      return x if isinstance(x, dict) else {}
                  except Exception:
                      return {}
              return {}


          def _compact(s, limit):
              s = re.sub(r'\n{3,}', '\n\n', str(s or '').strip())
              return s if len(s) <= limit else s[:limit].rstrip() + '\n...[truncated]'


          def _title(text):
              for line in str(text or '').splitlines()[:30]:
                  m = re.match(r'\s*#{1,6}\s+(.+?)\s*$', line)
                  if m:
                      return m.group(1).strip()
              return ''


          def _collection_from_text(text, fallback=''):
              patterns = [
                  r'collection\s*[:=]\s*[`"]?([A-Za-z0-9_\-]+)',
                  r'collection_name\s*[:=]\s*[`"]?([A-Za-z0-9_\-]+)',
                  r'集合\s*[:：]\s*[`"]?([A-Za-z0-9_\-]+)',
              ]
              for pat in patterns:
                  m = re.search(pat, text or '', re.I)
                  if m:
                      return m.group(1).strip('`"')
              return fallback


          def _dedup_key(collection, context_text):
              title = _title(context_text)
              if title:
                  return (collection, title)
              h = hashlib.md5(str(context_text or '').encode('utf-8')).hexdigest()[:12]
              return (collection, h)


          def _score(item):
              for key in ('score', 'similarity', 'metadata_score'):
                  try:
                      return float(item.get(key))
                  except Exception:
                      pass
              return 0.0


          def _extract_json_terms(obj, out):
              if isinstance(obj, dict):
                  for k, v in obj.items():
                      if any(x in str(k).lower() for x in ('field', 'group', 'metric', 'chart', 'time')):
                          if isinstance(v, str):
                              out.add(v)
                          elif isinstance(v, list):
                              for x in v:
                                  if isinstance(x, str):
                                      out.add(x)
                      _extract_json_terms(v, out)
              elif isinstance(obj, list):
                  for x in obj:
                      _extract_json_terms(x, out)


          def _terms_from_old_plan(old_plan_json):
              terms = set()
              obj = _loads(old_plan_json)
              _extract_json_terms(obj, terms)
              return {str(x).strip() for x in terms if str(x).strip()}


          def _alias_map_from_line(line, field):
              aliases = []
              for pat in (r'aliases?\s*[:=]\s*\[([^\]]+)\]', r'别名\s*[:：=]\s*\[?([^\]\n;；]+)'):
                  m = re.search(pat, line, re.I)
                  if m:
                      aliases.extend([x.strip(' `"\'，,、') for x in re.split(r'[,，、/|]', m.group(1))])
              return {a: field for a in aliases if a}


          def _field_name_from_line(line):
              s = line.strip()
              patterns = [
                  r'^[-*]\s*`?([A-Za-z_][A-Za-z0-9_]*)`?\s*[:：-]',
                  r'^[-*]\s*field\s*[:=]\s*`?([A-Za-z_][A-Za-z0-9_]*)',
                  r'`([A-Za-z_][A-Za-z0-9_]*)`\s*[:：-]',
              ]
              for pat in patterns:
                  m = re.search(pat, s, re.I)
                  if m:
                      return m.group(1)
              return ''


          def _is_useful_field_line(line, relevant_terms):
              low = line.lower()
              if any(t and (t.lower() in low or t in line) for t in relevant_terms):
                  return True
              return any(k in low for k in ('groupable', 'filterable', 'aggregatable', 'allowed_values', 'aliases', 'enum', 'datetime'))


          def _compress_schema(collection, role, context_text, relevant_terms):
              text = str(context_text or '')
              collection = _collection_from_text(text, collection)
              purpose = ''
              default_time_field = ''
              fields = []
              metrics = []
              rules = []
              alias_map = {}

              for line in text.splitlines():
                  raw = line.strip()
                  if not raw:
                      continue
                  low = raw.lower()
                  if not purpose and any(k in low for k in ('purpose', '用途', '说明')):
                      purpose = _compact(re.sub(r'^[-#*\s]*(purpose|用途|说明)\s*[:：-]?\s*', '', raw, flags=re.I), 180)
                  if not default_time_field:
                      m = re.search(r'default[_\s-]*time[_\s-]*field\s*[:=：]\s*`?([A-Za-z_][A-Za-z0-9_]*)', raw, re.I)
                      if m:
                          default_time_field = m.group(1)
                  if any(k in low for k in ('metric', '指标', 'count(', 'sum(', 'avg(', 'min(', 'max(')):
                      if len(metrics) < 8:
                          metrics.append(_compact(raw, 220))
                      continue
                  if any(k in low for k in ('query rule', 'rules', '必须', '聚合', 'aggregate', '时间范围', 'group_by')):
                      if len(rules) < 8 and not any(bad in low for bad in ('example', '示例')):
                          rules.append(_compact(raw, 220))
                      continue
                  field = _field_name_from_line(raw)
                  if field:
                      alias_map.update(_alias_map_from_line(raw, field))
                      if _is_useful_field_line(raw, relevant_terms) and not any(x.startswith('- ' + field + ':') for x in fields):
                          fields.append('- ' + field + ': ' + _compact(re.sub(r'^[-*]\s*`?' + re.escape(field) + r'`?\s*[:：-]?\s*', '', raw), 320))

              # Alias preservation is schema-driven only; no built-in business fallback aliases are injected.


              if not fields:
                  for line in text.splitlines():
                      raw = line.strip()
                      field = _field_name_from_line(raw)
                      if field and len(fields) < 12:
                          fields.append('- ' + field + ': ' + _compact(raw, 240))

              lines = ['collection: ' + (collection or 'unknown')]
              if role:
                  lines.append('role: ' + role)
              if default_time_field:
                  lines.append('default_time_field: ' + default_time_field)
              if purpose:
                  lines.append('purpose: ' + purpose)
              if fields:
                  lines.append('relevant fields:')
                  lines.extend(fields[:24])
              if metrics:
                  lines.append('metrics:')
                  lines.extend('- ' + m.lstrip('-* ') for m in metrics[:8])
              if rules:
                  lines.append('rules:')
                  lines.extend('- ' + r.lstrip('-* ') for r in rules[:8])
              alias_items = sorted((k, v) for k, v in alias_map.items() if k and v)
              if alias_items:
                  lines.append('field_alias_map: ' + json.dumps(dict(alias_items[:80]), ensure_ascii=False))
              return '\n'.join(lines), alias_map


          def main(refine_schema_outputs, refine_retrieval_tasks_json: str, old_normalized_semantic_plan_json: str, refine_retrieval_valid=True, refine_retrieval_error: str=''):
              outputs = _list(refine_schema_outputs)
              tasks = _list(refine_retrieval_tasks_json)
              relevant_terms = _terms_from_old_plan(old_normalized_semantic_plan_json)
              for task in tasks:
                  _extract_json_terms(task, relevant_terms)

              best = {}
              seen_raw = 0
              for idx, raw in enumerate(outputs):
                  item = _loads(raw)
                  task = tasks[idx] if idx < len(tasks) and isinstance(tasks[idx], dict) else {}
                  collection = str(item.get('collection_name') or task.get('collection_name') or task.get('collection_hint') or '').strip()
                  role = str(item.get('role') or task.get('role') or '').strip()
                  context_text = str(item.get('context_text') or item.get('text') or item.get('content') or '').strip()
                  if not context_text:
                      continue
                  seen_raw += 1
                  collection = _collection_from_text(context_text, collection)
                  key = _dedup_key(collection, context_text)
                  candidate = {'item': item, 'collection': collection, 'role': role, 'context_text': context_text, 'score': _score(item), 'idx': idx}
                  old = best.get(key)
                  if old is None or (candidate['score'], -candidate['idx']) > (old['score'], -old['idx']):
                      best[key] = candidate

              sections = []
              alias_map = {}
              for x in sorted(best.values(), key=lambda v: (-v['score'], v['idx'])):
                  summary, aliases = _compress_schema(x['collection'], x['role'], x['context_text'], relevant_terms)
                  alias_map.update(aliases)
                  sections.append(summary)

              warning = ''
              if not sections:
                  warning = 'Refine schema 检索失败或为空，将只允许基于上一轮 semantic plan 已有字段做保守重规划。'
              elif str(refine_retrieval_valid).lower() in {'false', '0', 'no'}:
                  warning = str(refine_retrieval_error or '')

              ctx = '### refine_query schema_context_for_replan (compressed)\n' + '\n\n'.join(sections)
              truncated = False
              if len(ctx) > MAX_SCHEMA_CONTEXT_CHARS:
                  ctx = ctx[:MAX_SCHEMA_CONTEXT_CHARS].rstrip() + '\n...[schema_context truncated for replan prompt budget]'
                  truncated = True
                  warning = (warning + '; ' if warning else '') + 'schema_context 超过长度阈值，已截断。'

              debug = {
                  'task_count': len(tasks),
                  'retrieved_sections': seen_raw,
                  'deduped_sections': len(sections),
                  'schema_dedup_count': max(0, seen_raw - len(sections)),
                  'schema_compressed': True,
                  'schema_context_chars': len(ctx),
                  'schema_truncated': truncated,
                  'retrieval_valid': bool(refine_retrieval_valid),
                  'field_alias_map': alias_map,
                  'alias_unresolved': [],
                  'warning': '字段别名未在 schema_context 中明确声明时，未自动归一。' if not alias_map else '',
              }
              return {
                  'refine_schema_context': ctx,
                  'refine_schema_context_valid': bool(sections),
                  'refine_schema_warning': warning,
                  'refine_schema_debug_json': json.dumps(debug, ensure_ascii=False)
              }
