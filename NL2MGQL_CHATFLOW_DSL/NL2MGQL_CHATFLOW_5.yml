    - data:
        code: |
          import json, re
          SUPPORTED={'bar','line','pie'}

          def _extract(text):
              text=str(text or '').strip()
              m=re.match(r'^```(?:json)?\s*(.*?)\s*```$', text, flags=re.I|re.S)
              if m: text=m.group(1).strip()
              s,e=text.find('{'),text.rfind('}')
              return text[s:e+1] if s>=0 and e>=s else text

          def _loads(v, fb):
              if isinstance(v,(dict,list)): return v
              if isinstance(v,str) and v.strip():
                  try: return json.loads(_extract(v))
                  except Exception: return fb
              return fb

          def _rows(v):
              x=_loads(v,v)
              return [r for r in x if isinstance(r,dict)] if isinstance(x,list) else []

          def _num(v):
              try: return float(v)
              except Exception: return None

          def _pick(rows, old):
              x=str(old.get('x_field') or old.get('axis_x_title') or '').strip(); y=str(old.get('y_field') or old.get('series_name') or old.get('axis_y_title') or '').strip()
              if rows:
                  first=rows[0]
                  if not x:
                      x=next((k for k,v in first.items() if _num(v) is None), '')
                  if not y:
                      y=next((k for k,v in first.items() if k!=x and _num(v) is not None), '')
              return x,y

          def main(chart_structured, chart_text: str, question: str, last_merged_rows, last_chart, chart_modification_json: str):
              obj=_loads(chart_structured,{}) or _loads(chart_text,{})
              rows=_rows(last_merged_rows); old=_loads(last_chart,{}) if isinstance(_loads(last_chart,{}),dict) else {}
              mod=_loads(chart_modification_json,{}) if isinstance(_loads(chart_modification_json,{}),dict) else {}
              req=obj.get('chart_request') if isinstance(obj,dict) and isinstance(obj.get('chart_request'),dict) else {}
              chart_type=str(req.get('chart_type') or mod.get('chart_type') or old.get('chart_type') or '').lower().strip()
              q=str(question or '').lower()
              if '饼图' in q or 'pie' in q: chart_type='pie'
              elif '折线' in q or 'line' in q: chart_type='line'
              elif '柱状' in q or 'bar' in q: chart_type='bar'
              if chart_type not in SUPPORTED: chart_type='bar'
              x=str(req.get('x_field') or '').strip(); y=str(req.get('y_field') or '').strip()
              ox,oy=_pick(rows, old)
              x=x or ox; y=y or oy
              title=str(req.get('title') or old.get('title') or '上一轮结果图表').strip()[:40]
              normalized={'enabled': True, 'renderer':'echarts','chart_type':chart_type,'x_field':x,'y_field':y,'title':title}
              warning=str((obj or {}).get('warning') or '') if isinstance(obj,dict) else ''
              return {'chart_request_json': json.dumps(normalized, ensure_ascii=False), 'chart_plan_warning': warning, 'chart_plan_valid': bool(rows and x and y)}
        code_language: python3
        desc: 解析/规范化图表修改规划，校验 chart_type/x_field/y_field。
        outputs:
          chart_request_json:
            children:
            type: string
          chart_plan_warning:
            children:
            type: string
          chart_plan_valid:
            children:
            type: boolean
