          import json, re
          def _strip(s):
              s=str(s or '').strip(); m=re.match(r'^```(?:json)?\\s*(.*?)\\s*```$',s,flags=re.S|re.I)
              return m.group(1).strip() if m else s
          def _loads(v):
              if isinstance(v,dict): return v
              if isinstance(v,str) and v.strip():
                  try:
                      x=json.loads(_strip(v)); return x if isinstance(x,dict) else {}
                  except Exception: return {}
              return {}
          def _normalize(plan):
              if not isinstance(plan,dict): return {}
              if 'execution_plan' not in plan and 'stages' in plan: plan={'execution_plan':{'stages':plan.get('stages')},**{k:v for k,v in plan.items() if k!='stages'}}
              plan.setdefault('needs_chart',bool(plan.get('chart_request'))); plan.setdefault('chart_request',{}); plan.setdefault('answer_mode','query')
              return plan
          def main(structured_output=None, text: str=''):
              raw=structured_output if isinstance(structured_output,dict) and structured_output else _loads(text)
              plan=_normalize(raw); missing=[k for k in ['execution_plan','needs_chart','chart_request','answer_mode'] if k not in plan]
              stages=((plan.get('execution_plan') or {}).get('stages') or []) if isinstance(plan.get('execution_plan'),dict) else []
              if not stages: missing.append('execution_plan.stages')
              valid=not missing and not plan.get('replan_error')
              err=('缺失字段: '+','.join(missing)) if missing else str(plan.get('replan_error') or '')
              js=json.dumps(plan,ensure_ascii=False) if plan else ''
              return {'replanned_semantic_plan_json':js,'replanned_normalized_semantic_plan_json':js if valid else '','replan_valid':bool(valid),'replan_error':err,'replan_warning':'','replan_debug_json':json.dumps({'used_structured_output':isinstance(structured_output,dict) and bool(structured_output),'missing':missing},ensure_ascii=False)}
