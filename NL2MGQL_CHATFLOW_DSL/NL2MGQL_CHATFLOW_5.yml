          def _loads(v, default=None):
              if default is None:
                  default = {}
              if isinstance(v, (dict, list)):
                  return v
              if isinstance(v, str) and v.strip():
                  try:
                      return json.loads(v)
                  except Exception:
                      return default
              return default

          def _dumps(v):
