    - data:
        code: |
          import json

          ALLOWED = {'new_query','modify_chart','refine_query','explain_result','reanalyze_result','fix_result','continue_previous','clarify'}


          def _extract(text):
              text = str(text or '').strip()
              if text.startswith('```'):
                  text = text.strip('`').strip()
                  if text.lower().startswith('json'):
                      text = text[4:].strip()
              start = text.find('{')
              end = text.rfind('}')
              return text[start:end + 1] if start >= 0 and end >= start else text


          def _loads_obj(value):
              if isinstance(value, dict):
                  return value
              if isinstance(value, str) and value.strip():
                  try:
                      parsed = json.loads(_extract(value))
                      return parsed if isinstance(parsed, dict) else {}
                  except Exception:
                      return {}
              return {}


          def _bool(value, default=False):
              if isinstance(value, bool):
                  return value
              if value is None or value == '':
                  return default
              return str(value).strip().lower() in {'1','true','yes','y','on'}


          def _defaults(intent):
              base = {'need_previous_context': False, 'need_requery': True, 'need_rechart': False, 'need_analysis': True, 'can_answer_directly': False}
              if intent == 'modify_chart':
                  base.update({'need_previous_context': True, 'need_requery': False, 'need_rechart': True, 'need_analysis': True})
              elif intent in {'explain_result','reanalyze_result'}:
                  base.update({'need_previous_context': True, 'need_requery': False, 'need_rechart': False, 'need_analysis': True})
              elif intent == 'continue_previous':
                  base.update({'need_previous_context': True, 'need_requery': False, 'need_rechart': False, 'need_analysis': True})
              elif intent == 'clarify':
                  base.update({'need_previous_context': False, 'need_requery': False, 'need_rechart': False, 'need_analysis': False, 'can_answer_directly': True})
              elif intent == 'refine_query':
                  base.update({'need_previous_context': True, 'need_requery': True, 'need_rechart': True, 'need_analysis': True})
              elif intent == 'fix_result':
                  base.update({'need_previous_context': True, 'need_requery': True, 'need_rechart': True, 'need_analysis': True})
              return base


          def main(intent_text: str, last_context_json: str, question: str):
              ctx = _loads_obj(last_context_json)
              obj = _loads_obj(intent_text)
              valid = bool(obj)
              err = '' if valid else 'intent json parse failed; fallback to new_query'
              intent = str(obj.get('turn_intent') or 'new_query').strip()
              if intent not in ALLOWED:
                  intent = 'new_query'; valid = False; err = (err + '; invalid intent').strip('; ')
              d = _defaults(intent)
              for k in ['need_previous_context','need_requery','need_rechart','need_analysis','can_answer_directly']:
                  obj[k] = _bool(obj.get(k), d[k])
              obj['turn_intent'] = intent
              obj['missing_info'] = obj.get('missing_info') if isinstance(obj.get('missing_info'), list) else []
              obj['chart_modification'] = obj.get('chart_modification') if isinstance(obj.get('chart_modification'), dict) else {}
              obj['query_refinement'] = obj.get('query_refinement') if isinstance(obj.get('query_refinement'), dict) else {}
              obj['analysis_focus'] = str(obj.get('analysis_focus') or '')
              obj['reason'] = str(obj.get('reason') or '')

              q = str(question or '')
              chart_words = ['换成饼图','改成饼图','折线图','柱状图','标题','标签','top','Top','排序']
              analysis_words = ['分析','解释','为什么','说明什么','差异','继续','接着','刚才']
              has_context = bool(ctx.get('has_last_context'))
              rows_count = int(ctx.get('result_rows_count') or 0)
              if obj['need_previous_context'] and not has_context:
                  intent = 'clarify'; obj.update(_defaults('clarify')); obj['turn_intent'] = intent; obj['reason'] = '缺少可复用的上一轮上下文'
              if any(w in q for w in chart_words) and rows_count <= 0 and intent in {'modify_chart','continue_previous'}:
                  intent = 'clarify'; obj.update(_defaults('clarify')); obj['turn_intent'] = intent; obj['reason'] = '没有可复用的上一轮查询结果用于改图'
              if any(w in q for w in analysis_words) and rows_count <= 0 and intent in {'explain_result','reanalyze_result','continue_previous'}:
                  intent = 'clarify'; obj.update(_defaults('clarify')); obj['turn_intent'] = intent; obj['reason'] = '没有可复用的上一轮查询结果用于分析'
              if intent == 'fix_result':
                  ref = obj.get('query_refinement') or {}
                  keys = {'field','fields','time_range','filters','group_fields','metric','metric_alias','metric_field','dimension','sort','limit'}
                  obj['need_requery'] = any(k in ref and ref.get(k) not in ({}, [], '', None) for k in keys)
                  obj['need_rechart'] = obj['need_requery']
              if obj.get('need_requery'):
                  obj['turn_intent'] = 'refine_query' if intent in {'refine_query','fix_result','continue_previous'} else 'new_query'

              return {
                  'normalized_turn_intent_json': json.dumps(obj, ensure_ascii=False),
                  'turn_intent': str(obj.get('turn_intent') or 'new_query'),
                  'need_previous_context': bool(obj.get('need_previous_context')),
                  'need_requery': bool(obj.get('need_requery')),
                  'need_rechart': bool(obj.get('need_rechart')),
                  'need_analysis': bool(obj.get('need_analysis')),
                  'can_answer_directly': bool(obj.get('can_answer_directly')),
                  'intent_valid': valid,
                  'intent_error': err,
                  'chart_modification_json': json.dumps(obj.get('chart_modification') or {}, ensure_ascii=False),
                  'query_refinement_json': json.dumps(obj.get('query_refinement') or {}, ensure_ascii=False),
                  'analysis_focus': str(obj.get('analysis_focus') or ''),
              }
        code_language: python3
