          import json,re

          def _extract(text):
              text=str(text or '').strip(); m=re.match(r'^```(?:json)?\s*(.*?)\s*```$', text, flags=re.I|re.S)
              if m: text=m.group(1).strip()
              s,e=text.find('{'),text.rfind('}')
              return text[s:e+1] if s>=0 and e>=s else text

          def _loads(v):
              if isinstance(v,dict): return v
              if isinstance(v,str) and v.strip():
                  try: return json.loads(_extract(v))
                  except Exception: return {}
              return {}

          def main(analysis_structured, analysis_text: str, last_context_json: str):
              obj=_loads(analysis_structured) or _loads(analysis_text)
              text=str(obj.get('analysis_markdown') or '').strip()
              if not text:
                  try:
                      ctx=json.loads(last_context_json or '{}'); count=int(ctx.get('result_rows_count') or 0); fields=', '.join(ctx.get('result_fields') or [])
                  except Exception:
                      count=0; fields=''
                  text='从当前统计结果看，已返回 %s 行结果%s。LLM 分析暂不可用，建议结合图表和结果摘要判断差异；如需验证原因，需要进一步补充筛选条件或重新查询。' % (count, ('，字段包括：'+fields) if fields else '')
              debug=obj.get('analysis_debug_json') if isinstance(obj.get('analysis_debug_json'),dict) else {'fallback': not bool(obj)}
              return {'analysis_markdown': text, 'analysis_debug_json': json.dumps(debug, ensure_ascii=False), 'final_answer_markdown': text, 'final_answer_summary': text[:4000]}
