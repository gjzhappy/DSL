    - data:
        code: |
          import json
          from datetime import datetime, timezone

          def _loads(value, fallback):
              if isinstance(value, (dict, list)):
                  return value
              if isinstance(value, str) and value.strip():
                  try:
                      return json.loads(value)
                  except Exception:
                      return fallback
              return fallback

          def _rows(value):
              parsed = _loads(value, [])
              return [x for x in parsed if isinstance(x, dict)] if isinstance(parsed, list) else []

          def _fields(rows):
              seen = []
              for row in rows[:20]:
                  for key in row.keys():
                      if key not in seen:
                          seen.append(key)
              return seen

          def _json(value):
              if isinstance(value, str):
                  return value
              return json.dumps(value if value is not None else {}, ensure_ascii=False)

          def main(final_answer_to_use: str,
                   answer_source: str,
                   question: str,
                   main_semantic_plan_json: str,
                   main_execution_plan_json: str,
                   main_ast_json: str,
                   main_pipeline_json: str,
                   main_rows_json: str,
                   main_chart_request_json: str,
                   main_chart_markdown: str,
                   main_summary: str,
                   main_error: str,
                   main_fields_json: str,
                   chart_request_json,
                   chart_markdown: str,
                   chart_summary: str,
                   analysis_summary: str,
                   last_semantic_plan_json: str,
                   last_execution_plan_json: str,
                   last_ast_json: str,
                   last_pipeline_json: str,
                   last_rows_json: str,
                   last_chart_request_json: str,
                   last_chart_markdown: str,
                   last_summary: str,
                   last_fields_json: str):
              source = str(answer_source or 'main')
              now = datetime.now(timezone.utc).isoformat()
              if source == 'chart':
                  rows_json = last_rows_json or main_rows_json or '[]'
                  summary = chart_summary or last_summary or ''
                  chart_req = _json(chart_request_json) if chart_request_json else (last_chart_request_json or main_chart_request_json or '{}')
                  chart_md = chart_markdown or last_chart_markdown or main_chart_markdown or ''
                  semantic_plan = last_semantic_plan_json or main_semantic_plan_json or '{}'
                  execution_plan = last_execution_plan_json or main_execution_plan_json or '{}'
                  ast = last_ast_json or main_ast_json or '{}'
                  pipeline = last_pipeline_json or main_pipeline_json or '{}'
                  error = ''
              elif source == 'analysis':
                  rows_json = last_rows_json or main_rows_json or '[]'
                  summary = analysis_summary or last_summary or ''
                  chart_req = last_chart_request_json or main_chart_request_json or '{}'
                  chart_md = last_chart_markdown or main_chart_markdown or ''
                  semantic_plan = last_semantic_plan_json or main_semantic_plan_json or '{}'
                  execution_plan = last_execution_plan_json or main_execution_plan_json or '{}'
                  ast = last_ast_json or main_ast_json or '{}'
                  pipeline = last_pipeline_json or main_pipeline_json or '{}'
                  error = ''
              else:
                  rows_json = main_rows_json or last_rows_json or '[]'
                  summary = main_summary or ''
                  chart_req = main_chart_request_json or '{}'
                  chart_md = main_chart_markdown or ''
                  semantic_plan = main_semantic_plan_json or '{}'
                  execution_plan = main_execution_plan_json or '{}'
                  ast = main_ast_json or '{}'
                  pipeline = main_pipeline_json or '{}'
                  error = main_error or ''

              rows = _rows(rows_json)
              fields_json = main_fields_json if source == 'main' and main_fields_json else (last_fields_json or json.dumps(_fields(rows), ensure_ascii=False))
              has_context = 'true' if (rows or chart_md or summary) else 'false'
              return {
                  'final_answer_to_use': str(final_answer_to_use or ''),
                  'last_question': str(question or ''),
                  'last_normalized_semantic_plan_json': semantic_plan,
                  'last_normalized_execution_plan': execution_plan,
                  'last_validated_ast': ast,
                  'last_pipeline_json': pipeline,
                  'last_merged_rows': rows_json,
                  'last_query_result_json': rows_json,
                  'last_result_rows_json': rows_json,
                  'last_chart_request_json': chart_req,
                  'last_chart': chart_req,
                  'last_chart_echarts_markdown': chart_md,
                  'last_result_summary': summary,
                  'last_final_answer_summary': summary,
                  'last_error': error,
                  'last_result_fields_json': fields_json,
                  'last_updated_at': now,
                  'has_last_context_state': has_context,
              }
