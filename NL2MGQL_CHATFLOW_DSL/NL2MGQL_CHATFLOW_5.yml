                  'chart_title': '',
                  'chart_axis_x_title': '',
                  'chart_axis_y_title': '',
                  'schema_metadata_json': '{}',
                  'schema_alias_index_json': '{}',
                  'chart_debug_json': '{}',
              }


          def _result_profile(rows):
              rows = rows if isinstance(rows, list) else []
              fields = []
              for row in rows:
                  if not isinstance(row, dict):
                      continue
                  for key in row.keys():
                      name = str(key)
                      if name not in fields:
                          fields.append(name)
              return {
                  'row_count': len(rows),
                  'fields': fields,
                  'preview_rows': rows[:10],
              }


          def _select_compiler_plan(semantic_plan, validator_result_json=None):
              debug = {'plan_source': '', 'legacy_unvalidated_plan_fallback': False, 'legacy_compiler_resolution_used': False}
              validator_result = _ensure_obj(validator_result_json, 'validator_result') if validator_result_json else {}
              for key in ('normalized_plan_json', 'normalized_semantic_plan_json', 'semantic_plan_json'):
                  raw = validator_result.get(key) if isinstance(validator_result, dict) else None
                  if isinstance(raw, str) and raw.strip():
                      debug['plan_source'] = 'validator_result.' + key
                      return _ensure_obj(raw, key), debug
                  if isinstance(raw, dict) and raw:
                      debug['plan_source'] = 'validator_result.' + key
                      return raw, debug
              plan = _ensure_obj(semantic_plan, 'semantic_plan')
              if plan:
                  debug['plan_source'] = 'validator.normalized_plan_json_input'
                  return plan, debug
              debug['legacy_unvalidated_plan_fallback'] = True
              debug['plan_source'] = 'empty_or_legacy_unvalidated_fallback'
              return {}, debug


          def main(semantic_plan, planner, question: str, schema_context: str, query_urls: str, validator_route: str='valid', validator_result_json: str=''):
              if str(validator_route or '').strip() != 'valid':
                  out = _compiler_contract_defaults('validator_route is not valid; compiler execution is blocked')
                  out['question'] = str(question or '').strip()
                  out['compiler_debug_json'] = _safe_json_dumps({'validator_route': str(validator_route or ''), 'blocked_before_compile': True})
                  return out
              plan, compiler_debug = _select_compiler_plan(semantic_plan, validator_result_json)
              if not plan:
                  out = _compiler_contract_defaults('compiler received empty validator normalized plan')
                  out['question'] = str(question or '').strip()
                  out['compiler_debug_json'] = _safe_json_dumps(compiler_debug)
                  return out
              if str(plan.get('contract_version') or '').strip() != 'semantic_plan_contract':
                  out = _compiler_contract_defaults('compiler input contract_version must be semantic_plan_contract')
                  out['question'] = str(question or '').strip()
                  compiler_debug['input_contract_version'] = str(plan.get('contract_version') or '')
                  out['compiler_debug_json'] = _safe_json_dumps(compiler_debug)
                  return out
              planner = _ensure_obj(planner, 'planner')
              urls = _parse_query_urls(query_urls)
              if not urls:
                  out = _compiler_contract_defaults('SN_MONGODB_QUERY_URLS is empty')
                  out['question'] = str(question or '').strip()
                  out['compiler_debug_json'] = _safe_json_dumps(compiler_debug)
                  return out

              normalized_execution_plan = _normalize_plan(plan, planner, question)
              schema_metadata = extract_schema_metadata(schema_context)
              schema_alias_index = build_alias_index(schema_metadata)
              compiler_debug['legacy_compiler_resolution_used'] = False
              compiler_debug['schema_metadata_loaded_for_labels_only'] = bool(schema_metadata.get('collections'))
              normalized_execution_plan['schema_context'] = str(schema_context or '')
              normalized_execution_plan['schema_metadata'] = schema_metadata
              normalized_execution_plan['schema_alias_index'] = schema_alias_index
              stage_outputs = {}
              stage_execution_trace = []

              for stage in normalized_execution_plan.get('stages') or []:
                  stage = _sanitize_stage_for_compile(stage)
                  validated_ast, pipeline, skip_query = _compile_stage(stage, schema_context, stage_outputs)
                  pipeline = _assert_safe_pipeline(pipeline)
                  pipeline_json = json.dumps(pipeline, ensure_ascii=False, indent=2)
                  selected_url = ''
                  request_id = uuid.uuid4().hex
                  request_body = {}
                  status_code = 0
                  response_body = ''
                  response_headers = {}
                  rows = []
                  reason = ''
                  if (not skip_query) and (not pipeline):
                      skip_query = True
                      reason = 'empty pipeline'
                  if not skip_query:
                      selected_url = random.choice(urls)
                      request_body = {
                          'validated_ast': validated_ast or {},
                          'pipeline_json': pipeline_json,
                          'validation_message': 'ok',
                          'request_id': request_id,
                      }
                      status_code, response_body, response_headers = _post_json(selected_url, request_body)
                      if status_code < 200 or status_code >= 300:
                          raise ValueError(f"stage `{stage['stage_name']}` query failed: status={status_code}, body={response_body[:1200]}")
                      response_json = _read_json_text(response_body)
                      expected_row_fields = _collect_expected_row_fields(stage, validated_ast, normalized_execution_plan)
                      rows = _find_best_rows(response_json, expected_row_fields)
                  else:
                      response_body = json.dumps({'msg': 'skip query', 'code': 200, 'data': {'rows': []}}, ensure_ascii=False)
                      rows = []
                      if not reason:
                          reason = 'no join values from previous stage'

                  trace_item = {
                      'stage_name': stage['stage_name'],
                      'collection': stage['collection'],
                      'intent_type': stage['intent_type'],
                      'sanitize_report': stage.get('sanitize_report') or {},
                      'validated_ast': validated_ast,
                      'pipeline': pipeline,
