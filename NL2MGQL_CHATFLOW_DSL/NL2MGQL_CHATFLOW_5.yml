              req=_loads(chart_request_json,{}) if isinstance(_loads(chart_request_json,{}),dict) else {}
              rows=_rows(last_merged_rows); warnings=[]; error=''; rec=''
              ctype=str(req.get('chart_type') or 'bar').lower().strip()
              if ctype not in SUPPORTED: warnings.append('不支持的图表类型，已推荐柱状图'); rec='bar'; ctype='bar'; req['chart_type']='bar'
              x=str(req.get('x_field') or '').strip(); y=str(req.get('y_field') or '').strip()
              if not rows: error='查询结果为空，不生成空图。'
              elif not x or x not in rows[0]: error='图表横轴字段不存在。'
              elif not y or y not in rows[0]: error='图表纵轴字段不存在。'
              elif _num(rows[0].get(y)) is None: error='图表纵轴字段不是数字。'
              if rows and x:
                  cats=len({str(r.get(x)) for r in rows})
                  if cats>20: warnings.append('分类数量较多，图表可读性可能下降。')
