              version = str(meta.get('schema_version') or ref.get('schema_version') or '').strip()
              catalog_digest = str(ref.get('catalog_digest') or '').strip()
              context_ref = {'collections': list(collections.keys()), 'schema_digest': meta['schema_digest'], 'schema_version': version, 'catalog_digest': catalog_digest}
              return {
