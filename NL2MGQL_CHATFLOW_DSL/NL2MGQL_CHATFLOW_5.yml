                      summary_text = _summary(question, query_profile.get('preview_rows') or result_rows[:5], normalized_plan)
                      analysis_text = _analysis(query_profile.get('preview_rows') or result_rows[:5], normalized_plan, True) if _needs_analysis(question, mode) else ''
                      result_summary = (summary_text or '已返回查询结果。')[:1200]
