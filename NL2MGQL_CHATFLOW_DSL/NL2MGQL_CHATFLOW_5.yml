          import json

          def _loads(v):
              if isinstance(v, dict):
                  return v
              if isinstance(v, str) and v.strip():
                  try:
                      return json.loads(v)
                  except Exception:
                      return {}
              return {}

          def _bool(v):
              if isinstance(v, bool):
                  return v
              return str(v or '').strip().lower() in {'1', 'true', 'yes', 'y', 'on'}

          def _first_stage(plan):
              if not isinstance(plan, dict):
                  return {}
              stages = ((plan.get('execution_plan') or {}).get('stages') or plan.get('stages') or [])
              return stages[0] if isinstance(stages, list) and stages and isinstance(stages[0], dict) else {}

          def _derive_planner(plan, original_planner):
              planner = dict(original_planner) if isinstance(original_planner, dict) else {}
              stage = _first_stage(plan)
              primary = str(
                  plan.get('primary_collection')
                  or stage.get('primary_collection')
                  or stage.get('collection')
                  or planner.get('primary_collection')
                  or 'unknown'
              ).strip() or 'unknown'
              collections = plan.get('collections') if isinstance(plan.get('collections'), list) else []
              related = []
              for c in collections:
                  c = str(c or '').strip()
                  if c and c != primary and c not in related:
                      related.append(c)
              for c in planner.get('related_collections') or []:
                  c = str(c or '').strip()
                  if c and c != primary and c not in related:
                      related.append(c)
              planner.update({
                  'primary_collection': primary,
                  'related_collections': related,
                  'confidence': float(planner.get('confidence') or 1),
                  'reason': str(planner.get('reason') or 'prepared from selected normalized semantic plan'),
              })
              return planner

          def main(turn_intent: str, patch_applied, original_normalized_semantic_plan_json: str, patched_normalized_semantic_plan_json: str, guarded_normalized_semantic_plan_json: str, original_planner, original_schema_context: str, refine_schema_context: str, guard_valid=True, guard_error: str=''):
              intent = str(turn_intent or '').strip()
              if intent == 'refine_query' and _bool(patch_applied):
                  selected_json = patched_normalized_semantic_plan_json
                  source = 'patch'
                  schema_context = str(refine_schema_context or original_schema_context or '')
              elif intent == 'refine_query':
                  selected_json = guarded_normalized_semantic_plan_json
                  source = 'replan_guard'
                  schema_context = str(refine_schema_context or '')
              else:
                  selected_json = original_normalized_semantic_plan_json
                  source = 'new_query'
                  schema_context = str(original_schema_context or '')
              plan = _loads(selected_json)
              execution_input_error = ''
              if intent == 'refine_query' and source == 'replan_guard' and not _bool(guard_valid):
                  execution_input_error = str(guard_error or 'refine_query 重规划差异保护未通过')
              if not plan:
                  execution_input_error = execution_input_error or '缺少可用于 Mongo 编译的 normalized_semantic_plan_json'
              normalized_json = json.dumps(plan, ensure_ascii=False) if plan else ''
              planner = _derive_planner(plan, _loads(original_planner)) if plan else _loads(original_planner)
              return {
                  'normalized_semantic_plan_json': normalized_json,
                  'planner': planner,
                  'semantic_plan_source': source,
                  'schema_context': schema_context,
                  'execution_input_valid': bool(plan) and not execution_input_error,
                  'execution_input_error': execution_input_error,
              }
