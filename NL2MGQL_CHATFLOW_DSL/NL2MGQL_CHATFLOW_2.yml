              if rows and isinstance(rows[0], dict):
                  for key, value in rows[0].items():
                      if not isinstance(value, (int, float)):
                          return str(key)

              return ''


          def _choose_y_field(normalized_plan=None, rows=None):
              normalized_plan = normalized_plan or {}
              rows = rows or []

              stages = normalized_plan.get('stages') or []
              if stages:
                  metric_alias = str((stages[0] or {}).get('metric_alias') or '').strip()
                  if metric_alias:
                      return metric_alias

              if rows and isinstance(rows[0], dict):
                  for key, value in rows[0].items():
                      if isinstance(value, (int, float)):
                          return str(key)

              return ''


          def _build_echarts_markdown(option):
              nl = chr(10)
              fence = chr(96) * 3
              return (
                  fence
                  + 'echarts'
                  + nl
                  + json.dumps(option, ensure_ascii=False, indent=2)
                  + nl
                  + fence
              )


          def _build_chart_payload(visualization=None, rows=None, allowed_types=None, normalized_plan=None, question=''):
              visualization = visualization or {}
              rows = rows if isinstance(rows, list) else []
              normalized_plan = normalized_plan or {}
              decision = _choose_chart_type(visualization, rows, allowed_types or {'bar', 'line', 'pie'})
              chart_type = str(decision.get('chart_type') or 'bar')

              if not rows:
                  return False, {}, '', '', '', chart_type, 'empty rows'

              x_field = str(decision.get('x_field') or _choose_x_field(normalized_plan, rows) or '').strip()
              y_field = str(decision.get('y_field') or _choose_y_field(normalized_plan, rows) or '').strip()
              if not x_field or not y_field:
                  return False, {}, '', x_field, y_field, chart_type, 'missing x_field or y_field'

              viz = dict(visualization)
              viz['enabled'] = True
              viz['chart_type'] = chart_type
              viz['x_field'] = x_field
              viz['y_field'] = y_field
              if not str(viz.get('title') or '').strip() and str(question or '').strip():
                  viz['title'] = str(question or '').strip()

              option = _build_echarts_option(viz, rows)
              if not option:
                  option = _build_echarts_option(
                      {'enabled': True, 'chart_type': chart_type, 'x_field': x_field, 'y_field': y_field, 'title': str(question or '').strip()},
                      rows,
                  )
              if not option:
                  return False, {}, '', x_field, y_field, chart_type, 'no valid chart points'

              return True, option, _build_echarts_markdown(option), x_field, y_field, chart_type, ''


          def _choose_chart_type(visualization=None, rows=None, allowed_types=None):
              visualization = visualization or {}
              rows = rows if isinstance(rows, list) else []
              allowed = set(allowed_types or {'bar', 'line', 'pie'})

              raw_type = str(visualization.get('chart_type') or '').strip().lower()
              aliases = {
                  'column': 'bar',
                  '柱状图': 'bar',
                  '条形图': 'bar',
                  '对比图': 'bar',
                  'line': 'line',
                  '折线图': 'line',
                  '趋势图': 'line',
                  'pie': 'pie',
                  '饼图': 'pie',
              }
              normalized_type = aliases.get(raw_type, raw_type if raw_type in {'bar', 'line', 'pie'} else 'bar')
              if normalized_type not in allowed:
                  normalized_type = 'bar'

              x_field = str(visualization.get('x_field') or '').strip()
              y_field = str(visualization.get('y_field') or '').strip()

              if not x_field and rows:
                  for key in rows[0].keys():
                      if key not in {'_id', y_field}:
                          x_field = str(key)
                          break
              if not y_field and rows:
                  for key in rows[0].keys():
                      val = rows[0].get(key)
                      if isinstance(val, (int, float)):
                          y_field = str(key)
                          break

              return {
                  'chart_type': normalized_type,
                  'x_field': x_field,
                  'y_field': y_field,
                  'title': str(visualization.get('title') or '').strip(),
                  'series_name': str(visualization.get('series_name') or visualization.get('y_field') or 'value').strip() or 'value',
              }

          def _build_echarts_option(visualization, rows):
              if not isinstance(visualization, dict) or not visualization.get('enabled'):
                  return {}
              if not isinstance(rows, list) or not rows:
                  return {}
              chart_type = str(visualization.get('chart_type') or 'bar').strip().lower()
              x_field = str(visualization.get('x_field') or '').strip()
              y_field = str(visualization.get('y_field') or '').strip()
              title = str(visualization.get('title') or '').strip()
              series_name = str(visualization.get('series_name') or y_field or 'value').strip() or 'value'
              if not x_field or not y_field:
                  return {}
              points = []
              for row in rows:
                  if not isinstance(row, dict):
                      continue
                  x = row.get(x_field)
                  y = row.get(y_field)
                  if x is None or y is None:
                      continue
                  points.append((x, y))
              if not points:
                  return {}
              if chart_type == 'pie':
                  return {
                      'title': {'text': title or y_field},
                      'tooltip': {'trigger': 'item'},
                      'series': [{
                          'name': series_name,
                          'type': 'pie',
                          'data': [{'name': str(x), 'value': y} for x, y in points],
                      }],
                  }
              x_axis = [str(x) for x, _ in points]
              y_axis = [y for _, y in points]
              return {
                  'title': {'text': title or y_field},
                  'tooltip': {'trigger': 'axis'},
                  'xAxis': {'type': 'category', 'data': x_axis},
                  'yAxis': {'type': 'value'},
                  'series': [{
                      'name': series_name,
                      'type': 'line' if chart_type == 'line' else 'bar',
                      'data': y_axis,
                  }],
              }

          def main(semantic_plan, planner, question: str, schema_context: str, query_urls: str):
              semantic_plan = json.loads(semantic_plan) if isinstance(semantic_plan, str) else semantic_plan
              plan = _ensure_obj(semantic_plan, 'semantic_plan')
              planner = _ensure_obj(planner, 'planner')
              urls = _parse_query_urls(query_urls)
              if not urls:
                  raise ValueError('SN_MONGODB_QUERY_URLS is empty')

              normalized_execution_plan = _normalize_plan(plan, planner, question)
              stage_outputs = {}
              stage_execution_trace = []

              for stage in normalized_execution_plan.get('stages') or []:
                  stage = _sanitize_stage_for_compile(stage)
                  validated_plan, pipeline, skip_query = _compile_stage(stage, schema_context, stage_outputs)
                  pipeline_json = json.dumps(pipeline, ensure_ascii=False, indent=2)
                  selected_url = ''
                  request_id = uuid.uuid4().hex
                  request_body = {}
                  status_code = 0
                  response_body = ''
                  response_headers = {}
                  rows = []
                  reason = ''
                  if (not skip_query) and (not pipeline):
                      skip_query = True
                      reason = 'empty pipeline'
                  if not skip_query:
                      selected_url = random.choice(urls)
                      request_body = {
                          'validated_plan': validated_plan or {},
                          'pipeline_json': pipeline_json,
                          'validation_message': 'ok',
                          'request_id': request_id,
                      }
                      status_code, response_body, response_headers = _post_json(selected_url, request_body)
                      if status_code < 200 or status_code >= 300:
                          raise ValueError(f"stage `{stage['stage_name']}` query failed: status={status_code}, body={response_body[:1200]}")
                      response_json = _read_json_text(response_body)
                      rows = _find_best_rows(response_json)
                  else:
                      response_body = json.dumps({'msg': 'skip query', 'code': 200, 'data': {'rows': []}}, ensure_ascii=False)
                      rows = []
                      if not reason:
                          reason = 'no join values from previous stage'

                  trace_item = {
                      'stage_name': stage['stage_name'],
                      'collection': stage['collection'],
                      'intent_type': stage['intent_type'],
                      'sanitize_report': stage.get('sanitize_report') or {},
                      'validated_plan': validated_plan,
                      'pipeline': pipeline,
                      'pipeline_json': pipeline_json,
                      'selected_url': selected_url,
                      'request_id': request_id,
                      'query_request_body': request_body,
                      'query_status_code': status_code,
                      'query_response_body': response_body,
                      'query_response_headers': response_headers,
                      'rows': rows,
                      'skipped': bool(skip_query),
                      'skip_reason': reason,
                  }
                  stage_execution_trace.append(trace_item)
                  stage_outputs[stage['stage_name']] = trace_item

              execution_mode = normalized_execution_plan.get('execution_mode')
              final_merge = normalized_execution_plan.get('final_merge') or {}
              if execution_mode == 'multi_stage' and final_merge.get('left_stage') and final_merge.get('right_stage'):
                  left_rows = (stage_outputs.get(final_merge['left_stage']) or {}).get('rows') or []
                  right_rows = (stage_outputs.get(final_merge['right_stage']) or {}).get('rows') or []
                  merged_rows = _merge_rows(left_rows, right_rows, final_merge.get('left_field'), final_merge.get('right_field'), final_merge.get('attach_as') or 'related_info')
              else:
                  first_stage_name = normalized_execution_plan['stages'][0]['stage_name']
                  merged_rows = (stage_outputs.get(first_stage_name) or {}).get('rows') or []
              visualization = normalized_execution_plan.get('visualization') or {}
              chart_decision = _choose_chart_type(visualization, merged_rows, {'bar', 'line', 'pie'})
              chart_option = _build_echarts_option(visualization, merged_rows)
              chart_x_field = str(chart_decision.get('x_field') or '')
              chart_y_field = str(chart_decision.get('y_field') or '')
              chart_enabled, chart_option, chart_markdown, _, _, _, _ = _build_chart_payload(visualization, merged_rows, {'bar', 'line', 'pie'}, normalized_execution_plan, question)
              if chart_enabled and chart_option:
                  if not bool((normalized_execution_plan.get('visualization') or {}).get('enabled')):
                      normalized_execution_plan.setdefault('visualization', {})['enabled'] = True
                  if not str((normalized_execution_plan.get('visualization') or {}).get('chart_type') or '').strip():
                      normalized_execution_plan.setdefault('visualization', {})['chart_type'] = str(chart_decision.get('chart_type') or 'bar')
              option_title = str((((chart_option or {}).get('title') or {}).get('text')) or '').strip() or str(question or '').strip()
              option_series_name = ''
              if isinstance((chart_option or {}).get('series'), list) and (chart_option or {}).get('series'):
                  option_series_name = str((((chart_option or {}).get('series') or [{}])[0].get('name')) or '').strip()
              chart_decision = {
                  'enabled': bool(chart_enabled and chart_option),
                  'chart_type': str(chart_decision.get('chart_type') or 'bar'),
                  'x_field': str(chart_decision.get('x_field') or ''),
                  'y_field': str(chart_decision.get('y_field') or ''),
                  'title': option_title,
                  'series_name': option_series_name or str(chart_decision.get('y_field') or '') or 'value',
                  'reason': 'local echarts option generated' if bool(chart_enabled and chart_option) else '',
              }
              chart_payload = {
                  'enabled': bool(chart_enabled and chart_option),
                  'renderer': 'echarts',
                  'library': 'echarts',
                  'option': chart_option,
                  'echarts_markdown': chart_markdown,
                  'decision': chart_decision,
              }

              no_data_message = ''
              if visualization.get('enabled') and not (merged_rows or []):
                  no_data_message = 'æ¥è¯¢æåï¼ä½ç»æä¸ºç©ºï¼æ æ³çæå¾è¡¨ã'
              final_payload = {
                  'question': str(question or '').strip(),
                  'normalized_execution_plan': normalized_execution_plan,
                  'stage_execution_trace': stage_execution_trace,
                  'merged_rows': merged_rows,
                  'chart': chart_payload,
                  'message': no_data_message,
              }
              final_response_summary = {
                  'question': str(question or '').strip(),
                  'execution_mode': str(normalized_execution_plan.get('execution_mode') or ''),
                  'stage_count': len(normalized_execution_plan.get('stages') or []),
                  'merged_row_count': len(merged_rows or []),
                  'has_chart': bool((chart_payload or {}).get('enabled')),
                  'chart_type': str(chart_decision.get('chart_type') or ''),
                  'stage_names': [str((s or {}).get('stage_name') or '') for s in (normalized_execution_plan.get('stages') or [])],
              }

              nl = chr(10)
              message_text = str(no_data_message or '').strip()
              error_text = ''
              if isinstance(stage_execution_trace, list):
                  for trace_item in reversed(stage_execution_trace):
                      if isinstance(trace_item, dict):
                          stage_error = str(trace_item.get('error') or '').strip()
                          if stage_error:
                              error_text = stage_error
                              break
              summary_text = str(final_response_summary.get('summary') or '').strip()
              if not summary_text and (merged_rows or []):
                  summary_text = '查询完成，共返回 ' + str(len(merged_rows or [])) + ' 条结果。'
              chart_markdown = ''
              if isinstance(chart_payload, dict):
                  chart_markdown = str(chart_payload.get('echarts_markdown') or '').strip()
              chart_enabled = isinstance(chart_payload, dict) and bool(chart_payload.get('enabled'))

              if error_text or message_text:
                  answer_text = '执行失败：' + (error_text or message_text)
              elif chart_enabled and chart_markdown:
                  answer_text = (
                      '查询结果如下：'
                      + nl
                      + nl
                      + chart_markdown
                      + nl
                      + nl
                      + '结果摘要：'
                      + nl
                      + (summary_text or '已生成图表。')
                  )
              elif summary_text:
                  answer_text = summary_text
              elif merged_rows:
                  answer_text = '查询完成，共返回 ' + str(len(merged_rows)) + ' 条结果。'
              else:
                  answer_text = '查询成功，但结果为空。'

              return {
                  'answer_text': answer_text,
                  'question': str(question or '').strip(),
                  'normalized_execution_plan': normalized_execution_plan,
                  'last_validated_ast': ((stage_execution_trace or [{}])[-1] or {}).get('validated_plan') if isinstance(stage_execution_trace, list) and stage_execution_trace else {},
                  'last_pipeline_json': str((((stage_execution_trace or [{}])[-1] or {}).get('pipeline_json')) or ''),
                  'merged_rows': merged_rows,
                  'chart': chart_payload,
                  'chart_echarts_markdown': chart_markdown,
                  'result_summary': summary_text,
                  'last_error': error_text,
                  'final_response_summary': final_response_summary,
                  'normalized_execution_plan_json': json.dumps(normalized_execution_plan, ensure_ascii=False),
                  'stage_execution_trace_json': json.dumps(stage_execution_trace, ensure_ascii=False),
                  'final_response_body': json.dumps(final_payload, ensure_ascii=False),
                  'final_response_summary': final_response_summary,
                  'chart_enabled': 'true' if bool(chart_option) else 'false',
                  'chart_type': str(chart_decision.get('chart_type') or '') if bool(chart_option) else '',
                  'chart_data': json.dumps(chart_option, ensure_ascii=False) if bool(chart_option) else '',
                  'chart_title': str((visualization or {}).get('title') or ''),
                  'chart_axis_x_title': str(chart_x_field or ''),
                  'chart_axis_y_title': str(chart_y_field or ''),
              }
