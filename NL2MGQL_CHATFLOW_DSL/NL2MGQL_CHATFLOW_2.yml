              )


          def _build_chart_payload(visualization=None, rows=None, allowed_types=None, normalized_plan=None, question=''):
              visualization = visualization or {}
              rows = rows if isinstance(rows, list) else []
              normalized_plan = normalized_plan or {}
              decision = _choose_chart_type(visualization, rows, allowed_types or {'bar', 'line', 'pie'})
              chart_type = str(decision.get('chart_type') or 'bar')

              if not rows:
                  return False, {}, '', '', '', chart_type, 'empty rows'

              row_fields = set(rows[0].keys()) if rows and isinstance(rows[0], dict) else set()
              stages = normalized_plan.get('stages') or []
              stage0 = stages[0] if stages and isinstance(stages[0], dict) else {}
              group_fields = stage0.get('group_fields') or []
              primary_group = str(group_fields[0] or '').strip() if group_fields else ''
              metric_alias = str(stage0.get('metric_alias') or '').strip()
              warning = ''

              x_field = str(decision.get('x_field') or _choose_x_field(normalized_plan, rows) or '').strip()
              y_field = str(decision.get('y_field') or _choose_y_field(normalized_plan, rows) or '').strip()
              if x_field not in row_fields and primary_group and primary_group in row_fields:
                  old_x = x_field
                  x_field = primary_group
                  warning = json.dumps({'chart_field_autofix': True, 'x_field_before': old_x, 'x_field_after': x_field, 'reason': 'x_field not found in rows; fallback to group_fields[0]'}, ensure_ascii=False)
              if y_field not in row_fields and metric_alias and metric_alias in row_fields:
                  y_field = metric_alias
              if not x_field or not y_field or x_field not in row_fields or y_field not in row_fields:
                  return False, {}, '', x_field, y_field, chart_type, 'missing valid x_field or y_field'

              viz = dict(visualization)
              viz['enabled'] = True
              viz['chart_type'] = chart_type
              viz['x_field'] = x_field
              viz['y_field'] = y_field
              if not str(viz.get('series_name') or '').strip() or str(viz.get('series_name') or '').strip() == 'value':
                  viz['series_name'] = _field_label_from_plan(normalized_plan, metric_alias or y_field, 'metric') or metric_alias or y_field
              viz['x_label'] = _field_label_from_plan(normalized_plan, x_field, 'field')
              viz['y_label'] = _field_label_from_plan(normalized_plan, metric_alias or y_field, 'metric')
              viz['title'] = build_short_chart_title(normalized_plan, viz, chart_type, x_field, y_field, question)

              option = _build_echarts_option(viz, rows)
              if not option:
                  option = _build_echarts_option(
                      {'enabled': True, 'chart_type': chart_type, 'x_field': x_field, 'y_field': y_field, 'series_name': _field_label_from_plan(normalized_plan, metric_alias or y_field, 'metric') or metric_alias or y_field, 'x_label': _field_label_from_plan(normalized_plan, x_field, 'field'), 'y_label': _field_label_from_plan(normalized_plan, metric_alias or y_field, 'metric'), 'title': build_short_chart_title(normalized_plan, visualization, chart_type, x_field, y_field, question)},
                      rows,
                  )
              if not option:
                  return False, {}, '', x_field, y_field, chart_type, 'no valid chart points'

              return True, option, _build_echarts_markdown(option), x_field, y_field, chart_type, warning


          def _choose_chart_type(visualization=None, rows=None, allowed_types=None):
              visualization = visualization or {}
              rows = rows if isinstance(rows, list) else []
              allowed = set(allowed_types or {'bar', 'line', 'pie'})

              raw_type = str(visualization.get('chart_type') or '').strip().lower()
              aliases = {
                  'column': 'bar',
                  '柱状图': 'bar',
                  '条形图': 'bar',
                  '对比图': 'bar',
                  'line': 'line',
                  '折线图': 'line',
                  '趋势图': 'line',
                  'pie': 'pie',
                  '饼图': 'pie',
              }
              normalized_type = aliases.get(raw_type, raw_type if raw_type in {'bar', 'line', 'pie'} else 'bar')
              if normalized_type not in allowed:
                  normalized_type = 'bar'

              x_field = str(visualization.get('x_field') or '').strip()
              y_field = str(visualization.get('y_field') or '').strip()

              if not x_field and rows:
                  for key in rows[0].keys():
                      if key not in {'_id', y_field}:
                          x_field = str(key)
                          break
              if not y_field and rows:
                  for key in rows[0].keys():
                      val = rows[0].get(key)
                      if isinstance(val, (int, float)):
                          y_field = str(key)
                          break

              return {
                  'chart_type': normalized_type,
                  'x_field': x_field,
                  'y_field': y_field,
                  'title': str(visualization.get('title') or '').strip(),
                  'series_name': str(visualization.get('series_name') or visualization.get('y_field') or 'value').strip() or 'value',
              }

          def _build_echarts_option(visualization, rows):
              if not isinstance(visualization, dict) or not visualization.get('enabled'):
                  return {}
              if not isinstance(rows, list) or not rows:
                  return {}
              chart_type = str(visualization.get('chart_type') or 'bar').strip().lower()
              x_field = str(visualization.get('x_field') or '').strip()

              y_field = str(visualization.get('y_field') or '').strip()
              title = str(visualization.get('title') or '').strip()
              series_name = str(visualization.get('series_name') or y_field or 'value').strip() or 'value'
              if not x_field or not y_field:
                  return {}
              points = []
              for row in rows:
                  if not isinstance(row, dict):
                      continue
                  x = row.get(x_field)
                  y = row.get(y_field)
                  if x is None or y is None:
                      continue
                  points.append((x, y))
              if not points:
                  return {}
              if chart_type == 'pie':
                  return {
                      'title': {'text': title or y_field},
                      'tooltip': {'trigger': 'item'},
                      'series': [{
                          'name': series_name,
                          'type': 'pie',
                          'data': [{'name': str(x), 'value': y} for x, y in points],
                      }],
                  }
              x_axis = [str(x) for x, _ in points]
              y_axis = [y for _, y in points]
              return {
                  'title': {'text': title or y_field},
                  'tooltip': {'trigger': 'axis'},
                  'xAxis': {'type': 'category', 'data': x_axis},
                  'yAxis': {'type': 'value'},
                  'series': [{
                      'name': series_name,
                      'type': 'line' if chart_type == 'line' else 'bar',
                      'data': y_axis,
                  }],
              }

          def _assert_safe_pipeline(pipeline):
              text = json.dumps(pipeline or [], ensure_ascii=False).lower()
              for token in FORBIDDEN_MONGO_TOKENS:
                  if token.lower() in text:
                      raise ValueError('unsafe Mongo pipeline rejected')
              for stage in pipeline or []:
                  if not isinstance(stage, dict) or len(stage) != 1:
                      raise ValueError('invalid Mongo pipeline stage')
                  op = next(iter(stage.keys()))
                  if op not in {'$match','$project','$sort','$limit','$group','$unwind'}:
                      raise ValueError('unsupported Mongo pipeline stage rejected')
              if pipeline and not any(isinstance(s, dict) and '$limit' in s for s in pipeline):
                  pipeline.append({'$limit': MAX_RETURN_ROWS})
              return pipeline


          def main(semantic_plan, planner, question: str, schema_context: str, query_urls: str):
              if isinstance(semantic_plan, str):
                  semantic_plan = json.loads(semantic_plan)
              plan = _ensure_obj(semantic_plan, 'semantic_plan')
              planner = _ensure_obj(planner, 'planner')
              urls = _parse_query_urls(query_urls)
              if not urls:
                  raise ValueError('SN_MONGODB_QUERY_URLS is empty')

              normalized_execution_plan = _normalize_plan(plan, planner, question)
              schema_metadata = extract_schema_metadata(schema_context)
              schema_alias_index = build_alias_index(schema_metadata)
              normalized_execution_plan['schema_context'] = str(schema_context or '')
              normalized_execution_plan['schema_metadata'] = schema_metadata
              normalized_execution_plan['schema_alias_index'] = schema_alias_index
              stage_outputs = {}
              stage_execution_trace = []

              for stage in normalized_execution_plan.get('stages') or []:
                  stage = _sanitize_stage_for_compile(stage)
                  validated_ast, pipeline, skip_query = _compile_stage(stage, schema_context, stage_outputs)
                  pipeline = _assert_safe_pipeline(pipeline)
                  pipeline_json = json.dumps(pipeline, ensure_ascii=False, indent=2)
                  selected_url = ''
                  request_id = uuid.uuid4().hex
                  request_body = {}
                  status_code = 0
                  response_body = ''
                  response_headers = {}
                  rows = []
