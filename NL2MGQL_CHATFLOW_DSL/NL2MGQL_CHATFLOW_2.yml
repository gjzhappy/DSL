          def _to_number(value):
              if isinstance(value, (int, float)):
                  return value
              try:
                  return float(value)
              except Exception:
                  return 0


          def _choose_x_field(normalized_plan=None, rows=None):
              normalized_plan = normalized_plan or {}
              rows = rows or []

              stages = normalized_plan.get('stages') or []
              if stages:
                  group_fields = (stages[0] or {}).get('group_fields') or []
                  if group_fields:
                      return str(group_fields[0] or '')

              if rows and isinstance(rows[0], dict):
                  for key, value in rows[0].items():
                      if not isinstance(value, (int, float)):
                          return str(key)

              return ''


          def _choose_y_field(normalized_plan=None, rows=None):
              normalized_plan = normalized_plan or {}
              rows = rows or []

              stages = normalized_plan.get('stages') or []
              if stages:
                  metric_alias = str((stages[0] or {}).get('metric_alias') or '').strip()
                  if metric_alias:
                      return metric_alias

              if rows and isinstance(rows[0], dict):
                  for key, value in rows[0].items():
                      if isinstance(value, (int, float)):
                          return str(key)

              return ''


