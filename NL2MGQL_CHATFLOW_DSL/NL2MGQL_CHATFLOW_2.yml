          def _build_chart_payload(visualization=None, rows=None, allowed_types=None, normalized_plan=None, question=''):
              visualization = visualization or {}
              rows = rows if isinstance(rows, list) else []
              normalized_plan = normalized_plan or {}
              decision = _choose_chart_type(visualization, rows, allowed_types or {'bar', 'line', 'pie'})
              chart_type = str(decision.get('chart_type') or 'bar')

              if not rows:
                  return False, {}, '', '', '', chart_type, 'empty rows'

              x_field = str(decision.get('x_field') or _choose_x_field(normalized_plan, rows) or '').strip()
              y_field = str(decision.get('y_field') or _choose_y_field(normalized_plan, rows) or '').strip()
              if not x_field or not y_field:
                  return False, {}, '', x_field, y_field, chart_type, 'missing x_field or y_field'

              viz = dict(visualization)
              viz['enabled'] = True
              viz['chart_type'] = chart_type
              viz['x_field'] = x_field
              viz['y_field'] = y_field
              viz['title'] = build_short_chart_title(normalized_plan, viz, chart_type, x_field, y_field, question)

              option = _build_echarts_option(viz, rows)
              if not option:
                  option = _build_echarts_option(
                      {'enabled': True, 'chart_type': chart_type, 'x_field': x_field, 'y_field': y_field, 'title': build_short_chart_title(normalized_plan, visualization, chart_type, x_field, y_field, question)},
                      rows,
                  )
              if not option:
                  return False, {}, '', x_field, y_field, chart_type, 'no valid chart points'

              return True, option, _build_echarts_markdown(option), x_field, y_field, chart_type, ''


          def _choose_chart_type(visualization=None, rows=None, allowed_types=None):
              visualization = visualization or {}
              rows = rows if isinstance(rows, list) else []
              allowed = set(allowed_types or {'bar', 'line', 'pie'})

              raw_type = str(visualization.get('chart_type') or '').strip().lower()
              aliases = {
                  'column': 'bar',
                  '柱状图': 'bar',
                  '条形图': 'bar',
                  '对比图': 'bar',
                  'line': 'line',
                  '折线图': 'line',
                  '趋势图': 'line',
                  'pie': 'pie',
                  '饼图': 'pie',
              }
              normalized_type = aliases.get(raw_type, raw_type if raw_type in {'bar', 'line', 'pie'} else 'bar')
              if normalized_type not in allowed:
                  normalized_type = 'bar'

              x_field = str(visualization.get('x_field') or '').strip()
              y_field = str(visualization.get('y_field') or '').strip()

              if not x_field and rows:
                  for key in rows[0].keys():
                      if key not in {'_id', y_field}:
                          x_field = str(key)
                          break
              if not y_field and rows:
                  for key in rows[0].keys():
                      val = rows[0].get(key)
                      if isinstance(val, (int, float)):
                          y_field = str(key)
                          break

              return {
                  'chart_type': normalized_type,
                  'x_field': x_field,
                  'y_field': y_field,
                  'title': str(visualization.get('title') or '').strip(),
                  'series_name': str(visualization.get('series_name') or visualization.get('y_field') or 'value').strip() or 'value',
              }

          def _build_echarts_option(visualization, rows):
              if not isinstance(visualization, dict) or not visualization.get('enabled'):
                  return {}
              if not isinstance(rows, list) or not rows:
                  return {}
              chart_type = str(visualization.get('chart_type') or 'bar').strip().lower()
              x_field = str(visualization.get('x_field') or '').strip()

              y_field = str(visualization.get('y_field') or '').strip()
              title = str(visualization.get('title') or '').strip()
              series_name = str(visualization.get('series_name') or y_field or 'value').strip() or 'value'
              if not x_field or not y_field:
                  return {}
              points = []
              for row in rows:
                  if not isinstance(row, dict):
                      continue
                  x = row.get(x_field)
                  y = row.get(y_field)
                  if x is None or y is None:
                      continue
                  points.append((x, y))
              if not points:
                  return {}
              if chart_type == 'pie':
                  return {
                      'title': {'text': title or y_field},
                      'tooltip': {'trigger': 'item'},
                      'series': [{
                          'name': series_name,
                          'type': 'pie',
                          'data': [{'name': str(x), 'value': y} for x, y in points],
                      }],
                  }
              x_axis = [str(x) for x, _ in points]
              y_axis = [y for _, y in points]
              return {
                  'title': {'text': title or y_field},
                  'tooltip': {'trigger': 'axis'},
                  'xAxis': {'type': 'category', 'data': x_axis},
                  'yAxis': {'type': 'value'},
                  'series': [{
                      'name': series_name,
                      'type': 'line' if chart_type == 'line' else 'bar',
                      'data': y_axis,
                  }],
              }

          def _assert_safe_pipeline(pipeline):
              text = json.dumps(pipeline or [], ensure_ascii=False).lower()
              for token in FORBIDDEN_MONGO_TOKENS:
                  if token.lower() in text:
                      raise ValueError('unsafe Mongo pipeline rejected')
              for stage in pipeline or []:
                  if not isinstance(stage, dict) or len(stage) != 1:
                      raise ValueError('invalid Mongo pipeline stage')
                  op = next(iter(stage.keys()))
                  if op not in {'$match','$project','$sort','$limit','$group','$unwind'}:
                      raise ValueError('unsupported Mongo pipeline stage rejected')
              if pipeline and not any(isinstance(s, dict) and '$limit' in s for s in pipeline):
                  pipeline.append({'$limit': MAX_RETURN_ROWS})
              return pipeline


          def main(semantic_plan, planner, question: str, schema_context: str, query_urls: str):
              if isinstance(semantic_plan, str):
                  semantic_plan = json.loads(semantic_plan)
              plan = _ensure_obj(semantic_plan, 'semantic_plan')
              planner = _ensure_obj(planner, 'planner')
              urls = _parse_query_urls(query_urls)
              if not urls:
                  raise ValueError('SN_MONGODB_QUERY_URLS is empty')

              normalized_execution_plan = _normalize_plan(plan, planner, question)
              stage_outputs = {}
              stage_execution_trace = []

              for stage in normalized_execution_plan.get('stages') or []:
                  stage = _sanitize_stage_for_compile(stage)
                  validated_ast, pipeline, skip_query = _compile_stage(stage, schema_context, stage_outputs)
                  pipeline = _assert_safe_pipeline(pipeline)
                  pipeline_json = json.dumps(pipeline, ensure_ascii=False, indent=2)
                  selected_url = ''
                  request_id = uuid.uuid4().hex
                  request_body = {}
                  status_code = 0
                  response_body = ''
                  response_headers = {}
                  rows = []
                  reason = ''
                  if (not skip_query) and (not pipeline):
                      skip_query = True
                      reason = 'empty pipeline'
                  if not skip_query:
                      selected_url = random.choice(urls)
                      request_body = {
                          'validated_ast': validated_ast or {},
                          'pipeline_json': pipeline_json,
                          'validation_message': 'ok',
                          'request_id': request_id,
                      }
                      status_code, response_body, response_headers = _post_json(selected_url, request_body)
                      if status_code < 200 or status_code >= 300:
                          raise ValueError(f"stage `{stage['stage_name']}` query failed: status={status_code}, body={response_body[:1200]}")
                      response_json = _read_json_text(response_body)
                      rows = _find_best_rows(response_json)
                  else:
                      response_body = json.dumps({'msg': 'skip query', 'code': 200, 'data': {'rows': []}}, ensure_ascii=False)
                      rows = []
                      if not reason:
                          reason = 'no join values from previous stage'

                  trace_item = {
                      'stage_name': stage['stage_name'],
                      'collection': stage['collection'],
                      'intent_type': stage['intent_type'],
                      'sanitize_report': stage.get('sanitize_report') or {},
                      'validated_ast': validated_ast,
                      'pipeline': pipeline,
                      'pipeline_json': pipeline_json,
                      'selected_url': selected_url,
                      'request_id': request_id,
                      'query_request_body': request_body,
                      'query_status_code': status_code,
                      'query_response_body': response_body,
                      'query_response_headers': response_headers,
                      'rows': rows,
                      'skipped': bool(skip_query),
                      'skip_reason': reason,
                  }
                  stage_execution_trace.append(trace_item)
                  stage_outputs[stage['stage_name']] = trace_item

              execution_mode = normalized_execution_plan.get('execution_mode')
              final_merge = normalized_execution_plan.get('final_merge') or {}
              if execution_mode == 'multi_stage' and final_merge.get('left_stage') and final_merge.get('right_stage'):
                  left_rows = (stage_outputs.get(final_merge['left_stage']) or {}).get('rows') or []
                  right_rows = (stage_outputs.get(final_merge['right_stage']) or {}).get('rows') or []
                  merged_rows = _merge_rows(left_rows, right_rows, final_merge.get('left_field'), final_merge.get('right_field'), final_merge.get('attach_as') or 'related_info')
              else:
                  first_stage_name = normalized_execution_plan['stages'][0]['stage_name']
                  merged_rows = (stage_outputs.get(first_stage_name) or {}).get('rows') or []
              visualization = normalized_execution_plan.get('visualization') or {}
              chart_decision = _choose_chart_type(visualization, merged_rows, {'bar', 'line', 'pie'})
              chart_option = _build_echarts_option(visualization, merged_rows)
              chart_x_field = str(chart_decision.get('x_field') or '')
              chart_y_field = str(chart_decision.get('y_field') or '')
              chart_enabled, chart_option, chart_markdown, _, _, _, _ = _build_chart_payload(visualization, merged_rows, {'bar', 'line', 'pie'}, normalized_execution_plan, question)
              if chart_enabled and chart_option:
                  if not bool((normalized_execution_plan.get('visualization') or {}).get('enabled')):
                      normalized_execution_plan.setdefault('visualization', {})['enabled'] = True
                  if not str((normalized_execution_plan.get('visualization') or {}).get('chart_type') or '').strip():
                      normalized_execution_plan.setdefault('visualization', {})['chart_type'] = str(chart_decision.get('chart_type') or 'bar')
              option_title = str((((chart_option or {}).get('title') or {}).get('text')) or '').strip()
              option_series_name = ''
