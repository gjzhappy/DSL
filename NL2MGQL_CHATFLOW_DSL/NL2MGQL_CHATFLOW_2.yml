                  stage_execution_trace.append(trace_item)
                  stage_outputs[stage['stage_name']] = trace_item

              execution_mode = normalized_execution_plan.get('execution_mode')
              final_merge = normalized_execution_plan.get('final_merge') or {}
              if execution_mode == 'multi_stage' and final_merge.get('left_stage') and final_merge.get('right_stage'):
                  left_rows = (stage_outputs.get(final_merge['left_stage']) or {}).get('rows') or []
                  right_rows = (stage_outputs.get(final_merge['right_stage']) or {}).get('rows') or []
                  merged_rows = _merge_rows(left_rows, right_rows, final_merge.get('left_field'), final_merge.get('right_field'), final_merge.get('attach_as') or 'related_info')
              else:
