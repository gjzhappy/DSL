    - data:
        code: |
          import json
          import re


          def _truncate_text(text, limit=2000):
              text = '' if text is None else str(text)
              return text if len(text) <= limit else text[:limit] + '...'


          def _read_json_text(text):
              if text is None:
                  return None
              if isinstance(text, (dict, list)):
                  return text
              raw = str(text).strip()
              if not raw:
                  return None
              return json.loads(raw)


          def _content_to_text(content):
              if isinstance(content, str):
                  return content.strip()
              if isinstance(content, list):
                  parts = []
                  for item in content:
                      if isinstance(item, str) and item.strip():
                          parts.append(item.strip())
                      elif isinstance(item, dict):
                          text = str(item.get('text') or item.get('content') or '').strip()
                          if text:
                              parts.append(text)
                  return '\n'.join(parts).strip()
              return ''


          def _extract_chat_text(resp_json):
              if not isinstance(resp_json, dict):
                  return ''
              choices = resp_json.get('choices')
              if isinstance(choices, list) and choices:
                  first = choices[0] or {}
                  if isinstance(first, dict):
                      msg = first.get('message') or {}
                      if isinstance(msg, dict):
                          text = _content_to_text(msg.get('content'))
                          if text:
                              return text
                      text = _content_to_text(first.get('text'))
                      if text:
                          return text
              output = resp_json.get('output')
              text = _content_to_text(output)
              if text:
                  return text
              if isinstance(output, list):
                  for item in output:
                      if isinstance(item, dict):
                          text = _content_to_text(item.get('content'))
                          if text:
                              return text
              for key in ('result', 'text', 'content', 'answer'):
                  text = _content_to_text(resp_json.get(key))
                  if text:
                      return text
              data = resp_json.get('data')
              if isinstance(data, dict):
                  for key in ('result', 'text', 'content', 'answer'):
                      text = _content_to_text(data.get(key))
                      if text:
                          return text
              return ''


          def _strip_code_fence(text):
              raw = str(text or '').strip()
              full_match = re.match(r'^```(?:json)?\s*(.*?)\s*```$', raw, flags=re.IGNORECASE | re.DOTALL)
              if full_match:
                  return full_match.group(1).strip()
              return raw


          def _remove_think_blocks(text):
              raw = str(text or '')
              raw = re.sub(r'<think>.*?</think>', ' ', raw, flags=re.IGNORECASE | re.DOTALL)
              return raw.strip()


          def _ast_candidate_score(obj):
              if not isinstance(obj, dict):
                  return -1
              score = 0
              keys = set(obj.keys())
              if 'execution_plan' in keys:
                  score += 10
              stages = (obj.get('execution_plan') or {}).get('stages') if isinstance(obj.get('execution_plan'), dict) else None
              if isinstance(stages, list) and stages:
                  score += 10
              if keys:
                  score += 1
              return score


          def _try_decode_object(raw):
              try:
                  decoder = json.JSONDecoder()
                  obj, end = decoder.raw_decode(raw)
                  if isinstance(obj, dict):
                      return obj, raw[:end], raw[end:].strip()
              except Exception:
                  return None
              return None


          def _extract_json_object_text(text):
