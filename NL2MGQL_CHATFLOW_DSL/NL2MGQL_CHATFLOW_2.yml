              tr = stage0.get('time_range') if isinstance(stage0.get('time_range'), dict) else {}; days = int(tr.get('relative_days') or 0) if str(tr.get('mode') or '') == 'relative_days' else 0; time_label = '过去一个月' if days in (28, 29, 30, 31) else ('最近7天' if days == 7 else ('昨日' if days == 1 else ('最近' + str(days) + '天' if days > 0 else '')))
