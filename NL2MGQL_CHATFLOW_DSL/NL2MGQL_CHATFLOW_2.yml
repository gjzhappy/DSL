              metric = '订单数' if any(k in metric_lower or k in metric_src for k in ['order_count','orders_count','order_num','订单数']) or (str(stage0.get('metric_function') or '').lower() == 'count' and ('order' in collection or '订单' in collection)) else ('销售额' if any(k in metric_lower or k in metric_src for k in ['amount','gmv','sales','金额','销售额']) else ('数量' if str(stage0.get('metric_function') or '').lower() == 'count' or any(k in metric_lower or k in metric_src for k in ['quantity','qty','数量']) else (metric_src[:8] if metric_src else '指标')))
              suffix = '趋势' if str(chart_type or visualization.get('chart_type') or '').lower() == 'line' else ('分布' if str(chart_type or visualization.get('chart_type') or '').lower() == 'pie' else '对比')
              return (time_label + (('各' + dim) if dim else '') + metric + suffix)[:24]


