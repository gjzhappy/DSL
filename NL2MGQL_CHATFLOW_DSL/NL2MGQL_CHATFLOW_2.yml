    - data:
        code: |
          import json

          UNSUPPORTED_JSON_SCHEMA_KEYS = {
              'uniqueItems',
          }


          def _truncate_text(text, limit=2000):
              text = '' if text is None else str(text)
              return text if len(text) <= limit else text[:limit] + '...'


          def _read_json_text(text):
              if text is None:
                  return None
              if isinstance(text, (dict, list)):
                  return text
              raw = str(text).strip()
              if not raw:
                  return None
              return json.loads(raw)


          def _first_non_empty_string(*values):
              for value in values:
                  if isinstance(value, str) and value.strip():
                      return value.strip()
              return ''


          def _sanitize_json_schema(value):
              if isinstance(value, dict):
                  cleaned = {}
                  for key, item in value.items():
                      if key in UNSUPPORTED_JSON_SCHEMA_KEYS:
                          continue
                      cleaned[key] = _sanitize_json_schema(item)
                  return cleaned
              if isinstance(value, list):
                  return [_sanitize_json_schema(item) for item in value]
              return value


          def _to_bool(value):
              if isinstance(value, bool):
                  return value
              return str(value or '').strip().lower() in {'1','true','yes','y','on'}


          def main(status_code, body, semantic_plan_system_prompt: str, semantic_plan_user_prompt: str, semantic_plan_json_schema: str,
                   chat_url: str, llm_config_json: str, request_id: str, full_llm_response_format_enabled: str):
              try:
                  code = int(status_code or 0)
                  if code < 200 or code >= 300:
                      raise ValueError(f"动态token获取失败, status={code}, body={_truncate_text(body, 2000)}")
                  resp_json = _read_json_text(body)
                  if not resp_json or not isinstance(resp_json, dict):
                      raise ValueError(f"动态token响应不是合法JSON: {_truncate_text(body, 1200)}")
                  token_result = resp_json.get('result')
                  if token_result is None:
                      raise ValueError('TOKEN_RESULT_EMPTY')
                  if not isinstance(token_result, str):
                      raise ValueError('TOKEN_RESULT_INVALID_TYPE')
                  authorization_value = token_result.strip()
                  if not authorization_value:
                      raise ValueError('TOKEN_RESULT_EMPTY')
                  if not authorization_value.startswith('Basic '):
                      print('WARN:TOKEN_RESULT_UNEXPECTED_PREFIX')
                  llm_config = _read_json_text(llm_config_json)
                  if not llm_config or not isinstance(llm_config, dict):
                      raise ValueError('llm_config_json 不是合法JSON对象')
                  schema = _read_json_text(semantic_plan_json_schema)
                  if not schema or not isinstance(schema, dict):
                      raise ValueError('semantic_plan_json_schema 不是合法JSON对象')
                  sanitized_schema = _sanitize_json_schema(schema)
                  if not sanitized_schema or not isinstance(sanitized_schema, dict):
                      raise ValueError('清洗后的 semantic_plan_json_schema 不是合法JSON对象')
                  model = _first_non_empty_string(str(llm_config.get('model') or '').strip(), 'DeepSeek-V4-Flash')
                  prompt = semantic_plan_user_prompt
                  request_body = {
                      'model': model,
                      'messages': [
                          {'role': 'system', 'content': semantic_plan_system_prompt},
                          {'role': 'user', 'content': prompt},
                      ],
                      'stream': False,
                  }
                  rf_enabled = _to_bool(full_llm_response_format_enabled)
                  if rf_enabled:
                      request_body['response_format'] = {
                          'type': 'json_schema',
                          'json_schema': {
                              'name': 'semantic_execution_plan',
                              'strict': False,
                              'schema': sanitized_schema,
                          }
                      }
                  return {
                      'request_enabled': 'true',
                      'debug_summary': json.dumps({
                          'request_url': str(chat_url or '').strip(),
                          'model': model,
                          'prompt_length': len(prompt or ''),
                          'auth_present': bool(authorization_value),
                          'auth_from': 'token_response.result',
                          'auth_scheme': 'Basic' if authorization_value.startswith('Basic ') else '',
                          'auth_len': len(authorization_value or ''),
                          'body_keys': list(request_body.keys()),
                          'response_format_enabled': rf_enabled,
                          'response_format_type': 'json_schema' if rf_enabled else '',
                          'schema_name': 'semantic_execution_plan' if rf_enabled else '',
                          'schema_required': ['execution_plan'],
                          'prompt_preview': _truncate_text(prompt, 1000),
                      }, ensure_ascii=False),
                      'chat_url': chat_url,
                      'authorization_value': authorization_value,
                      'llm_request_body_json': json.dumps(request_body, ensure_ascii=False),
                      'request_id': request_id,
                  }
              except Exception as e:
                  return {
                      'request_enabled': 'false',
                      'debug_summary': _truncate_text(str(e), 2000),
                      'chat_url': str(chat_url or '').strip(),
                      'authorization_value': '',
                      'llm_request_body_json': '',
                      'request_id': str(request_id or '').strip(),
                  }
