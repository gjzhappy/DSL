              groups = ast.get('group_by') if isinstance(ast, dict) else []
              if not isinstance(groups, list):
                  return ''
              for item in groups:
                  if isinstance(item, dict):
                      field = str(item.get('alias') or item.get('field') or '').strip()
                      if field:
                          return field
                  elif isinstance(item, str) and item.strip():
                      return item.strip()
              return ''


          def _field_from_ast_metric(ast):
              aggs = ast.get('aggregations') if isinstance(ast, dict) else []
              if not isinstance(aggs, list):
                  return ''
              for item in aggs:
                  if isinstance(item, dict):
                      field = str(item.get('alias') or item.get('field') or '').strip()
                      if field:
                          return field
                  elif isinstance(item, str) and item.strip():
                      return item.strip()
              return ''


          def _pick_group_field(rows, normalized_plan=None):
              normalized_plan = normalized_plan or {}
              row_keys = list(rows[0].keys()) if rows and isinstance(rows[0], dict) else []
              row_key_set = set(row_keys)
              for stage in _execution_stages(normalized_plan):
                  group_fields = stage.get('group_fields') if isinstance(stage, dict) else []
                  if isinstance(group_fields, list) and group_fields:
                      group = str(group_fields[0] or '').strip()
                      if group and (not row_keys or group in row_key_set):
                          return group
              ast_group = _field_from_ast_group(_validated_ast(normalized_plan))
              if ast_group and (not row_keys or ast_group in row_key_set):
                  return ast_group
              chart_x = str(_chart_request(normalized_plan).get('x_field') or _chart_request(normalized_plan).get('x_axis') or '').strip()
              if chart_x and (not row_keys or chart_x in row_key_set):
                  return chart_x
              if rows:
                  for key in row_keys:
                      if not isinstance(rows[0].get(key), (int, float)) or isinstance(rows[0].get(key), bool):
                          return key
              return row_keys[0] if row_keys else ''


          def _pick_metric_field(rows, group_field, normalized_plan=None):
              normalized_plan = normalized_plan or {}
              row_keys = list(rows[0].keys()) if rows and isinstance(rows[0], dict) else []
              row_key_set = set(row_keys)
              for stage in _execution_stages(normalized_plan):
                  metric_alias = str((stage or {}).get('metric_alias') or '').strip() if isinstance(stage, dict) else ''
                  if metric_alias and (not row_keys or metric_alias in row_key_set):
                      return metric_alias
              ast_metric = _field_from_ast_metric(_validated_ast(normalized_plan))
              if ast_metric and (not row_keys or ast_metric in row_key_set):
                  return ast_metric
              chart_y = str(_chart_request(normalized_plan).get('y_field') or _chart_request(normalized_plan).get('y_axis') or '').strip()
              if chart_y and (not row_keys or chart_y in row_key_set):
                  return chart_y
              if rows:
                  for key in row_keys:
                      value = rows[0].get(key)
                      if key != group_field and isinstance(value, (int, float)) and not isinstance(value, bool):
                          return key
              for key in row_keys:
                  if key != group_field:
                      return key
              return ''


          def _prettify(field):
              text = str(field or '').strip()
              if not text:
                  return '字段'
              return text.replace('_', ' ')


          def _schema_metadata_from_plan(plan):
              if not isinstance(plan, dict):
                  return {'collections': {}, 'warnings': []}
              meta = plan.get('schema_metadata') or plan.get('schema_metadata_json')
              if isinstance(meta, str) and meta.strip():
                  try:
                      meta = json.loads(meta)
                  except Exception:
                      meta = None
              if isinstance(meta, dict) and isinstance(meta.get('collections'), dict):
                  return meta
              schema = plan.get('schema_context')
              if isinstance(schema, str) and schema.strip():
                  return extract_schema_metadata(schema)
              return {'collections': {}, 'warnings': []}


          def _collection_from_plan(plan):
              stages = _execution_stages(plan)
              stage0 = stages[0] if stages and isinstance(stages[0], dict) else {}
              return str(plan.get('primary_collection') or stage0.get('primary_collection') or stage0.get('collection') or '').strip() if isinstance(plan, dict) else ''


          def _schema_label_map(plan):
              labels = {}
              meta = _schema_metadata_from_plan(plan)
              collection_name = _collection_from_plan(plan)
              for cname, coll in (meta.get('collections') or {}).items():
                  if collection_name and cname != collection_name:
                      continue
                  for fname, field in (coll.get('fields') or {}).items():
                      label = str(field.get('label') or '').strip()
                      if label:
                          labels[fname] = label
                  for mname, metric in (coll.get('metrics') or {}).items():
                      label = str(metric.get('label') or '').strip()
                      if label:
                          labels[mname] = label
              return labels


          def _ast_alias_map(plan):
              aliases = {}
              ast = _validated_ast(plan)
              for item in (ast.get('group_by') or []) if isinstance(ast, dict) else []:
                  if isinstance(item, dict):
                      field = str(item.get('field') or '').strip()
                      alias = str(item.get('alias') or '').strip()
                      if field and alias:
                          aliases[field] = alias
              for item in (ast.get('aggregations') or []) if isinstance(ast, dict) else []:
                  if isinstance(item, dict):
                      field = str(item.get('field') or item.get('alias') or '').strip()
                      alias = str(item.get('alias') or '').strip()
                      if field and alias:
                          aliases[field] = alias
              return aliases


          def _field_label(field, normalized_plan=None, role=''):
              field = str(field or '').strip()
              if not field:
                  return '字段'
              meta = _schema_metadata_from_plan(normalized_plan or {})
              collection_name = _collection_from_plan(normalized_plan or {})
              if role == 'metric':
                  metric_label = resolve_metric_label(field, meta, collection_name)
                  if metric_label and metric_label != _prettify(field):
                      return metric_label
              else:
                  field_label = resolve_field_label(field, meta, collection_name)
                  if field_label and field_label != _prettify(field):
                      return field_label
              labels = _schema_label_map(normalized_plan or {})
              if field in labels:
                  return labels[field]
              aliases = _ast_alias_map(normalized_plan or {})
              if field in aliases:
                  return aliases[field]
              chart = _chart_request(normalized_plan or {})
              axis_key = 'x_label' if role == 'group' else 'y_label'
              axis_label = str(chart.get(axis_key) or chart.get(role + '_label') or '').strip()
              if axis_label:
                  return axis_label
              return _prettify(field)


          def _fmt(value):
              if isinstance(value, float):
                  if value.is_integer():
                      return str(int(value))
                  return ('%.2f' % value).rstrip('0').rstrip('.')
              return str(value)


          def _summary(question, rows, normalized_plan=None):
              row_count = len(rows)
              group_field = _pick_group_field(rows, normalized_plan)
              metric_field = _pick_metric_field(rows, group_field, normalized_plan)
              group_label = _field_label(group_field, normalized_plan, 'group')
              metric_label = _field_label(metric_field, normalized_plan, 'metric')
              title = '结果摘要'
              if not rows:
                  return title + '：\n- 当前筛选条件下未查询到符合条件的数据记录。'

              bullets = [f'- 查询完成，共返回 {row_count} 条统计结果。']
              if group_field and metric_field:
                  sorted_rows = sorted(rows, key=lambda row: row.get(metric_field) if isinstance(row.get(metric_field), (int, float)) else 0, reverse=True)
                  top = sorted_rows[0]
                  top_name = top.get(group_field, '未知')
                  top_value = top.get(metric_field, '')
                  bullets.append(f'- 按 {group_label} 分组后，{top_name} 的 {metric_label} 最高，为 {_fmt(top_value)}。')
                  if row_count > 1:
                      tail = sorted_rows[-1]
                      bullets.append(f'- 排名靠后的分组是 {tail.get(group_field, "未知")}，{metric_label} 为 {_fmt(tail.get(metric_field, ""))}。')
                  preview = '、'.join([f'{row.get(group_field, "未知")}({_fmt(row.get(metric_field, ""))})' for row in sorted_rows[:5]])
                  if preview:
                      bullets.append(f'- 主要分组数据：{preview}。')
              return title + '：\n' + '\n'.join(bullets)


          def _analysis(rows, normalized_plan=None, chart_available=False):
              if not rows:
                  return '简单分析：\n- 当前筛选条件下没有可用于对比的数据记录，建议放宽时间范围或检查筛选条件。'
              group_field = _pick_group_field(rows, normalized_plan)
              metric_field = _pick_metric_field(rows, group_field, normalized_plan)
              group_label = _field_label(group_field, normalized_plan, 'group')
              metric_label = _field_label(metric_field, normalized_plan, 'metric')
              if not group_field or not metric_field:
                  return '简单分析：\n- 已返回查询结果，但字段结构不足以自动识别分组维度和指标，可结合统计结果查看整体分布。'
              numeric = [row for row in rows if isinstance(row.get(metric_field), (int, float)) and not isinstance(row.get(metric_field), bool)]
              if len(numeric) < 2:
                  return '简单分析：\n- 分组数量较少，暂不适合做明显的横向对比。'
              sorted_rows = sorted(numeric, key=lambda row: row.get(metric_field), reverse=True)
              top, second = sorted_rows[0], sorted_rows[1]
              gap = top.get(metric_field) - second.get(metric_field)
              prefix = '从图表看' if chart_available else '从统计结果看'
              return (
                  '简单分析：\n'
                  f'- {prefix}，{top.get(group_field, "未知")} 的 {metric_label} 最高，比第二名 '
                  f'{second.get(group_field, "未知")} 高 {_fmt(gap)}。\n'
                  f'- 可优先关注排名靠前的分组（{top.get(group_field, "未知")}、{second.get(group_field, "未知")}）以及排名靠后的分组，继续分析不同 {group_label} 的差异情况。'
              )


          def _result_fields_json(rows):
              seen = []
              for row in rows[:10]:
                  for key in row.keys():
                      if key not in seen:
                          seen.append(key)
              return json.dumps(seen, ensure_ascii=False)


          def _plan_needs_chart(normalized_plan, semantic_plan, question):
              viz = normalized_plan.get('visualization') if isinstance(normalized_plan.get('visualization'), dict) else {}
              chart_request = normalized_plan.get('chart_request') if isinstance(normalized_plan.get('chart_request'), dict) else {}
              text = str(question or '')
              asked = any(k in text for k in ['图', '柱状图', '折线图', '饼图', '图表', '做图', '可视化'])
              return bool(normalized_plan.get('needs_chart') or semantic_plan.get('needs_chart') or viz.get('enabled') or chart_request.get('enabled') or asked)


          def _first_stage_for_context(plan):
              stages = _execution_stages(plan if isinstance(plan, dict) else {})
              return stages[0] if stages and isinstance(stages[0], dict) else {}


          COMPACT_CONTEXT_TARGET_BYTES = 12000
          COMPACT_CONTEXT_HARD_BYTES = 60000
          MAX_PREVIEW_ROWS = 5
          MAX_PREVIEW_FIELDS = 20
          MAX_PREVIEW_STRING = 200


          def _safe_int_value(value, default=0):
              try:
                  return int(value)
              except Exception:
                  return default


          def _dedupe_values(values, limit=50):
              out = []
              for value in values or []:
                  text = str(value or '').strip()
                  if text and text not in out:
                      out.append(text)
                      if limit and len(out) >= limit:
                          break
              return out


          def _compact_value(value, max_len=MAX_PREVIEW_STRING):
              if isinstance(value, str):
                  return value[:max_len]
              if isinstance(value, (int, float, bool)) or value is None:
                  return value
              try:
                  return json.dumps(value, ensure_ascii=False, default=str)[:max_len]
              except Exception:
                  return str(value)[:max_len]


          def _normalize_time_range(value):
              value = value if isinstance(value, dict) else {}
              return {
                  'field': str(value.get('field') or ''),
                  'mode': str(value.get('mode') or ''),
                  'relative_days': _safe_int_value(value.get('relative_days'), 0),
                  'start': str(value.get('start') or ''),
                  'end': str(value.get('end') or ''),
              }


          def _compact_rows_profile(rows):
              fields = []
              numeric_fields = []
              dimension_fields = []
              preview_rows = []
              for row in rows or []:
                  if not isinstance(row, dict):
                      continue
                  for key, value in row.items():
                      name = str(key)
                      if name not in fields:
                          fields.append(name)
                      if isinstance(value, (int, float)) and not isinstance(value, bool):
                          if name not in numeric_fields:
                              numeric_fields.append(name)
                      elif isinstance(value, (str, bool)) or value is None:
                          if name not in dimension_fields:
                              dimension_fields.append(name)
                  if len(preview_rows) < MAX_PREVIEW_ROWS:
                      compact = {}
                      for key, value in row.items():
                          if len(compact) >= MAX_PREVIEW_FIELDS:
                              break
                          compact[str(key)] = _compact_value(value)
                      preview_rows.append(compact)
              return {
                  'row_count': len(rows or []),
                  'fields': fields[:80],
                  'numeric_fields': numeric_fields[:40],
                  'dimension_fields': dimension_fields[:40],
                  'preview_rows': preview_rows,
              }


          def _compact_chart_request(chart_request):
              chart_request = chart_request if isinstance(chart_request, dict) else {}
              return {
                  'enabled': bool(chart_request.get('enabled') or chart_request.get('chart_type') or chart_request.get('type')),
                  'chart_type': str(chart_request.get('chart_type') or chart_request.get('type') or ''),
                  'x_field': str(chart_request.get('x_field') or chart_request.get('x') or ''),
                  'y_field': str(chart_request.get('y_field') or chart_request.get('y') or ''),
                  'series_name': str(chart_request.get('series_name') or chart_request.get('series') or ''),
                  'title': str(chart_request.get('title') or '')[:200],
              }


          def _schema_context_ref(collections, schema_metadata_json='', collection_catalog_json='', collection_selection_json=''):
              warnings = []
              meta = _loads_obj(schema_metadata_json)
              catalog = _loads_obj(collection_catalog_json)
              selection = _loads_obj(collection_selection_json)
              selected = []
              for item in [selection.get('selected_primary_collection')] + list(selection.get('selected_related_collections') or []) + list(collections or []):
                  item = str(item or '').strip()
                  if item and item not in selected:
                      selected.append(item)
              digest = str(meta.get('schema_digest') or '')
              if digest and not digest.startswith('sha256:'):
                  digest = 'sha256:' + digest
              catalog_digest = str(catalog.get('catalog_digest') or selection.get('collection_catalog_digest') or '')
              if catalog_digest and not catalog_digest.startswith('sha256:'):
                  catalog_digest = 'sha256:' + catalog_digest
              if not digest:
                  warnings.append('schema_context_ref.schema_digest 缺失；compact context 仅保存引用摘要，不写入完整 schema。')
              if not catalog_digest:
                  warnings.append('schema_context_ref.catalog_digest 缺失；下一轮需要重新确认 collection catalog。')
              return {
                  'ref': {
                      'collections': selected,
                      'schema_digest': digest,
                      'schema_version': str(meta.get('schema_version') or ''),
                      'catalog_digest': catalog_digest,
                  },
                  'warnings': warnings,
              }


          def _first_stage_summary(stage, primary, related):
              stage = stage if isinstance(stage, dict) else {}
              return {
                  'primary_collection': primary or str(stage.get('collection') or ''),
                  'related_collections': related if isinstance(related, list) else [],
                  'intent_type': str(stage.get('intent_type') or ''),
                  'time_range': _normalize_time_range(stage.get('time_range')),
                  'filters': stage.get('filters') if isinstance(stage.get('filters'), list) else [],
                  'group_fields': stage.get('group_fields') if isinstance(stage.get('group_fields'), list) else [],
                  'metric_alias': str(stage.get('metric_alias') or ''),
                  'metric_function': str(stage.get('metric_function') or ''),
                  'metric_field': str(stage.get('metric_field') or ''),
                  'sort': stage.get('sort') if isinstance(stage.get('sort'), list) else [],
                  'limit': _safe_int_value(stage.get('limit'), 0),
                  'projection_fields': stage.get('projection_fields') if isinstance(stage.get('projection_fields'), list) else [],
              }


          def _dump_compact_context(compact):
              compact['answer_summary'] = str(compact.get('answer_summary') or '')[:800]
              compact.setdefault('context_warnings', [])
              compact['size_guard'] = {'max_bytes': COMPACT_CONTEXT_TARGET_BYTES, 'actual_bytes': 0, 'truncated': False, 'truncate_reason': ''}
              text = json.dumps(compact, ensure_ascii=False)
              compact['size_guard']['actual_bytes'] = len(text.encode('utf-8'))
              if compact['size_guard']['actual_bytes'] > COMPACT_CONTEXT_TARGET_BYTES:
                  compact['last_result_profile']['preview_rows'] = compact['last_result_profile'].get('preview_rows', [])[:3]
                  compact['answer_summary'] = compact.get('answer_summary', '')[:400]
                  compact['size_guard']['truncated'] = True
                  compact['size_guard']['truncate_reason'] = 'compact_context 超过 12000 bytes，裁剪 preview_rows 与 answer_summary。'
                  compact['context_warnings'].append(compact['size_guard']['truncate_reason'])
                  text = json.dumps(compact, ensure_ascii=False)
                  compact['size_guard']['actual_bytes'] = len(text.encode('utf-8'))
              if compact['size_guard']['actual_bytes'] > COMPACT_CONTEXT_HARD_BYTES:
                  compact['last_result_profile']['preview_rows'] = []
                  compact['answer_summary'] = compact.get('answer_summary', '')[:200]
                  compact['size_guard']['truncated'] = True
                  compact['size_guard']['truncate_reason'] = 'compact_context 超过 60000 bytes 硬上限，清空 preview_rows。'
                  compact['context_warnings'].append(compact['size_guard']['truncate_reason'])
                  text = json.dumps(compact, ensure_ascii=False)
                  compact['size_guard']['actual_bytes'] = len(text.encode('utf-8'))
              return json.dumps(compact, ensure_ascii=False)


          def _compact_context_contract(question, normalized_plan, chart_request, rows, answer_summary, schema_metadata_json='', collection_catalog_json='', collection_selection_json=''):
              stage = _first_stage_for_context(normalized_plan)
              primary = str((normalized_plan or {}).get('primary_collection') or stage.get('primary_collection') or stage.get('collection') or '').strip()
              collections = _dedupe_values([primary] + list((normalized_plan or {}).get('related_collections') or []))
              if not collections and stage.get('collection'):
                  collections.append(str(stage.get('collection')).strip())
              related = [c for c in collections if c and c != primary]
              plan_summary = _first_stage_summary(stage, primary, related)
              result_profile = _compact_rows_profile(rows)
              chart = _compact_chart_request(chart_request)
              schema_ref_payload = _schema_context_ref(collections, schema_metadata_json, collection_catalog_json, collection_selection_json)
              warnings = list(schema_ref_payload.get('warnings') or [])
              compact = {
                  'context_version': 'compact_context_contract',
                  'has_last_context': bool(question and (primary or plan_summary.get('group_fields') or plan_summary.get('metric_alias') or result_profile.get('row_count') or answer_summary)),
                  'last_question': str(question or '')[:1000],
                  'last_turn_intent': {'turn_intent': '', 'refine_type': ''},
                  'last_primary_collection': primary,
                  'last_related_collections': related,
                  'last_plan_summary': plan_summary,
                  'last_resolved_fields': _dedupe_values(plan_summary.get('group_fields') + plan_summary.get('projection_fields') + [plan_summary.get('metric_field')], 80),
                  'last_resolved_metrics': _dedupe_values([plan_summary.get('metric_alias'), plan_summary.get('metric_field')], 40),
                  'last_chart_request': chart,
                  'last_result_profile': result_profile,
                  'schema_context_ref': schema_ref_payload.get('ref') or {'collections': [], 'schema_digest': '', 'schema_version': '', 'catalog_digest': ''},
                  'answer_summary': str(answer_summary or '')[:800],
                  'size_guard': {'max_bytes': COMPACT_CONTEXT_TARGET_BYTES, 'actual_bytes': 0, 'truncated': False, 'truncate_reason': ''},
                  'context_warnings': warnings,
              }
              return compact



          BANNED_CONTEXT_KEYS = {
              'schema_metadata_json', 'schema_alias_index_json', 'schema_runtime_context_json',
              'hydrated_schema_metadata_json', 'hydrated_schema_alias_index_json', 'collection_catalog_json',
              'raw_schema_docs', 'raw_llm_response', 'full_prompt', 'pipeline_json', 'request_body_json',
              'query_response_body', 'query_response_headers', 'compiler_debug_json', 'validator_debug',
              'chart_debug', 'stage_execution_trace', 'full_rows', 'rows_json', 'merged_rows_json',
              'echarts option', 'echarts_markdown', 'chart_payload.option', 'chart_payload.echarts_markdown'
          }

          ANSWER_PAYLOAD_CONTRACT_VERSION = 'answer_payload_contract'
          CONTEXT_UPDATE_CONTRACT_VERSION = 'context_update_contract'
          COMPACT_CONTEXT_CONTRACT_VERSION = 'compact_context_contract'


          def _loads_any(value, fallback=None):
              if fallback is None:
                  fallback = {}
              if isinstance(value, (dict, list)):
                  return value
              if isinstance(value, str) and value.strip():
                  try:
                      return json.loads(value)
                  except Exception:
                      return fallback
              return fallback


          def _safe_bool(value):
              if isinstance(value, bool):
                  return value
              if isinstance(value, str):
                  return value.strip().lower() in {'true', '1', 'yes', 'y'}
              return bool(value)


          def _safe_int(value, default=0):
              try:
                  if value in (None, '') or isinstance(value, bool):
                      return default
                  return int(float(value))
              except Exception:
                  return default


          def _compact_chart_payload(payload):
              if not isinstance(payload, dict):
                  return {'enabled': False, 'summary': '', 'warning': ''}
              allowed = ('contract_version', 'enabled', 'chart_type', 'title', 'x_field', 'y_field', 'series_name', 'summary', 'warning', 'data_profile')
              out = {k: payload.get(k) for k in allowed if k in payload}
              out.pop('option', None)
              out.pop('echarts_markdown', None)
              out.pop('chart_debug', None)
              profile = out.get('data_profile') if isinstance(out.get('data_profile'), dict) else {}
              if profile:
                  out['data_profile'] = {
                      'row_count': _safe_int(profile.get('row_count'), 0),
                      'fields': [str(x) for x in (profile.get('fields') or [])[:50]],
                      'preview_rows': [r for r in (profile.get('preview_rows') or [])[:5] if isinstance(r, dict)],
                  }
              return out


          def _query_result_profile(query_result_json, rows, fields_json='', row_count=0):
              qr = _loads_any(query_result_json, {})
              profile = qr.get('profile') if isinstance(qr, dict) and isinstance(qr.get('profile'), dict) else {}
              qr_rows = profile.get('preview_rows') if isinstance(profile.get('preview_rows'), list) else []
              source_rows = qr_rows or _rows(rows)[:5]
              fields = []
              if isinstance(qr, dict) and isinstance(qr.get('fields'), list):
                  fields = qr.get('fields') or []
              if not fields:
                  parsed_fields = _loads_any(fields_json, [])
                  fields = parsed_fields if isinstance(parsed_fields, list) else []
              if not fields:
                  fields = _fields(source_rows, [])[:50]
              count = _safe_int(row_count, -1)
              if count < 0 and isinstance(qr, dict):
                  count = _safe_int(qr.get('row_count'), -1)
              if count < 0:
                  count = len(_rows(rows))
              return {
                  'row_count': max(0, count),
                  'fields': [str(x) for x in fields[:50]],
                  'preview_rows': [r for r in source_rows[:5] if isinstance(r, dict)],
              }


          def _query_success(query_result_json, execution_success=True):
              qr = _loads_any(query_result_json, {})
              if isinstance(qr, dict) and 'success' in qr:
                  return _safe_bool(qr.get('success'))
              if isinstance(qr, dict) and 'execution_success' in qr:
                  return _safe_bool(qr.get('execution_success'))
              return _safe_bool(execution_success)


          def _compiler_error(query_result_json, execution_error=''):
              qr = _loads_any(query_result_json, {})
              msg = ''
              if isinstance(qr, dict):
                  msg = str(qr.get('execution_error') or qr.get('error') or qr.get('message') or '')
              raw = (str(execution_error or '') or msg)[:300]
              if raw:
                  return '执行阶段失败，已隐藏内部错误细节。'
              return '执行阶段返回失败。'


          def _markdown_from_payload(payload):
              parts = []
              for key in ('answer_text', 'chart_echarts_markdown', 'message'):
                  val = str(payload.get(key) or '').strip()
                  if val and val not in parts:
                      parts.append(val)
              return '\n\n'.join(parts).strip() or '系统在处理该查询时出现异常，请调整问题后重试。'


          def _answer_payload(answer_type, answer_text='', chart_markdown='', result_summary='', message='', chart_payload=None, query_profile=None, should_save=True, context_summary=None):
              return {
