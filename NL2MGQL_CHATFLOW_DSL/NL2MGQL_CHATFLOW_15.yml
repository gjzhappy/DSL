    - data:
        code: |
          """Phase 9 runtime schema context helper for semantic_plan_validator.

          Builds a transient schema_runtime_context_contract immediately before validation.
          It never persists full schema metadata or alias index into compact conversation context.
          """

          from __future__ import annotations

          import json
          from typing import Any, Dict, List, Tuple

          CONTRACT_VERSION = "schema_runtime_context_contract"


          def _loads(v: Any, default: Any = None) -> Any:
              if default is None:
                  default = {}
              if isinstance(v, (dict, list)):
                  return v
              if isinstance(v, str) and v.strip():
                  try:
                      return json.loads(v)
                  except Exception:
                      return default
              return default


          def _dumps(v: Any) -> str:
              return json.dumps(v if v is not None else {}, ensure_ascii=False, separators=(",", ":"))


          def _str(v: Any) -> str:
              return str(v or "").strip()


          def _list(v: Any) -> List[Any]:
              if v is None or v == "":
                  return []
              if isinstance(v, list):
                  return [x for x in v if x is not None and _str(x)]
              if isinstance(v, str):
                  parsed = _loads(v, None)
                  if isinstance(parsed, list):
                      return [x for x in parsed if x is not None and _str(x)]
                  return [x.strip() for x in v.split(",") if x.strip()]
              return [v]


          def _add(xs: List[str], value: Any) -> None:
              s = _str(value)
              if s and s not in xs:
                  xs.append(s)


          def _collections_from_plan(plan: Dict[str, Any]) -> Tuple[List[str], str]:
              out: List[str] = []
              primary = _str(plan.get("primary_collection"))
              _add(out, primary)
              for rc in _list(plan.get("related_collections")):
                  _add(out, rc)
              stages = plan.get("stages") if isinstance(plan.get("stages"), list) else []
              for stage in stages:
                  if isinstance(stage, dict):
                      _add(out, stage.get("collection"))
                      _add(out, stage.get("primary_collection"))
                      for rc in _list(stage.get("related_collections")):
                          _add(out, rc)
              return out, primary


          def _collections_from_selection(selection: Dict[str, Any]) -> List[str]:
              out: List[str] = []
              _add(out, selection.get("selected_primary_collection"))
              for key in ("selected_related_collections", "related_collections", "candidate_collections"):
                  for c in _list(selection.get(key)):
                      if isinstance(c, dict):
                          _add(out, c.get("collection") or c.get("name"))
                      else:
                          _add(out, c)
              return out


          def _collections_from_compact(compact: Dict[str, Any]) -> List[str]:
              out: List[str] = []
              ref = compact.get("schema_context_ref") if isinstance(compact.get("schema_context_ref"), dict) else {}
              for c in _list(ref.get("collections")):
                  _add(out, c)
              _add(out, compact.get("last_primary_collection"))
              for c in _list(compact.get("last_related_collections")):
                  _add(out, c)
              return out


          def _loads_with_error(v: Any, default: Any = None) -> Tuple[Any, str]:
              if default is None:
                  default = {}
              if isinstance(v, (dict, list)):
                  return v, ""
              if isinstance(v, str):
                  if not v.strip():
                      return default, ""
                  try:
                      return json.loads(v), ""
                  except Exception:
                      return default, "schema_metadata_parse_failed"
              return default, ""


          def _schema_info(schema_raw: Any) -> Tuple[Dict[str, Any], bool, str, bool]:
              schema, parse_error = _loads_with_error(schema_raw, {})
              if parse_error:
                  return {}, False, parse_error, True
              if not isinstance(schema, dict) or not schema:
                  return {}, False, "empty_schema_metadata", False
              collections = schema.get("collections")
              if not isinstance(collections, dict) or not collections:
                  return schema, False, "missing_schema_metadata_collections", False
              return schema, True, "", False


          def _alias_index(alias_raw: Any) -> Dict[str, Any]:
              alias_index = _loads(alias_raw, {})
              return alias_index if isinstance(alias_index, dict) else {}


          def _schema_collections(schema: Dict[str, Any]) -> List[str]:
              if not isinstance(schema, dict):
                  return []
              collections = schema.get("collections")
              if isinstance(collections, dict):
                  return [str(k).strip() for k in collections.keys() if str(k).strip()]
              return []


          def _missing_collections(required: List[str], available: List[str]) -> List[str]:
              available_set = {str(x).strip() for x in available if str(x).strip()}
              return [str(x).strip() for x in required if str(x).strip() and str(x).strip() not in available_set]


          def _parsed_collection_names(schema: Dict[str, Any]) -> List[str]:
              return _schema_collections(schema)


          def _prune_ref_to_parsed(collections: List[str], schema: Dict[str, Any], warnings: List[Any]) -> List[str]:
              parsed = set(_parsed_collection_names(schema))
              if not parsed:
                  return collections
              kept = [c for c in collections if c in parsed]
              removed = [c for c in collections if c not in parsed]
              if removed:
                  warnings.append({
                      "type": "schema_context_ref_pruned_to_parsed_collections",
                      "removed": removed,
                      "reason": "requested collection was not parsed into schema_metadata.collections",
                  })
              return kept


          def _ref(compact: Dict[str, Any]) -> Dict[str, Any]:
              return compact.get("schema_context_ref") if isinstance(compact.get("schema_context_ref"), dict) else {}


          def _result(**kwargs: Any) -> Dict[str, Any]:
              base = {
                  "contract_version": CONTRACT_VERSION,
                  "schema_context_ready": False,
                  "validator_schema_context_ready": False,
                  "schema_hydration_needed": False,
                  "schema_hydration_reason": "",
                  "schema_hydration_collections": [],
                  "schema_metadata_json": "{}",
                  "schema_alias_index_json": "{}",
                  "schema_digest": "",
                  "schema_version": "",
                  "catalog_digest": "",
                  "schema_source": "missing",
                  "schema_context_ref": {"collections": [], "schema_digest": "", "schema_version": "", "catalog_digest": ""},
                  "warnings": [],
                  "errors": [],
              }
              base.update(kwargs)
              base["schema_context_ready"] = bool(base.get("schema_context_ready"))
              base["validator_schema_context_ready"] = bool(base.get("validator_schema_context_ready", base["schema_context_ready"]))
              if not isinstance(base.get("schema_context_ref"), dict):
                  base["schema_context_ref"] = {
                      "collections": base.get("schema_hydration_collections") or [],
                      "schema_digest": base.get("schema_digest") or "",
                      "schema_version": base.get("schema_version") or "",
                      "catalog_digest": base.get("catalog_digest") or "",
                  }
              base["schema_runtime_context_json"] = _dumps({k: v for k, v in base.items() if k not in {"schema_runtime_context_json"}})
              return base


          def prepare_validator_schema_context(
              semantic_plan_json: Any = "{}",
              schema_metadata_json: Any = "{}",
              schema_alias_index_json: Any = "{}",
              collection_selection_json: Any = "{}",
              compact_context_json: Any = "{}",
              legacy_schema_metadata_json: Any = "{}",
              legacy_schema_alias_index_json: Any = "{}",
          ) -> Dict[str, Any]:
              warnings: List[Any] = []
              errors: List[str] = []
              plan = _loads(semantic_plan_json, {})
              if not isinstance(plan, dict):
                  plan = {}
              selection = _loads(collection_selection_json, {})
              if not isinstance(selection, dict):
                  selection = {}
              compact = _loads(compact_context_json, {})
              if not isinstance(compact, dict):
                  compact = {}
              ref = _ref(compact)

              plan_cols, _primary = _collections_from_plan(plan)
              fallback_cols: List[str] = []
              for source in (_collections_from_selection(selection), _collections_from_compact(compact)):
                  for c in source:
                      _add(fallback_cols, c)
              required = plan_cols or fallback_cols

              schema, schema_ok, schema_reason, schema_parse_failed = _schema_info(schema_metadata_json)
              alias_index = _alias_index(schema_alias_index_json)
              available = _schema_collections(schema)
              missing = _missing_collections(required, available)
              digest = _str(schema.get("schema_digest")) if isinstance(schema, dict) else ""
              version = _str(schema.get("schema_version")) if isinstance(schema, dict) else ""
              catalog_digest = _str(schema.get("catalog_digest") or ref.get("catalog_digest")) if isinstance(schema, dict) else _str(ref.get("catalog_digest"))
              ref_digest = _str(ref.get("schema_digest"))
              ref_version = _str(ref.get("schema_version"))

              if ref_digest and digest and ref_digest != digest:
                  warnings.append("schema_digest_mismatch_between_runtime_and_compact_ref")
              if ref_version and version and ref_version != version:
                  warnings.append("schema_version_mismatch_between_runtime_and_compact_ref")
              if schema_ok and not alias_index:
                  warnings.append("schema_alias_index_missing_but_schema_reused")

              if schema_ok and required and not missing:
                  return _result(
                      schema_context_ready=True,
                      validator_schema_context_ready=True,
                      schema_hydration_needed=False,
                      schema_hydration_reason="",
                      schema_hydration_collections=[],
                      schema_metadata_json=_dumps(schema),
                      schema_alias_index_json=_dumps(alias_index),
                      schema_digest=digest,
                      schema_version=version,
                      catalog_digest=catalog_digest,
                      schema_source="candidate_runtime_reuse",
                      schema_context_ref={"collections": available, "schema_digest": digest, "schema_version": version, "catalog_digest": catalog_digest},
                      warnings=warnings,
                      errors=[],
                  )

              legacy_schema, legacy_schema_ok, _legacy_reason, _ = _schema_info(legacy_schema_metadata_json)
              legacy_alias = _alias_index(legacy_schema_alias_index_json)
              legacy_available = _schema_collections(legacy_schema)
              legacy_missing = _missing_collections(required, legacy_available)
              if legacy_schema_ok and required and not legacy_missing:
                  if not legacy_alias:
                      warnings.append("legacy_schema_alias_index_missing_but_schema_reused")
                  warnings.append("legacy_conversation_schema_fallback_used_runtime_only")
                  return _result(
                      schema_context_ready=True,
                      validator_schema_context_ready=True,
                      schema_hydration_needed=False,
                      schema_hydration_reason="legacy_conversation_compat",
                      schema_hydration_collections=[],
                      schema_metadata_json=_dumps(legacy_schema),
                      schema_alias_index_json=_dumps(legacy_alias),
                      schema_digest=_str(legacy_schema.get("schema_digest") or digest or ref_digest),
                      schema_version=_str(legacy_schema.get("schema_version") or version or ref_version),
                      catalog_digest=_str(legacy_schema.get("catalog_digest") or catalog_digest),
                      schema_source="legacy_conversation_compat",
                      schema_context_ref={"collections": legacy_available, "schema_digest": _str(legacy_schema.get("schema_digest") or digest or ref_digest), "schema_version": _str(legacy_schema.get("schema_version") or version or ref_version), "catalog_digest": _str(legacy_schema.get("catalog_digest") or catalog_digest)},
                      warnings=warnings,
                      errors=[],
                  )

              if not required:
                  errors.append("missing_collections_for_schema_hydration")
                  return _result(
                      schema_context_ready=False,
                      validator_schema_context_ready=False,
                      schema_hydration_needed=False,
                      schema_hydration_reason="missing_collections_for_schema_hydration",
                      schema_hydration_collections=[],
                      schema_digest=digest or ref_digest,
                      schema_version=version or ref_version,
                      catalog_digest=catalog_digest,
                      schema_source="invalid" if schema_metadata_json and schema_metadata_json != "{}" else "missing",
                      schema_context_ref={"collections": available, "schema_digest": digest or ref_digest, "schema_version": version or ref_version, "catalog_digest": catalog_digest},
                      warnings=warnings,
                      errors=errors,
                  )

              if schema_parse_failed:
                  hydration_reason = "schema_metadata_parse_failed"
                  hydration_collections = required
                  schema_source = "invalid"
              elif schema_ok:
                  hydration_reason = "missing_required_collections" if missing else "runtime_schema_context_not_ready"
                  hydration_collections = missing or required
                  schema_source = "candidate_runtime_incomplete"
              else:
                  hydration_reason = schema_reason or "runtime_schema_context_not_ready"
                  hydration_collections = required
                  schema_source = "missing" if schema_metadata_json in (None, "", "{}") else "invalid"

              return _result(
                  schema_context_ready=False,
                  validator_schema_context_ready=False,
                  schema_hydration_needed=True,
                  schema_hydration_reason=hydration_reason,
                  schema_hydration_collections=hydration_collections,
                  schema_digest=digest or ref_digest,
                  schema_version=version or ref_version,
                  catalog_digest=catalog_digest,
                  schema_source=schema_source,
                  schema_context_ref={"collections": available, "schema_digest": digest or ref_digest, "schema_version": version or ref_version, "catalog_digest": catalog_digest},
                  warnings=warnings,
                  errors=errors,
              )


          def main(**kwargs: Any) -> Dict[str, Any]:
              return prepare_validator_schema_context(**kwargs)

