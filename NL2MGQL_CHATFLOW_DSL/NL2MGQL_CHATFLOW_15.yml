    - data:
        code: |
          """Phase 8 semantic_plan_validator runtime contract helper.

          This module mirrors the code embedded in the DSL node `代码执行_semantic_plan_validator`.
          It intentionally validates and canonicalizes semantic_plan_contract JSON without generating
          Mongo pipelines or rewriting compiler/executor behavior.
          """

          from __future__ import annotations

          import copy
          import json
          import re
          from datetime import datetime
          from typing import Any, Dict, List, Tuple

          VALID_ROUTES = {"valid", "needs_replan", "requires_clarification", "blocked", "invalid"}
          ALLOWED_OPERATORS = {"eq", "ne", "gt", "gte", "lt", "lte", "in", "nin", "contains", "regex", "between"}
          SUPPORTED_CHART_TYPES = {"", "bar", "line", "pie", "table", "area", "scatter", "柱状图", "折线图", "饼图", "表格"}
          PII_WORDS = ("手机", "手机号", "电话", "身份证", "邮箱", "email", "phone", "mobile", "id_card")

          COMPILER_SUPPORTED_INTENT_TYPES = {"detail_query", "aggregate_summary", "group_top_entity", "group_top_record", "enrich_related"}
          INTENT_TYPE_ALIASES = {
              "aggregate": "aggregate_summary",
              "aggregation": "aggregate_summary",
              "summary": "aggregate_summary",
              "aggregate_summary": "aggregate_summary",
              "group_by": "aggregate_summary",
              "group": "aggregate_summary",
              "grouping": "aggregate_summary",
              "group_count": "aggregate_summary",
              "group_stat": "aggregate_summary",
              "group_statistics": "aggregate_summary",
              "count_by_group": "aggregate_summary",
              "grouped_count": "aggregate_summary",
              "group_by_metric": "aggregate_summary",
              "group_and_metric": "aggregate_summary",
              "aggregation_by_group": "aggregate_summary",
              "group_summary": "aggregate_summary",
              "metric_by_group": "aggregate_summary",
              "chart_aggregate": "aggregate_summary",
              "group_by_dimension": "aggregate_summary",
              "group_by_dimension_with_time_range_and_aggregation": "aggregate_summary",
              "group_by_metric_with_time_filter": "aggregate_summary",
              "aggregate_group_by": "aggregate_summary",
              "aggregate_group": "aggregate_summary",
              "aggregation_group": "aggregate_summary",
              "aggregate_grouped": "aggregate_summary",
              "aggregation_grouped": "aggregate_summary",
              "group_metric": "aggregate_summary",
              "group_metric_summary": "aggregate_summary",
              "group_metric_aggregate": "aggregate_summary",
              "group_metric_aggregation": "aggregate_summary",
              "group_aggregate": "aggregate_summary",
              "grouped_aggregate": "aggregate_summary",
              "grouped_aggregation": "aggregate_summary",
              "aggregation_grouped": "aggregate_summary",
              "grouped_metric_aggregation": "aggregate_summary",
              "aggregate_by_group": "aggregate_summary",
              "aggregate_by_dimension": "aggregate_summary",
              "dimension_aggregate": "aggregate_summary",
              "summary_by_group": "aggregate_summary",
              "summary_by_dimension": "aggregate_summary",
              "detail": "detail_query",
              "detail_query": "detail_query",
              "find": "detail_query",
              "find_query": "detail_query",
              "query": "detail_query",
              "group_top_entity": "group_top_entity",
              "top_entity": "group_top_entity",
              "group_top_record": "group_top_record",
              "top_record": "group_top_record",
              "enrich_related": "enrich_related",
              "join": "enrich_related",
          }


          def _looks_like_grouped_aggregate(stage: Dict[str, Any] | None = None) -> bool:
              stage = stage if isinstance(stage, dict) else {}
              group_fields = stage.get("group_fields") or stage.get("group_by") or []
              metrics = stage.get("metrics") or []
              return bool(group_fields) and (
                  bool(stage.get("metric_function"))
                  or bool(stage.get("metric_field"))
                  or bool(stage.get("metric_alias"))
                  or bool(metrics)
              )


          def canonicalize_intent_type(intent_type: Any, stage: Dict[str, Any] | None = None) -> str:
              raw = _str(intent_type).lower()
              stage = stage if isinstance(stage, dict) else {}
              if raw in {"aggregate", "aggregation"}:
                  if stage.get("group_fields") and (stage.get("metric_function") or stage.get("metric_alias") or stage.get("metric_field")):
                      return "aggregate_summary"
                  if stage.get("metric_function") or stage.get("metric_alias") or stage.get("metric_field"):
                      return "aggregate_summary"
                  if stage.get("filters") or stage.get("projection_fields"):
                      return "detail_query"
              if raw in INTENT_TYPE_ALIASES:
                  return INTENT_TYPE_ALIASES[raw]
              normalized_tokens = {token for token in raw.replace("-", "_").split("_") if token}
              has_aggregate_token = bool(normalized_tokens & {"aggregate", "aggregation"})
              has_group_token = bool(normalized_tokens & {"group", "grouped"})
              if raw and raw not in COMPILER_SUPPORTED_INTENT_TYPES and has_aggregate_token and has_group_token:
                  return "aggregate_summary"
              if raw and raw not in COMPILER_SUPPORTED_INTENT_TYPES and _looks_like_grouped_aggregate(stage):
                  return "aggregate_summary"
              if not raw:
                  return "aggregate_summary" if (stage.get("group_fields") or stage.get("metric_alias") or stage.get("metric_function") or stage.get("metric_field") or stage.get("metrics")) else "detail_query"
              return raw


          def _loads(v: Any, default: Any = None) -> Any:
              if default is None:
                  default = {}
              if isinstance(v, (dict, list)):
                  return v
              if isinstance(v, str) and v.strip():
                  try:
                      return json.loads(v)
                  except Exception:
                      return default
              return default


          def _list(v: Any) -> List[Any]:
              if v is None or v == "":
                  return []
              if isinstance(v, list):
                  return [x for x in v if x is not None and str(x).strip()]
              if isinstance(v, str):
                  s = v.strip()
                  if not s:
                      return []
                  try:
                      parsed = json.loads(s)
                      if isinstance(parsed, list):
                          return [x for x in parsed if x is not None and str(x).strip()]
                  except Exception:
                      pass
                  return [x.strip() for x in re.split(r"\s*,\s*", s) if x.strip()]
              return [v]


          def _str(v: Any) -> str:
              return str(v or "").strip()


          def _normalize_stage_depends_on(value: Any) -> str:
              """Normalize depends_on to scalar stage name for semantic_plan_contract."""
              if value is None:
                  return ""
              if isinstance(value, list):
                  for item in value:
                      s = str(item or "").strip()
                      if s:
                          return s
                  return ""
              s = str(value or "").strip()
              if not s:
                  return ""
              if s.startswith("[") and s.endswith("]"):
                  try:
                      import ast
                      parsed = ast.literal_eval(s)
                      if isinstance(parsed, list):
                          for item in parsed:
                              item_s = str(item or "").strip()
                              if item_s:
                                  return item_s
                          return ""
                  except Exception:
                      pass
              return s


          def _safe_message_text(item: Any) -> str:
              if item is None:
                  return ""
              if isinstance(item, str):
                  return item.strip()
              if isinstance(item, dict):
                  typ = item.get("type") or item.get("code") or item.get("warning_type") or ""
                  msg = item.get("message") or item.get("reason") or item.get("detail") or ""
                  if typ and msg:
                      return f"{typ}: {msg}"
                  if typ:
                      return str(typ).strip()
                  if msg:
                      return str(msg).strip()
                  try:
                      return json.dumps(item, ensure_ascii=False, sort_keys=True)
                  except Exception:
                      return str(item).strip()
              try:
                  return str(item).strip()
              except Exception:
                  return ""

          def _safe_text_list(value: Any) -> List[str]:
              if value is None or value == "":
                  return []
              items = value if isinstance(value, list) else [value]
              out: List[str] = []
              for item in items:
                  text = _safe_message_text(item)
                  if text:
                      out.append(text)
              return out

          def _sanitize_normalized_plan_runtime_fields(plan: Dict[str, Any]) -> Dict[str, Any]:
              if not isinstance(plan, dict):
                  return plan
              if "normalizer_warnings" in plan:
                  plan["normalizer_warnings"] = _safe_text_list(plan.get("normalizer_warnings"))
              return plan


          def _result(route: str, plan: Dict[str, Any] | None, errors=None, warnings=None, autofixes=None, clarification="", blocked="", debug=None, needs_schema_retrieval=False) -> Dict[str, Any]:
              route = route if route in VALID_ROUTES else "invalid"
              normalized = copy.deepcopy(plan) if isinstance(plan, dict) else {}
              normalized = _sanitize_normalized_plan_runtime_fields(normalized)
              return {
                  "contract_version": "validator_result_contract",
                  "valid": route == "valid",
                  "validator_route": route,
                  "normalized_plan": normalized,
                  "normalized_plan_json": json.dumps(normalized, ensure_ascii=False) if route == "valid" and normalized else "{}",
                  "semantic_plan_json": json.dumps(normalized, ensure_ascii=False) if route == "valid" and normalized else "{}",
                  "normalized_semantic_plan_json": json.dumps(normalized, ensure_ascii=False) if route == "valid" and normalized else "{}",
                  "errors": errors or [],
                  "warnings": warnings or [],
                  "autofixes": autofixes or [],
                  "needs_replan": route == "needs_replan",
                  "needs_schema_retrieval": bool(needs_schema_retrieval),
                  "requires_clarification": route == "requires_clarification",
                  "clarification_question": clarification or ("我需要确认一下：当前查询中的字段或指标对应哪个 schema 字段？" if route == "requires_clarification" else ""),
                  "blocked_reason": blocked or ("当前查询不符合安全或 schema 关系约束，未进入 Mongo 编译执行。" if route == "blocked" else ""),
                  "debug": debug or {},
                  "validator_result_json": "",  # filled by main for DSL convenience
                  "answer_payload_json": "",
                  "answer_type": {"requires_clarification": "clarification", "blocked": "validation_error", "needs_replan": "validation_error", "invalid": "system_error"}.get(route, "data"),
                  "final_answer_markdown": "",
                  "context_update_json": "",
              }


          def _field_ref_collections(value: Any) -> List[str]:
              refs: List[str] = []
              if isinstance(value, dict):
                  for v in value.values():
                      refs.extend(_field_ref_collections(v))
              elif isinstance(value, list):
                  for v in value:
                      refs.extend(_field_ref_collections(v))
              elif isinstance(value, str):
                  for match in re.findall(r"\b([A-Za-z_][\w-]*)\.[A-Za-z_][\w-]*\b", value):
                      if match not in refs:
                          refs.append(match)
              return refs


          def _related_collection_used(plan: Dict[str, Any], related: str) -> bool:
              stages = plan.get("stages") if isinstance(plan.get("stages"), list) else []
              for stage in stages:
                  if isinstance(stage, dict) and _str(stage.get("collection")) == related:
                      return True
              final_merge = plan.get("final_merge") if isinstance(plan.get("final_merge"), dict) else {}
              if _str(final_merge.get("merge_mode") or "none") != "none":
                  if related in _field_ref_collections(final_merge) or related in [_str(x) for x in _list(final_merge.get("collections") or final_merge.get("related_collections") or final_merge.get("merge_collections"))]:
                      return True
                  if related in json.dumps(final_merge, ensure_ascii=False):
                      return True
              for key in ("joins", "join", "relations", "relation", "enrich", "enrichments", "lookup", "lookups"):
                  if related in _field_ref_collections(plan.get(key)) or (isinstance(plan.get(key), (dict, list)) and related in json.dumps(plan.get(key), ensure_ascii=False)):
                      return True
              for key in ("filters", "group_fields", "projection_fields", "sort"):
                  for stage in stages:
                      if isinstance(stage, dict) and related in _field_ref_collections(stage.get(key)):
                          return True
              chart = plan.get("chart_request") if isinstance(plan.get("chart_request"), dict) else {}
              if related in _field_ref_collections([chart.get("x_field"), chart.get("y_field")]):
                  return True
              for key in ("output_fields", "return_fields", "select_fields"):
                  if related in _field_ref_collections(plan.get(key)):
                      return True
                  for stage in stages:
                      if isinstance(stage, dict) and related in _field_ref_collections(stage.get(key)):
                          return True
              return False


          def _prune_unused_related_collections(plan: Dict[str, Any], autofixes: List[Dict[str, Any]]) -> List[str]:
              related = [_str(x) for x in _list(plan.get("related_collections"))]
              kept = [rc for rc in related if _related_collection_used(plan, rc)]
              removed = [rc for rc in related if rc not in kept]
              if removed:
                  plan["related_collections"] = kept
                  autofixes.append({
                      "type": "unused_related_collection_prune",
                      "from": removed,
                      "to": kept,
                      "reason": "declared related collection is not referenced by stages/final_merge/fields/chart",
                  })
              return kept


          def _iter_named_items(v: Any):
              """Support dict[name -> meta] and list[{"name": ..., ...}] schema sections."""
              if isinstance(v, dict):
                  for name, meta in v.items():
                      if isinstance(meta, dict):
                          item = dict(meta)
                          item.setdefault("name", name)
                          yield item
                      else:
                          yield {"name": _str(name), "value": meta}
              elif isinstance(v, list):
                  for item in v:
                      if isinstance(item, dict):
                          yield item


          def _named_item_map(v: Any) -> Dict[str, Dict[str, Any]]:
              out: Dict[str, Dict[str, Any]] = {}
              for item in _iter_named_items(v):
                  name = _str(item.get("name")).strip()
                  if name:
                      out[name] = item
              return out


          def _alias_hits(alias_index: Any, section: str, raw: str, collection: str, kind: str) -> List[Dict[str, Any]]:
              if not isinstance(alias_index, dict):
                  return []
              bucket = alias_index.get(section)
              if not isinstance(bucket, dict):
                  return []
              hits = bucket.get(raw) or []
              if isinstance(hits, dict):
                  hits = [hits]
              out = []
              for hit in hits if isinstance(hits, list) else []:
                  if not isinstance(hit, dict):
                      continue
                  if collection and hit.get("collection") != collection:
                      continue
                  if hit.get("kind") and hit.get("kind") != kind:
                      continue
                  name = _str(hit.get("name")).strip()
                  if name:
                      out.append({"name": name, "source": section, "label": hit.get("label")})
              return out


          def _field_alias(raw: str, schema: Dict[str, Any], collection: str, alias_index: Any = None) -> Tuple[str, str, List[Dict[str, Any]]]:
              raw = _str(raw).strip()
              if not raw:
                  return raw, "unresolved", []
              hits = _alias_hits(alias_index, "field_aliases", raw, collection, "field")
              if not hits:
                  hits = _alias_hits(alias_index, "aliases", raw, collection, "field")
              if len(hits) == 1:
                  return hits[0]["name"], hits[0]["source"], hits
              if len(hits) > 1:
                  return raw, "ambiguous", hits
              coll = ((schema.get("collections") or {}).get(collection) or {}) if isinstance(schema, dict) else {}
              fields = coll.get("fields") or []
              field_map = _named_item_map(fields)
              if raw in field_map:
                  return raw, "schema_field_name", []
              for field in _iter_named_items(fields):
                  name = _str(field.get("name")).strip()
                  label = _str(field.get("label")).strip()
                  aliases = field.get("aliases") or []
                  if isinstance(aliases, str):
                      aliases = [aliases]
                  candidates = [name, label] + [_str(x).strip() for x in aliases if _str(x).strip()]
                  if raw in candidates:
                      hits.append({"name": name, "source": "field_alias", "label": field.get("label")})
              if len(hits) == 1:
                  return hits[0]["name"], "field_alias", hits
              if len(hits) > 1:
                  return raw, "ambiguous", hits
              return raw, "unresolved", []


          def _metric_alias(raw: str, schema: Dict[str, Any], collection: str, alias_index: Any = None) -> Tuple[str, str, List[Dict[str, Any]]]:
              raw = _str(raw).strip()
              if not raw:
                  return raw, "unresolved", []
              hits = _alias_hits(alias_index, "metric_aliases", raw, collection, "metric")
              if not hits:
                  hits = _alias_hits(alias_index, "aliases", raw, collection, "metric")
              if len(hits) == 1:
                  return hits[0]["name"], hits[0]["source"], hits
              if len(hits) > 1:
                  return raw, "ambiguous", hits
              coll = ((schema.get("collections") or {}).get(collection) or {}) if isinstance(schema, dict) else {}
              metrics = coll.get("metrics") or []
              metric_map = _named_item_map(metrics)
              if raw in metric_map:
                  return raw, "schema_metric_name", []
              for metric in _iter_named_items(metrics):
                  name = _str(metric.get("name")).strip()
                  label = _str(metric.get("label")).strip()
                  aliases = metric.get("aliases") or []
                  if isinstance(aliases, str):
                      aliases = [aliases]
                  candidates = [name, label] + [_str(x).strip() for x in aliases if _str(x).strip()]
                  if raw in candidates:
                      hits.append({"name": name, "source": "metric_alias", "label": metric.get("label")})
              if len(hits) == 1:
                  return hits[0]["name"], "metric_alias", hits
              if len(hits) > 1:
                  return raw, "ambiguous", hits
              return raw, "unresolved", []


          def _value_alias(value: Any, field: Dict[str, Any]) -> Tuple[Any, bool]:
              aliases = field.get("value_aliases") or {}
              key = _str(value)
              if key in aliases:
                  return aliases[key], True
              return value, False


          def _field(schema: Dict[str, Any], collection: str, name: str) -> Dict[str, Any]:
              coll = ((schema.get("collections") or {}).get(collection) or {}) if isinstance(schema, dict) else {}
              return _named_item_map(coll.get("fields") or {}).get(name) or {}


          def _metric(schema: Dict[str, Any], collection: str, name: str) -> Dict[str, Any]:
              coll = ((schema.get("collections") or {}).get(collection) or {}) if isinstance(schema, dict) else {}
              return _named_item_map(coll.get("metrics") or {}).get(name) or {}


          def _is_sensitive(f: Dict[str, Any]) -> bool:
              return bool(f.get("sensitive") or f.get("pii") or f.get("pii_category"))


          def _canonical_field(raw: str, schema: Dict[str, Any], collection: str, place: str, errors: List[str], warnings: List[str], autofixes: List[Dict[str, Any]], require_flag: str = "", alias_index: Any = None) -> str:
              name, source, hits = _field_alias(raw, schema, collection, alias_index)
              if source == "ambiguous":
                  errors.append(f"字段 {raw} 在 collection={collection} 中存在多个候选，需要澄清。")
                  return raw
              if source == "unresolved":
                  errors.append(f"未知字段 {raw}，未在 schema metadata 中声明。")
                  return raw
              if name != raw:
                  autofixes.append({"type": "field_alias_canonicalize", "place": place, "from": raw, "to": name, "collection": collection})
              f = _field(schema, collection, name)
              if require_flag and not bool(f.get(require_flag)):
                  if require_flag in {"projectable", "returnable"} and (f.get("projectable") or f.get("returnable")):
                      warnings.append(f"字段 {name} 使用 {require_flag} 兼容策略放行。")
                  else:
                      errors.append(f"字段 {name} 不允许用于 {place}（{require_flag}=false）。")
              if _is_sensitive(f) and place in {"group_fields", "projection_fields", "sort", "chart_x", "chart_y"}:
                  errors.append(f"敏感/PII 字段 {name} 不允许用于 {place}。")
              return name


          def _stage_is_aggregate(stage: Dict[str, Any]) -> bool:
              if _str(stage.get("stage_type")) == "enrich_related" or _str(stage.get("intent_type")) == "enrich_related":
                  return False
              return bool(stage.get("group_fields") or stage.get("metric_alias") or stage.get("metric_function") or stage.get("metric_field") or canonicalize_intent_type(stage.get("intent_type"), stage) in {"aggregate_summary"} or _str(stage.get("intent_type")) in {"ranking", "trend"})


          def _date_ok(s: str) -> bool:
              if not s:
                  return True
              for fmt in ("%Y-%m-%d", "%Y/%m/%d", "%Y-%m-%dT%H:%M:%S"):
                  try:
                      datetime.strptime(s[:19], fmt)
                      return True
                  except Exception:
                      pass
              return False


          def _negative_fields(compact: Dict[str, Any], patch: Dict[str, Any], patch_debug: Dict[str, Any], qref: Dict[str, Any]) -> List[str]:
              out = []
              sources = [patch.get("negative_fields"), patch_debug.get("negative_fields"), qref.get("negative_fields")]
              for item in _list(patch.get("unapplied_refinements")):
                  if isinstance(item, dict):
                      sources.append(item.get("negative_fields") or item.get("field"))
              text = json.dumps([patch, patch_debug, qref], ensure_ascii=False)
              for src in sources:
                  for x in _list(src):
                      if isinstance(x, dict):
                          x = x.get("field") or x.get("name")
                      if _str(x):
                          out.append(_str(x))
              return list(dict.fromkeys(out))


          def semantic_plan_validator(question: str = "", semantic_plan_json: str = "{}", schema_metadata_json: str = "{}", schema_alias_index_json: str = "{}", collection_selection_json: str = "{}", compact_context_json: str = "{}", patch_result_json: str = "{}", patch_debug_json: str = "{}", query_refinement_json: str = "{}", normalizer_valid: Any = True, normalizer_route: str = "ok", schema_runtime_context_json: str = "{}") -> Dict[str, Any]:
              errors: List[str] = []
              warnings: List[str] = []
              autofixes: List[Dict[str, Any]] = []
              debug: Dict[str, Any] = {"normalizer_route": _str(normalizer_route)}

              runtime_ctx = _loads(schema_runtime_context_json, {})
              if not isinstance(runtime_ctx, dict):
                  runtime_ctx = {}
              plan = _loads(semantic_plan_json, {})
              runtime_schema_json = runtime_ctx.get("schema_metadata_json") if runtime_ctx.get("schema_metadata_json") not in (None, "") else schema_metadata_json
              runtime_alias_json = runtime_ctx.get("schema_alias_index_json") if runtime_ctx.get("schema_alias_index_json") not in (None, "") else schema_alias_index_json
              schema = _loads(runtime_schema_json, {})
              alias_index = _loads(runtime_alias_json, {})
              selection = _loads(collection_selection_json, {})
              compact = _loads(compact_context_json, {})
              if not isinstance(compact, dict):
                  compact = {}
              debug["prior_compact_context"] = {
                  "has_last_context": bool(compact),
                  "last_primary_collection": compact.get("last_primary_collection") or "",
                  "last_related_collections": compact.get("last_related_collections") if isinstance(compact.get("last_related_collections"), list) else [],
                  "last_plan_summary": compact.get("last_plan_summary") if isinstance(compact.get("last_plan_summary"), dict) else {},
                  "last_resolved_fields": compact.get("last_resolved_fields") if isinstance(compact.get("last_resolved_fields"), list) else [],
                  "last_resolved_metrics": compact.get("last_resolved_metrics") if isinstance(compact.get("last_resolved_metrics"), list) else [],
                  "last_chart_request": compact.get("last_chart_request") if isinstance(compact.get("last_chart_request"), dict) else {},
                  "last_result_profile": compact.get("last_result_profile") if isinstance(compact.get("last_result_profile"), dict) else {"row_count": 0, "fields": [], "preview_rows": []},
                  "schema_context_ref": compact.get("schema_context_ref") if isinstance(compact.get("schema_context_ref"), dict) else {},
              }
              patch = _loads(patch_result_json, {})
              if isinstance(patch, list):
                  patch = {"unapplied_refinements": patch}
              elif not isinstance(patch, dict):
                  patch = {}
              patch_debug = _loads(patch_debug_json, {})
              if not isinstance(patch_debug, dict):
                  patch_debug = {}
              qref = _loads(query_refinement_json, {})
              if not isinstance(qref, dict):
                  qref = {}

              debug["question"] = _str(question)
              debug["schema_source"] = _str(runtime_ctx.get("schema_source")) or "direct_runtime_fallback"
              debug["schema_context_ref"] = runtime_ctx.get("schema_context_ref") if isinstance(runtime_ctx.get("schema_context_ref"), dict) else {}
              debug["schema_context_ready"] = bool(runtime_ctx.get("schema_context_ready")) if runtime_ctx else bool(schema)
              debug["schema_hydration_needed"] = bool(runtime_ctx.get("schema_hydration_needed"))
              if runtime_ctx and not runtime_ctx.get("schema_context_ready"):
                  reason = _str(runtime_ctx.get("schema_hydration_reason")) or "schema_runtime_context_not_ready"
                  collections = runtime_ctx.get("schema_hydration_collections") or []
                  msg = f"validator runtime schema context 未就绪：{reason}。"
                  if collections:
                      msg += f" 可基于 collections={collections} 轻量检索 schema 后重试校验。"
                  return _finalize(_result("needs_replan", plan if isinstance(plan, dict) else {}, [msg] + _list(runtime_ctx.get("errors")), _list(runtime_ctx.get("warnings")), debug=debug, needs_schema_retrieval=bool(runtime_ctx.get("schema_hydration_needed"))))
              if str(normalizer_valid).lower() in {"false", "0", "no"}:
                  return _finalize(_result("invalid", {}, ["semantic_plan_normalizer 未通过，validator 拒绝进入 Mongo 编译。"], debug=debug))
              if not isinstance(plan, dict) or not plan:
                  return _finalize(_result("invalid", {}, ["semantic_plan_json 为空或不是 JSON 对象。"], debug=debug))
              stages = plan.get("stages") if isinstance(plan.get("stages"), list) else []
              if not stages:
                  return _finalize(_result("invalid", plan, ["semantic_plan_contract 缺少 stages。"], debug=debug))
              collections = schema.get("collections") or {}
              if not collections:
                  return _finalize(_result("needs_replan", plan, ["缺少 schema_metadata.collections，无法校验字段与指标。"], debug=debug, needs_schema_retrieval=True))

              plan = copy.deepcopy(plan)
              primary = _str(plan.get("primary_collection") or (stages[0] or {}).get("collection"))
              selected = _str(selection.get("selected_primary_collection"))
              confidence = float(selection.get("confidence") or 0) if isinstance(selection, dict) else 0.0
              if not primary or primary not in collections:
                  errors.append(f"primary_collection={primary or '<empty>'} 不存在于 schema metadata。")
