          def _looks_like_grouped_aggregate(stage: Dict[str, Any] | None = None) -> bool:
              stage = stage if isinstance(stage, dict) else {}
              group_fields = stage.get("group_fields") or stage.get("group_by") or []
              metrics = stage.get("metrics") or []
              return bool(group_fields) and (
                  bool(stage.get("metric_function"))
                  or bool(stage.get("metric_field"))
                  or bool(stage.get("metric_alias"))
                  or bool(metrics)
              )


          def canonicalize_intent_type(intent_type: Any, stage: Dict[str, Any] | None = None) -> str:
              raw = _str(intent_type).lower()
              stage = stage if isinstance(stage, dict) else {}
              if raw in {"aggregate", "aggregation"}:
                  if stage.get("group_fields") and (stage.get("metric_function") or stage.get("metric_alias") or stage.get("metric_field")):
                      return "aggregate_summary"
                  if stage.get("metric_function") or stage.get("metric_alias") or stage.get("metric_field"):
                      return "aggregate_summary"
                  if stage.get("filters") or stage.get("projection_fields"):
                      return "detail_query"
              if raw in INTENT_TYPE_ALIASES:
                  return INTENT_TYPE_ALIASES[raw]
              normalized_tokens = {token for token in raw.replace("-", "_").split("_") if token}
              has_aggregate_token = bool(normalized_tokens & {"aggregate", "aggregation"})
              has_group_token = bool(normalized_tokens & {"group", "grouped"})
              if raw and raw not in COMPILER_SUPPORTED_INTENT_TYPES and has_aggregate_token and has_group_token:
                  return "aggregate_summary"
              if raw and raw not in COMPILER_SUPPORTED_INTENT_TYPES and _looks_like_grouped_aggregate(stage):
                  return "aggregate_summary"
              if not raw:
                  return "aggregate_summary" if (stage.get("group_fields") or stage.get("metric_alias") or stage.get("metric_function") or stage.get("metric_field") or stage.get("metrics")) else "detail_query"
              return raw


